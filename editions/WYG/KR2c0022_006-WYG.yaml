  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0022_WYG_006-1a, image: WYG0369/WYG0369-0041c.png}
body:
  text: 左傳紀事本末卷六詹事府詹事髙士竒撰魯與列國通好宋衛節共姬之附隠公元年九月及宋人盟于宿惠公之季年敗宋師于黄公立而求成焉及宋人盟于宿始通也七年秋宋及鄭平七月庚申盟于宿公伐邾為宋討也八年春齊侯將平宋衞有㑹期宋公以幣請于衞請先相見衞侯許之故遇于犬丘齊人卒平宋衞于鄭秋㑹于温盟于瓦屋以釋東門之役禮也桓公二年春王正月戊申宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公督召莊公于鄭而立之以親鄭滕子來朝三月公㑹齊侯陳侯鄭伯于稷以成宋亂為賂故立華氏也夏四月取郜大鼎于宋戊申納于大廟僖公二十五年衞人平莒于我十二月盟于洮修衞文公之好且及莒平也二十六年春王正月公㑹莒茲㔻公甯莊子盟于向尋洮之盟也齊師侵我西鄙討是二盟也夏衞人伐齊洮之盟故也二十八年晉人執衞侯歸之于京師三十年夏公為之請納玉于王與晉侯皆十㲄王許之秋乃釋衞侯文公四年秋衞甯武子來聘俱詳甯武子弭晉難五年臧文仲以陳衞之睦也欲求好于陳夏季文子聘于陳且娶焉襄仲聘于宋且言司城蕩意諸而復之因賀楚師之不害也宣公七年春衞孫桓子來盟始通且謀㑹晉也成公三年冬十一月晉侯使荀庚來聘且尋盟衞侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之于晉也其位在三孫子之于衞也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衞在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衞禮也四年春宋華元來聘通嗣君也五年春孟獻子如宋報華元也八年春宋華元來聘聘共姬也夏宋公使公孫壽來納幣禮也冬衞人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否九年二月伯姬歸于宋夏季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入晉人來媵禮也十五年夏六月宋共公卒襄公元年冬衞子叔來聘禮也二年秋穆叔聘于宋通嗣君也七年秋季武子如衞報子叔之聘且辭緩報非貳也冬衞孫文子來聘且拜武子之言而尋孫桓子之盟詳晉悼復伯孫甯廢立十有五年春宋公使向戌來聘且尋盟二十年冬季武子如宋報向戌之聘也褚師段逆之以受享賦常棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也三十年五月或呌于宋大廟曰譆譆出出鳥鳴于亳社如曰譆譆甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也補逸榖梁傳取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少避火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少避火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也秋七月叔弓如宋葬共姬也為宋災故諸侯之大夫㑹以謀歸宋財冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戌衞北宫佗鄭罕虎及小邾之大夫㑹于澶淵既而無歸于宋故不書其人君子曰信其不可不慎乎澶淵之㑹卿不書不信也夫諸侯之上卿㑹而不信寵名皆棄不信之不可也如是詩曰文王陟降在帝左右信之謂也又曰淑慎爾止無載爾偽不信之謂也書曰某人某人㑹于澶淵宋災故尤之也不書魯大夫諱之也補逸列女傳伯姬者魯宣公之女成公之妹也嫁于宋恭公三月廟見當行夫婦之道伯姬以恭公不親迎故不肯聽命宋人告魯魯使大夫季文子如宋致命于伯姬十年恭公卒伯姬寡至景公時伯姬嘗遇夜失火遂逮于火而死諸侯聞之莫不悼痛以為死者不可以生財物猶可復故相與聚㑹于澶淵償宋之所喪春秋善之昭公十一年春王二月叔弓如宋葬平公也十二年夏宋公使華定來聘通嗣君也二十五年九月公孫于齊十一月宋元公將為公故如晉己亥卒于曲棘二十七年秋㑹于扈謀納公也宋衞皆利納公故請之范獻子取貨于季孫乃辭小國而以難復詳見三桓弱公室臣士竒曰春秋時魯于列國邦交自齊晉兩大國外惟宋衞最親衞兄弟也宋姻婭也中間以兵事齟齬者不過數見而已其餘則行李之往來歡好無間即左氏所載未易一二數也隠元年盟宿平王之怨八年遇犬丘又盟瓦屋桓公二年㑹稷文公五年襄仲聘十五年華孫來盟成公四年華元聘五年孟獻子報聘八年華元又聘公孫壽納幣九年伯姬歸季文子致女襄公二年穆叔聘十五年向戍來季武子報之三十年叔弓往葬共姬叔孫豹㑹澶淵宋災故昭公十一年叔弓葬宋平公二十五年宋元將為公故如晉卒曲棘二十七年㑹扈謀納公此魯宋邦交之始末也隠公八年遇犬丘盟瓦屋僖公二十五年盟洮二十六年盟向衞為魯伐齊三十年納玉請釋衞侯文公四年甯俞聘宣公七年孫桓子來盟成公三年良夫聘且尋盟八年媵共姬襄公元年子叔聘七年季武子往報孫文子來尋盟三十年共澶淵之㑹昭公二十七年協納公之謀此魯衞邦交之始末也觀衞成深室之囚諸姬環視莫恤惟魯不愛先君之重器始反衞侯魯昭之逐殞身不惜而為魯急難者宋元也扈之㑹諸大夫莫利納公獨宋衞之大夫心切義舉亦足以明三國之式好無尤善終善始矣獨立督之㑹取賂而不討弑君之賊澶淵謀救宋災而實未嘗以財歸之不獨縱釋蔡般為不知類也此二役誠為可憾而魯衞于宋最暱亦與諸侯同惡焉其謂之何矣共姬賢而有禮遂致諸國之媵及蹈譆譆出出之變守經以死聖人于其始卒一書再書芳流史冊亦可以知立節為大哉左傳紀事本末卷六
