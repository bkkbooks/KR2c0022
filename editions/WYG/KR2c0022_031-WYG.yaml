body:
  text: 左傳紀事本末卷三十一詹事府詹事髙士竒撰晉卿族廢興發明晉之卿族魏氏趙氏狐氏胥氏先氏欒氏郤氏韓氏知氏中行氏范氏凡十一族賈季奔狄而狐氏廢先縠得罪而先氏廢胥廢於郤欒郤廢趙而趙復興厲公用欒氏譖殺三郤而郤氏廢范宣子逐欒盈而欒氏廢范中行氏逐於知韓魏趙而韓魏趙復共滅知伯遂為三晉靈公厲公之弑與軍制之變皆卿族廢興所係也按列國之卿强半公族如魯如宋如鄭則並無他姓齊魏亦多公族惟晉公子不為卿故卿皆異姓然欒氏韓氏亦公族也閔公元年冬晉侯作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還賜趙夙耿賜畢萬魏以為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始攷證史記魏之先畢公髙之後也畢公髙與周同姓武王之伐紂而髙封於畢於是為畢姓其後絶封為庶人或在中國或在夷狄其苗裔曰畢萬事晉獻公畢萬封十一年晉獻公卒四子爭更立晉亂而畢萬之世彌大從其國名為魏氏生武子魏武子以魏諸子事晉公子重耳晉獻公之二十一年武子從重耳出亡十九年反重耳立為晉文公而令魏武子襲魏氏之後封列為大夫治於魏生悼子魏悼子徙治霍生魏絳徙安邑魏絳卒諡爲昭子生魏嬴嬴生魏獻子魏獻子生魏侈魏侈之孫曰魏桓子桓子之孫曰文侯都趙氏之先與秦共祖奄父生叔帶叔帶之時周幽王無道去周如晉事晉文侯始建趙氏於晉國自叔帶以下趙宗益興五世而生趙夙晉獻公之十六年伐霍魏耿而趙夙為將伐霍霍公求犇齊晉大旱卜之曰霍太山為祟使趙夙召霍君於齊復之以奉霍太山之祀晉復穰晉獻公賜趙夙耿趙夙生共孟共孟生趙衰字子餘事晉公子重耳韓之先與周同姓姓姬氏其後苗裔事晉得封於韓原曰韓武子武子後三世有韓厥從封姓為韓氏號為獻子獻子卒子宣子代立宣子徙居州宣子卒子貞子代立貞子徙居平陽貞子卒子簡子代立發明按國語韓宣子曰其自桓叔以下嘉吾子之賜疑韓氏是曲沃桓叔之後以上因趙夙畢萬之封并及韓氏世系志三晉之始也趙氏世系後備詳於傳中惟景子為文子之子簡子之父其事稍微然傳亦載其名諡矣僖公二十三年晉公子重耳之及於難也遂奔狄從者狐偃趙衰顛頡魏武子司空季子狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾二十四年春王正月秦伯納之狄人歸季隗於晉而請其二子文公妻趙衰生原同屏括樓嬰趙姬請逆盾與其母子餘辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請於公以為嫡子而使其三子下之以叔隗為内子而已下之二十五年晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故使處原二十七年冬作三軍謀元帥趙衰曰郤縠可二十八年冬晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行三十一年晉蒐於清原作五軍以禦狄趙衰為卿三十三年晉侯敗狄於箕郤缺獲白狄子初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫反自箕襄公以三命命先且居將中軍以再命命先茅之縣賞胥臣曰舉郤缺子之功也以一命命郤缺為卿復與之冀亦未有軍行文公五年晉陽處父聘於衞反過寗寗嬴從之及温而還其妻問之嬴曰以剛商書曰沈潛剛克髙明柔克夫子壹之其不沒乎天為剛徳猶不干時况在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之晉趙成子欒貞子霍伯臼季皆卒六年春晉蒐於夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自温改蒐於董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政制事典正法罪辟刑獄董逋逃由質要治舊洿本秩禮續常職出滯淹既成以授大傅陽子與太師賈佗使行諸晉國以為常法八月乙亥晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四徳者難必抒矣賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓偪姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士㑹如秦逆公子雍賈季亦使召公子樂於陳趙孟使殺諸郫賈季怨陽子之易其班也而知其無援於晉也九月賈季使續鞫居殺陽處父書曰晉殺其大夫侵官也十一月丙寅晉殺續簡伯賈季奔狄宣子使臾駢送其帑夷之蒐賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也損怨益仇非知也以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟補逸糓梁傳稱國以殺罪累上也襄公已葬其以累上之辭言之何也君漏言也上泄則下闇下闇則上聾且闇且聾無以相通夜姑殺者也夜姑之殺奈何曰晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁其不可乎襄公曰諾謂夜姑曰吾始使盾佐女今女佐盾矣射姑曰敬諾襄公死處父主竟上事夜姑使人殺之君漏言也故士造辟而言詭辭而出曰用我則可不用我則無亂其德公羊傳晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也其漏言奈何君將使射姑將陽處父諫曰射姑民衆不悦不可使將於是廢將陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不悦不可使將射姑怒出刺陽處父於朝而走七年秦康公送公子雍於晉曰文公之入也無衞故有呂郤之難乃多與之徒衞穆嬴日抱太子以啼於朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之步招御戎戎津為右及董陰宣子曰我若受秦秦則賓也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐㓂如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師於令狐至於刳首己丑先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章又弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也士㑹在秦三年不見士伯其人曰能亡人於國不能見於此焉用之士季曰吾與之同罪非義之也將何見焉及歸遂不見狄侵我西鄙公使告於晉趙宣子使因賈季問鄷舒且讓之鄷舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也秋八月齊侯宋公衞侯陳侯鄭伯許男曹伯會晉趙盾盟於扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也後至不書其國辟不敏也八年晉人以扈之盟來討冬襄仲會晉趙孟盟於衡雍報扈之盟也遂會伊雒之戎書曰公子遂珍之也夷之蒐晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勲不可廢也從之先克奪蒯得田於堇陰故箕鄭父先都士縠梁益耳蒯得作亂九年春王正月己酉使賊殺先克乙丑晉人殺先都梁益耳三月甲戌晉人殺箕鄭父士縠蒯得十二年秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師於河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士會曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之婿也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰於河十二月戊午秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩君之士皆未憗也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止補逸説苑趙宣子言韓獻子於晉侯曰其為人不黨治衆不亂臨死不恐晉侯以為中軍尉河曲之役趙宣子之車干行韓獻子戮其僕人皆曰韓獻子必死矣其主朝升之而暮戮其僕誰能待之役罷趙宣子觴大夫爵三行曰二三子可以賀我二三子曰不知所賀宣子曰我言韓厥於君言之而不當必受其刑今吾車失次而戮吾僕可謂不黨矣是吾言當也二三子再拜稽首曰不惟晉國適享之乃唐叔是賴之敢不再拜稽首乎十三年晉人患秦之用士會也夏六卿相見於諸浮趙宣子曰隨會在秦賈季在狄難日生矣若之何中行桓子曰請復賈季能外事且由舊勲郤成子曰賈季亂且罪大不如隨會能賤而有恥柔而不犯其知足使也且無罪乃使魏壽餘偽以魏叛者以誘士㑹執其帑於晉使夜逸請自歸於秦秦伯許之履士會之足於朝秦伯師於河西魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先使士會士會辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以策曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏宣公元年晉人討不用命者放胥甲父於衞而立胥克先辛奔齊宋人之弑昭公也晉荀林父以諸侯之師伐宋取賂而還補逸國語宋人殺昭公趙宣子請師於靈公以伐宋公曰非晉國之急也對曰大者天地其次君臣所以為明訓也今宋人殺其君是反天地而逆民則也天必誅焉晉為盟主而不修天罰將懼及焉公許之乃發令於太廟召軍吏而戒樂正令三軍之鐘鼓必備趙同曰國有大役不鎮撫民而備鐘鼓何也宣子曰大罪伐之小罪憚之襲侵之事陵也今宋人殺其君罪莫大焉明聲之猶恐其不聞也吾備鐘鼓為君故也乃使旁告於諸侯治兵振旅鳴鐘鼔以至於宋發明按是役也取賂而還觀此則似非趙盾之罪故不載晉事而載於此二年晉靈公不君厚斂以雕牆從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也會請先不入則子繼之三進及溜而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣賴之又曰衮職有闕惟仲山甫補之能補過也君能補過衮不廢矣猶不改宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死秋九月晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為鬭且出提彌明死之初宣子田於首山舍於翳桑見靈輒餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸槖以與之既而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也乙丑趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懐矣自詒伊慼其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免宣子使趙穿逆公子黑臀於周而立之壬申朝於武宮補逸公羊傳趙盾弑君此其復見何親弑君者趙穿也親弑君者趙穿則曷為加之趙盾不討賊也何以謂之不討賊晉史書賊曰晉趙盾弑其君夷獋趙盾曰天乎無辜吾不弑君誰謂吾弑君者乎史曰爾為仁為義人弑爾君而復國不討賊此非弑君而何趙盾之復國奈何靈公為無道使諸大夫皆内朝然後處乎臺上引彈而彈之已趨而辟丸是樂而已矣趙盾已朝而出與諸大夫立於朝有人荷畚自閨而出者趙盾曰彼何也夫畚曷為出乎閨呼之不至曰子大夫也欲視之則就而視之趙盾就而視之則赫然死人也趙盾曰是何也曰膳宰也熊蹯不熟公怒以斗摮而殺之支解將使我棄之趙盾曰嘻趨而入靈公望見趙盾愬而再拜趙盾逡巡北面再拜稽首趨而出靈公心怍焉欲殺之於是使勇士某者往殺之勇士入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉俯而闚其户方食魚飱勇士曰嘻子誠仁人也吾入子之大門則無人焉入子之閨則無人焉上子之堂則無人焉是子之易也子為晉國重卿而食魚飱是子之儉也君將使我殺子吾不忍殺子也雖然吾亦不可復見吾君矣遂刎脰而死靈公聞之怒滋欲殺之甚衆莫可使往者於是伏甲於宮中召趙盾而食之趙盾之車右祁彌明者國之力士也仡然從乎趙盾而入放乎堂下而立趙盾已食靈公謂盾曰吾聞子之劍葢利劍也子以示我吾將觀焉趙盾起將進劍祁彌明自下呼之曰盾食飽則出何故拔劍於君所趙盾知之躇階而走靈公有周狗謂之獒呼獒而屬之獒亦躇階而從之祁彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也然而宮中甲鼔而起有起於甲中者抱趙盾而乗之趙盾顧曰吾何以得此於子曰子某時所食活我於暴桑下者也趙盾曰子名為誰曰吾君孰為介子之乗矣何問吾名趙盾驅而出衆無留之者趙穿緣民衆不説起弑靈公然後逆趙盾而入與之立於朝而立成公黑臀穀梁傳穿弑也盾不弑而曰盾弑何也以罪盾也其以罪盾何也曰靈公朝諸大夫而暴彈之觀其辟丸也趙盾入諫不聽出亡至於郊趙穿弑公而後反趙盾史狐書賊曰趙盾弑公盾曰天乎天乎予無罪孰為盾而忍弑其君者乎史狐曰子為正卿入諫不聽出亡不逺君弑反不討賊則志同志同則書重非子而誰故書之曰晉趙盾弑其君夷臯者過在下也曰於盾也見忠臣之至於許世子止見孝子之至呂氏春秋昔趙宣孟將上之絳見骫桑之下有餓人卧不能起者宣孟止車為之下食蠲而餔之再咽而後能視宣孟問之曰女何為而餓若是對曰昔臣宦於絳歸而糧絶羞行乞而憎自取故至於此宣孟與脯一朐拜受而弗敢食也問其故對曰臣有老母將以遺之宣孟曰斯食之吾更與汝乃復賜之脯二束與錢百而遂去之處二年晉靈公欲殺宣孟伏士於房中以待之因發酒於宣孟宣孟知之中飲而出靈公令房中之士疾追而殺之一人疾追先及宣孟之面曰嘻君轝吾請為君反死宣孟曰而名為誰反走對曰何以名為臣骫桑下之餓人也還鬭而死宣孟遂活史記初盾常田首山見桑下有餓人餓人示眯明也盾與之食已而為晉宰夫趙盾弗復知也九月晉靈公飲趙盾酒伏甲將攻盾公宰示眯明知之恐盾醉不能起而進曰君賜臣觴三行可以罷欲以去趙盾令先母及難盾既去靈公伏士未會先縱齧狗名敖明為盾搏殺狗盾曰棄人用狗雖猛何為然不知明之為隱德也已而靈公縱伏士出逐趙盾示眯明反擊靈公之伏士伏士不能進而竟脱盾盾問其故曰我桑下餓人問其名弗告明亦因亡去盾遂奔未出晉境乙丑盾昆弟將軍趙穿襲殺靈公於桃園而迎趙盾趙盾素貴得民和靈公少侈民不附故為弑易盾復位辨誤按餓人靈輒也殺獒者彌明也史記誤合為一人初麗姬之亂詛無畜羣公子自是晉無公族及成公即位乃宦卿之適子而為之田以為公族又宦其餘子亦為餘子其庶子為公行晉於是有公族餘子公行趙盾請以括為公族曰君姬氏之愛子也微君姬氏則臣狄人也公許之冬趙盾為旄車之族使屏季以其故族為公族大夫八年晉胥克有蠱疾郤缺為政秋廢胥克使趙朔佐下軍十三年秋赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族君子曰惡之來也已則取之其先縠之謂乎十五年秋七月秦桓公伐晉次於輔氏壬午晉侯治兵於稷還及雒魏顆敗秦師於輔氏獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職説是賞也曰周書所謂庸庸祗祗者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫載周能施也率是道也其何不濟晉侯使趙同獻狄俘於周不敬劉康公曰不及十年原叔必有太咎天奪之魄矣十六年三月獻狄俘晉侯請於王戊申以黻冕命士會將中軍且為大傅於是晉國之盗逃奔於秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄氷善人在上也善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也冬晉侯使士會平王室定王享之原襄公相禮殽烝武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法十七年范武子將老召文子曰燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒將已亂也勿已者必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子唯敬乃請老郤獻子為政補逸國語范文子莫退於朝武子曰何莫也對曰有秦客廋辭於朝大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子何知而三掩人於朝我不在晉國亡無日矣擊之以杖折委笄成公三年十二月甲戌晉作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞌之功也四年冬晉趙嬰通於趙莊姬五年春原屏放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能舍我何害弗聽嬰夢天使謂已祭余余福女使問諸士貞伯貞伯曰不識也既而告其人曰神福仁而禍淫淫而無罰福也祭其得亡乎祭之之明日而亡夏晉荀首如齊逆女故宣伯餫諸糓梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之補逸糓梁傳梁山崩壅遏河三日不流晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯尊下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯尊曰君為此召我也為之奈何輦者曰天有山天崩之天有河天壅之雖召伯尊如之何伯尊由忠問焉輦者曰君親素縞帥羣臣而哭之既而祠焉斯流矣伯尊至如其言孔子聞之曰伯尊其無績乎攘善也六年春晉人謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也韓獻子將新中軍且為僕大夫公揖而入獻子從公立於寢庭謂獻子曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沈溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡且民從教十世之利也夫山澤林盬國之寶也國饒則民驕佚近寶公室乃貧不可謂樂公説從之夏四月丁丑晉遷於新田八年夏晉趙莊姬為趙嬰之亡故譖之於晉侯曰原屏將為亂欒郤為徵六月晉討趙同趙括武從姬氏畜於公宮以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之禄夫豈無辟王賴前哲以免也周書曰不敢侮鰥寡所以明德也乃立武而反其田焉補逸史記朔娶晉成公姊為夫人晉景公之三年大夫屠岸賈欲誅趙氏初趙盾在時夢見叔帶持要而哭甚悲已而笑拊手且歌盾卜之兆絶而後好趙史援占之曰此夢甚惡非君之身乃君之子然亦君之咎至孫趙將世益衰屠岸賈者始有寵於靈公及至於景公而賈為司冦將作難乃治靈公之賊以致趙盾徧告諸將曰盾雖不知猶為賊首以臣弑君子孫在朝何以懲辠請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意而今妄誅謂之亂臣有大事而君不聞是無君也屠岸賈不聽韓厥告趙朔趣亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏於下宮殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宮匿趙朔客曰公孫杵臼杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何朔婦免身生男屠岸賈聞之索於宮中夫人置兒絝中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脱程嬰謂公孫杵臼曰今一索不得後必且復索之奈何公孫杵臼曰立孤與死孰難程嬰曰死易立孤難耳公孫杵臼曰趙世先君遇子厚子彊為其難者吾為其易者請先死乃二人謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將軍曰嬰不肖不能立趙孤誰能與我千金吾告趙氏孤處諸將皆喜許之發師隨程嬰攻公孫杵臼杵臼謬曰小人哉程嬰昔下宮之難不能死與我謀匿趙氏孤兒今又賣我縱不能立而忍賣之乎抱兒呼曰天乎天乎趙氏孤兒何罪請活之獨殺杵臼可也諸將不許遂殺杵臼與孤兒諸將以為趙氏孤兒良已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至於成公世有立功未嘗絶祀今吾君獨滅趙宗國人哀之故見龜策唯君圖之景公問趙尚有後子孫乎韓厥具以實告於是景公乃與韓厥謀立趙孤兒召而匿之宮中諸將入問疾景公因韓厥之衆以脅諸將而見趙孤趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命并命羣臣非然誰敢作難微君之疾羣臣固且請立趙後今君有命羣臣之願也於是召趙武程嬰徧拜諸將遂反與程嬰趙武攻屠岸賈滅其族復與趙武田邑如故及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武既立為成人復故位我將下報趙宣孟與公孫杵臼趙武啼哭頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祀之世世勿絶發明司馬遷序趙氏下宫之難文工而事詳顧與左氏迥畢此千古疑案也自當兩存之馬氏繹史謂晉國無屠岸賈其人然考之國語迎文公者有屠岸夷賈或即夷之子孫乎補逸國語趙文子冠見欒武子武子曰美哉昔我逮事莊主華則榮矣實之不知請務實乎見中行宣子宣子曰美哉惜也吾老矣見范文子文子曰而今可以戒矣夫賢者寵至而益戒不足者為寵驕故興王賞諫臣逸王罰之吾聞古之王者政德既成又聽於民於是乎使工誦諫於朝在列者獻詩使勿兠風聽臚言於市辯妖祥於謠考百事於朝問謗譽於路有邪而正之盡戒之術也先王疾是驕也見郤駒伯駒伯曰美哉然而壯不若老者多矣見韓獻子獻子曰戒之此謂成人成人在始與善始與善善進善不善蔑由至矣始與不善不善進不善善亦蔑由至矣如草木之産也各以其物人之有冠猶宫室之有牆屋也糞除而已何又加焉見知武子武子曰吾子勉之成宣之後而老為大夫非恥乎成子之文宣子之忠其可忘乎夫成子道前志以佐先君道法而卒以政可不謂文乎夫宣子盡諫於襄靈以諫取惡不憚死進也可不謂忠乎吾子勉之有宣子之忠而納之以成子之文事君必濟見苦成叔子叔子曰抑年少而執官者衆吾安容子見溫季子季子曰誰之不如可以求乎見張老而語之張老曰善矣從欒伯之言可以滋范叔之教可以大韓子之戒可以成物備矣志在子若夫三郤亡人之言也何稱述焉知子之道善矣是先主覆露子也十年晉侯夢大厲被髪及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞户公覺召桑田巫巫言如夢公曰何如曰不食新矣公疾病求醫於秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉十一年春郤犫來聘且涖盟聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犫來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏晉郤至與周爭鄇田王命劉康公單襄公訟諸晉郤至曰溫吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘇忿生以溫為司㓂與檀伯達封於河蘇氏即狄又不能於狄而奔衞襄王勞文公而賜之溫狐氏陽氏先處之而後及子若治其故則王官之邑也子安得之晉侯使郤至勿敢爭十三年春晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衞而惰棄君命也不亡何為十四年衞侯饗苦成叔寗惠子相苦成叔傲寗子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔彼交匪傲萬福來求今夫子傲取禍之道也十五年晉三郤害伯宗譖而殺之及欒弗忌伯州犂奔楚韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待初伯宗每朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難補逸國語伯宗朝以喜歸其妻曰子貌有喜何也曰吾言於朝諸大夫皆謂吾知似陽子對曰陽子華而不實主言而無謀是以難及其身子何喜焉伯宗曰吾飲諸大夫酒而與之語爾試聽之曰諾既飲其妻曰諸大夫莫子若也然而民不能戴其上久矣難必及子子盍亟索士憖庇州犂焉得畢陽及欒弗忌之難諸大夫害伯宗將謀而殺之畢陽實送州犂於荆十六年夏六月晉楚遇於鄢陵范文子不欲戰欒書曰楚師輕窕固壘而待之三日必退郤至曰楚有六間不可失也我必克之郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓郤至見客免胄承命三肅使者而退楚師薄於險晉師囚楚公子茷晉侯使郤至獻楚捷於周與單襄公語驟稱其伐單子語諸大夫曰溫季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位夏書曰怨豈在明不見是圖將慎其細也今而明之其可乎補逸國語晉既克楚於鄢使郤至告慶於周未將事王叔簡公飲之酒交酬好貨皆厚飲酒宴語相説也明日王叔子譽諸朝郤至見召桓公與之語召公以告單襄公曰王叔子譽溫季以為必相晉國相晉國必大得諸侯勸二三君子必先導焉可以樹今夫子見我以晉國之克也為已實謀之曰微我晉不戰矣楚有五敗晉不知乘我則强之背宋之盟一也薄德而以地賂諸侯二也棄壯之良而用幼弱三也建立卿士而不用其言四也夷鄭從之三陳而不整五也辠不由晉晉得其民四軍之帥旅力方剛卒伍治整諸侯與之是有五勝也有辭一也得民二也軍帥彊禦三也行列治整四也諸侯輯睦五也有一勝猶足用也有五勝以伐五敗而避之者非人也不可以不戰欒范不欲我則强之戰而勝是吾力也且夫戰也微謀吾有三伐勇而有禮反之以仁吾三逐楚君之卒勇也見其君必下而趨禮也能獲鄭伯而赦之仁也若是而知晉國之政楚越必朝吾曰子則賢矣抑晉國之舉也不失其次吾懼政之未及子也謂我曰夫何次之有昔先大夫荀伯自下軍之佐以政趙宣子未有軍行而以政今欒伯自下軍往是三子也吾又過於四之無不及若佐新軍而升為政不亦可乎將必求之是其言也君以為奚若襄公曰人有言曰兵在其頸其郤至之謂乎君子不自稱也非以讓也惡其葢人也夫人性陵上者也不可葢也求葢人其抑下滋甚故聖人貴讓且諺曰獸惡其網民惡其上書曰民可近也而不可上也詩曰愷悌君子求福不囬在禮敵必三讓是則聖人知民之不可加也故王天下者必先諸民然後庇焉則能長利今郤至在七人之下而欲上之是求葢七人也其亦有七怨怨在小醜猶不可堪而况在侈卿乎其何以待之晉之克也天有惡於楚也故儆之以晉而郤至佻天以為已力不亦難乎佻天不祥乘人不義不祥則天棄之不義則民畔之且郤至何三伐之有夫仁禮勇皆民之為也以義死用謂之勇奉義順則謂之禮畜義豐功謂之仁姦仁為佻姦禮為羞姦勇為賊夫戰盡敵為上守和同順義為上故制戎以果毅制朝以序成畔戰而擅舍鄭君賊也棄毅行容羞也畔國即讎佻也有三姦以求替其上逺於得政矣以吾觀之兵在其頸不可久也雖吾王叔未能違難在大誓曰民之所欲天必從之王叔欲郤至能勿從乎郤至歸明年死難及伯輿之獄王叔陳生奔晉十七年晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及於難范氏之福也六月戊辰士燮卒補逸國語柯陵之會單襄公見晉厲公視逺步髙晉郤錡見單子其語犯郤犫見其語迃郤至見其語伐齊國佐見其語盡魯成公見言及晉難及郤犫之譖單子曰君何患焉晉將有亂其君與三郤其當之乎魯侯曰寡人懼不免於晉今君曰將見有亂敢問天道乎抑人故也對曰吾非瞽史焉知天道吾見晉君之容而聽三郤之語矣殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以步目今晉侯視逺而足髙目不在體而足不步目其心必異矣目體不相從何以能久夫合諸侯國之大事也於是乎觀存亡故國將無咎其君在會步言視聽必皆無謫則可以知德矣視逺日絶其義足髙日棄其德言爽日反其信聽淫日離其名夫目以處義足以踐德口以庇信耳以聽名者也故不可不慎也偏喪有咎既喪則國從之晉侯爽二吾是以云夫郤氏晉之寵人也三卿而五大夫可以戒懼矣髙位實疾僨厚味實腊毒今郤伯之語犯叔迃季伐犯則陵人迃則誣人伐則掩人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於淫亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有乎吾聞之國德而鄰於不修必受其福今君偪於晉而鄰於齊齊晉有禍可以取伯無德之患何憂於晉且夫長翟之人利而不義其利淫矣流之若何魯侯歸乃逐叔孫僑如簡王十一年諸侯會於柯陵十二年晉殺三郤十三年晉侯殺於翼東門塟以車一乘齊人殺國武子晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犫與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘於周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不偪敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉壬午胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結衽而偽訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位溫季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲刼欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在内為軌御姦以德御軌以刑不施而殺不可謂德臣偪而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊於匠麗氏欒書中行偃遂執公焉召士匄士匄辭召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也補逸國語韓獻子辭中行偃欲伐之欒書曰不可乃止閏月乙卯晦欒書中行偃殺胥童民不與郤氏胥童道君為亂故皆書曰晉殺其大夫十八年春王正月庚申晉欒書中行偃使程滑弑厲公塟之於翼東門之外以車一乘使荀罃士魴逆周子於京師而立之二月乙酉朔晉悼公即位於朝襄公七年冬十月晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露又曰弗躬弗親庶民弗信無忌不才讓其可乎請立起也與田蘇游而曰好仁詩曰靖共爾位好是正直神之聽之介爾景福恤民為德正直為正正曲為直參和為仁如是則神聽之介福降之立之不亦可乎庚戌使宣子朝遂老晉侯謂韓無忌仁使掌公族大夫十四年夏諸侯之大夫從晉侯伐秦晉侯待於竟使六卿帥諸侯之師以進至於棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路敢不恥乎與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦於是齊杼宋華閲仲江會伐秦不書惰也向之會亦如之衞北宫括不書於向書於伐秦攝也秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施没矣而黶之怨實章將於是乎在秦伯以為知言為之請於晉而復之師歸自伐秦晉侯舍新軍於是知朔生盈而死盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舍之十九年諸侯還自沂上荀偃癉疽生瘍於頭濟河及著雍病目出大夫先歸者皆反士匄請見弗内請後曰鄭甥可二月甲寅卒而視不可含宣子盥而撫之曰事呉敢不如事主猶視欒懷子曰其為未卒事於齊故也乎乃復撫之曰主茍終所不嗣事於齊者有如河乃瞑受含宣子出曰我淺之為丈夫也發明觀士匄自恨之語知欒盈之見忌於范氏自此始矣二十一年欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通幾亡室矣懷子患之祁懼其討也愬諸宣子曰盈將為亂以范氏為死桓主而専政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而専於國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徵懐子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆囚伯華叔向籍偃人謂叔向曰子離於罪其為不知乎叔向曰與其死亡若何詩曰優哉游哉聊以卒歲知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言於君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讎内舉不失親其獨遺我乎詩曰有覺德行四國順之夫子覺者也晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乘馹而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨訓明徵定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今壹不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放太甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子説與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝初叔向之母妒叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懐子嬖之故羊舌氏之族及於難欒盈過於周周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪罪重於郊甸無所伏竄敢布其死昔陪臣書能輸力於王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅補逸國語平公六年箕遺及黃淵嘉父作亂不克而死公遂逐羣賊謂陽畢曰自穆侯以至於今亂兵不輟民志無厭禍敗無已離民且速冦恐及吾身若之何陽畢對曰本根猶樹枝葉益長本根益茂是以難已也今若大其柯去其枝葉絶其本根可以少閒公曰子實圖之陽畢曰圖在明訓明訓在威權威權在君君掄賢人之後有常位於國者而立之亦掄逞志虧君以亂國者之後而去之是遂威而逺權民畏其威而懷其德莫能勿從若從則民心皆可畜畜其心而知其欲惡民孰偷生若不偷生則莫思亂矣且夫欒氏之誣晉國也久矣欒書實覆宗殺厲公以厚其家若滅欒氏則民威矣今吾若起瑕原韓魏之後而賞立之則民懷矣威與懷各當其所則國安矣君治而國安欲作亂者誰與君曰欒書立吾先君欒盈不獲辠如何陽畢曰夫正國者不可以暱於權行權不可以隱於私暱於權則民不道行權隱於私則政不行政不行何以道民民之不道亦無君矣則其為暱與隱也復産害矣且勤君身君其圖之若愛欒盈則明逐羣賊而以國倫數而遣之厚戒箴國以待之彼皆求逞志而報於君辠孰大焉滅之猶少彼若不敢而逺逃乃厚其外交而勉之以報其德不亦可乎公許諾盡逐羣賊而使祁午及陽畢適曲沃逐欒盈欒盈出奔楚遂令於國人曰自文公以來有力於先君而子孫不育者將授立之得之者賞會於商任錮欒氏也齊侯衞侯不敬叔向曰二君者必不免會朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也知起中行喜州綽邢蒯出奔齊皆欒氏之黨也樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃亦子之勇也二十三年晉將嫁女於呉齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何貳之有盈出徧拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之趙氏以原屏之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親知悼子少而聽於中行氏程鄭嬖於公唯魏氏及七輿大夫與之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏率賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劍左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃初斐豹隷也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劍以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女於天樂射之不中又注則乘槐本而覆或以㦸鈎之斷肘而死欒魴傷欒盈奔曲沃晉人圍之晉人克欒盈於曲沃盡殺欒氏之族黨欒魴出奔宋書曰晉人殺欒盈不言大夫言自外也補逸國語居三年欒盈晝入為賊於絳范宣子以公入於襄公之宫欒盈不克出奔曲沃遂刺欒盈滅欒氏是以没平公之身無内亂也欒懷子之出執政使欒氏之臣勿從從欒氏者為大戮施欒氏之臣辛俞行吏執而獻之公公曰國有大令何故犯之對曰臣順之也豈敢犯之執政曰無從欒氏而從君是明令必從君也臣聞之曰三世仕家君之再世以下主之事君以死事主以勤君之明令也自臣之祖以無大援於晉國世隷欒氏於今三世矣臣故不敢不君今執政曰不從君者為大戮臣敢忘其死而畔其君以煩司冦公説固止之不可厚賂之辭曰臣嘗陳辭矣心以守志辭以行之所以事君也若受君賜是墮其前言君問而陳辭未退而逆之何以事君公知其不可得也乃遣之尸子范獻子游河大夫皆在君曰知欒氏之子乎大夫莫答舟人清涓捨楫對曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清涓曰善修晉國之政内得大夫外不失百姓雖欒氏子其若君何若不修晉國之政内不得大夫而外失百姓則舟中之人皆欒氏子也君曰善二十四年春穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世禄非不朽也魯有先大夫曰臧文仲既没其言立其是之謂乎豹聞之太上有立德其次有立功其次有立言雖久不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之祿之大者不可謂不朽補逸國語范宣子與龢大夫爭田久而無成宣子欲攻之問於伯華伯華曰外有軍内有事赤也外事也不敢侵官且吾子之心有出焉可徵訊也問於孫林父孫林父曰旅人所以事子也唯事是待問於張老張老曰老也以軍事承子非戎則非吾所知也問於祁奚祁奚曰公族之不恭公室之有回内事之邪大夫之貪是吾辠也若以軍官從子之私懼子之應且憎也問於籍偃籍偃曰偃以斧鉞從於張孟曰聽命焉若夫子之命也何二之有釋夫子而舉是反吾子也問於叔魚叔魚曰待我為子戮之叔向聞之見宣子曰聞子與龢未寧徧問於大夫又無決盍訪之訾祏訾祏實直而博直能端辯之博能上下比之且吾子之家老也吾聞國家有大事必順於典刑而訪咨於耉老而後行之司馬侯見曰聞吾子有龢之怒吾以為不信諸侯皆有二心是之不憂而怒龢大夫非子之任也祁午見曰晉為諸侯盟主子為正卿若能靖端諸侯使服朝命於晉晉國其誰不為子從何必龢盍密和和大以平小乎宣子問於訾祏訾祏對曰昔隰叔子違周難於晉國生子輿為理以正於朝朝無姦官為司空以正於國國無敗績世及武子佐文襄為諸侯諸侯無二心及為卿以輔成景軍無敗政及為成師居太傅端刑法輯訓典國無姦民後之人可則是以受隨范及文子成晉荆之盟豐兄弟之國使無有間隙是以受郇櫟今吾子嗣位於朝無姦行於國無邪民於是無四方之患而無外内之憂賴三子之功而饗其祿位今既無事矣而非龢於是加寵將何治為宣子悦乃益龢田而與之和訾祏死范宣子謂獻子曰鞅乎昔者吾有訾祏也吾朝夕顧焉以相晉國且為吾家今吾觀女也專則不能謀則無與將若之何對曰鞅也居處恭不敢安易敬學而好仁和於政而好其道謀於衆不以賈好私志雖衷不敢謂是也必長者之由宣子曰可以免身二十六年晉韓宣子聘於周王使請事對曰晉士起將歸時事於宰旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊齊人城郟之歲其夏齊烏餘以廩丘奔晉襲衞羊角取之遂襲我髙魚有大雨自其竇入介於其庫以登其城克而取之又取邑於宋於是范宣子卒諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往二十七年春胥梁帶使諸喪邑者具車徒以受地必周使烏餘具車徒以受封烏餘以其衆出使諸侯偽效烏餘之封者而遂執之盡獲之皆取其邑而歸諸侯諸侯是以睦於晉三十一年春王正月穆叔至自會見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早備魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉又與季孫語晉故季孫不從及趙文子卒晉公室卑政在侈家韓宣子為政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平丘之會昭公元年夏四月趙孟叔孫豹曹大夫入於鄭鄭伯兼享之子皮戒趙孟禮終趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻子其從之子皮曰敢乎穆叔曰夫人之所欲也又何不敢及享具五獻之籩豆於幕下趙孟辭私於子産曰武請於冢宰矣乃用一獻趙孟為客禮終乃宴穆叔賦鵲巢趙孟曰武不堪也又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安尨也可使無吠穆叔子皮及曹太夫興拜舉兕爵曰小國賴子知免於戾矣飲酒樂趙孟出曰吾不復此矣天王使劉定公勞趙孟於潁館於雒汭劉子曰美哉禹功明德逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於隷人朝不謀夕棄神人矣神怒民畔何以能久趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從又何以年后子見趙孟趙孟曰吾子其曷歸對曰鍼懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也國於天地有與立焉不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰鍼聞之國無道而年穀和熟天贊之也鮮不五稔趙孟視蔭曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民翫歲而愒日其與幾何十二月晉既烝趙孟適南陽將會孟子餘甲辰朔烝於溫庚戌卒鄭伯如晉弔及雍乃復補逸國語趙文子為室斵其椽而礱之張老夕焉而見之不謁而歸文子聞之駕而往曰吾不善子亦告我何其速也對曰天子之室斵其椽而礱之加密石焉諸侯礱之大夫斵之士首之備其物義也從其等禮也今子貴而忘義富而忘禮吾懼不免何敢以告文子歸令之勿礱也匠人請皆斵之文子曰止為後世之見之也其斵者仁者之為也其礱者不仁者之為也趙文子與叔向遊於九京曰死者若可作也吾誰與歸叔向曰其陽子乎文子曰夫陽子行廉直於晉國不免其身其知不足稱也叔向曰其舅犯乎文子曰舅犯見利不顧其君其仁不足稱也其隨武子乎納諫不忘其師言身不失其友事君不援而進不阿而退韓非子平公問叔向曰羣臣孰賢曰趙武公曰子黨於師乎曰武立如不勝衣言如不出口然所舉士也數十人皆得其意而公家甚賴之及武子之生也不利於家死不託於孤臣敢以為賢也新序平公過九原而歎曰嗟乎此地之藴我良臣多矣若使死者起也吾將誰與歸乎叔向對曰其趙武乎平公曰子黨於子之師也對曰臣敢言趙武之為人也立若不勝衣言若不出於口然其身舉士於白屋下者四十六人皆得其意而公家甚賴之及文子之死也四十六人皆就賔位是以無私德也臣故以為賢也平公曰善夫趙武賢臣也相晉天下無兵革者九年春秋曰晉趙武之力盡得人也葉公諸梁問樂王鮒曰晉大夫趙文子為人何若對曰好學而受規諫葉公曰疑未盡之矣對曰好學智也受規諫仁也江出汶山其源若甕口至楚國其廣十里無他故其下流多也人而好學受規諫宜哉其立也詩曰其維哲人告之話言順德之行此之謂也二年春晉侯使韓宣子來聘且告為政而來見禮也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦緜之卒章韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公宣子遂如齊納幣自齊聘於衞衞侯享之北宫文子賦淇澳宣子賦木𤓰夏四月韓須如齊逆女補逸國語叔向見韓宣子宣子憂貧叔向賀之宣子曰吾有卿之名而無其實無以從二三子吾是以憂子賀我何故對曰昔欒武子無一卒之田其官不備其宗器宣其德行順其憲則使越於諸侯諸侯親之戎狄懷之以正晉國行刑不疚以免於難及桓子驕泰奢侈貪欲無蓺略則行志假貸居賄宜及於難而賴武之德以殁其身及懷子改桓之行而修武之德可以免於難而離桓之罪以亡於楚夫郤昭子其富半公室其家半三軍恃其富寵以泰於國其身尸於朝其宗滅於絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也惟無德也今吾子有欒武子之貧吾以為能其德矣是以賀若不憂德之不建而患貨之不足將弔不暇何賀之有宣子拜稽首焉曰起也將亡賴子存之非起也敢專承之其自桓叔以下嘉吾子之賜三年春齊侯使晏嬰請繼室於晉既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃冦讎欒郤胥原狐續慶伯降在皂隷政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠况日不悛其能久乎晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族唯羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀夏四月鄭伯如晉公孫段相甚敬而卑禮無違者晉侯嘉焉授之以策曰子豐有勞於晉國余聞而弗忘賜女州田以胙乃舊勲伯石再拜稽首受策以出君子曰禮其人之急也乎伯石之汰也一為禮於晉猶荷其祿况以禮終始乎詩曰人而無禮胡不遄死其是之謂乎初州縣欒豹之邑也及欒氏亡范宣子趙文子韓宣子皆欲之文子曰溫吾縣也二宣子曰自郤稱以别三傳矣晉之别縣不唯州誰獲治之文子病之乃舍之二子曰我不可以正議而自與也皆舍之及文子為政趙獲曰可以取州矣文子曰退二子之言義也違義禍也余不能治余縣又焉用州其以徼禍也君子曰弗知實難知而弗從禍莫大焉有言州必死豐氏故主韓氏伯石之獲州也韓宣子為之請之為其復取之之故七年夏子産為豐施歸州田於韓宣子曰日君以夫公孫段為能任其事而賜之州田今無祿早世不獲久享君德其子弗敢有不敢以聞於君私致諸子宣子辭子産曰古人有言曰其父析薪其子弗克負荷施將懼不能任其先人之祿其况能任大國之賜縱吾子為政而可後之人若屬有疆埸之言敝邑獲戾而豐氏受其大討吾子取州是免敝邑於戾而建置豐氏也敢以為請宣子受之以告晉侯晉侯以與宣子宣子為初言病有之以易原縣於樂大心九年晉荀盈如齊逆女還六月卒於戲陽殯於絳未葬晉侯飲酒樂膳宰屠蒯趨入請佐公使尊許之而遂酌以飲工曰女為君耳將司聰也辰在子卯謂之疾日君徹宴樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之女弗聞而樂是不聰也又飲外嬖嬖叔曰女為君目將司明也服以旌禮禮以行事事有其物物有其容今君之容非其物也而女不見是不明也亦自飲也曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也公説徹酒初公欲廢知氏而立其外嬖為是悛而止秋八月使荀躒佐下軍以説焉攷異檀弓知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開予是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀匕是共又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至於今既畢獻斯揚觶謂之杜舉辨誤按杜蕢與屠蒯音字相近此漢世師傳之異不足怪也獨侍者二人傳稱工與嬖叔而記直斥為師曠李調夫李調不可知以師曠之聰不應昧昧如是記之傳信不如傳之傳疑也十四年晉邢侯與雍子爭鄐田久而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯專殺其罪一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不為末減曰義也夫可謂直矣平丘之會數其賄也以寛衞國晉不為暴歸魯季孫稱其詐也以寛魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利殺親益榮猶義也夫十六年公至自晉子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿彊而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國秋八月晉昭公卒冬十月季平子如晉葬昭公平子曰子服回之言猶信子服氏有子哉補逸國語范獻子聘於魯問具山敖山魯人以其鄉對獻子曰不為具敖乎對曰先君獻武之諱也獻子歸徧告其所知曰人不可以不學吾適魯而名其二諱為笑焉唯不學也人之有學也猶木之有枝葉也木有枝葉猶庇蔭人而况君子之學乎董叔將取於范氏叔向曰范氏富盍已乎曰欲為繫援焉它日董祁愬於范獻子曰不吾敬也獻子執而紡於庭之槐叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何請焉二十八年晉祁勝與鄔臧通室祁盈將執之訪於司馬叔游叔游曰鄭書有之惡直醜正實蕃有徒無道立矣子懼不免詩曰民之多辟無自立辟姑已若何盈曰祁氏私有討國何有焉遂執之祁勝賂荀躒荀躒為之言於晉侯晉侯執祁盈祁盈之臣曰鈞將皆死憗使吾君聞勝與臧之死也以為快乃殺之夏六月晉殺祁盈及楊食我食我祁盈之黨也而助亂故殺之遂滅祁氏羊舌氏初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女黰黑而甚美光可以鑑名曰𤣥妻樂正后䕫取之生伯封實有豕心貪惏無饜忿纇無期謂之封豕有窮后羿滅之䕫是以不祀且三代之亡共子之廢皆是物也女何以為哉夫有尤物足以移人茍非德義則必有禍叔向懼不敢取平公强使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視補逸列女傳晉羊叔姬者羊舌子之妻叔向叔魚之母也羊舌子好正不容於晉去之三室之邑邑人相與攘羊而遺之不受叔姬曰夫子居晉不容而去之又不容於三室之邑不如受之羊舌子受之曰為肸與鮒烹之叔姬曰不可南方有鳥名曰乾吉食其子不擇肉子嘗不遂今肸與鮒童子也隨大夫而化者不可食以不義之肉不若埋之以明不與後二年攘羊之事發都吏至羊舌子曰吾受之不敢食也發而視之則其骨存焉都吏曰君子哉羊舌子不與攘羊之事矣叔向欲娶於申公巫臣氏夏姬之女叔姬不欲平公强使娶之生楊食我號曰伯碩生時侍者謁之叔姬往視之及堂聞其號也而還曰豺狼之聲也狼子野心滅羊舌氏者必是子也及長與祁勝為亂晉人殺食我羊舌氏由是遂滅史記晉之宗家祁傒叔孫嚮子相惡於君六卿欲弱公室乃遂以法盡滅其族而分其邑為十縣各令其子為大夫晉益弱六卿皆大發明按此則祁氏羊舌氏皆晉之公族也叔向與晏子言亦自以為公族秋晉韓宣子卒魏獻子為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為鄔大夫賈辛為祁大夫司馬烏為平陵大夫魏戊為梗陽大夫知徐吾為塗水大夫韓固為馬首大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫謂賈辛司馬烏為有力於王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者皆受縣而後見於魏子以賢舉也魏子謂成鱄吾與戊也縣人其以我為黨乎對曰何也戊之為人也逺不忘君近不偪同居利思義在約思純有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他唯善所在親疏一也詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比於文王其德靡悔既受帝祉施於孫子心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和徧服曰順擇善而從之曰比經緯天地曰文九德不愆作事無悔故襲天祿子孫賴之主之舉也近文德矣所及其逺哉賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不颺子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力仲尼聞魏子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎冬梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之魏戊謂閻没女寛曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人二十九年秋龍見於絳郊魏獻子問於蔡墨曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏獻子曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安有裔子曰董父實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川鬷夷氏其後也故帝舜氏世有畜龍及有夏孔甲擾於有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉累學擾龍於豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷於魯縣范氏其後也獻子曰今何故無之對曰夫物物有其官官修其方朝夕思之一日失職則死及之失官不食官宿其業其物乃至若泯棄之物乃坁伏鬱湮不育故有五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰句芒火正曰祝融金正曰蓐收水正曰𤣥冥土正曰后土龍水物也水官棄矣故龍不生得不然周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉坤之剝曰龍戰於野若不朝夕見誰能物之獻子曰社稷五祀誰氏之五官也對曰少皥氏有四叔曰重曰該曰脩曰熙實能金木及水使重為句芒該為蓐收脩及熙為𤣥冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之冬晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也若之何以為法蔡史墨曰范氏中行氏其亡乎中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也其及趙氏趙孟與焉然不得已若德可以免定公十三年晉趙鞅謂邯鄲午曰歸我衞貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衞是以為邯鄲而寘諸晉陽絶衞之道也不如侵齊而謀之乃如之而歸之於晉陽趙孟怒召午而囚諸晉陽使其從者説劍而入涉賔不可乃使告邯鄲人曰吾私有討於午也二三子惟所欲立遂殺午趙稷涉賔以邯鄲叛夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲將作亂董安于聞之告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也安于曰與其害於民寧我獨死請以我説趙孟不可秋七月范氏中行氏伐趙氏之宮趙鞅奔晉陽晉人圍之范臯夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊髙彊曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未茍寅士吉射奔朝歌韓魏以趙氏為請十二月辛未趙鞅入於絳盟於公宫補逸新序趙文子問於叔向曰晉六將軍孰先亡乎對曰其中行氏乎文子曰何故先亡對曰中行氏之為政也以苛為察以欺為明以刻為忠以計多為善以聚斂為良譬之其猶鞟革者也大則大矣裂之道也當先亡列子傳范獻子之三子遊於趙氏趙簡子乘馬園中園中多株問三子曰奈何長者曰明君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三德使民設令伐株於山將有馬為也已而閑囿示之株夫山逺而囿近是民説一也去險阻之山而伐平林之株民説二矣既卑而賤賣民説三矣簡子從之民果大説少子伐其謀歸以告母母喟然歎曰終滅范氏者必是子也夫伐功恃勞鮮能布仁乘偽行詐莫能久長其後智伯滅范氏智伯葢指荀躒史記趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安于問扁鵲曰血脉治也而何怪在昔秦繆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有學也帝告吾晉國將大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦讖於是出矣獻公之亂文公之霸而襄公敗秦師於殽而歸縱淫此子之所聞今主君之疾與之同不出三日疾必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死帝甚喜賜我二笥皆有副我見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也今余思虞舜之勲適余將以其胄女孟姚配而七世之孫董安于受言而書藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝他日簡子出有人當道辟之不去從者怒將刃之當道者曰吾欲有謁於主君從者以聞簡子召之曰嘻吾有所見子晰也當道者曰屏左右願有所謁簡子屏人當道者曰主君之疾臣在帝側簡子曰然有之子之見我我何為當道者曰帝令主君射熊與羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主君滅二卿夫熊與羆皆其祖也簡子曰帝賜吾二笥皆有副何也當道者曰主君之子將克二國於翟皆子姓也簡子曰吾見兒在帝側帝屬我一翟犬曰及而子之長以賜之夫兒何謂以賜翟犬當道者曰兒主君之子也翟犬者代之先也主君之子且必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見簡子書藏之府十四年梁嬰父惡董安于謂知文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先發難也討於趙氏文子使告於趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其罪矣敢以告趙孟患之安于曰我死而晉國寧趙氏定將焉用生人誰不死吾死莫矣乃縊而死趙孟尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟而後趙氏定祀安于於廟補逸國語下邑之役董安于多趙簡子賞之辭固賞之對曰方臣之少也進秉筆贊為名命稱為前世義於諸侯而主弗志及臣之壯也耆其股肱以從司馬苛慝不産及臣之長也端委韠帶以隨宰人民無二心今臣一旦為狂疾而曰必賞女是以狂疾賞也不如亡趨而出乃釋之説苑趙簡子從晉陽之邯鄲中路而止引車吏進問君何為止簡主曰董安于在後吏曰此三軍之事也君奈何以一人留三軍也簡主曰諾驅之百步又止吏將進諫董安于適至簡主曰秦道之與晉國交者吾忘令人塞之董安于曰此安于之所為後也簡主曰官之寶璧吾忘令人載之對曰此安于之所為後也簡主曰行人燭過年長矣言未嘗不為晉國法也吾行忘令人辭且聘焉對曰此安于之所為後也簡主可謂内省外知人矣哉故身佚國安王孫子趙簡子獵於晉山之陽撫膺而歎董安于曰敢問何歎簡子曰吾有食糓之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也韓非子董閼于為趙上地守行石邑山中澗深峭如牆深百仞因問其旁鄉左右曰人嘗有入此者乎對曰無有曰嬰兒痴聾狂悖之人嘗有入此者乎對曰無有牛馬犬彘嘗有入此者乎對曰無有董閼于喟然太息曰吾能治矣使吾法之無赦猶入澗之必死也則人莫之敢犯也何為不治之説苑董安于治晉陽問政於蹇老蹇老曰曰忠曰信曰敢董安于曰安忠乎曰忠於主曰安信乎曰信於令曰安敢乎曰敢於不善人董安于曰此三者足矣國語趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其戸數簡子誡襄子曰晉國有難而無以尹鐸為少無以晉陽為逺必以為歸趙簡子使尹鐸為晉陽曰必墮其壘培吾將往焉若見壘培是見寅與吉射也尹鐸往而增之簡子如晉陽見壘怒曰必殺鐸也而後入大夫辭之不可曰是昭余仇也郵無正進曰昔先主文子少釁於難從姬氏於公宫有孝德以出在公族有恭德以升在位有武德以羞為正卿有温德以成其名譽失趙氏之典型而去其師保基於其身以克復其所及景子長於公宫未及教訓而嗣立矣亦能纂修其身以受先業無謗於國順德以學子擇言以教子擇師保以相子今吾子嗣位有文之典型有景之教訓重之以師保加之以父兄子皆疏之以及此難夫尹鐸曰思樂而喜思難而懼人之道也委土可以為師保吾何為不增是以修之庶曰可以鑑而鳩趙宗乎若罰之是罰善也罰善必賞惡臣何望矣簡子説曰微子吾幾不為人矣以免難之賞賞尹鐸初伯樂與尹鐸有怨以其賞如伯樂氏曰子免吾死敢不歸祿辭曰吾為主圖非為子也怨若怨焉晉人圍朝歌公會齊侯衞侯於脾上梁之間謀救范中行氏析成鮒小王桃甲率狄師以襲晉戰於絳中不克而還士鮒奔周小王桃甲入於朝歌秋齊侯宋公會於洮范氏故也冬十二月晉人敗范中行氏之師於潞獲籍秦髙彊又敗鄭師及范氏之師於百泉哀公元年夏四月齊侯衞侯救邯鄲圍五鹿齊侯衞侯會於乾侯救范氏也師及齊師衞孔圉鮮虞人伐晉取棘蒲冬十月晉趙鞅伐朝歌二年秋八月齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後隨而從之彼見吾貌必有懼心於是乎會之必大敗之從之卜戰龜焦樂丁曰詩曰爰始爰謀爰契我龜謀協以故兆詢可也簡子誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除垢恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣隷圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車樸馬無入於兆下卿之罰也甲戌將戰郵無恤御簡子衞太子為右登鐵上望見鄭師衆大子懼自投於車下子良授太子綏而乘之曰婦人也簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死於牗下羣子勉之死不在冦繁羽御趙羅宋勇為右羅無勇麇之吏詰之御對曰痁作而伏衞大子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人擊簡子中肩斃於車中獲其蠭旗太子救之以戈鄭師北獲溫大夫趙羅太子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傅傁曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨税焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主德追鄭師姚般公孫林殿而射前列多死趙孟曰國無小既戰簡子曰吾伏弢嘔血鼓音不衰今日我上也太子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也駕而乘材兩靷皆絶三年冬十月晉趙鞅圍朝歌師於其南荀寅伐其郛使其徒自北門入已犯師而出癸丑奔邯鄲十一月趙鞅殺士臯夷惡范氏也四年秋七月齊陳乞弦施衞寗跪救范氏庚午圍五鹿九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨十二月弦施逆之遂墮臨國夏伐晉取邢任欒鄗逆畤陰人盂壺口會鮮虞納荀寅於柏人補逸史記晉定公二十一年簡子拔邯鄲中行文子奔柏人簡子又圍柏人中行文子范昭子遂奔齊趙竟有邯鄲柏人范中行氏餘邑入於晉趙名晉卿實專晉權奉邑侔於諸侯新序中行寅將亡乃召其太祝而欲加罪焉曰子為我祝犧牲不肥澤邪且齋戒不敬邪使吾國亡何也祝簡對曰昔者吾先君中行穆子皮車十乗不憂其薄也憂德義之不足也今主君有革車百乘不憂徳義之薄也唯患車不足也夫舟車飾則賦斂厚賦斂厚則民怨謗詛矣且君茍以為祝有益於國乎則詛亦將為損世亡矣一人祝之一國詛之一祝不勝萬詛國亡不亦宜乎祝其何罪中行子乃慚韓非子晉中行文子出亡過於縣邑從者曰此嗇夫公之故人公奚不休舍且待後車文子曰吾嘗好音此人遺我鳴琴吾好佩此人遺我玉環是振我過者也以求容於我者吾恐其以我求容於人也乃去之果收文子後車三乘而獻之其君矣國語趙簡子歎曰吾願得范中行之良臣史黯侍曰將焉用之簡子曰良臣人之所願也又何問焉對曰臣以為不良故也夫事君者諫過而賞善薦可而替否獻能而進賢擇才而薦之朝夕誦善敗而納之道之以文行之以順勤之以力致之以死聽則進不則退今范中行氏之臣不能匡相其君使至於難君出在外又不能定而棄之則何良之為若弗棄則主焉得之夫二子之良將勤營其君使復立於外死而後止何日以來若來則非良臣也簡子曰善吾言實過矣五年春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張柳朔言諸昭子使為柏人昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及范氏出張柳朔謂其子爾從主勉之我將止死王生授我矣吾不可以僭之遂死於柏人夏趙鞅伐衞范氏之故也遂圍中牟六年春晉伐鮮虞治范氏之亂也補逸國語趙簡子歎曰雀入於海為蛤雉入於淮為蜃黿鼉魚鼈莫不能化唯人不能哀夫竇犫侍曰臣聞之君子哀無人不哀無賄哀無德不哀無寵哀名之不令不哀年之不登夫中行范氏不恤庶難而欲擅晉國今其子孫將耕於齊宗廟之犧為畎畝之勤人之化也何日之有史記趙簡子有臣曰周舍好直諫周舍死簡子每聽朝常不悦大夫請辠簡子曰大夫無辠吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之愕愕是以憂也簡子由此能附趙邑而懷晉人十年夏趙鞅帥師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉行也侵及賴而還十七年夏六月趙鞅圍衞齊國觀陳瓘救衞得晉人之致師者子玉使服而見之曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命子又何辱簡子曰我卜伐衞未卜與齊戰乃還二十三年夏六月晉荀瑤伐齊髙無㔻帥師禦之知伯視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子請卜知伯曰君告於天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑤非敢耀武也治英丘也以辭伐罪足矣何必卜壬辰戰於犂丘齊師敗績知伯親禽顔庚二十七年晉荀瑤帥師伐鄭次於桐丘駟𢎞請救於齊齊師將興陳成子屬孤子三日朝設乘車兩馬繫五邑焉召顔涿聚之子晉曰隰之役而父死焉以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違穀七里穀人不知及濮雨不涉子思曰大國在敝邑之宇下是以告急今師不行恐無及也成子衣製杖戈立於阪上馬不出者助之鞭之知伯聞之乃還曰我卜伐鄭不卜敵齊使謂成子曰大夫陳子陳之自出陳之不祀鄭之罪也故寡君使瑤察陳衷焉謂大夫其恤陳乎若利本之顛瑤何有焉成子怒曰多陵人者皆不在知伯其能久乎中行文子告成子曰有自晉師告寅者將為輕車千乘以厭齊師之門則可盡也成子曰寡君命恒曰無及寡無畏衆雖過千乘敢辟之乎將以子之命告寡君文子曰吾乃今而知所以亡君子之謀也始衷終皆舉之而後入焉今我三不知而入之不亦難乎悼之四年晉荀瑤帥師圍鄭未至鄭駟𢎞曰知伯愎而好勝早下之則可行也乃先保南里以待之知伯入南里門於桔柣之門鄭人俘酅魁壘賂之以知政閉其口而死將門知伯謂趙孟入之對曰主在此知伯曰惡而無勇何以為子對曰以能忍恥庶無害趙宗乎知伯不悛趙襄子由是惎知伯遂喪之知伯貪而愎故韓魏反而喪之補逸國語知宣子將以瑤為後知果曰不如宵也宣子曰宵也很對曰宵之很在面瑤之很在心心很敗國面很不害瑤之賢於人者五其不逮者一美鬢長大則賢射御足力則賢伎藝畢給則賢巧文辯惠則賢彊毅果敢則賢如是而甚不仁以其五賢陵人而以不仁行之其誰能待之若果立瑤也知宗必滅弗聽知果别族於太史為輔氏及知氏亡唯輔果在史記知伯與趙韓魏盡分其范中行故地晉出公怒告齊魯欲以伐四卿四卿恐遂共攻出公出公奔齊道死知伯乃立昭公曾孫驕是為晉懿公知伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱知伯怒遂率韓魏攻趙國策韓魏反於外趙氏應之於内智氏遂亡發明按知伯之事記載繁多左氏篇末數語言簡義盡然其事稍畧可嫓美者太史公世家也故並存之且以證韓魏反喪智氏之語新序知伯囂之時有士曰長兒子魚絶知伯而去之三年將東之越而道聞知伯囂之見殺也謂御曰還車反吾將死之御曰夫子絶知伯而去之三年矣今反死之是絶屬無别也長兒子魚曰不然吾聞仁者無餘愛忠臣無餘祿吾聞知伯之死而動吾心餘祿之加於我者至今尚存吾將往依之反而死臣士竒曰晉卿凡十一族魏氏也趙氏也狐氏也胥氏也先氏也欒氏也郤氏也韓氏也知氏也中行氏也范氏也魏為畢公髙之後至萬始受魏卜偃所謂必大者也魏武子從於文公及顆有獲杜回功絳以佐悼公駕楚受金石之賜絳以下七傳而為魏文侯斯始分晉趙之先與秦同祖伯翳至夙始受耿衰負羇絏從文公盾相靈成冬夏之日濟美焉及莊姬之難宗幾覆景公感大厲乃立武而反其田是為文子文子生景叔景叔生鞅是為簡子簡子以毋䘏得所藏常山寶符知其欲取代也廢伯魯而立之是為襄子再傳烈侯籍始列諸侯韓之先與周同姓其後仕晉封於韓原曰韓武子武子後三世有厥與郤克將兵伐齊幾逐得齊侯者也號為獻子生宣子起與趙魏共分祁氏羊舌氏十縣始大六傳至景侯䖍列諸侯狐氏之族自突始突以子偃及毛從文公惠公使突召之不順自殺名聞諸侯偃生射姑是為賈季夷之蒐將中軍陽處父為成季之屬舉趙盾易置中軍帥射姑怨之使續鞫居殺處父遂出奔狄狐氏以亡胥氏自胥臣以虎皮䝉馬顯於城濮是為臼季生胥甲父河曲之役佐下軍與趙穿為軍門之呼撓薄秦於河之計得罪晉人放之而立其子胥克有蠱疾郤缺為政廢之克子胥童怨郤氏黨厲公而殺三郤被誅胥氏以亡先氏自先軫城濮獻謀敗楚功多箕之戰免胄入狄師而死襄公命其子且居將中軍於溫覲王且居有力焉及先縠以敗邲召狄罪誅而盡滅其族先氏以亡欒氏公族也城濮之戰欒枝以曳柴遁書鍼世有勲伐及黶始汰盈以樂祁之譖奔而復入以逆誅欒氏遂亡郤氏自冀芮焚公宫欲弑文公以罪廢臼季舉其子缺箕之戰獲白狄子復與之冀子郤克伐齊大勝於鞌郤至陳六間之策敗楚鄢陵而自伐其績又與郤讎郤錡譖伯宗而殺之厲公信欒書之謗討滅三郤郤氏以亡知氏中行氏本皆荀族也自荀首始别為知氏故知罃亦稱荀罃云首生罃建三駕之策罃生盈盈生躒躒生瑤是為知伯滅於韓趙魏知氏以亡中行氏自文公作三行以禦狄而荀林父將中行葢軍師之名也因以為氏林父進思盡忠退思補過賢矣林父子庚庚子偃偃子呉呉子寅為知韓魏趙所逐盡分其地中行氏以亡范氏為陶唐之後其由來逺自士會始顯會生燮是為文子文子最賢鄢陵之不欲敗楚者也燮生匄是為宣子伐齊聞喪而還匄生鞅鞅生吉射與荀寅並逐地分范氏以亡此十一族廢興之大略也夫晉稱狐趙之勲然狐最先滅舅氏臨河之誓一傳遽斬晉真少恩哉若成季之勲宣孟之忠以一婦人言血食中斷向非嬰杵之存孤而又有韓厥為之伸理趙氏其終為厲矣至欒氏累世勤勞武子之德在人如周人之思召公獨不可以葢黶盈之侈而十世宥乎商任沙隨之間何其搏擊之如不克也曲沃入而欒氏族亦疾之已甚所致耳胥氏先氏郤氏其先世皆有功子孫雖不肖誅止其身可也並其族而廢之鯀殛禹興獨不可以待冀缺者倣而行之耶中行范氏惡於趙鞅鞅奔晉陽而卒復二氏老於朝歌終為叛臣同罪異罰葢亦不均之甚矣知伯黨三家以逐中行貪瞢無親卒為三家所併而晉亦隨之皆可以為戒哉左傳紀事本末卷三十一
