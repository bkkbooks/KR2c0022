body:
  text: 左傳紀事本末卷四詹事府詹事髙士竒撰王室庶孽之禍桓公十八年秋周公欲弑莊王而立王子克辛伯告王遂與王殺周公黒肩王子克奔燕初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政耦國亂之本也周公弗從故及以上子克之亂莊公十六年初晉武公伐夷執夷詭諸蒍國請而免之既而弗報故子國作亂謂晉人曰與我伐夷而取其地遂以晉師伐夷殺夷詭諸周公忌父出奔虢惠王既立而後復之十九年初王姚嬖于莊王生子頽子頺有寵蒍國為之師及惠王即位取蒍國之圃以為囿邊伯之宫近於王宫王取之王奪子禽祝跪與詹父田而收膳夫之秩故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏秋五大夫奉子頽以伐王不克出奔温蘇子奉子頽以奔衞衞師燕師伐周冬立子頽二十年春鄭伯和王室不克執燕仲父夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于鄔遂入成周取其寶器而還冬王子頽享五大夫樂及徧舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司寇行戮君為之不舉而况敢樂禍乎奸王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也二十一年春胥命于弭夏同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王于闕西辟樂備王與之武公之畧自虎牢以東原伯曰鄭伯效尤其亦將有咎五月鄭厲公卒王巡虢守虢公為王宫于玤王與之酒泉鄭伯之享王也王以后之鞶鑑予之虢公請器王予之爵鄭伯由是始惡於王冬王歸自虢二十七年十月王使召伯廖賜齊侯命且請伐衞以其立子頺也二十八年春齊侯伐衞戰敗衞師數之以王命取賂而還僖公十年春狄滅温蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衞以上子頺之亂莊公十八年虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于京師實惠后僖公七年閏月惠王崩襄王惡大叔帶之難懼不立不發喪而告難于齊八年春盟于洮謀王室也襄王定位而后發喪冬王人來告喪難故也是以緩十一年夏楊拒泉臯伊雒之戎同伐京師入王城焚東門王子帶召之也秦晉伐戎以救周秋晉侯平戎于王十二年王以戎難故討王子帶秋王子帶奔齊冬齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣十三年春齊侯使仲孫湫聘于周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也秋為戎難故諸侯戍周齊仲孫湫致之十六年王以戎難告于齊齊徴諸侯而戍周二十年滑人叛鄭而服於衞夏鄭公子士洩堵寇帥師入滑二十二年富辰言於王曰請召大叔詩曰協比其鄰昏姻孔云吾兄弟之不協焉能怨諸侯之不睦王説王子帶自齊復歸于京師王召之也二十四年鄭之入滑也滑人聽命師還又即衞鄭公子士洩堵俞彌帥師伐滑王使伯服游孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衞滑也故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之大上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衞毛耼郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周德之不類故糾合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟䦧于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢德之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也鄭有平惠之勲又有厲宣之親棄嬖寵而用三良於諸姬為近四德具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之其懐柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聽使頽叔桃子出狄師夏狄伐鄭取櫟王德狄人將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪惏王又啟之女德無極婦怨無終狄必為患王又弗聽初甘昭公有寵於惠后惠后將立之未及而卒昭公奔齊王復之又通於隗氏王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰王出適鄭處於汜大叔以隗氏居於温補逸國語王黜翟后翟人來誅殺譚伯富辰曰昔吾驟諫王王弗從以及此難若我不出王其以我為懟乎乃以其屬死之初惠后欲立王子帶故以其黨啟翟人翟人遂入周王乃出居於鄭晉文公納之冬王使來告難曰不榖不德得罪于母弟之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子䝉塵于外敢不奔問官守王使簡師父告于晉使左鄢父告于秦天子無出書曰天王出居于鄭辟母弟之難也天子凶服降名禮也鄭伯與孔將鉏石甲父侯宣多省視官具于汜而後聽其私政禮也二十五年秦伯師于河上將納王狐偃言於晉侯曰求諸侯莫如勤王晉侯辭秦師而下三月甲辰次于陽樊右師圍温左師逆王夏四月丁巳王入于王城取大叔于温殺之于隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊温原攅茅之田晉於是始啟南陽以上子帶之亂補逸國語靈王二十二年穀洛鬬將毁王宫王欲壅之大子晉諫曰不可晉聞古之長民者不墮山不崇藪不防川不竇澤夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫天地成而聚於髙歸物於下疏為川谷以導其氣陂唐汚庳以鍾其美是故聚不阤崩而物有所歸氣不沈滯而亦不散越是以民生有財用而死有所葬然則無夭昏札瘥之憂而無饑寒乏匱之患故上下能相固以待不虞古之聖王唯此之慎昔共工棄此道也虞於湛樂淫失其身欲壅防百川墮髙堙庫以害天下皇天弗福庶民弗助禍亂並興共工用滅其在有虞有崈伯鯀播其淫心稱遂共工之過堯用殛之於羽山其後伯禹念前之非度釐改制量象物天地比類百則儀之於民而度之於羣生共之從孫四岳佐之髙髙下下疏川導滯鍾水豐物封崇九山決汨九川陂障九澤豐殖九藪汩越九原宅居九隩合通四海故天無伏隂地無散陽水無沈氣火無災燀神無閒行民無淫心時無逆數物無害生帥象禹之功度之於軌儀莫非嘉績克厭帝心皇天嘉之胙以天下賜姓曰姒氏曰有夏謂其能以嘉祉殷富生物也胙四岳國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐民人也此一王四伯豈繄多寵皆亡王之後唯能釐舉嘉義以有𦙍在下守祀不替其典有夏雖衰杞鄫猶在申吕雖衰齊許猶在唯有嘉功以命姓受祀迄於天下及其失之也必有慆淫之心間之故亡其氏姓踣弊不振絶後無主堙替𨽻圉夫亡者豈繄無寵皆黄炎之後也唯不帥天地之度不順四時之序不度民神之義不儀生物之則以殄滅無𦙍至于今不祀及其得之也必有忠信之心間之度於天地而順於時動和於民神而儀於物則故髙朗令終顯融昭明命姓受氏而附之以令名若啟先王之遺訓省其典圖刑法而觀其廢興者皆可知也其興者必有夏吕之功焉其廢者必有共鯀之敗焉今吾執政無乃實有所避而滑夫二川之神使至于爭明以妨王宫王而飾之無乃不可乎人有言曰無過亂人之門又曰佐雝者嘗焉佐鬭者傷焉又曰禍不好不能為禍詩曰四牡騤騤旟旐有翩亂生不夷靡國不泯又曰民之貪亂寧為荼毒夫見亂而不惕所殘必多其飾彌章民有怨亂猶不可遏而况神乎王將防鬭川以飾宫是飾亂而佐鬭也其無乃章禍且遇傷乎自我先王厲宣幽平而貪天禍至於今未弭我又章之懼長及子孫王室其愈卑乎其若之何自后稷以來寧亂及文武成康而僅克安民自后稷之始基靖民十五王而文始平之十八王而康克安之其難也如是厲始革典十四王矣基德十五而始平基禍十五其不濟乎吾朝夕儆懼曰其何德之修而少光王室以逆天休王又章輔禍亂將何以堪之王無亦鑒於黎苗之王下及夏商之季上不象天而下不儀地中不和民而方不順時不共神祇而蔑棄五則是以人夷其宗廟而火焚其彞器子孫為𨽻下夷於民而亦未觀夫前哲令德之則則此五者而受天之豐福饗民之勲力子孫豐厚令聞不忘是皆天子之所知也天所崇之子孫或在畎畆由欲亂民也畎畆之人或在社稷由欲靖民也無有異焉詩云殷鑒不逺近在夏后之世將焉用飾宫以徼亂也度之天神則非祥也比之地物則非義也類之民則則非仁也方之時動則非順也咨之前訓則非正也觀之詩書與民之憲言皆亡王之為也上下儀之無所比度王其圖之夫事大不從象小不從文上非天刑下非地德中非民則方非時動而作之者必不節矣作又不節害之道也王卒壅之及景王多寵人亂於是乎始生景王崩王室大亂及定王王室遂卑周書晉侯尚力侵我王畧叔向聞儲幼而果賢復王位作太子晉晉平公使叔譽于周見太子晉而與之言五稱而五窮逡巡而退其不遂歸告公曰太子晉行年十五而臣弗能與言君請歸聲就復與田若不反及有天下將以為誅平公將歸之師曠不可曰請使瞑臣往與之言若能幪子反而復之師曠見太子稱曰吾聞王子之語髙於泰山夜寢不寐晝居不安不逺長道而求一言王子應之曰吾聞太師將來甚喜而又懼吾年甚少見子而懾盡忘吾其度師曠曰吾聞王子古之君子甚成不驕自晉始如周行不知勞王子應之曰古之君子其行至慎天下施闗道路無限百姓説之相將而逺逺人來驩視道如尺師曠告善又稱曰古之君子其行可則由舜而下其孰有廣德王子應之曰如舜者天舜居其所以利天下奉翼逺人皆得已仁此之謂天如禹者聖勞而不居以利天下好取不好與必度其正是之謂聖如文王者其大道仁其小道惠三分天下而有其二敬人無方服事於商既有其衆而返失其身此之謂仁如武王者義殺一人而以利天下異姓同姓各得之謂義師曠告善又稱曰宣辨名命異姓惡方王侯君公何以為尊何以為上王子應之曰人生而重丈夫謂之胄子胄子成人能治上官謂之士士率衆時作謂之曰伯伯能移善於衆與百姓同謂之公公能樹名與物天道俱謂之侯侯能成羣謂之君君有廣德分任諸侯而敦信曰予一人善至于四海曰天子達於四荒曰天王四荒至莫有怨訾乃登為帝師曠罄然又稱曰温恭敦敏方德不改聞物下學以起尚登帝臣乃參天子自古誰王子應之曰穆穆虞舜明明赫赫立義治律萬物皆作分均天財萬物熈熈非舜而誰能師曠東躅其足曰善哉善哉王子曰太師何舉足驟師曠曰天寒足躅是以數也王子曰請入坐遂敷席注瑟師曠歌無射曰國誠寧矣逺人來觀修義經矣好樂無荒乃注瑟於王子王子歌嶠曰何自南極至於北極絶境越國弗愁道逺師曠蹶然起曰瞑臣請歸王子賜之乗車駟馬曰太師亦善御之師曠對曰御吾未之學也王子曰汝不為夫時詩云馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣塵塵取予不疑以是御之師曠對曰瞑臣無見為人辯也唯耳之恃而耳又寡聞而易窮王子汝將為天下宗乎王子曰太師何汝賤我乎自太皥以下至於堯舜禹未有一姓而再有天下者夫大當時而不伐天何可得且吾聞汝知人年長短告我師曠對曰汝聲清汗汝色赤白火色不壽王子曰吾後三年上賔於天所汝慎無言禍將及汝師曠歸未及三年告死者至發明王子晉靈王長子景王之兄也生有神聖之姿使得嗣位則文武復生宣王不足數矣無如周不再興哲嗣早世景王以後庶孽之禍益甚豈非天與故輯其遺言軼事于子朝之亂之前詩云人之云亡邦國殄瘁信哉昭公十五年夏六月乙丑王大子壽卒秋八月戊寅王穆后崩十二月晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明器於王室以鎮撫其社稷故能薦彞器於王晉居深山戎狄之與鄰而逺於王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大蒐也闕鞏之甲武所以克商也唐叔受之以處參虛匡有戎狄其後襄之二路鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勲而不廢有績而載奉之以土田撫之以彞器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而髙祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉於是乎有董史女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一嵗而有三年之喪二焉於是乎以喪賔宴又求彞器樂憂甚矣且非禮也彞器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之十八年秋葬曹平公往者見周原伯魯焉與之語不説學歸以語閔子馬閔子馬曰周其亂乎夫必多有是説而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可於是乎下陵上替能無亂乎夫學殖也不殖將落原氏其亡乎二十一年春天王將鑄無射泠州鳩曰王其以心疾死平夫樂天子之職也夫音樂之輿也而鐘音之器也天子省風以作樂器以鐘之輿以行之小者不窕大者不槬則和於物物和則嘉成故和聲入於耳而藏於心心億則樂窕則不咸槬則不容心是以感感實生疾今鐘槬矣王心弗堪其能久乎補逸國語二十三年王將鑄無射而為之大林單穆公曰不可作重幣以絶民資又鑄大鐘以鮮其繼若積聚既喪又鮮其繼生何以殖且夫鐘不過以動聲若無射有林耳不及也夫鐘聲以為耳也耳所不及非鐘聲也猶目所不見不可以為目也夫目之察度也不過步武尺寸之間其察色也不過墨丈尋常之間耳之察和也在清濁之間其察清濁也不過一人之所勝是故先王之制鐘也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出故聖人慎之今王作鐘也聽之弗及比之不度鐘聲不可以知和制度不可以出節無益於樂而鮮民財將焉用之夫樂不過以聽耳而美不過以觀目若聽樂而震觀美而眩患莫甚焉夫耳目心之樞機也故必聽和而視正聽和則聰視正則明聰則言聽明則德昭聽言昭德則能思慮純固以言德於民民歆而德之則歸心焉上得民心以殖義方是以作無不濟求無不獲然則能樂夫耳内和聲而口出美言以為憲令而布諸民正之以度量民以心力從之不倦成事不貳樂之至也口内味而耳内聲聲味生氣氣在口為言在目為明言以信名明以時動名以成政動以殖生政成生殖樂之至也若視聽不和而有震眩則味入不精不精則氣佚氣佚則不和於是乎有狂悖之言有眩惑之明有轉易之名有過慝之度出令不信刑政放紛動不順時民無據依不知所力各有離心上失其民作則不濟求則不獲其何以能樂三年之中而有離民之器二焉國其危哉王弗聽問之伶州鳩對曰臣之守官弗及也臣聞之琴瑟尚宫鐘尚羽石尚角匏竹利制大不踰宫細不過羽夫宫音之主也第以及羽聖人保樂而愛財財以備器樂以殖財故樂器重者從細輕者從大是以金尚羽石尚角瓦絲尚宫匏竹尚議革木一聲夫政象樂樂從和和從平聲以和樂律以平聲金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以賛之革木以節之物得其常曰樂極極之所集曰聲聲應相保曰和細大不踰曰平如是而鑄之金磨之石繫之絲木越之匏竹節之鼓而行之以遂八風於是乎氣無滯隂亦無散陽隂陽序次風雨時至嘉生繁祉人民和利物備而樂成上下不罷故曰樂正今細過其主妨於正用物過度妨於財正害財匱妨於樂細抑大陵不容於耳非和也聽聲越逺非平也妨正匱財聲不和平非宗官之所司也夫有和平之聲則有蕃殖之財於是乎道之以中德詠之以中音德音不愆以合神人神是以寧民是以聽若夫匱財用罷民力以逞淫心聽之不和比之不度無益於教而離民怒神非臣之所聞也王不聽卒鑄大鐘二十四年鐘成伶人告和王謂伶州鳩曰鐘果和矣對曰未可知也王曰何故對曰上作器民備樂之則為和今財亡民罷莫不怨恨臣不知其和也且民所曹好鮮其不濟也其所曹惡鮮其不廢也故諺曰衆心成城衆口鑠金今三年之中而害金再興焉懼一之廢也王曰爾老耄矣何知二十五年王崩鐘不和王將鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鐘百官軌儀紀之以三平之以六成於十二天之道也夫六中之色也故名之曰黄鍾所以宣養六氣九德也由是第之二曰大簇所以金奏賛陽出滯也三曰姑洗所以修潔百物考神納賔也四曰㽔賔所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無貳也六曰無射所以宣布哲人之令德示民軌儀也為之六間以揚沈伏而黜散越也元間大吕助宣物也二間夾鍾出四隙之細也三間中吕宣中氣也四間林鍾和轉百事俾莫不任肅純恪也五間南吕賛陽秀也六間應鍾均利器用俾應復也律吕不易無姦物也細鈞有鐘無鏄昭其大也大鈞有鏄無鐘甚大無鏄鳴其細也大昭小鳴和之道也和平則久久固則純純明則終終復則樂所以成政也故先王貴之王曰七律者何對曰昔武王伐殷嵗在鶉火月在天駟日在析木之津辰在斗柄星在天黿星與日辰之位皆在北維顓頊之所建也帝嚳受之我姬氏出自天黿及析木者有建星及牽牛焉則我皇妣大姜之姪伯陵之後逢公之所馮神也嵗之所在則我有周之分野也月之所在辰馬農祥也我太祖后稷之所經緯也王欲合是五位三所而用之自鶉及駟七列也南北之揆七同也凡神人以數合之以聲昭之數合聲和然後可同也故以七同其數而以律和其聲於是乎有七律王以二月癸亥夜陳未畢而雨以夷則之上宫畢之當辰辰在戌上故長夷則之上宫名之曰羽所以藩屏民則也王以黄鍾之下宫布戎于牧之野故謂之厲所以厲六師也以太簇之下宫布令于商昭顯文德底紂之多􅖄故謂之宣所以宣三王之德也反及嬴内以無射之上宫布憲施舍於百姓故謂之嬴亂所以優柔容民也二十二年王子朝賔起有寵於景王王與賔孟説之欲立之劉獻公之庶子伯蚠事單穆公惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子王有心疾乙丑崩于榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王遂攻賔起殺之盟羣王子于單氏丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲以逐劉子壬戌劉子奔揚單子逆悼王于莊宫以歸王子還夜取王以如莊宫癸亥單子出王子還與召莊公謀曰不殺單旗不捷與之重盟必來背盟而克者多矣從之樊頃子曰非言也必不克遂奉王以追單子及領大盟而復殺摯荒以説劉子如劉單子亡乙丑奔于平畤羣王子追之單子殺還姑發弱鬷延定稠子朝奔京丙寅伐之京人奔山劉子入于王城辛未鞏簡公敗績于京乙亥甘平公亦敗焉叔鞅至自京師言王室之亂也閔馬父曰子朝必不克其所與者天所廢也單子欲告急于晉秋七月戊寅以王如平畤遂如圃車次于皇劉子如劉單子使王子處守于王城盟百工于平宫辛卯鄩肸伐皇大敗獲鄩肸壬辰焚諸王城之市八月辛酉司徒醜以王師敗績于前城百工叛己巳伐單氏之宫敗焉庚午反伐之辛未伐東圉冬十月丁巳晉籍談荀躒帥九州之戎及焦瑕温原之師以納王于王城庚申單子劉蚠以王師敗績于郊前城人敗陸渾于社十一月乙酉王子猛卒不成喪也考異史記子朝攻殺猛己丑敬王即位館于子旅氏十二月庚戌晉籍談荀躒賈辛司馬督帥師軍于隂于侯氏于谿泉次于社王師軍于汜于解次于任人閏月晉箕遺樂徴右行詭濟師取前城軍其東南王師軍于京楚辛丑伐京毁其西南二十三年春王正月壬寅朔二師圍郊癸卯郊鄩潰丁未晉師在平隂王師在澤邑王使告間庚戌還夏四月乙酉單子取訾劉子取牆人直人六月壬午王子朝入于尹癸未尹圉誘劉佗殺之丙戌單子從阪道劉子從尹道伐尹單子先至而敗劉子還己丑召伯奐南宫極以成周人戍尹庚寅單子劉子樊齊以王如劉甲午王子朝入于王城次于左巷秋七月戊申鄩羅納諸莊宫尹辛敗劉師于唐丙辰又敗諸鄩甲子尹辛取西闈丙寅攻蒯蒯潰八月丁酉南宫極震萇𢎞謂劉文公曰君其勉之先君之力可濟也周之亡也其三川震今西王之大臣亦震天棄之矣東王必大克二十四年春王正月辛丑召簡公南宫嚚以甘桓公見王子朝劉子謂萇𢎞曰甘氏又往矣對曰何害同德度義大誓曰紂有億兆夷人亦有籬德余有亂臣十人同心同德此周所以興也君其務德無患無人戊午王子朝入于鄔三月庚戌晉侯使士景伯涖問周故士伯立于乾祭而問于介衆晉人乃辭王子朝不納其使六月壬申王子朝之師攻瑕及杏皆潰鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯而憂宗周之隕為將及焉今王室實蠢蠢焉吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰缾之罄矣惟罍之恥王室之不寧晉之恥也獻子懼而與宣子圖之乃徴㑹於諸侯期以明年冬十月癸酉王子朝用成周之寶珪于河甲戌津人得諸河上隂不佞以温人南侵拘得玉者取其玉將賣之則為石王定而獻之與之東訾二十五年夏㑹于黄父謀王室也趙簡子令諸侯之大夫輸王粟具戍人曰明年將納王宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎右師不敢對受牒而退士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉壬申尹文公涉于鞏焚東訾弗克二十六年四月單子如晉告急五月戊午劉人敗王城之師于尸氏戊辰王城人劉人戰于施谷劉師敗績七月己巳劉子以王出庚午次于渠王城人焚劉丙子王宿于褚氏丁丑王次于萑谷庚辰王入于胥靡辛巳王次于滑晉知躒趙鞅帥師納王使女寛守闕塞冬十月丙申王起師于滑辛丑在郊遂次于尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚隂忌奔莒以叛召伯逆王于尸及劉子單子盟遂軍圉澤次于隄上癸酉王入于成周甲戌盟于襄宫晉師使成公般戌周而還十二月癸未王入于莊宫王子朝使告諸侯曰昔武王克殷成王靖四方康王息民並建母弟以藩屏周亦曰吾無專享文武之功且為後人之迷敗傾覆而溺入于難則振救之至于夷王王愆于厥身諸侯莫不並走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官至于幽王天不弔周王昬不若用愆厥位攜王奸命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力於王室也至于惠王天不靖周生頺禍心施于叔帶惠襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頿王甚神聖無惡于諸侯靈王景王克終其世今王室亂單旗劉狄剥亂天下壹行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂于王室侵欲無厭規求無度貫瀆鬼神慢棄刑法倍奸齊盟傲很威儀矯誣先王晉為不道是攝是賛思肆其罔極茲不榖震盪播越竄在荆蠻未有攸底若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圖不榖則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及太子壽早夭即世單劉賛私立少以間先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以專其志無禮甚矣文辭何為二十七年㑹于扈令戍周十二月晉籍秦致諸侯之戍于周魯人辭以難二十九年三月己卯京師殺召伯盈尹氏固及原伯魯之子尹固之復也有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三嵗乎夏五月庚寅王子趙車人于鄻以叛隂不佞敗之三十二年秋八月王使富辛與石張如晉請城成周天子曰天降禍于周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不皇啟處於今十年勤戌五年余一人無日忘之閔閔焉如農夫之望嵗懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也其委諸伯父使伯父實重圖之俾我一人無徴怨於百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告于諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衞彪傒曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅况敢干位以作大事乎己丑士彌牟營成周計丈數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦丈書以授帥而效諸劉子韓簡子臨之以為成命定公元年春王正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政衞彪傒曰將建天子而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原壽過而田於大陸焚焉還卒於甯范獻子去其柏椁以其未復命而田也孟懿子㑹城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職將承王官何故役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣且已無辭而抑我以神誣我也啟寵納侮其此之謂矣必以仲幾為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍齊髙張後不從諸侯晉女叔寛曰周萇𢎞齊髙張皆將不免萇叔違天髙子違人天之所壊不可支也衆之所為不可奸也補逸國語敬王十年劉文公與萇𢎞欲城成周為之告晉魏獻子為政説萇𢎞而與之將合諸侯衞彪傒適周聞之見單穆公曰萇劉其不没乎周詩有之曰天之所支不可壊也其所壊亦不可支也昔武王克殷而作此詩也以為飫歌名之曰支以遺後之人使永監焉夫禮之立成者為飫昭明大節而已少曲與焉是以為之日惕其欲教民戒也然則夫支之所道者必盡知天地之為也不然不足以遺後之人今萇劉欲支天之所壊不亦難乎自幽王而天奪之明使迷亂棄德而即慆淫以亡其百姓其壊之也久矣而又將補之殆不可矣水火之所犯猶不可救而况天乎諺曰從善如登從惡如崩昔孔甲亂夏四世而殞元王勤商十有四世而興帝甲亂之七世而殞后稷勤周十有五世而興幽王亂之十有四世守府之謂多胡可興也夫周髙山廣川大藪也故能生之良材而幽王蕩以為魁陵糞土溝瀆其有悛乎單子曰其咎孰多曰萇叔必速及夫將以道補者也夫天道道可而省不萇叔反是以誑劉子必有三殃違天一也反道二也誑人三也周若無咎萇叔必為戮雖晉魏子亦將及焉若得天福其當身乎若劉氏則必子孫實有禍夫子而棄常法以從其私欲用巧變以崇天災勤百姓以為己名其殃大矣是嵗也魏獻子合諸侯之大夫于翟泉遂田于大陸焚而死及范中行之難萇𢎞與之晉人以為討二十八年殺萇𢎞及定王劉氏亡五年春王人殺子朝于楚六年周儋翩率王子朝之徒因鄭人將以作亂于周鄭於是乎伐馮滑胥靡負黍狐人闕外六月晉閻没戍周且城胥靡冬十二月天王處于姑蕕辟儋翩之亂也七年春二月周儋翩入于儀栗以叛夏四月單武公劉桓公敗尹氏于窮谷冬十一月戊午單子劉子逆王于慶氏晉籍秦送王己巳王入于王城館于公族黨氏而後朝于莊宫八年二月己丑單子伐榖城劉子伐儀栗辛卯單子伐簡城劉子伐盂以定王室哀公三年劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討六月癸卯周人殺萇𢎞辨誤按韓非子説苑皆言叔向欲殺萇𢎞乃讒之于劉氏而誅之夫叔向晉之賢臣安有是事且此時叔向没已久矣故當以傳文為據若莊子血化為碧之説庸或有之後人又附㑹侈述以為萇𢎞乃神仙則又誣矣漢書兵隂陽家有萇𢎞十五篇十九年冬叔青如京師敬王崩故也以上子朝之亂臣士竒曰幽王以寵伯服廢宜臼而轍遂東可為永鑒不謂後王甘蹈覆車如子克子頺子帶子朝之紛紛也子克之禍始于桓王之寵辛伯之諫可謂切直周公弗悟蓄剚刃之心幸而辛伯告密其事弗集周公之罪已不容誅子克餬口四方固其自取論者未嘗不嘆息有憾于桓王也莊王以孽寵之故身幾被弑復有王姚之嬖愛子頺而以蒍國傅之亦猶子克之屬周公也寵則必驕驕則必盈盈則其願將無所限極勢不陷於惡不止當時即無五大夫之怨而子頺之難亦將作矣五大夫含忿積怒而蒍國以師傅之親事成則徼幸非福其倒行逆施宜矣蘇子寰内諸侯衞與燕皆王之懿親也亦黨蝥賊而犯大不韙于天下何義乎鄭虢同心翼戴卒綏王室豈止賢于燕衞萬萬但順逆之分判若黒白鷹鸇之逐難緩須臾子頺敗亡亦豈須俟樂及徧舞而後知者若何于弭之命徘徊需次直聞子頺之樂禍而後決亦足見春秋諸侯之暗於大義耳衞為亂首伯廖命而齊奉討此九伐之遺也取賂而還君子惜之蘇子曽奉逆頺見滅于狄而王不救報施之理宜哉子帶之難始于惠后之寵惠王崩至祕不發喪而定襄王之位其勢亦逼矣此時即當割骨肉之恩而以義善處之召戎犯闕逆帶之罪益彰越在岱隂根株幸絶齊保全其生親親之誼已厚迨齊人為之請復富辰亦從而慫恿於其中抑又何也卒有隗氏之通再挑狄禍襄王出走鄙在鄭地者踰年小不忍則亂大謀富辰安能辭其責哉至請滑不聽而以狄師伐鄭又以狄女為后謀之不臧階禍納侮若王之於子帶屬籍已絶而又歸之及其攻已而猶不忍禦篤於天性雖與仁人之不藏怒宿怨何異焉惜乎所以處之者未盡其道而子帶狼子野心始終狂悖不可以人理責矣晉文辭秦師而專納王之美此伯業所由基請隧弗許王章未墜東周之所以綿延而不絶者賴有是乎子朝之難始于景王之寵而賔孟實成之犧雞斷尾逞其邪説向使景王不以心疾而殞單劉見殺子猛其不立矣及王崩而子朝作亂召伯奐南宫極尹氏毛伯之徒羣兇羽助獨一劉蚠單旗擁弱主﨑嶇于奔北播遷之中不幸王猛短世又改立敬王出萬死一生卒定其位豈不誠忠臣哉當時東諸侯無有能恤嫠婦之緯者獨一晉可控告而亦僅以籍談荀躒之偏師翺翔其間無救禍敗及乾祭涖問而後辭子朝之使子太叔正言而後謀王室之計乃決不知東王之為共主子朝之為嬖孽南宫極震寶珪浮河天人之意灼然可見而何嫌何疑之若此也使晉能早合諸侯輸王粟具戍人相與戮力以討元兇豈至久辱草莽令子朝緩死荆蠻舉宗周之典籍而隨之以逸耶至敬王反正戍之固宜城之亦宜而宋為三恪乃不受功魏獻子且曰與其戍周不如城之天子實云雖有後事晉勿與知可也是何嘗有憂天夾日之誠乎而衞彪傒乃妄引天之所壊不可支也之説深咎萇劉以城成周為大殃則益悖矣吁當世之人心如此而謂周能復興耶鄭黨子朝之餘孽稱兵犯順致敬王再有姑蕕之辱其罪與燕衞均也歴觀東周王室之亂凡四見無不始于庶孽成于嬖寵論者不省致亂之由而區區歸之榖洛之壅無射之鑄與夫不説學之敝是知其末而不知其本也左傳紀事本末卷四
