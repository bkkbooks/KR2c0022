body:
  text: 左傳紀事本末卷十七詹事府詹事高士竒撰齊襄公之弒桓公十七年夏及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告公曰疆埸之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉莊公八年齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂連稱有從妹在公宮無寵使間公曰捷吾以女為夫人冬十二月齊侯游於姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬬死于門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足于户下遂弒之而立無知十年春齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之發明齊欲滅紀而魯以婚姻昵紀故齊與魯為讐長勺之戰齊魯相讐之終也襄公之弒不附于文姜而附于滅紀亦為魯諱恥而已矣臣士竒曰襄公淫于文姜而戕魯桓天理人心澌滅已盡迹其生平遷郱鄑郚三邑以逼紀卒使大去其國總天子之罪人連五國以伐衛而取其寶玉會魯圍郕而獨納其降書於經者無一善狀又按桓公之語管仲曰昔我先君築臺以為高位田狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪陳妾數百食必粟肉衣必文繡戎士凍餒戎車待游車之裂戎士待陳妾之餘優笑在前賢才在後是以國家不日引不月長今觀瓜期之不恤與戎士凍餒之言合而徒人費石之紛如與夫孟陽之屬皆所謂優笑在前者也荒淫若此未有不亡而况失職之公孫與怨望懷歸之戍卒㑹其及也豈不宜乎連稱之妹間襄公而襄公死襄公之妹賊魯桓而魯桓死桓之死報隱公也襄之死報魯桓也天道好還其應不爽而皆以一婦人與其間亦足以為女禍之戒矣彭生豕立其說似誕然蒼犬見祟大厲披髮載在簡冊惡已盈而妖氣得以乘之又何怪哉魯桓疆吏之戒得守禦之備曹劌揶揄肉食逞三鼓以勝齊律以王事真小人矣左傳紀事本末卷十七
