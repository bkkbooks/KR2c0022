body:
  text: 左傳紀事本末卷二十五詹事府詹事髙士竒撰晉文公之伯僖公二十三年晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳不可曰保君父之命而享其生祿於是乎得人有人而校罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顛頡魏武子司空季子狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子處狄十二年而行過衛衛文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上以告薑氏薑氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之薑曰行也懷與安實敗名公子不可薑與子犯謀醉而遣之醒以戈逐子犯及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自二焉乃饋盤飱置璧焉公子受飱反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉叔詹諫曰臣聞天之所啓人弗及也晉公子有三焉天其或者將建諸君其禮焉男女同姓其生不蕃晉公子姬出也而至於今一也離外之患而天不靖晉國殆將啓之二也有三士足以上人而從之三也晉鄭同儕其過子弟固將禮焉况天之所啓乎弗聽及楚楚子饗之曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寬忠而能力晉侯無親外內惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懷嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜補逸國語文公在翟十二年狐偃曰日吾來此也非以翟為榮可以成事也吾曰奔而易達困而有資休以擇利可以戾也今戾久矣戾久將砥砥箸滯淫誰能興之盍速行乎吾不適齊楚避其逺也蓄力一紀可以逺矣齊侯長矣而欲親晉管仲沒矣多讒在側謀而無正衷而思始夫必追擇前言求善以終厭邇逐逺逺人入服不為郵矣會其季年可也兹可以親皆以為然乃行發明按文公還國事左傳與國語小異大同大都內傳簡要外傳繁多今止取國語事實之補裨內傳者餘自有全書不盡録司空臼季勸納懷嬴之説典而無理斷易繇辭亦屬傅會今不録二十四年春王正月秦伯納之不書不告入也及河子犯以璧授公子曰臣負羇絏從君巡於天下臣之罪甚多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧於河濟河圍令狐入桑泉取臼衰二月甲午晉師軍於廬栁秦伯使公子縶如晉師師退軍於郇辛丑狐偃及秦晉之大夫盟於郇壬寅公子入於晉師丙午入於曲沃丁未朝於武宫戊申使殺懷公於髙梁不書亦不告也補逸國語董因迎公於河公問焉曰吾其濟乎對曰嵗在大梁將集天行元年始受實沈之星也實沈之虛晉人是居所以興也今君當之無不濟矣君之行也嵗在大火大火閼伯之星也是謂大辰辰以成善后稷是相唐叔以封瞽史記曰嗣續其祖如榖之滋必有晉國臣筮之得泰之八曰是謂天地配享小往大來今及之矣何不濟之有且以辰出而以參入皆晉祥也而天之大紀也濟且秉成必霸諸侯子孫賴之君無懼矣韓非子文公反國至河令籩豆捐之席蓐捐之手足胼胝面目黧黑者後之咎犯聞之而夜哭公曰寡人出亡二十年乃今得反國咎犯聞之不喜而哭意不欲寡人反國耶犯對曰籩豆所以食也席蓐所以卧也而君捐之手足胼胝面目黧黑勞有功者也而君後之今臣有與在後中不勝其哀故哭且臣為君行詐偽以反國者衆矣臣尚自惡也而况於君再拜而辭文公止之曰諺曰築社者攓撅而置之端冕而祀之今子與我取之而不與我治之與我置之而不與我祀之焉可解左驂而盟於河史記重耳出亡凡十九嵗而得入時年六十二矣至河咎犯請亡重耳投璧以與子犯盟是時介子推從在船中乃笑曰天實開公子而子犯以為己功而要市於君固足羞也我不忍與同位乃自隱吕卻畏逼將焚公宫而弒晉侯寺人披請見公使讓之且辭焉曰蒲城之役君命一宿女即至其後余從狄君以田渭濱女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鉤而使管仲相君若易之何辱命焉行者甚衆豈唯刑臣公見之以難告三月晉侯潛會秦伯於王城己丑晦公宫火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衛於晉三千人實紀綱之僕補逸國語公屬百官賦職任功棄責薄斂施舍分寡救乏振滯匡困資無輕關易道通商寬農茂穡勸分省用足財利器明德以厚民性舉善援能官方定物正名育類昭舊族愛親戚明賢良尊貴寵賞功勞事耉老禮賔旅友故舊胥籍狐箕欒郤柏先羊舌董韓實掌近官諸姬之良掌其中官異姓之能掌其逺官公食貢大夫食邑士食田庶人食力工商食官皂𨽻食職官宰食加政平民阜財用不匱初晉侯之豎頭須守藏者也其出也竊藏以逃盡用以求納之及入求見公辭焉以沭謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讎匹夫懼者甚衆矣僕人以告公遽見之晉侯賞從亡者介之推不言祿祿亦弗及推曰獻公之子九人唯君在矣惠懷無親外內棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為已力不亦誣乎竊人之財猶謂之盜况貪天之功以為已力乎下義其罪上賞其姦上下相蒙難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人補逸史記文公修政施惠百姓賞從亡者及功臣大者封邑小者尊爵未盡行賞周襄王以弟帶難出居鄭地來告急晉晉初定欲發兵恐他亂起是以賞從亡未至隱者介子推推亦不言祿祿亦不及介子推從者憐之乃懸書宫門曰龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所文公出見其書曰此介子推也吾方憂王室未圖其功使人召之則亡遂求所在聞其入綿上山中於是文公環綿上山中而封之以為介推田號曰介山以記吾過且旌善人發明按説苑介子推作舟之僑訛甚龍蛇之歌諸書所載亦多異同今從史記史記從亡賤臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾闕者此受下賞三賞之後故且及子晉人聞之皆説壺叔説苑作陶叔狐國語襄王使太宰文公及內史興賜晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎及期命於武宫設桑主布几筵大宰涖之晉侯端委以入大宰以王命命冕服內史贊之三命而後即冕服既畢賓饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道也成禮義德之則也則德以道諸侯諸侯必歸之狄師伐周王適鄭處於汜詳見子帶之亂使簡師父告於晉使左鄢父告於秦二十五年春秦伯師於河上將納王狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰於阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有之睽曰吉遇公用享於天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也晉侯辭秦師而下三月甲辰次於陽樊右師圍溫左師逆王夏四月丁巳王入於王城取太叔於溫殺之於隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原攢茅之田晉於是始啓南陽陽樊不服圍之倉葛呼曰德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫於冀趙衰為原大夫狐溱為溫大夫二十六年夏齊孝公伐我北鄙衛人伐齊洮之盟故也公使展喜犒師使受命於展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取榖凡師能左右之曰以置桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫於楚二十七年楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有冬楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎搜於被廬作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犨為右晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎子犯曰民未知禮未生其共於是乎大搜以示之禮作執秩以正其官民聽不惑而後用之出榖戍釋宋圍一戰而霸文之教也補逸國語公使趙衰為卿辭曰欒枝貞順先軫有謀胥臣多聞皆可以為輔臣弗若也乃使欒枝將下軍先軫佐之取五鹿先軫之謀也郤縠卒使先軫代之胥臣佐下軍二十八年春晉侯將伐曹假道於衛衛人弗許還自南河濟侵曹伐衛正月戊申取五鹿二月晉郤縠卒原軫將中軍胥臣佐下軍上德也晉侯齊侯盟於斂盂衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説於晉衛侯出居於襄牛公子買戍衛楚人救衛不克公懼於晉殺子叢以説焉謂楚人曰不卒戍也晉侯圍曹門焉多死曹人尸諸城上晉侯患之聽輿人之謀曰稱舍於墓師遷焉曹人凶懼為其所得者棺而出之因其凶也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也魏犫顛頡怒曰勞之不圖報於何有爇僖負羇氏魏犫傷於胸公欲殺之而愛其材使問且視之病將殺之魏犫束胸見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之殺顛頡以徇於師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説執曹伯分曹衛之田以畀宋人楚子入居於申使申叔去榖使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有德不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讐已多將何以戰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此退三舍辟之所以報也背惠食言以亢其讎我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憗次於城濮楚師背酅而舍晉侯患之聽輿人之誦曰原田每每舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大恥不如戰也晉侯夢與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏其罪吾且柔之矣子玉使鬬勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝將見晉車七百乘韅靷鞅靽晉侯登有莘之虛以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳於莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而偽遁楚師馳之原軫郤溱以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀及癸酉而還甲午至於衡雍作王宫於踐土鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成於晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟於衡雍丁未獻楚俘於王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命白重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲衛侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟癸亥王子虎盟諸侯於王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而元孫無有老幼君子謂是盟也信謂晉於是役也能以德攻初楚子玉自為瓊辨玉纓未之服也先戰夢河神謂己曰畀余余賜女孟諸之麋弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連榖而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉己而已不在民矣城濮之戰晉中軍風於澤亡大斾之左旃祁瞞姦命司馬殺之以徇於諸侯使茅茷代之師還壬午濟河舟之僑先歸士會攝右秋七月丙申振旅愷以入於晉獻俘授馘飲至大賞徴會討二殺舟之僑以徇於國民於是大服君子謂文公其能刑矣三罪而民服詩云惠此中國以綏四方不失賞刑之謂也補逸説苑城濮之戰文公謂咎犯曰吾卜戰而龜熸我迎嵗彼背嵗彗星見彼操其柄我操其標吾又夢與荆王搏彼在上我在下吾欲無戰子以為何如咎犯對曰卜戰龜熸是荆人也我迎嵗彼背嵗彼去我從之也彗星見彼操其柄我操其標以掃則彼利以擊則我利君夢與荆王搏彼在上君在下則君見天而荆王伏其罪也且吾以宋衛為主齊秦輔我我合天道獨以人事固將勝之矣文公從之荆人大敗韓非子晉文公與楚戰至黃鳯之陵履繫解因自結之左右曰不可以使人乎公曰吾聞上君所與居皆其所畏也中君之所與居皆其所愛也下君之所與居皆其所侮也寡人雖不肖先君之人皆在是以難之也吕氏春秋昔晉文公將與楚人戰於城濮召咎犯而問曰楚衆我寡奈何而可咎犯對曰臣聞繁禮之君不足於文繁戰之君不足於詐君亦詐之而已文公以咎犯言告雍季雍季曰竭澤而漁豈不獲得而明年無魚焚藪而田豈不獲得而明年無獸詐偽之道雖今偷可後將無復非長術也文公用咎犯之言而敗楚人於城濮反而為賞雍季在上左右諫曰城濮之功咎犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百世之利也咎犯之言一時之務也焉有以一時之務先百世之利者乎孔子聞之曰臨難用詐足以却敵反而尊賢足以報德文公雖不終始足以伯矣冬會於溫討不服也是會也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩於河陽言非其地也且明德也壬申公朝於王所丁丑諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公説復曹伯遂會諸侯圍許晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行補逸國語晉國飢公問於箕鄭曰救飢何以對曰信公曰安信對曰信於君心信於名信於令信於事公曰然則若何對曰信於君心則美惡不渝信於名則上下不干信於令則時無廢功信於事則民從事有業於是乎民知君心貧而不懼藏出如入何匱之有公使為箕及清原之搜使佐新上軍二十九年夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗盟於翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不會公侯會伯子男可也三十年春晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也夏狄侵齊九月甲午晉侯秦伯圍鄭以其無禮於晉且二於楚也三十一年春取濟西田分曹地也使臧文仲往宿於重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅於濟盡曹地也襄仲如晉拜曹田也秋晉搜於清原作五軍以禦狄趙衰為卿補逸國語公使原季為卿辭曰夫三德者偃之出也以德紀民其章大矣不可廢也使狐偃為卿辭曰毛之知賢於臣其齒又長毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之狐毛卒使趙衰代之辭曰城濮之役先且居之佐軍也善軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在乃使先且居將上軍公曰趙衰三讓其所讓皆社稷之衛也廢讓是廢德也以趙衰之故搜於清原作五軍使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之子犯卒蒲城伯請佐公曰趙衰三讓不失義讓推賢也義廣德也德廣賢至有何患矣請令衰也從子乃使趙衰佐新上軍三十二年春楚鬬章請平於晉晉陽處父報之晉楚始通冬晉文公卒庚辰將殯於曲沃出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉補逸國語文公學讀書於臼季三日曰吾不能行也咫聞則多矣對曰然而多聞以待能者不猶愈乎文公問於郭偃曰始也吾以國為易今也難對曰君以為易其難也將至矣君以為難其易也將至矣文公問於胥臣曰吾欲使陽處父傅歡也而教誨之其能善之乎對曰是在歡也籧篨不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇瞍不可使視嚚瘖不可使言聾聵不可使聽僮昏不可使謀質將善而賢良贊之則濟可俟也若有違質教將不入其何善之為臣聞昔者大任娠文王不變少􅘞於豕牢而得文王不加病焉文王在母不憂在傅弗勤處師弗煩事王不怒敬友二虢而慈惠二蔡刑于太姒比於諸弟詩云刑于寡妻至於兄弟以御於家邦於是乎用四方之賢良及其即位也詢於八虞而咨於二虢度於閎夭而謀於南宫諏於蔡原而訪於辛尹重之以周召畢榮億寧百神而柔和萬民故詩曰惠於宗公神罔時恫是則文王非専教誨之力也公曰然則教無益乎對曰胡為文益其質故人生而學非學不入公曰奈夫八疾何對曰官師之所材也戚施直鎛籧篨蒙璆侏儒扶盧矇瞍修聲聾聵司火僮昏嚚瘖僬僥官師所不材也以實裔土夫教者因體能質而利之者也若川然有原以卬浦而後大三十三年秦師滅滑而還晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興薑戎子墨衰絰梁𢎞御戎萊駒為右夏四月辛巳敗秦師於殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨狄侵齊因晉喪也狄伐晉及箕八月戊子晉侯敗狄於箕郤缺獲白狄子先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生晉陳鄭伐許討其二於楚也楚令尹子上侵陳蔡陳蔡成遂伐鄭晉陽處父侵蔡楚子上救之與晉師夾泜而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸大子商臣譖子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上文公元年晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公既祥使告於諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王於溫先且居胥臣伐衛五月辛酉朔晉師圍戚六月戊戌獲孫昭子衛人使告於陳陳共公曰更伐之我辭之衛孔達帥師伐晉君子以為古古者越國而謀秋晉侯疆戚田故公孫敖會之二年春秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰於彭衙秦師敗績晉人謂秦拜賜之師戰於殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與汝為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也公未至六月穆伯會諸侯及晉司空士縠盟於垂隴晉討衛故也書士縠堪其事也陳侯為衛請成於晉執孔達以説三年春莊叔會諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃衛侯如陳拜晉成也楚師圍江晉先僕伐楚以救江冬晉以江故告於周王叔桓公晉陽處父伐楚以救江門於方城遇息公子朱而還晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂四年春晉人歸孔達於衛以為衛之良也故免之夏衛侯如晉拜曹伯如晉會正六年冬十月襄仲如晉葬襄公七年晉郤缺言於趙宣子曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德無德何以主盟子為正卿以主諸侯而不務德將若之何夏書曰戒之用休董之用威勸之以九歌勿使壞九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土穀謂之六府正德利用厚生謂之三事義而行之謂之德禮無禮不樂所由叛也若吾子之德莫可歌也其誰來之盍使睦者歌吾子乎宣子説之八年春晉侯使解揚歸匡戚之田於衛且復致公壻池之封自申至於虎牢之竟臣士竒曰晉文公避驪姬之亂經歷狄鄭衛齊宋曹楚秦諸國備嘗險阻以老其才凡十有九年卒反晉國棄責薄斂分寡救乏振滯匡困舉善授能官方定物諸大政犂然一變晉國之常度伐原示信大搜示禮定王示義用能出榖戍解宋圍一戰而收館榖之功齊桓以後功烈未有如是之赫者也然而晉伯所基惟其定王一舉當時天子蒙塵使簡師父告於晉亦使左鄢父告於秦秦伯會師河上將納王使秦得専定王之美則天下之望走將在秦晉之大事去矣曹操先得獻帝而袁紹不能爭朱梁既反乘輿而克用不能抗名分所在形格勢禁自然之理也所以狐偃言於晉侯曰求諸侯莫如勤王取威定霸之謀於是乎在而文能聽之蓋亦賢矣獨其受南陽之賞陽樊不服至用師以圍之王之姻親幾為俘馘妄行請隧瀆亂王章而不知翼戴天子止諸侯之常職此非純臣之所為也若城濮功高而信先軫之詭謀許復曹衛拘留宛春一意敗楚而無按兵修禮之風比之召陵誠所謂譎而不正者耶大約文公之為人不逮齊桓逺甚而其臣子犯趙衰先軫之屬亦無有知大體如管夷吾者是以桓能忘濱死之怨忍手劍之辱而文反國之後惟以報復為事懷觀裸之恨則出衛君於襄牛銜與塊之憤則責曹君以獻狀卒使纍於晉陽辱於深室而衛之受禍尤烈君臣交獄兄弟相殘拂人道之經亂上下之分必如是而後快心即以鄭之小郤不能捐棄連秦伯以伐之結釁殘民兵端不息迹文之所為直睚眥必報之人耳子犯授璧子推自焚蓋有以窺見文之褊心而以為不能録功略過也世但見其能忍於豎頭里鳬須而稱之其亦未之考矣踐土作宫傳三覲之美而河陽召王功不塞咎非聖人原情文其罪魁乎襄公繼伯惟於溫覿王一事不隕家聲而導之者先且居也其他矜威恃力舉動多不中禮而敗殽之役為尤甚夫秦穆手挈文公而歸之晉德最深襄又秦之自出秦伯勞師襲逺雖有利可乘而大惠未泯何至興墨絰之戈矯牛鳴之命忍死先君而快心於一擊以父言之則不孝以甥舅之戚言之則不義以報施言之則不恕以在喪不與兵革之事言之則不懷邀人於險阻則不仁至於敗殽不已而繼以彭衙彭衙不已而繼以取汪秦固怨晉晉何為而致死於秦也若楚師在江不能悉索以急纓冠之義僅僅以一處父之師門方城而江患轉劇襄之霸功不逺愧於乃父哉左傳紀事本末卷二十五
