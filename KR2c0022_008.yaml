body:
  text: 左傳紀事本末卷八詹事府詹事髙士竒撰列卿嗣世孟孫臧孫叔孫氏季孫子叔閔公二年共仲奔莒莒人歸之乃縊共仲即慶父僖公十五年孟穆伯帥師及諸侯之師救徐穆伯即公孫敖慶父子是為仲孫氏亦曰孟孫文公元年春王使內史叔服來㑹葬公孫敖聞其能相人也見其二子焉叔服曰榖也食子難也收子榖也豐下必有後於魯國七年穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉冬徐伐莒莒人來請盟穆伯如莒涖盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲惠伯諫曰臣聞之兵作於內為亂於外為寇寇猶及人亂自及也今臣作亂而君不禁以啓寇讐若之何公止之惠伯成之使仲舍之公孫敖反之復為兄弟如初從之八年穆伯如周弔喪不至以幣奔莒從已氏焉十四年穆伯之從己氏也魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出三年而盡室以復適莒文伯疾而請曰榖之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告喪請葬弗許十五年齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也葬視共仲聲已不視幃堂而哭襄仲欲弗哭惠伯曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之他年其二子來孟獻子愛之聞於國或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎逺禮不如死一人門于句鼆一人門于戾丘皆死補逸國語文公欲弛孟文子之宅使謂之曰吾欲利子于外之寬者對曰夫位政之建也署位之表也車服表之章也宅章之次也祿次之食也君議五者以建政為不易之故也今有司來命易臣之署與其車服而曰將易而次為寬利也夫署所以朝夕䖍君命也臣立先臣之署服其車服為利故而易其次是辱君命也不敢聞命若罪也則請納祿與車服而違署唯里人之所命次公弗取臧文仲聞之曰孟孫善守矣其可以蓋穆伯而守其後于魯乎發明孟文子即文伯獻子之父也名不見經以無祿早世故穆伯之醜如此有賢子孫以世其家所謂有子考無咎者非耶以上孟獻子之立莊公三十二年成季使針季鴆僖叔及逵泉而卒立叔孫氏僖叔即叔牙僖公四年冬叔孫戴伯帥師㑹諸侯之師侵陳即公孫茲叔牙子是為叔孫氏五年夏公孫茲如牟娶焉文公十一年秋鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉冬十月甲午敗狄于鹹獲長狄僑如以命宣伯成公十四年秋宣伯如齊逆女稱族尊君命也九月僑如以夫人婦姜氏至自齊舍族尊夫人也故君子曰春秋之稱微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能修之補逸國語簡王八年魯成公來朝使叔孫僑如先聘且告見王孫說與之語說言于王曰魯叔孫之來也必有異焉其享覲之幣薄而言諂殆請之也若請之必欲賜也魯執政惟强故不歡焉而後遣之且其狀方上而鋭下宜觸冒人王其勿賜若貪陵之人來而盈其願是不賞善也且財不給故聖人之施舍也議之其喜怒取豫也亦議之是以不主寬惠亦不主猛毅主德義而已王曰諾使私問諸魯請之也王遂不賜禮如行人及魯侯至仲孫蔑為介王孫說與之語說讓說以語王王厚賄之十六年六月晉楚戰于鄢陵戰之日公出於壞隤宣伯通於穆姜欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待于壞隤申宫警備設守而後行是以後使孟獻子守于公宫秋㑹于沙隨謀伐鄭也宣伯使告卻犫曰魯侯待于壞隤以待勝者卻犫將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公于晉侯晉侯不見公秋公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食於鄭郊師逆以至聲伯四日不食以待之食使者而後食宣伯使告卻犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志于魯請止行父而殺之我斃蔑也而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉卻犫曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讐亡而為讎治之何及卻犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊十二月季孫及卻犫盟于扈歸刺公子偃召叔孫豹于齊而立之齊聲孟子通僑如使立于髙國之間僑如曰不可以再罪奔衛亦間於卿襄公九年穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞無咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣以上叔孫穆子之立莊公二十七年秋公子友如陳葬原仲閔公元年季子來歸季友為季氏之始其子不見經其孫即季文子行父也文公六年秋季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害十八年莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達公問其故季文子使大史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至于堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟共子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲很明德以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至于堯堯不能去縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦螭魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賔于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎考異莒僕之事國語作宣公以書命季文子曰為我豫之邑里革遇之而更其書曰為我流之內外傳事無不同者獨此有異附志之補逸國語季文子相宣成無衣帛之妾無食粟之馬仲孫它諫曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者猶多矣吾是以不敢人之父兄食粗衣惡而我美妾與馬無乃非相人者乎且吾聞以德榮為國華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠文子聞之曰過而能改者民之上也使為上大夫發明魯自中葉卿族五家三桓而外臧孫氏孝公子公子彄之後也子叔氏宣公弟叔肸子嬰齊之後叔老叔弓以下是也其上大夫有子服氏惠昭景伯甚著功名則孟獻子它之後襄公五年季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎以上季文子立此序三家之始隱公六年冬公子彄卒此臧僖伯臧氏之祖也子為哀伯孫為文仲附紀于此以起臧武仲立季悼子出奔之事并孟孝伯臧為之立俱附見焉襄公二十二年春臧武仲如晉雨過御叔御叔在其邑將飲酒曰焉用聖人我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人國之蠧也令倍其賦二十三年季武子無適子公彌長而愛悼子欲立之訪於申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往盡舍旃故公鉏氏富又出為公左宰孟孫惡臧孫季孫愛之孟氏之御騶豐㸃好羯也曰從余言必為孟孫再三云羯從之孟莊子疾豐㸃謂公鉏茍立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立于户側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長于公宫姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請茍守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聽公命殺適立庶盟叔孫氏曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠何如乃弗與田仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也夏書曰念茲在茲順事恕施也以上臧武仲之去國與季悼子孟孝伯臧為之立二十四年齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路昭公四年初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶于國氏生孟丙仲壬夢天厭已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之久矣魯人召之不告而歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政公孫明知叔孫于齊歸未逆國姜子明取之故怒其子長而後使逆之田于丘蕕遂遇疾焉豎牛欲亂其室而有之强與孟盟不可叔孫為孟鍾曰爾未際饗大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鐘聲牛曰孟有北婦人之客怒將往牛止之賔出使拘而殺諸外牛又强與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜泄見告之饑渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使置饋于個而退牛弗進則置虛命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜泄葬叔孫豎牛賂叔仲昭子與南遺使惡杜泄於季孫而去之杜泄將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命于朝而聘於王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之五年春舍中軍季氏使杜泄告于殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子惟不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之叔仲子謂季孫曰帶受命於子叔孫曰葬鮮者自西門季孫命杜泄杜泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宫射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之初穆子之生也莊叔以周易筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王以下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗于人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終以上叔孫昭子之立宣公十七年冬公弟叔肸卒公母弟也凡大子之母弟公在曰公子不在曰弟凡稱弟皆母弟也發明叔肸以宣公之弒為非又以兄弟不忍去之織屨而食終身不食宣公之食與其子嬰齊蓋皆賢人也按叔肸子為公孫嬰齊叔老叔弓之父也此子叔氏之始補逸國語子叔聲伯如晉謝季文子卻犫欲與之邑弗受也歸鮑國謂之曰子何辭苦成叔之邑欲信讓邪抑知其不可也對曰吾聞之不厚其棟不能任重重莫如國棟莫如德夫苦成叔家欲任兩國而無大德其不存也亡無日矣譬之如疾余恐易焉苦成氏有三亡少德而多寵位下而欲上政無大功而欲大祿皆怨府也其君驕而多私勝敵而歸必立新家立新家不因民不能去舊因民非多怨民無所始為怨三府可謂多矣其身之不能定焉能豫人邑鮑國曰我信不若子若鮑氏有釁吾不圖矣今子圖逺以讓邑必常立矣成公十七年聲伯之母不聘初聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒以上子叔氏補逸公羊傳仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使于晉而未返何以後之叔仲惠伯傅子赤者也文公死子幼公子遂謂叔仲惠伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何幼君之有公子遂知其不可與謀退而殺叔仲惠伯弒子赤而立宣公宣公死成公幼臧宣叔者相也君死不哭聚諸大夫而問焉昔者叔仲惠伯之事孰為之諸大夫皆雜然曰仲氏也其然乎于是遣歸父之家然後哭君歸父使乎晉還自晉至柳聞君薨家遣墠帷哭君成踊反命于介自是走之齊魯人徐傷歸父之無後也于是使嬰齊後之也辨誤按仲嬰齊或係歸父之子亦未可知若公孫嬰齊乃叔肸子聲伯非此仲嬰齊也經文明有二人何得混而為一乎昭公七年三月公如楚鄭伯勞于師之梁孟僖子為介不能相儀及楚不能答郊勞九月公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅于宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命茲益共故其鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以糊余口其共也如是臧孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬說與何忌于夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則效已矣十一年夏孟僖子㑹邾莊公盟于祲祥泉丘人有女夢以其帷幕孟氏之廟遂奔僖子其僚從之盟于清丘之社曰有子無相棄也僖子使助薳氏之簉反自祲祥宿于薳氏生懿子及南宫敬叔于泉丘人其僚無子使字敬叔以上孟僖子之事昭公二十五年初臧昭伯如晉臧㑹竊其寶龜僂句以卜為信與僭僭吉臧氏老將如晉問㑹請往昭伯問家故盡對及內子與母弟叔孫則不對再三問不對歸及郊㑹逆問又如初至次于外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉計於季氏臧氏使五人以戈楯伏諸桐汝之閭㑹出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘臧氏老季臧有惡及昭伯從公平子立臧㑹㑹曰僂句不余欺也以上臧㑹之立哀公三年秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告于君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣乃討之召正常正常不反以上季康子之立哀公二十四年夏四月晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取榖宣叔以晉師伐齊取汶陽寡君欲徼福于周公願乞靈于臧氏臧石帥師㑹之取廩丘軍吏令繕將進萊章曰君卑政暴往嵗克敵今又勝都天奉多矣又焉能進是躗言也役將班矣晉師乃還餼臧石牛大史謝之曰以寡君之在行牢禮不度敢展謝之發明按臧氏有後于魯而不失臣節其與子叔氏後人俱賢于三桓逺矣臣士竒曰魯卿莫强于三家其餘又有臧氏子叔氏其世次叢雜所宜深考也孟孫之祖慶父慶父弒逆走莒莒人歸之自縊立其子公孫敖敖與從弟襄仲爭已氏卒從己氏于莒魯人立其子文伯文伯卒弟惠叔嗣立其後文伯之世大孟獻子文伯子也獻子生孺子速即孟莊子也莊子生孺子秩而豐㸃立其庶子羯所謂孟孝伯也及昭公時有孟僖子生南宫敬叔與孟懿子懿子生武伯而獻子之孫有惠伯惠伯生昭伯别為子服氏及哀公時又有子服景伯孟孫氏世系槩如此叔孫氏之祖公子牙以鴆死立其子公孫茲牙之孫曰得臣得臣生僑如僑如罪出召其弟豹於齊而立之生孟丙仲壬為豎牛所殺立其庶子婼是為昭子昭子生成子不敢成子生武叔州仇武叔生文子舒叔孫氏世系槩如此季孫之祖成季再傳為文子行父文子生武子宿無適子公彌長而愛悼子紇臧氏立之悼子生平子意如平子生桓子斯桓子生康子肥而公彌别為公鉏氏悼子之子穆伯靖又别為公甫氏季孫世系槩如此臧氏之祖公子彄孝公子也是為僖伯僖伯生哀伯達哀伯生文仲辰文仲生宣叔許宣叔生賈及為武仲紇者繼室之子也以穆姜姨子故得立後奔邾為乃主臧氏之祀焉為生昭伯昭伯立而惡季氏立其從弟㑹㑹生賔如賔如生石嘗為魯將兵伐齊子叔氏之祖叔肸宣公弟也生子叔聲伯亦曰公孫嬰齊聲伯生叔老齊子齊子生叔弓叔弓生叔輒及叔鞅叔輒生叔詣而弓之曽孫有叔還叔還生叔青臧孫子叔之世系又槩如此今按孟叔二氏之先皆為逆首不如季友之賢然如文伯之不願以利易次莊子之不改父臣僖子恥不能相禮而知孔子為明德之後卒使南宫懿子受學聖人此亦足以蓋前人之愆而有餘也僑如淫姣幾盜魯國牙之弒械殆未甚焉而叔豹子昭繼世稱社稷之衛忠貞彌烈矣苐庚宗之舍竟以讒入凶于而家而身亦隨之豈所謂老將智而耄及者耶昭子朝而命吏卒剪凶豎不賞私勞其賢加于流俗數等哉若州仇非毁仲尼較之孟僖殆薰蕕之相去矣季友靖亂于慶父夫人內訌之際誠不負文手之占保姓受氏固其宜哉行父繼以忠清相三君而無私積却莒僕之奸等鷹鸇之逐春秋列國名卿蓋未有能過之者而宿及意如遂弱公室昭公思一搖手而身已被逐客死乾侯為天下笑而意如不臣之名亦藏在諸侯之策雖孝子慈孫莫能改易成季行父之忠替矣公子彄與其子哀伯世以忠諫顯武仲之知見許于聖人而徇季宿之私情舍公彌而立羯譖訴于孟氏不能思患豫防從甲東門適與為亂之言劵斬關出走納蔡規後所號為智囊者安在乎雨行何聖之譏猶淺焉耳叔肸不義宣公之篡織屨而食終身不食乃兄之食子鮮木門同一髙蹈聲伯不貪苦成氏之邑有父風焉皆宗邦之彥也合觀魯卿之族世以考其賢奸邪正而公室之强弱興衰瞭然在目矣左傳紀事本末卷八
