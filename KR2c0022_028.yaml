body:
  text: 左傳紀事本末卷二十八詹事府詹事髙士竒撰秦晉交兵文公六年八月乙亥晉襄公卒靈公少晉人以難故欲立長君趙孟使先蔑士㑹如秦逆公子雍七年夏秦康公送公子雍于晉曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴日抱太子以啼於朝宣子與諸大夫乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之歩招禦戎戎津為右及堇隂宣子曰我若受秦秦則賔也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師于令狐至于刳首己丑先蔑奔秦士㑹從之八年夏秦人伐晉取武城以報令狐之役十年春晉人伐秦取少梁夏秦伯伐晉取北徴十二年秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之十二月秦軍掩晉上軍趙穿追之不及秦師夜遁復侵晉入瑕十三年春晉侯使詹嘉處瑕以守桃林之塞宣公元年晉欲求成于秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成二年秦師伐晉以報崇也遂圍焦八年春白狄及晉平夏㑹晉伐秦晉人獲秦諜殺諸絳市六日而蘇十五年秋七月秦桓公伐晉次于輔氏壬午晉侯治兵于稷以畧狄土立黎侯而還及雒魏顆敗秦師于輔氏獲杜回秦之力人也成公九年秦人白狄伐晉諸侯貳故也十一年秦晉為成將㑹于令狐晉侯先至焉秦伯不肯涉河次于王城使史顆盟晉侯于河東晉郤犫盟秦伯于河西范文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成十三年夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如秦無祿獻公即世穆公不忘舊德俾我惠公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊德矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之將致命於秦文公恐懼綏靖諸侯秦師克還無害則是我有大造于西也無祿文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志於我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以來蕩揺我邊疆我是以有令狐之役康猶不悛入我河曲伐我洓川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不惠稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊垂我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車來命我景公曰吾與女同好棄惡復修舊德以追念前勲言誓未就景公即世我寡君是以有令狐之㑹君又不祥背棄盟誓白狄及君同州君之仇讎而我之婚姻也君來賜命曰吾與女伐狄寡君不敢顧婚姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其德也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不穀惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒鍼為右孟獻子曰晉帥乘和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父曹宣公卒于師師遂濟涇及侯麗而還迓晉侯于新楚襄公九年夏秦景公使士雃乞師于楚將以伐晉楚子師于武城以為秦援秦人侵晉晉饑弗能報也十年晉荀罃伐秦報其侵也十一年十二月秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴御之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也十二年冬秦嬴歸于楚楚司馬子庚聘于秦為夫人寧禮也十四年夏諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待於竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子説二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至於棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役於是齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衛北宫括不書于向書于伐秦攝也十九年於四月丁未鄭公孫蠆卒赴於晉大夫范宣子言於晉侯以其善於伐秦也六月晉侯請於王王追賜之大路使以行禮也二十五年㑹於夷儀之歲齊人城郟其五月秦晉為成晉韓起如秦涖盟秦伯車如晉涖盟成而不結二十六年春秦伯之弟鍼如晉修成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劍從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎昭公元年秦后子有寵於桓如二君於景其母曰弗去懼選癸卯鍼適晉其車千乘書曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也補逸國語秦后子來仕其車千乘楚公子干來仕其車五乘叔向為太傅實賦祿韓宣子問二公子之祿焉對曰大國之卿一旅之田上大夫一卒之田夫二公子者上大夫也皆一卒可也宣子曰秦公子富若之何其鈞之也對曰夫爵以建事禄以食爵徳以賦之功庸以稱之若何其以富賦祿也夫絳之富商韋藩木楗以過於朝唯其功庸少也而能金玉其車文錯其服能行諸侯之賄而無尋尺之祿無大績於民故也且楚秦匹也若之何其回於富也乃鈞其禄楚辭注秦伯有齧犬弟鍼欲請之秦伯不肯與鍼以百兩金易之而又不聽因逐鍼而奪其爵禄五年秦后子復歸於秦景公卒故也六年大夫如秦葬景公禮也臣士竒曰秦晉兵交自敗殽以至令狐自令狐以至遷延之役曲直各有攸歸而論其始禍則晉實負秦秦無負於晉也夫殽陵覆師其怨最為慘痛取王官及郊封尸而還不足以報匹馬隻輪之萬一奈何又有刳首之敗耶故論秦晉之曲直譬如讞獄殽其初案也令狐其轉案也然而令狐之舛亦甚矣靈公雖幼冢嫡也襄公手挈而授之宣子言猶在耳先君之肉未寒也古有植遺腹朝委裘而晏然無事者且盾非趙氏之孤耶無亦惟是諸大夫相與輯睦輔以成立何所見而别求長君大昧奕者舉碁之義矣至秦雖挾其蟊賊以來遣一介行李婉言謝過秦未必不聽不聽而後閉闗以拒之受固為賔不受亦豈即為冦潛師夜起一鼓而創之何以對賈季又何可使聞於天下諸侯乎自是少梁北徴羈馬河曲之兵至於膠葛而不可解秦固難免遂非之罪而晉之不韙如水益深矣至魯宣元年晉欲求成於秦毋亦悔禍之延而有悛心何惜披露肺腑申以約誓乃復崇詐術攻與國以挑秦怒秦肯降心乎圍焦所以報崇也會狄伐秦所以報焦也輔氏之次報伐也敗而又報遂合白狄以來秦之已甚惟此一役耳其餘則一彼一此往來相當而未見晉之肯為秦弱也至令狐為成臨河不濟後此吕相以是為秦罪然安知秦之不以晉欲殽陵我也令狐我也虎狼甚於秦而欲秦無不信之心難矣由是歸而背成晉使呂相貽書聽其辭秦若無以自解者先儒謂其書中多所文致而秦之報書亦不傳秦其無人也耶自是麻隧再報而士雃乞南郢之師荀罃報侵而庶長奏于櫟之績迨至十三國連兵以伐荀偃一令馬首遂東祇成遷延之役晉亦少倦而秦不復報矣韓起伯車使命交通后子歸而好成景公葬而禮厚然後舉敗殽令狐以來數十年之夙怨渙然交釋君子取其不以凶終而未嘗不恨晉之兩為禍始也左傳紀事本末卷二十八
