body:
  text: 左傳紀事本末卷二詹事府詹事髙士竒撰桓王伐鄭隱公三年鄭武公莊公為平王卿士王二于虢鄭伯怨王王曰無之故周鄭交質王子狐為質于鄭鄭公子忽為質于周王崩周人將畀虢公政四月鄭祭足帥師取溫之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之茍有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可薦于鬼神可羞于王公而况君子結二國之信行之以禮又焉用質風有采蘩采蘋雅有行葦泂酌昭忠信也六年鄭伯如周始朝桓王也王不禮焉周桓公言于王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣八年夏虢公忌父始作卿士于周八月丙戌鄭伯以齊人朝王禮也十一年王取塢劉蒍邘之田于鄭而與鄭人蘇忿生之田溫原絺樊隰郕攢茅向盟州陘隤懷君子是以知桓王之失鄭也恕而行之德之則也禮之經也已弗能有而以與人人之不至不亦宜乎桓公五年王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而萃于王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人况敢陵天子乎茍自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右七年夏盟向求成于鄭既而背之秋鄭人齊人衛人伐盟向王遷盟向之民于郟臣士竒曰鄭桓公死驪山之亂其子武公及武公之子莊公相繼為王朝卿士國于虢鄶之間無逺天室周之東遷固嘗依之其地親而功大誠難遽泯平王昵于虢公欲授之政周人不能裁以大義卒踐其言此交惡之所由始也夫臣子之于君父信而見疑忠而被疏則益負罪引慝積其忠誠以冀一旦之悔悟而已乃上下相要愛子出質君臣之分等于敵國左氏直稱周鄭蓋深疾鄭伯之不臣也及虢公柄用祭仲悍然稱麥禾之戈目中尚有天子耶春秋世諸侯放恣而用兵王室者自鄭莊始滅理犯分甘舉父祖之勤勞而盡棄之悖已甚矣桓王繼立銜麥禾之怨來朝不答固失不念舊惡之義與善鄭以勸來者之權取塢劉蒍邘之田而償以所必不得桓王所以處鄭者誠不能無過乃鄭遂鞅鞅廢述職之禮曽不思要言質子取麥取禾敢施之天子不顧其難堪王禮少不愜意而以無禮報之臣誼之謂何至天子總帥六師問罪境上不歸死司寇頓首伏辜遽興師而與之抗逞子元之狡謀縱祝聃之狂矢向使王不能軍此際寧有天日耶至請從而不許托不敢陵天子之名夜使祭足勞王且問左右飾殷勤曲謹之節而其玩弄王室如股掌情罪益彰矣當日者以天子之兵加以四國雲附之旅豈不能覆一鄭乃徒敗軍奔王威幾頓蓋虢為王所昵其奔也力不贍也非有二心于鄭也若陳蔡衛則實無鬭志望旗而靡疑有同類之懼焉唐世諸藩鎮合兵討賊往往徘徊觀望不欲盡力意亦如此故繻葛之敗蔡衛陳亦不為無罪也胡文定嘉其從王未之察耳左傳紀事本末卷二
