body:
  text: 左傳紀事本末巻十二詹事府詹事高士竒撰小國交魯以年序不以國序戎狄兵好俱附隱公二年莒子娶于向向姜不安莒而歸夏莒人入向以姜氏還七年春滕侯卒不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終稱嗣也以繼好息民謂之禮經十一年春滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庻姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯桓公二年秋七月杞侯來朝不敬杞侯歸乃謀伐之九月入杞討不敬也公及戎盟于唐修舊好也冬公至自唐告于廟也凡公行告于宗廟反行飲至舍爵策勲焉禮也特相會徃來稱地讓事也自參以上則徃稱地來稱會成事也三年夏公會杞侯于郕杞求成也五年冬淳于公如曹度其國危遂不復六年春自曹來朝書曰實來不復其國也七年春榖伯鄧侯來朝名賤之也九年冬曹太子來朝賔之以上卿禮也享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也十年春曹桓公卒十二年夏盟于曲池平杞莒也十七年蔡桓侯卒蔡人召蔡季于陳秋蔡季自陳歸于蔡蔡人嘉之也莊公五年秋郳犂來來朝名未王命也十八年夏公追戎于濟西不言其來諱之也二十七年春公會杞伯姬于洮非事也天子非展義不巡守諸侯非民事不舉卿非君命不越竟冬杞伯姬來歸寧也凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某僖公十四年鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝二十三年十一月杞成公卒書曰子杞夷也不書名未同盟也凡諸侯同盟死則赴以名禮也赴以名則亦書之不然則否辟不敏也二十七年春杞桓公來朝用夷禮故曰子公卑杞杞不共也秋入杞責無禮也二十九年春介葛盧來朝舍于昌衍之上公在會饋之芻米禮也冬介葛盧來以未見公故復來朝禮之加燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信文公十一年秋曹文公來朝即位而來見也郕太子朱儒自安於夫鍾國人弗徇十二年春郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔不書地尊諸侯也杞桓公來朝始朝公也且請絶叔姬而無絶昏公許之二月叔姬卒不言杞絶也書叔姬言非女也秋滕昭公來朝亦始朝公也十五年夏曹伯來朝禮也諸侯五年再相朝以修王命古之制也宣公九年滕昭公卒十六年秋郯伯姬來歸出也成公四年杞伯來朝歸叔姬故也七年夏曹宣公來朝八年冬杞叔姬卒來歸自杞故書九年春杞桓公來逆叔姬之喪請之也杞叔姬卒為杞故也逆叔姬為我也十三年五月晉師以諸侯之師及秦師戰于麻隧曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年冬葬曹宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑補逸檀弓諸侯伐秦曹桓桓當作宣公卒于㑹諸侯請含使之襲十五年春會于戚討曹成公也執而歸諸京師書曰晉侯執曹伯不及其民也凡君不道於其民諸侯討而執之則曰某人執其侯不然則否諸侯將見子臧於王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非我節也雖不能聖敢失守乎遂逃奔宋十六年曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大冺曹也先君無乃有罪乎若有罪則君列諸㑹矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出附録昭公二十年曹公孫㑹自鄸出奔宋公羊傳奔未有言自者此其言自何畔也畔則曷為不言其畔為公子喜時之後諱也春秋為賢者諱何賢乎公子喜時讓國也其讓國奈何曹伯廬卒于師則未知公子喜時從與公子負芻從與或為主乎國或為主于師公子喜時見公子負芻之當主也逡巡而退賢公子喜時則曷為為㑹諱君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱也榖梁傳自夢者專乎夢也曹無大夫其曰公孫何也言其以貴取之而不以畔也以上附子臧讓國之節成公十六年夏四月滕文公卒襄公六年春杞桓公卒始赴以名同盟故也秋滕成公來朝始朝公也七年春郯子來朝始朝公也小邾穆公來朝亦始朝公也十八年春白狄始來二十一年冬曹武公來朝始見也二十九年杞文公來盟書曰子賤之也三十一年冬十月滕成公來會葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣能無從乎昭公三年春王正月丁未滕子原卒同盟故書名五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯之忌敬子不入惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之十六年秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰我祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皥氏以龍紀故為龍師而龍名我高祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也雎鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信十七年春小邾穆公來朝公與之燕季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎十八年三月曹平公卒三十一年薛伯榖卒同盟故書臣士竒曰魯在春秋葢積弱之國也主盟不若齊晉之强地勢不及秦楚之大徒以周禮在魯號稱望國其聲名文物所留餘猶足以繫小國之心動逺人之慕如滕薛曹邾杞鄫郯紀郳犂牟葛介蕭之屬皆常勤享䞇修朝禮卽篡逆如桓榖鄧二國逺在方域之外猶不憚僕僕焉亦足見周公之思在人而魯國之大可為也然諸小國來朝悉書于策而終不聞有一介之使徃報其禮者豈春秋略而不紀歟又何其詳于齊晉宋衛之徃來不以為繁也敬人者人恒敬之愛人者人恒愛之魯惟奄然坐大視小國之親己以為分所應爾而無足酬答卽如杞侯之朝且以不敬見討而其他尚敢責其簡傲哉邦交人道之大倫徃來天下之常理魯第視强弱為疎密直世俗之見耳使能存恤諸姬敬恭慰藉以勸來者而又能任賢修政發憤自雄則天下之望走將在于魯而周不其東乎惜乎魯之昧昧也若夫小國僻陋其不知有天子無足怪魯為宗邦悍然受人之朝而亦不能修述職之禮故經于小國來朝一切存而不削所以示譏也會潛盟唐與白狄之來皆書之以為後世戒濟西道追而其效彰矣于洮遇防其事瑣褻無足道蔡季之賢子臧之讓皆可風也施父諗射姑之歎惠伯識滕成之涕不幸而言中也州實來而不復朱儒安而弗徇均自棄也郯子厯詳官制豈直與葛盧之識三犧美談千古哉左傳紀事本末巻十二
