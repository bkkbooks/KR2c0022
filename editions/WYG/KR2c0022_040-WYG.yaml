body:
  text: 左傳紀事本末卷四十詹事府詹事髙士竒撰衛靈公之立瞶輒父子争國寵齊豹之亂南子之附昭公七年秋衛襄公卒衛齊惡告喪於周且請命王使成簡公如衛弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉衛襄公夫人姜氏無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羇之孫圉與史茍相之史朝亦夢康叔謂已余將命而子茍與孔烝鉏之曾孫圉相元史朝見成子告之夢夢協晉韓宣子為政聘於諸侯之嵗婤姶生子名之曰元孟縶之足不良弱行孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎故孔成子立靈公十二月癸亥葬衛襄公二十年夏衛公孟縶狎齊豹奪之司㓂與鄄有役則反之無則取之公孟惡北宫喜褚師圃欲去之公子朝通於襄夫人宣姜懼而欲以作亂故齊豹北宫喜褚師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子而歸死於公孟其可也丙辰衛侯在平夀公孟有事於葢獲之門外齊子氏帷於門外而伏甲焉使祝鼃寘戈於車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中齊氏用戈撃公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘貳車及公宫鴻駵魋駟乘於公公載寳以出褚師子申遇公於馬路之衢遂從過齊氏使華寅肉袒執葢以當其闕齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥析朱鉏宵從竇出徒行從公齊侯使公孫青聘於衛既出聞衛亂使請所聘公曰猶在竟内則衛君也乃將事焉遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賓曰寡君命下臣於朝曰阿下執事臣不敢貳主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止衛侯固請見之不獲命以其良馬見為未致使故也衛侯以為乘馬賓將掫主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賓曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也臣懼不免於戾請以除死親執鐸終夕與於燎齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟於彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉霄子髙魴出奔晉閠月戊辰殺宣姜衛侯使北宫喜謚曰貞子賜析朱鉏謚曰成子而以齊氏之墓予之衛侯告寧於齊且言子石齊侯將飲酒徧賜大夫曰二三子之教也苑何忌辭曰與於青之賞必及於其罰在康誥曰父子兄弟罪不相及况在羣臣臣敢貪君賜以干先王琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於囘不以囘待人不葢不義不犯非禮定公十三年初衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮吾惟子之見驕而不亡者未之有也戍必與焉及文子卒衛侯始惡於公叔戍以其富也補逸檀弓公叔文子卒其子戍請謚於君曰日月有時將葬矣請所以易其名者君曰昔者衛國凶饑夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政脩其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子公叔戍又將去夫人之黨夫人愬之曰戍將為亂十四年春衛侯逐公叔戍與其黨故趙陽奔宋戍來奔夏衛北宫結來奔公叔戍之故也衛侯為夫人南子召宋朝㑹於洮太子蒯聵獻盂於齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余公執其手以登臺太子奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊太子告人曰戲陽速禍余戲陽速告人曰太子則禍余太子無道使余殺其母余不許將戕於余若殺夫人將以余説余是故許而弗為以紓余死諺曰民保於信吾以信義也補逸史記大子蒯聵奔宋已而之晉趙氏列女傳衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭變節不為冥冥惰行蘧伯玉衛之賢大夫也仁而有智敬以事上此其人必不以闇昧廢禮是以知之公使視之果伯玉也家語史魚病將卒命其子曰吾在衛朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生而不能正君則死無以成禮我死汝置屍牖下於我畢矣其子從之靈公弔焉怪而問焉其子以其父言告公公愕然失容曰是寡人之罪也於是命之殯於客位進蘧伯玉而用之退彌子瑕而逺之哀公二年初衛侯遊於郊子南僕公曰余無子將立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命秪辱夏衛靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒六月乙酉晉趙鞅納衛太子於戚宵迷陽虎曰右河而南必至焉使太子絻八人衰絰偽自衛逆者告於門哭而入遂居之三年春齊衛圍戚求援於中山補逸史記靈公遊於郊令子郢僕郢靈公少子也字子南靈公怨太子出奔謂郢曰我將立若為後郢對曰郢不足以辱社稷君更圖之夏靈公卒夫人命子郢為太子曰此靈公命也郢曰亡人太子蒯聵之子輒在也不敢當於是衛乃以輒為君是為出公十一年冬衛大叔疾出奔宋初疾娶於宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫於外州外州人奪之軒以獻恥是二者故出衛人立遺使室孔姞疾臣向魋納美珠焉與之城鉏宋公求珠魋不與由是得罪及桓氏出城鉏人攻大叔疾衛莊公復之使處巢死焉殯於鄖𦵏於少禘初晉悼公子憖亡在衛使其女僕而田大叔懿子止而飲之酒遂聘之生悼子悼子即位故夏戊為大夫悼子亡衛人翦夏戊十二年夏吳徴㑹於衛秋衛侯㑹吳於鄖吳人藩衛侯之舎衛侯歸效夷言子之尚㓜曰君必不免其死於夷乎執焉而又説其言從之固矣十五年衛孔圉取大子蒯聵之姊生悝孔氏之豎渾良夫長而美孔文子卒通於内大子在戚孔姬使之焉大子與之言曰茍使我入獲國服冕乘軒三死無與與之盟為請於伯姬閏月良夫與大子入舎於孔氏之外圃昏二人䝉衣而乘寺人羅御如孔氏孔氏之老欒寧問之稱姻妾以告遂入適伯姬氏既食孔伯姬杖戈而先大子與五人介輿豭從之迫孔悝於厠强盟之遂劫以登臺欒寧將飲酒炙未熟聞亂使告季子召獲駕乘車行爵食炙奉衛侯輒來奔季子將入遇子羔將出曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出子路入及門公孫敢門焉曰無入為也季子曰是公孫也求利焉而逃其難由不然利其祿必救其患有使者出乃入曰大子焉用孔悝雖殺之必或繼之且曰大子無勇若燔臺半必舎孔叔大子聞之懼下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣孔悝立莊公莊公害故政欲盡去之先謂司徒瞞成曰寡人離病於外久矣子請亦嘗之歸告褚師比欲與之伐公不果十六年春瞞成褚師比出奔宋衛侯使鄢武子告於周曰蒯聵得罪於君父君母逋竄於晉晉以王室之故不棄兄弟寘諸河上天誘其衷獲嗣守封焉使下臣肸敢告執事王使單平公對曰肸以嘉命來告余一人往謂叔父余嘉乃成世復爾祿次敬之哉方天之休弗敬弗休悔其可追六月衛侯飲孔悝酒於平陽重酬之大夫皆有納焉醉而送之夜半而遣之載伯姬於平陽而行及西門使貳車反祏於西圃子伯季子初為孔氏臣新登於公請追之遇載祏者殺而乘其車許公為反祏遇之曰與不仁人爭明無不勝必使先射射三發皆逺許為許為射之殪或以其車從得祏於橐中孔悝出奔宋補逸禮記衛孔悝之鼎銘曰六月丁亥公假於大廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫於宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊耆欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施於烝彞鼎此衛孔悝之鼎銘也衛侯占夢嬖人求酒於大叔僖子不得與卜人比而告公曰君有大臣在西南隅弗去懼害乃逐大叔遺遺奔晉衛侯謂渾良夫曰吾繼先君而不得其器若之何良夫代執火者而言曰疾與亡君皆君之子也召之而擇材焉可也若不材器可得也豎告大子大子使五人輿豭從已劫公而彊盟之且請殺良夫公曰其盟免三死曰請三之後有罪殺之公曰諾哉十七年春衛侯為虎幄於藉圃成求令名者而與之始食焉太子請使良夫良夫乘衷甸兩牡紫衣狐裘至袒裘不釋劍而食太子使牽以退數之以三罪而殺之晉趙鞅使告於衛曰君之在晉也志父為主請君若太子來以免志父不然寡君其曰志父之為也衛侯辭以難太子又使椓之夏六月趙鞅圍衛齊國觀陳瓘救衛得晉人之致師者子玉使服而見之曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命子又何辱簡子曰我卜伐衛未卜與齊戰乃還衛侯夢於北宫見人登昆吾之觀被髪北面而譟曰登此昆吾之虚緜緜生之𤓰余為渾良夫呌天無辜公親筮之胥彌赦占之曰不害與之邑寘之而逃奔宋衛侯貞卜其繇曰如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰冬十月晉復伐衛入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入般師出初公登城以望見戎州問之以告公曰我姬姓也何戎之有焉翦之公使匠久公欲逐石圃未及而難作辛巳石圃因匠氏攻公公閉門而請弗許踰於北方而隊折股戎州人攻之太子疾公子青踰從公戎州人殺之公入於戎州已氏初公自城上見已氏之妻髪美使髠之以為吕姜髢既入焉而示之璧曰活我吾與女璧已氏曰殺女璧其焉往遂殺之而取其璧衛人復公孫般師而立之十二月齊人伐衛衛人請平立公子起執般師以歸舎諸潞夏衛石圃逐其君起起奔齊衛侯輙自齊復歸逐石圃而復石魋與大叔遺二十五年夏五月庚辰衛侯出奔宋衛侯為靈臺於藉圃與諸大夫飲酒焉褚師聲子韈而登席公怒辭曰臣有疾異於人若見之君將􅄆之是以不敢公愈怒大夫辭之不可褚師出公㦸其手曰必斷而足聞之褚師與司㓂亥乘曰今日幸而後亡公之入也奪南氏邑而奪司冦亥政公使寺人納公文懿子之車於池初衛人翦夏丁氏以其帑賜彭封彌子彌子飲公酒納夏戊之女嬖以為夫人其弟期大叔疾之從孫甥也少畜於公以為司徒夫人寵衰期得罪公使三匠久公使優狡盟拳彌而甚近信之故褚師比公孫彌牟公文要司冦亥司徒期因三匠與拳彌以作亂皆執利兵無者執斤使拳彌入於公宫而自太子疾之宫譟以攻公鄄子士請禦之彌援其手曰子則勇矣將若君何不見先君乎君何所不逞欲且君嘗在外矣豈必不反當今不可衆怒難犯休而易間也乃出將適蒲彌曰晉無信不可將適鄄彌曰齊晉爭我不可將適泠彌曰魯不足與請適城鉏以鉤越越有君乃適城鉏彌曰衛盜不可知也請速自我始乃載寳以歸公為支離之卒因祝史揮以侵衛衛人病之懿子知之見子之請逐揮文子曰無罪懿子曰彼好専利而妄夫見君之入也將先道焉若逐之必出於南門而適君所夫越新得諸侯將必請師焉揮在朝使吏遣諸其室揮出信弗内五日乃館諸外里遂有寵使如越請師二十六年夏五月叔孫舒帥師㑹越臯如后庸宋樂茷納衛侯文子欲納之懿子曰君愎而虐少待之必毒於民乃睦於子矣師侵外州大獲出禦之大敗掘褚師定子之墓焚之於平莊之上文子使王孫齊私於臯如曰子將大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已文子致衆而問焉曰君以蠻夷伐國國幾亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出衆曰勿出重賂越人申開守陴而納公公不敢入師還立悼公南氏相之以城鉏與越人公曰期則為此令苟有怨於夫人者報之司徒期聘於越公攻而奪之幣期告王王命取之期以衆取之公怒殺期之甥之為大子者遂卒於越衛出公自城鉏使以弓問子贛且曰吾其入乎子贛稽首受弓對曰臣不識也私於使者曰昔成公孫於陳寗武子孫莊子為宛濮之盟而君入獻公孫於齊子鮮子展為夷儀之盟而君入今君再在孫矣内不聞獻之親外不聞成之卿則賜不識所由入也詩曰無競惟人四方其順之若得其人四方以為主而國於何有臣士竒曰衛襄公無嫡子公孟縶以足廢而靈公得立康叔告符若亦非偶然者但靈之為靈庸何愈於縶齊豹之亂其兄見賊而已亦有死鳥之辱僅而能復豹既誅於北宫氏而公子朝褚師圃子玉霄子髙魴未正典刑有逸賊矣至侵欲無厭使世臣以富為懼可為寒心身經宣姜之禍猶不知戒溺帷房之愛艾豭貽誚而瞶輒逆倫之事遂萌於此公叔戍欲去夫人之黨一言被逐昏悖若靈其不失國也亦幸焉耳南子雖淫非瞶所得殺聵獲罪而出屬籍已絶然靈公欲立公子郢郢曰亡人之子輙在夫人雖怨聵亦不以為非而遂立之輒不以亡人之子廢即安得以亡人拒其父哉為輒者誠於嗣位之初涕泣而請於夫人曰若以聵為有罪歟則輙固罪人子也何敢為君若以輙為無罪則亡人越在異國不䝉赦宥輙惟一死以謝亡人耳天下豈有無父之子哉安知南子不感其仁孝而為及泉之見乃儼然立乎其位不惟斷烏鳥之情而直等冦讐之禦為人子者顧如是耶夫聵雖不立撫有衛國者即其子也先君無廢祀民人無廢主聵亦可以菟裘老矣子據國而父爭之非古今之大愚斷不出此渾良夫姦豎也乃比之以求入茍有人心者祿之以天下弗為而况一國乎而况其子之國乎不知何顔以告之周而周且竊竊然命之也已氏殞而卒符北宫之占城鉏頓而莫返於越之魄國於何有而徒使至性相殘曾虎狼之不若故輙拒父之罪不容於誅而聵亦未為無過也要其源則自靈公之寵南子始吁可不戒哉左傳紀事本末卷四十
