body:
  text: 左傳紀事本末卷四十一詹事府詹事髙士竒撰鄭莊強國克段爭入許公子立附諸隱公元年初鄭武公娶於申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於已公子吕曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收二以為已邑至於廪延子封曰可矣厚將得衆公曰不義不䁥厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入於鄢公伐諸鄢五月辛丑大叔出奔共書曰鄭伯克段於鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也遂置薑氏於城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之公曰爾有母遺繄我獨無潁考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融薑出而賦大隧之外其樂也泄泄遂為母子如初君子曰潁考叔純孝也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎冬十月鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廪延鄭人以王師虢師伐衛南鄙請師於邾邾子使私於公子豫豫請往公弗許遂行及邾人鄭人盟於翼不書非公命也二年冬鄭人伐衛討公孫滑之亂也三年冬齊鄭盟於石門尋盧之盟也庚戍鄭伯之車僨於濟四年宋公陳侯蔡人衛人伐鄭圍其東門五日而還秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師會之公弗許固請而行諸侯之師敗鄭徒兵取其禾而還五年四月鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人六月鄭二公子以制人敗燕師於北制君子曰不備不虞不可以師宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道鄭人以王師會之伐宋入其郛以報東門之役宋人伐鄭圍長葛以報入郛之役也六年五月庚申鄭伯侵陳大獲往嵗鄭伯請成於陳陳侯不許五父諫曰親仁善鄰國之寶也君其許鄭陳侯曰宋衛實難鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎商書曰惡之易也如火之燎於原不可鄉邇其猶可撲滅周任有言曰為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣秋宋人取長葛九年宋公不王鄭伯為王左卿士以王命來告伐宋會於防謀伐宋也十年會於中丘為師期也餘見隱公攝國蔡人衛人郕人不會王命秋七月庚寅鄭師入郊猶在郊宋人衛人入鄭蔡人從之伐戴八月壬戍鄭伯圍戴癸亥克之取三師焉宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗九月戊寅鄭伯入宋冬齊人鄭人入郕討違王命也十一年夏公會鄭伯於郲謀伐許也鄭伯將伐許五月甲辰授兵於大宫公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之及大逵弗及子都怒秋七月公會齊侯鄭伯伐許庚辰傅於許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登壬午遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖有君命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞於許君而假手於我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口於四方其况能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子若寡人得沒於地天其以禮悔禍於許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而况能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此王室而既卑矣周之子孫日失其序夫許大嶽之胤也天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮禮經國家定社稷序民人利後嗣者也許無刑而伐之服而舍之度德而處之量力而行之相時而動無纍後人可謂知禮矣鄭伯使卒出豭行出犬雞以詛射潁考叔者君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪邪而詛之將何益矣鄭息有違言息侯伐鄭鄭伯與戰於竟息師大敗而還君子是以知息之將亡也不度德不量力不親親不徴辭不察有罪犯五不韙而以伐人其喪師也不亦宜乎冬十月鄭伯以虢師伐宋壬戍大敗宋師以報其入鄭也宋不告命故不書凡諸侯有命告則書不然則否師出臧否亦如之雖及滅國滅不告敗勝不告克不書於策桓公十五年許叔入於許公會齊侯於艾謀定許也莊公二十九年夏鄭人侵許凡師有鐘鼓曰伐無曰侵輕曰襲閔公二年鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人隱公七年陳及鄭平十二月陳五父如鄭涖盟壬申及鄭伯盟歃如忘泄伯曰五父必不免不賴盟矣鄭良佐如陳涖盟辛巳及陳侯盟亦知陳之將亂也冬鄭公子忽在王所故陳侯請妻之鄭伯許之乃成昏八年四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳針子送女先配而後祖針子曰是不為夫婦誣其祖矣非禮也何以能育九年冬北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也公子突曰使勇而無剛者嘗冦而速去之君為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝聃逐之衷戎師前後擊之盡殪戎師大奔十一月甲寅鄭人大敗戎師桓公六年夏北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒故有郎之師公之未昏於齊也齊侯欲以文薑妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯十年冬齊衛鄭來戰於郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐先書齊衛王爵也十一年春齊衛鄭宋盟於惡曹鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗從夏鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥厲公立十二年夏公欲平宋鄭秋公及宋公盟於句瀆之丘宋成未可知也故又會於虛冬又會於龜宋公辭平故與鄭伯盟於武父遂帥師而伐宋戰焉宋無信也君子曰茍信不繼盟無益也詩曰君子屢盟亂是用長無信也十三年春宋多責賂於鄭鄭不堪命故以紀魯及齊與宋衛燕戰不書所戰後也鄭人來請修好十四年春會於曹曹人致餼禮也夏鄭子人來尋盟且修曹之會冬宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽十五年祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也夏厲公出奔蔡六月乙亥昭公入秋鄭伯因櫟人殺檀伯而遂居櫟冬會於袲謀伐鄭將納厲公也弗克而還十六年春正月會於曹謀伐鄭也夏伐鄭秋七月公至自伐鄭以飲至之禮也十七年初鄭伯將以髙渠彌為卿昭公惡之固諫不聽昭公立懼其殺已也辛卯弒昭公而立公子亹君子謂昭公知所惡矣公子達曰髙伯其為戮乎復惡已甚矣十八年秋齊侯師於首止子亹會之髙渠彌相七月戊戌齊人殺子亹而轘髙渠彌祭仲逆鄭子於陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知免仲曰信也考異史記子亹自齊襄公為公子之時嘗會鬭相仇及會諸侯祭仲請子亹無行子亹曰齊強而厲公居櫟即不往是率諸侯伐我內厲公我不如往往何遽必辱且又何至是卒行於是祭仲恐齊并殺之故稱疾子亹至不謝齊侯齊侯怒遂伏甲而殺子亹髙渠彌亡歸歸與祭仲謀召子亹弟公子嬰於陳而立之是為鄭子莊公十四年鄭厲公自櫟侵鄭及大陵獲傅瑕傅瑕曰茍舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公初內蛇與外蛇鬭於鄭南門中內蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣焰以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖厲公入遂殺傅瑕使謂原繁曰傅瑕二周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祏社稷有主而外其心其何二如之茍主社稷國內之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死十六年鄭伯治與於雍紏之亂者九月殺公子閼刖強鉏公父定叔出奔衛三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉君子謂強鉏不能衛其足臣士奇曰鄭莊公春秋諸侯中梟雄之姿也其陰謀忮忍先自翦弟始而後上及於王下及於四鄰與國夫兄弟一本天屬最親而養驕長惡以行其芟夷之計及泉誓母敢施於所生况他人乎自是雄心弗戢修廩延之郤則伐衛報東門之役則侵衛為邾人釋取田之憾則伐宋忿請成之弗許則侵陳假王命以興師則伐宋兼三國之師則取戴託違命以虐小則入郕飾鬼神之不逞則入許怒周班之見後則戰郎其他連衡植黨相從牲歃難一二數莊公亦一世之雄哉然而不能崇固國本內多寵嬖三公子皆疑於君致忽突子亹子儀之際爭弒禍興國內大亂則皆隂謀忮忍之所積有以取之而後知天道之不誣也昭公屢經行陳其救齊也大敗戎師獲甲首三百功最多亦非盡柔弱者其辭文薑曰在我而已大國何為不可謂不自立而當時因其見逐於突惋惜歎恨於坐失齊援至引有女同車之詩為刺不知忽不幸而昏於齊則彭生之禍不在魯桓而在鄭忽矣安見人各有耦之言為失計也祭仲足有寵莊公使為卿為公娶鄧曼而生忽故祭仲立之則祭仲者忽之所倚為腹心者也古有託六尺之孤寄百里之命臨大節而不可奪者仲見執於宋遽歸而立厲公逐昭公又復以専見忌出厲公而納昭公反面事仇行同狗彘子亹之會於首止也齊人討髙渠彌之弒並殺之仲知之故稱疾不往人謂其能以知免不知仲特一貪生畏死之小人耳臣而盡如仲國家奚賴哉若原繁乃可謂守死不二者矣忽入而終出突出而終入子亹子儀立而不終當是時鄭有四君棼若亂絲矣蛇妖告變事非偶然厲公存共叔之後以其篡逆之氣類同也然而君子原四公子之禍未嘗不追恨於莊公也左傳紀事本末卷四十一
