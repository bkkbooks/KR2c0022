body:
  text: 左傳紀事本末卷十八詹事府詹事高士竒撰齊桓公之伯桓公二年秋七月蔡侯鄭伯會于鄧始懼楚也莊公八年初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔初公孫無知虐于雍廪九年春雍廪殺無知公及齊大夫盟于蔇齊無君也夏公伐齊納子糾桓公自莒先入秋師及齊師戰于乾時我師敗績公喪戎路傳乘而歸秦子梁子以公旗辟于下道是以皆止鮑叔帥師來言曰子糾親也請君討之管召讐也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於高傒使相可也公從之補逸史記初襄公之醉殺魯桓公通其夫人殺誅數不當淫於婦人數欺大臣羣弟恐禍及故次弟糾奔魯其母魯女也管仲召忽傅之次弟小白奔莒鮑叔傅之小白母衛女也有寵於釐公小白自少好善大夫高傒及雍林人殺無知議立君高國先陰召小白於莒魯聞無知死亦發兵送子糾而使管仲别將兵遮莒道射中小白帶鉤小白佯死管仲使人馳報魯魯送糾者行益遲六日至齊則小白已入高傒立之是為桓公桓公之中鉤佯死以誤管仲已而載溫車中馳行亦有高國內應故得先入立考異管子襄公逐小白小白走莒三年襄公薨公子糾踐位國人召小白鮑叔曰胡不行矣小白曰不可夫管仲知召忽強武雖國人召我我猶不得入也鮑叔曰管仲得行其知於國國何為亂乎召忽強武豈能獨圖我哉小白曰夫雖不得行其知豈且不有焉乎召忽雖不得衆其及豈不足以圖我哉鮑叔對曰夫國之亂也智人不得作內事朋友不能相合摎而國乃可圖也乃命車駕鮑叔御小白乘而出於莒小白曰夫二人者奉君令吾不可以試也乃將下鮑叔履其足曰事之濟也在此時事若不濟老臣死之公子猶之免也乃行至於邑郊鮑叔令車二十乘先十乘後鮑叔乃告小白曰夫國之疑二三子莫忍老臣事之未濟也老臣是以塞道鮑叔乃誓曰事之濟也聽吾令事之不濟也免公子者為上死者為下我以五乘之實距路鮑叔乃為前驅遂入國逐公子糾管仲射小白中鉤管仲與公子糾召忽遂走魯桓公踐位魯伐齊納公子糾而不能補逸國語桓公自莒反於齊使鮑叔為宰辭曰臣君之庸臣也君加惠於臣使不凍餒則是君之賜也若必治國家者則非臣之所能也若必治國家者則管夷吾乎臣之所不若夷吾者五寬惠柔民弗若也治國家不失其柄弗若也忠信可結於百姓弗若也制禮義可法於四方弗若也執枹鼓立於軍門使百姓加勇焉弗若也桓公曰夫管夷吾射寡人中鉤是以濱於死鮑叔對曰夫為其君動也君若宥而反之夫猶是也桓公曰若何鮑子對曰請諸魯桓公曰施伯魯君之謀臣也夫知吾將用之必不豫我矣若之何鮑子對曰使人請諸魯曰寡君有不令之臣在君之國欲以戮於羣臣故請之則豫我矣桓公使請諸魯如鮑叔之言嚴公以問施伯施伯對曰此非欲戮之也欲用其政也夫管子天下之才也所在之國則必得志於天下令彼在齊則必長為魯國憂矣嚴公曰若何施伯對曰殺而以其尸授之嚴公將殺管仲齊使者請曰寡君欲親以為戮若不生得以戮於羣臣猶未得請也請生之於是嚴公使束縛以豫齊使齊使受而以退比至三釁三浴之桓公親逆之於郊而與之坐問焉曰昔我先君襄公築臺以為高位田狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪陳妾數百食必粱肉衣必文繡戎士凍餒戎車待遊車之裂戎士待陳妾之餘優笑在前賢才在後是以國家不日引不月長恐宗廟之不掃除社稷之不血食敢問為此若何管子對曰昔我先王昭王穆王世法文武逺績以成名合羣􅙕比校民之有道者設象以為民紀式權以相應比綴以度竱本肇末勸之以賞賜糾之以刑罰班序顛毛以為民紀統桓公曰為之若何管子對曰昔者聖王之治天下也參其國而伍其鄙定民之居成民之事陵為之終而慎用其六柄焉桓公曰成民之事若何管子對曰四民者勿使雜處雜處則其言哤其事易公曰處士農工商若何管子對曰昔聖王之處士也使就間燕處工就官府處商就市井處農就田野令夫士羣萃而州處間燕則父與父言義子與子言孝其事君者言敬其幼者言悌少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子恆為士令夫工羣萃而州處審其四時辨其功苦權節其用論比協材旦暮從事施于四方以飭其子弟相語以事相示以巧相陳以功少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子恆為工令夫商羣萃而州處察其四時而監其鄉之資以知其市之賈負任儋何服牛軺馬以周四方以其所有易其所無市賤鬻貴旦莫從事於此以飭其子弟相語以利相示以賴相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子恆為商令夫農羣萃而州處察其四時權節其用耒耜枷芟及寒擊菒除田以待時耕及耕深耕而疾耰之以待時雨時雨既至挾其槍刈耨鎛以旦莫從事於田野脫衣就功首戴茅蒲身衣襏襫霑體塗足暴其髮膚盡其四支之敏以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故農之子恆為農野處而不昵其秀民之能為士者必足賴也有司見而不以告其罪五有司已於事而竣桓公曰定民之居若何管子對曰制國以為二十一鄉桓公曰善管子於是制國以為二十一鄉工商之鄉六士鄉十五公帥五鄉焉國子帥五鄉焉高子帥五鄉焉參國起案以為三官臣立三宰工立三族市立三鄉澤立三虞山立三衡桓公曰吾欲從事於諸侯其可乎管子對曰未可國未安桓公曰安國若何管子對曰修舊法擇其善者而業用之遂滋民與無財而敬百姓則國安矣桓公曰諾遂修舊法擇其善者而業用之遂滋民與無財而敬百姓國既安矣桓公曰國安矣其可乎管子對曰未可君若正卒伍修甲兵則大國亦將正卒伍修甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隱令可以寄政桓公曰為之若何管子對曰作內政而寄軍令焉桓公曰善管子於是制國五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有中軍之鼓有國子之鼓有高子之鼓春以振旅秋以獮治兵是故卒伍整於里軍旅整於郊內教既成令勿使遷徙伍之人祭祀同福死喪同恤禍災共之人與人相疇家與家相疇世同居少同遊故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死居同樂行同和死同哀是故守則同固戰則同強君有此士也三萬人以方行於天下以誅無道以屏周室天下大國之君莫之能禦也正月之朝鄉長復事君親問焉曰於子之鄉有居處好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不以告謂之蔽明其罪五有司已於事而竣桓公又問焉曰於子之鄉有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣桓公又問焉曰於子之鄉有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣是故鄉長退而修德進賢桓公親見之遂使役官桓公令官長期而書伐以告且選選其官之賢者而復用之曰有人居我官有功休德惟慎端慤以待時使民以勸綏謗言足以補官之不善政桓公召而與之語訾相其質足以比成事誠可立而授之設之以國家之患而不疚退問其鄉以觀其所能而無大厲升以為上卿之贊謂之三選國子高子退而修鄉鄉退而修連連退而修里里退而修軌軌退而修伍伍退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也政既成鄉不越長朝不越爵罷士無伍罷女無家夫是故民皆勉為善與其為善於鄉也不如為善於里與其為善於里也不如為善於家是故士莫敢言一朝之便皆有終歲之計莫敢以終歲之議皆有終身之功桓公曰伍鄙若何管子對曰相地而衰征則民不移征不旅舊則民不偷山澤各致其時則民不苟陸阜陵墐井田疇均則民不憾無奪民時則百姓富犧牲不略則牛羊遂桓公曰定民之居若何管子對曰制鄙三十家為邑邑有司十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬故立五大夫各使治一屬焉立五正各使聽一屬焉是故正之政聽屬牧政聽縣下政聽鄉桓公曰各保治爾所無或淫怠而不聽治者正月之朝五屬大夫復事桓公擇是寡功者而謫之曰制地分民如一何故獨寡功教不善而政不治一再則宥三則不赦桓公又親問焉曰於子之屬有居處為義好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不以告謂之蔽明其罪五有司已於事而竣桓公又問焉曰於子之屬有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣桓公又問焉曰於子之屬有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也政既成以守則固以征則強桓公曰吾欲從事於諸侯其可乎管子對曰未可鄰國未吾親也君若欲從事於天下諸侯則親鄰國桓公曰若何管子對曰審吾疆埸而反其侵地正其封疆無受其資而重為之幣帛以驟聘俯於諸侯以安四鄰則四鄰之國親我矣為遊士八十人奉之以車馬衣裘多其資幣使周遊於四方以號召天下之賢士皮幣玩好使人鬻之四方以監其上下之所好擇其淫亂者而先征之桓公問曰夫軍令則寄諸內政矣齊國寡甲兵為之若何管子對曰輕過而移諸甲兵桓公曰為之若何管子對曰制重罪贖以犀甲一戟輕罪贖以鞼盾一戟小罪謫以金分宥間罪索訟者三禁而不可上下坐成以束矢美金以鑄劍戟試諸狗馬惡金以鑄鉏夷斤欘試諸壤土甲兵大足桓公曰吾欲南伐何主管子對曰以魯為主反其侵地堂潛使海於有蔽渠弭於有渚環山於有牢桓公曰我欲西伐何主管子對曰以衛為主反其侵地臺原姑與漆里使海於有蔽渠弭於有渚環山於有牢桓公曰吾欲北伐何主管子對曰以燕為主反其侵地柴夫吠狗使海於有蔽渠弭於有渚環山於有牢四鄰大親既反侵地正封疆地南至於􅡤陰西至於濟北至於河東至於紀酅有革車八百乘擇天下之甚淫亂者而先征之十年齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至冬齊師滅談談無禮也談子奔莒同盟故也十二年秋宋萬弒閔公于蒙澤十三年春會於北杏以平宋亂遂人不至夏齊人滅而戍之冬盟于柯始及齊平也補逸公羊傳何以不日易也其易奈何桓之盟不日其會不致信之也其不日何以始乎此莊公將會乎桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾于是會乎桓莊公升壇曹子手劍而從之管子進曰君何求乎曹子曰城壞壓境君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟已盟曹子摽劍而去之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著乎天下自柯之盟始焉史記曹沫者魯人也以勇力事魯莊公莊公好力曹沫為魯將與齊戰三敗北魯莊公懼乃獻遂邑之地以和猶復以為將齊桓公許與魯會於柯而盟桓公與莊公既盟於壇上曹沫執匕首劫齊桓公桓公左右莫敢動而問曰子將何欲曹沫曰齊強魯弱而大國侵魯亦以甚矣今魯城壞即壓齊境君其圖之桓公乃許盡歸魯之侵地既已言曹沫投其匕首下壇北靣就羣臣之位顔色不變辭令如故桓公怒欲倍其約管子曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之於是桓公乃遂割魯侵地曹沫三戰所亡地盡復於魯桓公後悔欲無與魯地而殺曹沫管仲曰夫劫許之而倍信殺之愈一小快耳而棄信於諸侯失天下之援不可於是遂與曹沫三敗所亡地於魯宋人背北杏之會十四年春諸侯伐宋齊請師於周夏單伯會之取成于宋而還冬會于鄄宋服故也十五年春復會焉齊始霸也秋諸侯為宋伐郳鄭人間之而侵宋十六年夏諸侯伐鄭宋故也鄭伯自櫟入緩告於楚秋楚伐鄭及櫟為不禮故也冬同盟于幽鄭成也十七年春齊人執鄭詹鄭不朝也夏遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉二十七年夏同盟于幽陳鄭服也冬王使召伯廖賜齊侯命且請伐衛以其立子頽也二十八年春齊侯伐衛戰敗衛師數之以王命取賂而還楚令尹子元欲蠱文夫人為館於其宮側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讐而於未亡人之側不亦異乎御人以告子元子元曰婦人不忘襲讎我反忘之秋子元以車六百乘伐鄭入於桔柣之門子元鬭御疆鬭梧耿之不比為斾鬬班王孫遊王孫喜殿衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止冬飢臧孫辰告糴于齊禮也三十年冬遇于魯濟謀山戎也以其病燕故也補逸史記山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至于孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮于燕于是分溝割燕君所至與燕命燕君復修召公之政納貢于周如成康之時諸侯聞之皆從齊管子桓公北伐孤竹未至卑耳之溪十里闟然止瞪然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾事其不濟乎寡人大惑豈有人若此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之溪有贊水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲於馬前曰仲父之聖至若此寡人之抵罪也久矣管仲對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也韓非子管仲隰朋從於桓公而伐孤竹春往冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仭有水乃掘地遂得水以管仲之聖而隰朋之智至所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎三十一年夏六月齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘補逸説苑齊桓公將伐山戎孤竹使人請助于魯魯君進羣臣而謀皆曰師行數千里入蠻夷之地必不反矣于是魯許助之而不行齊已伐山戎孤竹而欲移兵于魯管仲曰不可諸侯未親今又伐逺而還誅近鄰鄰國不親非伯王之道君之所得山戎之寶器者中國之所鮮也不可以不進周公之廟乎桓公乃分山戎之寶獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰聖人轉禍為福報怨以德此之謂也三十二年春城小榖為管仲也齊侯為楚伐鄭之故請會于諸侯宋公請先見于齊侯夏遇于梁丘八月癸亥公薨于路寢子般即位次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏成季奔陳立閔公閔公元年春狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢秋八月公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之書曰季子來歸嘉之也冬齊仲孫湫來省難書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間攜二覆昏亂伯王之器也二年秋八月辛丑共仲使卜齮賊公于武闈哀薑與知之故孫于邾齊人取而殺之于夷冬齊高子來盟補逸公羊傳高子者何齊大夫也何以不稱使我無君也然則何以不名喜之也何喜爾正我也其正我奈何莊公死子般弒閔公弒比三君死曠年無君設以齊取魯曾不興師徒以言而已矣桓公使高子將南陽之甲立僖公而城魯或曰自鹿門至于爭門者是也或曰自爭門至于吏門者是也魯人至今以為美談曰猶望高子也冬十二月狄人伐衛遂滅衛詳見衛事衛文公定狄難衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戌曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩僖之元年齊桓公遷邢于夷儀二年封衛於楚丘邢遷如歸衛國忘亡僖公元年春諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之救患也凡侯伯救患分災討罪禮也秋楚人伐鄭鄭即齊故也盟于犖謀救鄭也二年春諸侯城楚丘而封衛焉不書所會後也秋盟于貫服江黃也冬楚人伐鄭鬬章囚鄭𣆀伯三年秋會于陽榖謀伐楚也補逸公羊傳此大會也曷為末言爾桓公曰無障谷無貯粟無易樹子無以妾為妻發明據此則桓公之會無不有命不獨葵丘之會也然屬孝公于宋首犯樹子之禁何歟齊侯為陽榖之會來尋盟冬公子友如齊涖盟楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄德不祥齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之四年春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢包茅不入王祭不共無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵師進次于陘夏楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不榖是為先君之好是繼與不榖同好何如對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯説與之虎牢執轅濤塗秋伐陳討不忠也許穆公卒于師葬之以侯禮也凡諸侯薨于朝會加一等死王事加二等於是有以衮斂冬叔孫戴伯帥師會諸侯之師侵陳陳成歸轅濤塗補逸韓非子蔡女為桓公妻桓公與之乘舟夫人蕩舟桓公大懼禁之不止怒而出之乃且復召之蔡因更嫁之桓公大怒將伐蔡仲父諌曰夫以寢席之戲不足以伐人之國功業不可冀也請無以此為規也桓公不聽仲父曰必不得已楚之菁茅不貢於天子三年矣君不如舉兵為天子伐楚楚服因還襲蔡曰余為天子伐楚而蔡不以兵聽從遂滅之此義於名而利於實故必有為天子誅之名而有報讐之實史記管仲列傳桓公實怒少姬南襲蔡管仲因而伐楚責包茅不入貢于周室桓公實北征山戎而管仲因而令燕修召公之政桓公既得管仲與鮑叔隰朋高傒修齊國政連五家之兵設輕重魚鹽之利以贍貧窮祿賢能齊人皆説發明按史遷所紀與韓非同意後段亦可櫽括管子故附載之五年夏會于首止會王大子鄭謀寧周也陳轅宣仲怨鄭申侯之反已於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂譖諸鄭伯曰美城其賜邑將以叛也申侯由是得罪秋諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸六年夏諸侯伐鄭以其逃首止之盟故也圍新密鄭所以不時城也秋楚子圍許救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子於武城許男靣縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所楚子從之辨誤按論語微子去之不過行遁而已未嘗奔周也微子已遁矣武王克商時又安得有靣縛銜璧之事故或曰奔周或曰靣縛皆傳之訛也宋儒王柏謂靣縛銜璧之事必屬武庚蓋入商之時紂已自焚武庚嫡冢父死子繼則武庚此時已為殷君力不敵周故衰絰輿櫬造軍門而聽罪此事理之最確者七年春齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能強又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不及夕何以待君夏鄭殺申侯以説于齊且用陳轅濤塗之譖也初申侯申出也有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已補逸呂氏春秋荆文王曰莧僖數犯我以義違我以禮與處則不安曠之而不榖得焉不以吾身爵之後世有聖人將以非不榖于是爵之五大夫申侯伯善持養吾意吾所欲則先我為之與處則安曠之而不榖喪焉不以吾身遠之後世有聖人將以非不榖于是送而行之申侯伯如鄭阿鄭君之心先為其所欲三年而知鄭國之政也五月而鄭人殺之是後世之聖人使文王為善于上世也秋盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷遠以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物鄭伯使太子華聽命于會言於齊侯曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討于鄭未捷今苟有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也會而列姦何以示後嗣夫諸侯之會其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯使請盟于齊閏月惠王崩襄王惡太叔帶之難懼不立不發喪而告難于齊八年春盟於洮謀王室也鄭伯乞盟請服也襄王定位而後發喪九年夏會于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無會也齊侯不務德而勤逺略故北伐山戎南伐楚西為此會也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還補逸公羊傳貫澤之會桓公有憂中國之心不召而至者江人黃人也葵丘之會桓公震而矜之叛者九國榖梁傳桓盟不日此何以日美之也為見天子之禁故備之也葵丘之盟陳牲而不殺讀書加于牲上一明天子之禁曰毋雍泉毋訖糴毋易樹子毋以妾為妻毋使婦人與國事國語即位數年東南多有淫亂者萊莒徐夷吳越一戰帥服三十一國遂南征伐楚濟汝踰方城望汶山使貢絲於周而反荆州諸侯莫不來服遂北伐山戎刜令支斬孤竹而南歸海濱諸侯莫不來服與諸侯飾牲為載以約誓於上下庶神與諸侯戮力同心西征攘白翟之地至於西河方舟設泭乘桴濟河至於石抗縣車束馬踰大行與辟耳之溪拘夏西服㳅沙西吳南城周反胙於絳嶽濱諸侯莫不來服而大朝諸侯於陽榖兵車之屬六乘車之會三諸侯甲不解纍兵不解翳􅀢無弓服無矢隱武事行文道帥諸侯而朝天子葵丘之會天子使宰孔致胙於桓公曰余一人之命有事於文武使孔致胙且有後命曰以爾自卑勞實謂爾伯舅無下拜桓公召管子而謀管子對曰為君不君為臣不臣亂之本也桓公懼出見客曰天威不違顔咫尺小白余敢承天子之命曰爾無下拜恐隕越於下以為天子羞遂下拜升受命賞服大路龍旗九旒渠門赤旗諸侯稱順焉桓公憂天下諸侯魯有夫人慶父之亂二君殺死國絶無嗣桓公聞之使高子存之翟人攻邢桓公築夷儀以封之男女不淫牛馬選具翟人攻衛衛人出廬於曹桓公城楚丘以封之其畜散而無育桓公與之繫馬三百天下諸侯稱仁焉於是天下諸侯知桓公之為已動也是故諸侯歸之譬若市人桓公知諸侯之歸已也故使輕其幣而重其禮故天下諸侯罷馬以為幣縷纂以為奉鹿皮四個諸侯之使垂櫜而入捆載而歸故拘之以利結之以信示之以武故天卞小國諸侯既許桓公莫之敢背就其利而信其仁畏其武桓公知天下諸侯多與已也故又大施忠焉可為動者為之動可為謀者為之謀軍談遂而不有也諸侯稱寬焉通齊國之魚鹽於東萊使關市譏而不征以為諸侯利諸侯稱廣焉築葵兹宴負夏領釜丘以禦戎翟之地所以禁暴於諸侯也築五鹿中牟蓋與牡丘以衛諸夏之地所以示權於中國也教大成定三革隱五刃朝服以濟河而無怵惕焉文事勝矣是故大國慚愧小國協附唯能用管夷吾寧戚隰朋賔胥無鮑叔牙之屬而伯功立發明按此國語總敘齊桓管仲前後事功故附于葵丘之後補逸史記三十五年夏會諸侯于葵丘周襄王使宰孔賜桓公文武胙彤弓矢大路命無拜桓公欲許之管仲曰不可乃下拜受賜秋復會諸侯于葵丘益有驕色周使宰孔會諸侯頗有叛者晉侯病後遇宰孔宰孔曰齊侯驕矣第無行從之是時周室微唯齊楚秦晉為強晉初與會獻公死國內亂秦穆公辟逺不與中國會盟楚成王初收荆蠻有之夷狄自置唯獨齊為中國會盟而桓公能宣其德故諸侯賓會於是桓公稱曰寡人南伐至召陵望熊山北伐山戎離枝孤竹西伐大夏涉流沙束馬懸車登太行至卑耳山而還諸侯莫違寡人寡人兵車之會三乘車之會六九合諸侯一匡天下昔三代受命有何以異於此乎吾欲封泰山禪梁父管仲固諫不聽乃説桓公以逺方珍怪物至乃得封桓公乃止齊桓公既霸會諸侯于葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬懸車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之會三而乘車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳯凰麒麟不來嘉榖不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止九月晉獻公卒冬十月里克殺奚齊于次十一月里克殺公子卓于朝齊侯以諸侯之師伐晉及高梁而還討晉亂也令不及魯故不書齊隰朋帥師會秦師納晉惠公十年夏四月周公忌父王子黨會齊隰朋立晉侯十一年夏戎伐京師王子帶召之也黃人不歸楚貢冬楚人伐黃十二年春諸侯城衛楚丘之郛懼狄難也黃人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黃冬齊侯使管夷吾平戎於王王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管仲之世祀也宜哉讓不忘其上十三年春齊侯使仲孫湫聘于周夏會于鹹淮夷病杞故且謀王室也秋為戎難故諸侯戌周仲孫湫致之十四年春諸侯城緣陵而遷杞焉不書其人有闕也十五年春楚人伐徐徐即諸夏故也三月盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之秋伐厲以救徐也冬楚敗徐于婁林徐恃救也十六年夏齊伐厲不克救徐而還秋王以戎難告于齊齊徵諸侯而戍周十一月乙卯鄭殺子華十二月會于淮謀鄫且東略也城鄫役人病有夜登丘而呼曰齊有亂不果城而還十七年春齊人為徐伐英氏以報婁林之役也冬十月乙亥齊桓公卒十二月乙亥赴辛巳夜殯十八年秋八月葬齊桓公十九年陳穆公請修好於諸侯以無忘齊桓之德冬盟于齊修桓公之好也補逸韓詩外傳昔鮑叔有疾管仲為之不食不納漿寧戚患之管仲曰生我者父母知我者鮑子士為知己者死馬為知己者良鮑子死天下莫我知安用水漿雖為之死亦何傷哉呂氏春秋齊桓公合諸侯衛人後至公朝而與管仲謀伐衛退朝而入衛姬望見君下堂再拜請衛君之罪公曰吾於衛無故子曷為請對曰妾望君之入也足髙氣強有伐國之志也見妾而有動色伐衛也明日君朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之管仲曰君之揖朝也恭而言也徐見臣而有慚色臣是以知之君曰善仲父治外夫人治內寡人知終不為諸侯笑矣齊桓公與管仲謀伐莒謀未發而聞於國桓公怪之曰與仲父謀伐莒謀未發而聞於國其故何也管子曰國必有聖人也桓公曰嘻日之役者有執跖􅲘而上視者意者其是耶乃令復役無得相代少頃東郭牙至管仲曰此必是已乃令賔者延之而上分級而立管仲曰子邪言伐莒者對曰然管仲曰我不言伐莒子何故言伐莒對曰臣聞君子善謀小人善意臣竊意之也管仲曰我不言伐莒子何以意之對曰臣聞君子有三色顯然善樂者鐘鼓之色也湫然清淨者衰絰之色也艴然充盈手足矜者兵革之色也日者臣望君之在臺上也艴然充盈手足矜者此兵革之色也君呿而不􅀈所言者莒也君舉臂而指所當者莒也臣竊以慮諸侯之不服者其惟莒乎臣故言之管子楚伐莒莒君使人求救於齊桓公將救之管仲曰君勿救也公曰其故何也管仲對曰臣與其使者言三辱其君顔色不變臣使官無滿其禮三強其使者爭之以死莒君小人也君勿救桓公果不救而莒亡韓非子晉人伐邢齊桓公將救之鮑叔曰太蚤邢不亡晉不敝晉不敝齊不重且夫持危之功不如存亡之德大君不如晚救之以敝晉齊實利待邢亡而復存之其名實美桓公乃弗救管子桓公曰四夷不服恐其逆政遊於天下而傷寡人寡人之行為此有道乎管子對曰吳越不朝請珠象而以為幣乎發朝鮮不朝請文皮服而以為幣乎禺氏不朝請以白璧為幣乎崑崙之虛不朝請以璆琳琅玕為幣乎故夫握而不見於手合而不見於口而辟千金者珠也然後八千里之吳越可得而朝也一豹之皮容金而金也然後八千里之發朝鮮可得而朝也懷而不見於抱挾而不見於掖而辟千金者白璧也然後八千里之禺氏可得而朝也簪珥而辟千金者璆琳琅玕也然後八千里崑崙之虛可得而朝也故物無立事無接逺近無以相因則四夷不得而朝矣桓公曰魯梁之於齊也千榖也蜂螫也齒之有唇也今吾欲下魯梁何行而可管子對曰魯梁之民俗為綈公服綈令左右服之民從而服之公因令齊勿敢為必仰於魯梁則是魯梁釋其農事而作綈矣桓公曰諾即為服於泰山之陽十日而服之管子告魯梁之賈人曰子為致綈千匹賜子金三百斤什至而金三千斤則是魯梁不賦於民財用足也魯梁之君聞之則教其民為綈十三月而管子令人之魯梁魯梁郭中之民道路揚塵十步不相見絏繑而踵相隨車轂齺騎連伍而行管子曰魯梁可下矣公曰奈何管子對曰公宜服帛率民去綈閉關毋與魯梁通使公曰諾後十月管子令人之魯梁魯梁之民餓餒相及應聲之正無以給上魯梁之君即令其民去綈修農榖不可以三月而得魯梁之人糴十百齊糴十錢二十四月魯梁之民歸齊者十分之六三年魯梁之君請服説苑齊桓公謂管仲曰吾國甚小而財用甚少而羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之今君之食也必桂之漿衣練紫之衣狐白之裘此羣臣之所奢大也詩曰不躬不親庶民不信君欲禁之胡不自親乎桓公曰善於是更置練帛之衣大白之冠朝一年而齊國儉也韓非子齊桓公好服紫一國盡服紫當是時也五素不得一紫桓公患之謂管仲曰寡人好服紫紫貴甚一國百姓好服紫不已寡人奈何管仲曰君何不試勿衣紫也謂左右曰吾甚惡紫之臭於是左右適有衣紫而進者公必曰少却吾惡紫臭公曰諾於是日郎中莫衣紫其明日國中莫衣紫三日境內莫衣紫也桓公微服而行於民間有鹿門稷者行年七十而無妻桓公問管仲曰有民老而無妻者乎管仲曰有鹿門稷者行年七十矣而無妻桓公曰何以令之有妻管仲曰臣聞之上有積財則民臣必匱乏於下宮中有怨女則有老而無妻者桓公曰善令於宮中女子未嘗御出嫁之乃令男子二十而室女子十五而嫁則內無怨女外無曠夫説苑桓公之平陵見家人有年老而自養者公問其故對曰吾有子九人家貧無以妻之吾使傭而未反也桓公取外御者五人妻之管仲入見曰公之施惠不亦小矣公曰何故對曰公待所見而施惠焉則齊國之有妻者少矣公曰若何管仲曰令國丈夫二十而室女子十五而嫁齊桓公出獵逐鹿而走入山谷之中見一老公而問之曰是為何谷對曰為愚公之谷桓公曰何故對曰以臣名之桓公曰今視公之儀狀非愚人也何為以公名對曰臣請陳之臣故畜牸牛生子而大賣之而買駒少年曰牛不能生馬遂持駒去傍鄰聞之以臣為愚故名此谷為愚公之谷桓公曰公誠愚矣夫何為而與之桓公遂歸明日朝以告管仲管仲正襟再拜曰此夷吾之愚也使堯在上咎繇為理安有取人之駒者乎若有見暴如是叟者又必不與也公知獄訟之不正故與之耳請退而修政孔子曰弟子記之桓公霸君也管仲賢佐也猶有以智為愚者也况不及桓公管仲者也新序昔者齊桓公出遊於野見亡國故城郭氏之墟問於野人曰是為何墟野人曰是為郭氏之墟桓公曰郭氏者曷為墟野人曰郭氏者善善而惡惡桓公曰善善而惡惡人之善行也其所以為墟者何也野人曰善善而不能行惡惡而不能去是以為墟也桓公歸以語管仲管仲曰其人為誰曰不知也管仲曰君亦一郭氏也於是桓公招野人而賞焉韓詩外傳齊桓公出遊遇一丈夫裒衣應步帶著桃殳桓公怪而問之曰是何名何經所在何篇所居何以斥逐何以避余丈夫曰是名二桃桃之為言亡也夫日日慎桃何患之有故亡國之社以戒諸侯庶人之戒在於桃殳桓公説其言與之共載來年正月庶人皆佩詩曰殷監不逺韓非子齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡其不雪之以政公曰善因發倉囷賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎或曰管仲雪桓公之恥於小人而生桓公之恥於君子矣使桓公發倉囷而賜貧窮論囹圄而出薄罪非義也不可以雪恥使之而義也桓公宿義須遺冠而後行之則是桓公行義為遺冠也是雖雪遺冠之恥於小人而亦遺宿義之恥於君子矣且夫發倉囷而賜貧窮者是賞無功也論囹圄而出薄罪者是不誅過也夫賞無功則民偷幸而望於上不誅過則民不懲而易為非此亂之本也安可以雪恥哉齊桓公時有處士曰小臣稷桓公三往而弗得見桓公曰吾聞布衣之士不輕爵祿無以易萬乘之主萬乘之主不好仁施義亦無以下布衣之士於是五往乃得見之説苑齊桓公設庭燎為士之欲造見者期年而士不至於是東野鄙人有以九九之術見者桓公曰九九何足以見乎鄙人對曰臣非以九九為足以見也臣聞主君設庭燎以待士期年而士不至夫士之所以不至者君天下賢君也四方之士皆自以論而不及君故不至也夫九九薄能耳而君猶禮之况賢於九九乎夫泰山不辭壤石江海不逆小流所以成大也詩曰先民有言詢於芻蕘言博謀也桓公曰善乃因禮之期月四方之士相攜而並至詩曰自堂徂基自羊徂牛言以內及外以小及大也齊桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治桓公曰何故管仲對曰貧不能使富桓公賜之齊國市租一年而國不治桓公曰何故對曰疏不能制親桓公立以為仲父齊國大安而遂霸天下孔子曰管仲之賢不得此三權者亦不能使其君南靣而霸矣齊桓公之時霖雨十旬桓欲伐漅陵其城之值雨也未合管仲隰朋以卒徒造於門桓公曰徒衆何以為管仲對曰臣聞之雨則有事夫漅陵不能雨臣請攻之公曰善遂興師伐之既至天卒間外士在內矣桓公曰其有聖人乎乃還旗而去之臣士竒曰齊桓公以奔莒之餘因高國之奉庸鮑叔薦賢之公忘射鈎濱死之恥卒用仲父作內政寄軍令成節制之師通魚鹽之利國以殷富士氣騰飽用三萬人以方行天下南征北伐東略西討朝服濟河而無所怵惕焉孔子許其一匡之功孟子載其五命之盛諒哉一世之雄而仲誠天下才也嘗綜其收攝人心之大略言之一曰攘外一曰恤患一曰尊王自周室既東大防漸緼魯以宗國首為潛唐之役未幾而楚丘劫掠辱逮王官自是而燕齊邢衛之間屢見告矣若楚則介恃荆蠻淫名坐大其勢於王畿尤逼肆其豕突而無與為難雄心弗戢不至于問鼎觀兵不己者桓為是先致淮徐之伐旋刜令支之水然後大合八國之兵登熊耳而望江漢問昭王之不復責縮酒之不共楚始知中國有人弭耳震魄而不敢朵頤神器者則桓伯攘外之力也鄭為中原屏蔽子元逞蠱媚之心無故以車六百乘宵突純門其勢最棘桓特救之楚幕烏而桐丘之竄始息魯有慶父之亂曠年無君自南陽之甲下定僖公而城魯周公禽父之祀不餒矣邢衛之中狄患也一則城楚丘而封之一則具器用而遷之邢遷如歸衛國忘亡誰之賜也其後淮夷復為杞患而又城之而又遷之猶前志也其他纓冠襘恤之誼難一二數而如新城之頓許昌旋告軌里星馳尤能緩急人之最善者則桓伯恤患之德也子頺之禍衛實奬蝥賊以來至是伯廖之命下義旗西指衛師撓敗天討彰矣惠王之有二心于叔帶也襄后幾不立桓惟是控大國扶小國會于首止以定其位寧母歃而王貢通皆捧日之忠也及惠后崩而憂猶未弭因是有于洮之聚葵丘申禁而王章赫矣加勞下拜而隕越滋懼矣戎難告而戍周之令行矣迹五伯中能鰓鰓念切天家而不厭至再至三者如桓有幾此尤尊王之大惠而不容泯沒者也他如重信義則忍曹沫之劍從善言則卻子華之姦退召陵禮服義之使遣隰朋置晉君之位皆皎皎媺節之堪傳者而當兩鄄兩幽貫澤陽榖以來所以招攜服二為內安外攘之謀者念深而禮謹慮周而義著事事皆當人心乃驕溢之萌始于徑陳而成于葵丘之伐使宰孔見微而竊議晉侯聞言而竟還其後暮氣益衰不可復振此胡氏所謂假之不久而遂歸也至次陘大舉不聞天吏之臨封國美談未有黼扆之命雖使業蓋人羣聲施歷祀論世者不能無遺憾焉况身經篡奪之後不戒前車屬託孝公祗資爭柄五公子之際棼如亂絲豎刁易牙開方與先君之優笑在前者夫何以異身死家閙戶有尸蟲亦其自取哉左傳紀事本末卷十八
