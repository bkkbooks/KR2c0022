body:
  text: 左傳紀事本末卷四十四詹事府詹事髙士竒撰子産相鄭西宫純門之難諸臣興廢附襄公五年夏鄭子國來聘通嗣君也八年鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜惟子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣冬楚子囊伐鄭討其侵蔡也十年楚子囊鄭子耳伐宋秋七月侵我西鄙還圍蕭八月丙寅克之九月侵宋北鄙孟獻子曰鄭其有災乎師競已甚周猶不堪競況鄭乎有災其執政之三士乎初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宫之朝殺子駟子國子耳劫鄭伯以如北宫子孔知之故不死書曰盜言無大夫焉子西聞盜不警而出尸而追盜盜入於北宫乃歸授甲臣妾多逃器用多喪子産聞盜為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乘尸而攻盜於北宫子蟜帥國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國為載書以位序聽政辟大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯専欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定十五年鄭尉氏司氏之亂其餘盜在宋鄭人以子西伯有子産之故納賂於宋以馬四十乘與師筏師慧三月公孫黑為質焉司城子罕以堵女父尉翩司齊與之良司臣而逸之託諸季武子武子置諸卞鄭人醢之三人也師慧過宋朝將私焉其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相易淫樂之矇必無人焉故也子罕聞之固請而歸之十二月鄭人奪堵狗之妻而歸諸范氏十八年鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不穀為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢會楚師楚師伐鄭次於魚陵右師城上棘遂涉潁次於旃然蒍子馮公子格率鋭師侵費滑胥靡獻於雍梁右回梅山侵鄭東北至於蟲牢而反子庚門於純門信於城下而還涉於魚齒之下甚雨及之楚師多凍役徒幾盡十九年鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西率國人伐之殺子孔而分其室書曰鄭殺其大夫專也子然子孔宋子之子也士子孔圭媯之子也圭媯之班亞宋子而相親也士子孔亦相親也僖之四年子然卒簡之元年士子孔卒司徒孔實相子革子良之室三室如一故及於難子革子良出奔楚子革為右尹鄭人使子展當國子西聽政立子産為卿二十二年夏晉人徵朝於鄭鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝於執事執事不禮於寡君寡君懼因是行也我二年六月朝於楚晉是以有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜二於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨於執事以會嵗終二於楚者子侯石盂歸而討之湨梁之明年子蟜老矣公孫夏從寡君以朝於君見於嘗酎與執燔焉間二年聞君將靖東夏四月又朝以聽事期不朝之間無嵗不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讐敝邑是懼其敢忘君命委諸執事執事實重圖之九月鄭公孫黑肱有疾歸邑於公召室老宗人立段而使黜官薄祭祭以特羊殷以少牢足以共祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也己巳伯張卒君子曰善戒詩曰慎爾侯度用戒不虞鄭子張其有焉十二月鄭遊眅將如晉未出竟遭逆妻者奪之以館於邑丁巳其夫攻子明殺之以其妻行子展廢良而立太叔曰國卿君之二也民之主也不可以茍請舍子明之類求亡妻者使復其所使遊氏勿怨曰無昭惡也二十四年范宣子為政諸侯之幣重鄭人病之二月鄭伯如晉子産寓書於子西以告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨汝無二爾心有令名也夫恕思以明德則令名載而行之是以逺至邇安毋寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子説乃輕幣是行也鄭伯朝晉為重幣故且請伐陳也鄭伯稽首宣子辭子西相曰以陳國之介恃大國而陵虐於敝邑寡君是以請罪焉敢不稽首晉侯嬖程鄭使佐下軍鄭行人公孫揮如晉聘程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也二十五年初陳侯會楚子伐鄭當陳隧者井堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其大子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還鄭子産獻捷於晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至於今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷啓敝邑心陳知其罪授手於我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復於趙文子文子曰其辭順犯順不祥乃受之冬十月子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功慎辭哉晉程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔且曰他日吾見蔑之面而已今吾見其心矣子大叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣二十六年鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑子産辭邑曰自上以下隆殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固豫之乃受三邑公孫揮曰子産其將知政矣讓不失禮秋七月齊侯鄭伯為衛侯故如晉國景子相齊侯子展相鄭伯叔向曰鄭七穆罕氏其後亡者也子展儉而一鄭伯歸自晉使子西如晉聘辭曰寡君來煩執事懼不免於戾使夏謝不敏君子曰善事大國楚子伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也子展説不禦冦二十七年秋鄭伯享趙孟於垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁趙孟曰牀笫之言不踰閾况在野乎非使人之所得聞也子西賦黍苗之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子大叔賦野有蔓草趙孟曰吾子之惠也印段賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能久乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎二十八年蔡侯歸自晉入於鄭鄭伯享之不敬子産曰蔡侯其不免乎日其過此也君使子展迋勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為已心將得死乎若不免必由其子其為君也淫而不父僑聞之如是者恆有子禍子産相鄭伯以如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大茍舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德小適大有五惡説其罪戾請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也公如楚過鄭鄭伯不在伯有迋勞於黃崖不敬穆叔曰伯有無戾於鄭鄭必有大咎敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也敬可棄乎二十九年葬靈王鄭上卿有事子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎詩云王事靡盬不遑啓處東西南北誰敢寧處堅事晉楚以蕃王室也王事無曠何常之有遂使印段如周鄭子展卒子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾是以得鄭國之民故罕氏常掌國政以為上卿鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟於伯有氏禆諶曰是盟也其與幾何詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能紓然明曰政將焉往裨諶曰善之代不善天命也其焉辟子産舉不踰等則位班也擇善而舉則世隆也天又除之奪伯有魄子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾不然將亡矣三十年子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此嵗也駟良方爭未知所成若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣夏四月己亥鄭伯及其大夫盟君子是以知鄭難之不已也鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許大夫聚謀子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免人謂子産就直助強子産曰豈為我徒國之禍難誰知所敝或主強直難乃不生姑成吾所辛丑子産斂伯有氏之死者而殯之不及謀而遂行印段從之子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者况生者乎遂自止之壬寅子産入癸卯子石入皆受盟於子晳氏乙巳鄭伯及其大夫盟於大宫盟國人於師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介於襄庫以伐舊北門駟帶率國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死於羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止於是遊吉如晉還聞難不入復命於介八月甲子奔晉駟帶追之及酸棗與子上盟用兩圭質於河使公孫肸入盟大夫己巳復歸書曰鄭人殺良霄不稱大夫言自外入也於子蟜之卒也將葬公孫揮與裨竈晨會事焉過伯有氏其門上生莠子羽曰其莠猶在乎於是嵗在降婁降婁中而旦裨竈指之曰猶可以終嵗嵗不及此次也已及其亡也嵗在娵訾之口其明年乃及降婁僕展從伯有與之皆死羽頡出奔晉為任大夫雞澤之會鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之説焉以宋之盟故不可子皮以公孫鉏為馬師鄭子皮授子産政辭曰國小而逼族大寵多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬子産為政有事伯石賂與之邑子大叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子大叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒與之伯有既死使大史命伯石為卿辭太史退則請命焉復命之又辭如是三乃受䇿入拜子産是以惡其為人也使次已位子産使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰唯君用鮮衆給而已子張怒退而徵役子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之三十一年公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修冦盜充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館高其閈閎厚其墻垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆以待賔客若皆毁之其何以共命寡君使丐請命對曰以敝邑褊小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廏繕修司空以時平易道路圬人以時塓館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車脂轄𨽻人牧圉各贍其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則巡之教其不知而恤其不足賔至如歸無寧災患不畏冦盜而亦不患燥濕今銅鞮之宫數里而諸侯舍於𨽻人門不容車而不可踰越盜賊公行而夭癘不戒賔見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不德而以𨽻人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之協矣辭之繹矣民之莫矣其知之矣鄭子皮使印段如楚以適晉告禮也十二月北宫文子相衛襄公以如楚宋之盟故也過鄭印段迋勞於棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與大叔逆客事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之於政如熱之有濯也濯以救熱何患之有子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨於其大夫之族姓班位貴賤能否而又善為辭令裨諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與裨諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也鄭人逰於鄉校以論執政然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國補逸吕氏春秋晉人欲攻鄭令叔嚮聘焉視其有人與無人子産為之詩曰子惠思我褰裳涉洧子不思我豈無他士叔嚮歸曰鄭有人子産在焉不可攻也秦荆近其詩有異心不可攻也晉人乃輟攻鄭孔子曰詩云無競惟人子産一稱而鄭國免韓非子鄭子産晨出過東匠之閭聞婦人之哭也撫其御之手而聽之有間遣吏執而問之則手絞其夫者也異日其御問曰夫子何以知之子産曰其聲懼凡人於其親愛也始病而憂臨死而懼已死而哀今哭已死不哀而懼是以知其有姦也家語子遊問於孔子曰夫子之極言子産之惠也可得聞乎孔子曰惠在愛民而已矣子遊曰愛民謂之德教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之弗能教也子遊曰其事可言乎孔子曰子産以所乘之輿濟冬涉者是愛教也昭公元年楚公子圍聘於鄭且娶於公孫段氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館於外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聽命令尹命大宰伯州犂對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告於莊共之廟而來若野賜之是委君貺於草莽也是寡大夫不得列於諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之正月乙未入逆而出鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也惟所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也乃執子南而數之曰國之大節有五女皆姦之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也姦國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪五月庚辰鄭放遊楚於吳將行子南子産咨於大叔大叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸遊鄭為遊楚亂故六月丁巳鄭伯及其大夫盟於公孫段氏罕虎公孫僑公孫段印段遊吉駟帶私盟於閨門之外實薰隧公孫黑強與於盟使大史書其名且曰七子子産弗討二年秋鄭公孫黑將作亂欲去遊氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司冦將至七月壬寅縊尸諸周氏之衢加木焉四年鄭子産作丘賦國人謗之曰其父死於路已為蠆尾以令於國國將若之何子寬以告子産曰何害茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣渾罕曰國氏其先亡乎君子作法於涼其敝猶貪作法於貪敝將若之何姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法政不率法而制於心民各有心何上之有五年鄭罕虎如齊娶於子尾氏晏子驟見之陳桓子問其故對曰能用善人民之主也六年三月鄭人鑄刑書叔向使詒子産書曰始吾有虞於子今則已矣昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以義糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以強斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徵於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書將以靖民不亦難乎詩云儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠士文伯曰火見鄭其火乎火未出而作火以鑄刑器藏爭辟焉火如象之不火何為六月丙戌鄭災七年鄭子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀於羽山其神化為黃熊以入於羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎韓子祀夏郊晉侯有間賜子産莒之二方鼎鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子大叔問其故子産曰鬼有所歸乃不為厲吾為之歸也大叔曰公孫泄何為子産曰説也為身無義而圖説從政有所反之以取媚也不媚不信不信民不從也及子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明匹夫匹婦強死其魂魄猶能馮依於人以為淫厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而強死能為鬼不亦宜乎子皮之族飲酒無度故馬師氏與子皮氏有惡齊師還自燕之月罕朔殺罕魋罕朔奔晉韓宣子問其位於子産子産曰君之羇臣茍得容以逃死何位之敢擇卿違從大夫之位罪人以其罪降古之制也朔於敝邑亞大夫也其官馬師也獲戾而逃唯執政所置之得免其死為惠大矣又敢求位宣子為子産之敏也使從嬖大夫十年秋七月戊子晉平公卒九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也鄭子皮將以幣行子産曰喪焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡既葬諸侯之大夫欲因見新君叔向辭之子皮盡用其幣歸謂子羽曰非知之實難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也十二年三月鄭簡公卒將為葬除及遊氏之廟將毁焉子大叔使其除徒執用以立而無庸毁曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子産乃使辟之司墓之室有當道者毁之則朝而塴弗毁則日中而塴子大叔請毁之曰無若諸侯之賔何子産曰諸侯之賔能來會吾喪豈憚日中無損於賔而民不害何故不為遂弗毁日中而葬君子謂子産於是乎知禮禮無毁人以自成也六月葬鄭簡公十三年晉合諸侯於平丘子産大叔相鄭伯以如會子産以幄幕九張行子大叔以四十既而悔之每舍損焉及會亦如之及盟子産爭承曰鄭伯男也而從諸侯之貢懼弗給也自日中以爭至於昏晉人許之子産歸未至聞子皮卒哭且曰吾已無為為善矣惟夫子知我仲尼謂子産於是行也足以為國基矣詩曰樂只君子邦家之基子産君子之求樂者也且曰合諸侯藝貢事禮也十六年三月晉韓起聘於鄭鄭伯享之子産戒曰茍有位於朝無有不共恪孔張後至立於客問執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我我皆有禮夫猶鄙我國而無禮何以求榮孔張失位吾子之恥也子産怒曰發命之不衷出令之不信刑之頗類獄之放紛會朝之不敬使命之不聽取陵於大國罷民而無功罪及而弗知僑之恥也孔張君之昆孫子孔之後也執政之嗣也為嗣大夫承命以使周於諸侯國人所尊諸侯所知立於朝而祀於家有祿於國有賦於軍喪祭有職受脤歸脤其祭在廟已有著位在位數世世守其業而忘其所僑焉得恥之辟邪之人而皆及執政是先王無刑罰也子寧以他規我宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君不知子大叔子羽謂子産曰韓子亦無幾求晉國亦未可以二晉國韓子不可偷也若屬有讒人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎韓子買諸賈人既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也今買諸商人商人曰必以聞敢以為請子産曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無強賈毋或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑強奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦勿為也僑若獻玉不知所成敢私布之韓子辭玉曰起不敏敢求玉以徼二罪敢辭之夏四月鄭六卿餞宣子於郊宣子曰二三君子請皆賦起亦以知鄭志子齹賦野有蔓草宣子曰孺子善哉吾有望矣子産賦鄭之羔裘宣子曰起不堪也子大叔賦褰裳宣子曰起在此敢勤子至於他人乎子大叔拜宣子曰善哉子之言是不有是事其能終乎子遊賦風雨子旗賦有女同車子栁賦籜兮宣子喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將子産拜使五卿皆拜曰吾子靖亂敢不拜德宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜鄭大旱使屠擊祝款豎柎有事於桑山斬其木不雨子産曰有事於山藝山林也而斬其木其罪大矣奪之官邑十七年冬有星孛於大辰西及漢申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火災乎梓慎曰往年吾見之是其徵也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭裨竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與十八年夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火裨竈曰不用吾言鄭又將火鄭人請用之子産不可子大叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫於東門使司冦出新客禁舊客勿出於宫使子寬子上巡羣屏攝至於大宫使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各警其事商成公警司宫出舊宫人置諸火所不及司馬司冦列居火道行火所焮城下之人伍列登城明日使野司冦各保其徵郊人助祝史除於國北禳火於玄冥回祿祈於四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也七月鄭子産為火故大為社祓禳於四方振除火災禮也乃簡兵大搜將為搜除子大叔之廟在道南其寢在道北其庭小過期三日使除徒陳於道南廟北曰子産過汝而命速除乃毁於而鄉子産朝過而怒之除者南毁子産及衝使從者止之曰毁於北方火之作也子産授兵登陴子大叔曰晉無乃討乎子産曰吾聞之小國忘守則危况有災乎國之不可小有備故也既晉之邉吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴將以誰罪邉人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人荐為敝邑不利以重君之憂幸而不亡猶可説也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉既事晉矣其敢有二心十九年是嵗也鄭駟偃卒子遊娶於晉大夫生絲弱其父兄立子瑕子産憎其為人也且以為不順弗許亦弗止駟氏聳他日絲以告其舅冬晉人使以幣如鄭問駟乞之立故駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗豫大夫謀對子産不待而對客曰鄭國不天寡君之二三臣札瘥夭昏今又喪我先大夫偃其子幼弱其一二父兄懼隊宗主私族於謀而立長親寡君與其二三老曰抑天實剝亂是吾何知焉諺曰無過亂門民有兵亂猶憚過之而况敢知天之所亂今大夫將問其故抑寡君實不敢知其誰實知之平丘之會君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之鄭大水龍鬭於時門之外洧淵國人請為禜焉子産弗許曰我鬭龍不我覿也龍鬭我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止也二十年鄭子産有疾謂子大叔曰我死子必為政惟有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒大叔為政不忍猛而寬鄭國多盜取人於萑苻之澤大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也毋從詭隨以謹無良式遏冦虐慘不畏明糾之以猛也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也及子産卒仲尼聞之出涕曰古之遺愛也補逸史記鄭相子産卒鄭人皆哭泣悲之如亡親戚子産者鄭成公少子也為人仁愛人事君忠厚孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也鄭昭君之時以所愛徐摯為相國亂上下不親父子不和大宫子期言之君以子産為相為相一年豎子不戲狎班白不提挈僮子不犂畔二年市不豫賈三年門不夜關道不拾遺四年田器不歸五年士無尺籍喪期不令而治治鄭二十六年而死丁壯號哭老人兒啼曰子産去我死乎民將安歸二十五年會於黃父謀王室也子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦外內以經二物為父子兄弟姑姊甥舅昏媾姻亞以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生於六氣是故審則宜類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協於天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎簡子曰鞅也請終身守此言也定公四年反自召陵鄭子大叔未至而卒晉趙簡子為之臨甚哀曰黃父之會夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義八年鄭駟歂嗣子大叔為政九年鄭駟歂殺鄧析而用其竹刑君子謂子然於是不忠茍有可以加於國家者棄其邪可也靜女之三章取彤管焉竿旄何以告之取其忠也故用其道不棄其人詩云蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其樹况用其道而不恤其人乎子然無以勸能矣補逸列子鄧析操兩可之説設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之然則子産非能用竹刑不得不用鄧析非能屈子産不得不屈子産非能誅鄧析不得不誅也哀公五年鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解於位民之攸塈不守其位而能久者鮮矣商頌曰不僭不濫不敢怠皇命以多福臣士竒曰鄭之為國族大寵多俗淫而侈又介晉楚之間疆埸日駭民生墊隘未易以為治而子産之相鄭則大有可觀矣方子國子耳之侵蔡而獲公子燮也國人皆喜子産年猶童子即慮晉楚兵爭之禍固已竒矣西宫之亂庀羣司閉府庫而後出兵倉卒之中具有成畫子孔載書之誤則力請焚之使反側子自安子晳與子南爭室子南以戈擊子晳傷數其五姦抗法不少貸及子晳欲去遊氏而代其位將作亂使吏切責尸諸衢而加木焉刑政肅矣其治民也有惠愛之心而濟之以猛水濡火烈之喻殆即亂國用重典之意乎他若鑄刑書制參辟立謗政作溝洫行之一年而豎子不狎班白不提挈二年市不豫賈三年門不夜關道不拾遺四年田器不歸五年士無尺籍喪期不令而治至妖妄誕譎之習凡可以惑民聽沮教令者屏之務絶伯有之厲立其祀以安之龍鬭洧淵則置而弗問裨竈請禳火則始終援天道人道以折之此其卓識逺見豈流輩所能及哉若夫馳詞執禮以當晉楚之鋒徵朝則歷述比嵗之勤重幣則寓宣子之書獻捷則士莊伯不能詰壞館垣則叔向歎其有辭却逆女則楚人垂櫜而入拒玉環之請則杜無厭之求申登陴之對則寢問罪之端問駟乞之立則語以縣鄙之懼而多聞博物又足以傾動四國之諸侯而照耀乎壇坫是以外捍牧圉內庇民社而遺愛所被既沒而悲之如亡親戚也子産不誠賢相矣哉雖然無罕虎則子産之賢不彰無子大叔則子産之賢亦不傳此君子所以重汲引也左傳紀事本末卷四十四
