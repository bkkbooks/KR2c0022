body:
  text: 左傳紀事本末卷四十三詹事府詹事高士竒撰鄭滅許隱公十一年鄭伯伐許遂入許使許大夫百里奉許叔以居許東偏詳見鄭莊强國桓公十五年許叔入於許成公三年夏許恃楚而不事鄭鄭子良伐許四年冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田五年夏許靈公訴鄭伯於楚八年鄭伯將㑹晉師門於許東門大獲焉十四年八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封十五年許靈公畏逼於鄭請遷於楚辛丑楚公子申遷許於葉襄公十六年許男請遷於晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師二十六年許靈公如楚請伐鄭曰師不興孤不歸矣八月卒於楚楚子伐鄭昭公十八年楚左尹王子勝言於楚子曰許於鄭讐敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專於楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城外之蔽也土不可易國不可小許不可俘讐不可啓君其圖之楚子說冬楚子使王子勝遷許於析實白羽十九年夏許悼公瘧五月戊辰飲大子止之藥卒大子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也冬葬許悼公補逸公羊傳賊未討何以書葬不成於弒也曷為不成於弒止進藥而藥殺也止進藥而藥殺則曷為加弒焉爾譏子道之不盡也穀梁傳不弒而曰弒責止也止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥噎不容粒未踰年而死故君子即止自責而責之也定公四年許遷於容城六年春鄭滅許因楚敗也臣士竒曰許為太嶽之裔國於舊許與鄭為鄰而鄭之所欲吞併以拓其封竟者也當魯隱之季㑹齊魯以入許使許叔處許西偏僅存其祀耳及桓公時鄭方有內難許叔乘機竊入非鄭意也而許又南附於楚數從伐鄭於是世為仇讐云夫鄭許脣齒之國也使鄭能盡睦鄰之禮挾許以從中國許豈甘折而入於楚哉乃恃强陵弱惟滅許之是務既取鉏任泠敦之田又平以叔申之封彈丸者許所餘有幾耶是以靈公兩訴於楚曰師不興孤不歸矣淚盡楚庭魂羇鄢郢慘惻至此其下喬而遷於幽谷也亦鄭之不善處許而為楚淵驅耳然許亦有失䇿焉當時許嘗請遷於晉夫遷晉愈於遷楚明甚而許大夫從中沮撓晉人歸諸侯其事遂寢乃即安於楚始而葉繼而白羽繼而容城流離困苦卒為鄭所滅而楚屬師徒撓敗不能救也許固不善擇音亦不能不深恨於鄭之相煎太急也左傳紀事本末卷四十三
