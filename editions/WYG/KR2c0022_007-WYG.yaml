body:
  text: 左傳紀事本末卷七詹事府詹事髙士竒撰魯文姜之亂莊公忘讐附桓公三年春㑹于嬴成昏于齊也秋公子翬如齊逆女修先君之好故曰公子齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之冬齊仲年來聘致夫人也六年九月丁卯子同生以太子生之禮舉之接以大牢卜士負之士妻食之公與文姜宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隠疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同十八年春公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乗公公薨于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生補逸管子魯桓公夫人文姜齊女也公將如齊與夫人偕行申俞諫公不聽文姜通于齊侯桓公聞責文姜文姜告齊侯齊侯怒饗公使公子彭生乗魯侯脅之公薨于車豎㬅曰賢者死忠以振疑百姓寓焉智者究理而長慮身得免焉今彭生二于君無盡言而諛行以戲我君使我君失親戚之禮命又力成我君之禍以搆二國之怨彭生其得免乎魯若有誅必以彭生為説二月魯人告齊齊人為殺彭生以謝于魯莊公元年春不稱即位文姜出故也三月夫人孫于齊不稱姜氏絶不為親禮也秋築王姬之館于外為外禮也發明按忘父仇而為之主婚喪心甚矣何以為禮二年冬夫人姜氏㑹齊侯于禚書姦也三年春溺㑹齊師伐衞疾之也六年冬齊人來歸衞寶文姜請之也七年春文姜㑹齊侯于防齊志也八年春治兵于廟禮也夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德德乃降姑務修德以待時乎秋師還君子是以善魯莊公發明按此正莊公忘父仇之惡也何善之有十九年夫人姜氏如莒臣士竒曰文姜淫恣為鳥獸之行與弑桓公狂走無忌論者謂莊公不能盡防閑之道桓公不能慎有家之戒禍成於于濼而穢極于如莒竊謂不然禮首冠昏以其為人道之始也合兩姓之好以為宗廟社稷主葢莫重乎親迎矣魯與齊密邇親迎之禮尤便躬自圖昏于嬴而使公子翬逆女齊侯溺愛越禮以送而桓公初未受室于姜氏之祧何輕重之倒置也且羽父弑君之賊也昏姻吉禮之大者而以凶人從事其間公子彭生之兆成矣公惟不能慎其始因不能正其終先王所為致謹于大昏之際也夫觀子同之生而公與文姜宗婦命之文姜此際亦似少嫻于禮者迨如齊姦成而淫奔之行遂至于不可制然則使桓能從申繻之訓豈其至此乎桓公弑兄魯不能討而假手於齊人特以文姜為之媒此亦似有天道不知其然而然者也莊公忘父之讐不能興一旅問罪之師僅以一彭生塞責而靦然主王姬之昏同伐衞之舉及圍郕而郕降于齊師仲慶父請擊齊猶欲引脩德待時之義以自解天下之無人心者亦至此哉左傳紀事本末卷七
