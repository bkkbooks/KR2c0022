body:
  text: 左傳紀事本末卷四十二詹事府詹事高士竒撰鄭穆公之立靈公僖公之弑附僖公十六年冬十一月乙夘鄭殺子華二十四年鄭子華之弟子臧岀奔宋好聚鷸冠鄭伯聞而惡之使盜誘之八月盜殺之於陳宋之間君子曰服之不衷身之災也詩曰彼已之子不稱其服子臧之服不稱也夫詩曰自詒伊慼其子臧之謂矣夏書曰地平天成稱也三十年晉侯秦伯圍鄭初鄭公子蘭出奔晉從於晉侯伐鄭請無與圍鄭許之使待命於東鄭石甲父侯宣多逆以為大子以求成於晉晉人許之三十一年鄭洩駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚三十三年楚令尹子上伐鄭將納公子瑕門於桔柣之門瑕覆於周氏之汪外僕髠屯禽之以獻文夫人斂而葬之鄶城之下宣公三年冬鄭穆公卒初鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭文公報鄭子之妃曰陳媯生子華子臧子臧得罪而出誘子華而殺之南里使盜殺子臧於陳宋之間又娶於江生公子士朝於楚楚人酖之及葉而死又娶於蘇生子瑕子俞彌俞彌早卒洩駕惡瑕文公亦惡之故不立也公逐羣公子公子蘭奔晉從晉文公伐鄭石癸曰吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也今公子蘭姞甥也天或啟之必將為君其後必蕃先納之可以亢寵與孔將鉏侯宣多納之盟於大宫而立之以與晉平穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒四年楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而況君乎反譖子家子家懼而從之夏弑靈公書曰鄭公子歸生弑其君夷權不足也君子曰仁而不武無能達也凡弑君稱君君無道也稱臣臣之罪也鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為乃舍之皆為大夫十年鄭子家卒鄭人討幽公之亂斵子家之棺而逐其族改葬幽公諡之曰靈成公十年鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許十三年六月丁夘夜鄭公子班自訾求入於大宫不能殺子印子羽反軍於市己巳子駟帥國人盟於大宫遂從而盡焚之殺子如子駹孫叔孫知襄公二年秋七月鄭伯睔卒於是子罕當國子駟為政子國為司馬五年夏鄭子國來聘通嗣君也七年鄭僖公之為大子也於成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝於晉子豐欲愬諸晉而廢之子罕止之及將㑹於鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弑僖公而以瘧疾赴於諸侯簡公生五年奉而立之八年鄭羣公子以僖公之死也謀子駟子駟先之夏四月庚辰辟殺子狐子熙子侯子丁孫撃孫惡出奔衛臣士竒曰鄭穆公出亡從晉文公伐鄭請弗與圍城之役篤念宗邦水木之誼至焉由是晉鄭感其賢反而立之其視聚鷸冠與葬鄶下之羣公子異矣姬姞耦而必蕃國香刈而遂卒固有是理未可以禨祥小數而疑左氏之夸也子公以染指之釁欲剚刃於君父子家知其不可則告於靈公執子公而戮之可也乃猶豫不忍畜老憚殺之言尤悖逆而不可為訓令子公反得搖舌其間以相劫制而遂即於大惡其剖棺戮尸舉累世之卿族而盡滅之有以也僖公之為太子也不禮於其臣及為諸侯將㑹於鄬子駟相又侮慢之侍者諫而被殺固失優崇大臣之體矣然為人臣者可生可殺而不可使為亂禮貌一不至而冦讐視之為之君者不亦難乎按僖公之為此行也棄楚而從晉也而子駟執官命未改之説於前此諸大夫請從晉之日則知公欲背楚非子駟意也及楚子囊伐鄭子駟子國子耳欲從楚子孔子蟜子展欲待晉而子駟曰發言盈庭誰敢執其咎請從楚騑也受其咎然則子駟固未嘗一日忘楚也僖公舍楚從晉身卒見弑此事勢相倚之必然者而豈盡不禮諸大夫之咎哉羣公子一謀子駟而反為所殺子駟討公子班之難而身為亂首與子家名在諸侯之策其亦不朽也夫左傳紀事本末卷四十二
