body:
  text: 左傳紀事本末卷十四詹事府詹事高士竒撰城築搜狩因事别見者不更載隱公元年夏四月費伯帥師城郎不書非公命也新作南門不書亦非公命也七年夏城中丘書不時也九年夏城郎書不時也桓公十六年冬城向書時也莊公二十八年冬築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城二十九年春新作延廏書不時也凡馬日中而出日中而入冬十二月城諸及防書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢僖公二十年春新作南門書不時也凡啓塞從時文公十二年城諸及鄆書時也宣公八年城平陽書時也成公九年城中城書時也十八年築鹿囿書不時也襄公十三年冬城防書事時也於是將早城臧武仲請俟畢農事禮也昭公九年冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎定公十五年冬城漆書不時告也以上城築桓公四年春正月公狩於郎書時禮也六年秋大閲簡車馬也昭公八年秋大搜於紅自根牟至於商衛革車千乘以上搜狩臣士竒曰千仭之山跛羊能陵之以其迤也數仞之牆雖有賁育猝莫能越以其峻也城以保民奈之何其可廢哉顧城本為民防患於未然而使之疲於工築棄本業而起愁歎則未然之患猶紓而目前之困已劇矣况登丘之呼亦足動衆梁伯之好適以資敵無城猶可無民將誰與國乎是以先王之愛城常不如愛民力一歲之中用民不過三日而又必以農隙之時使之手足寬然得以緣南畝仰事俯育兩無所憾而後本固邦寧也春秋凡用民無論時之合否皆書重民力也魯之城中丘城郎皆以盛夏興役而延廏之新又當大無之後其為草菅民命全莫省憂昭昭簡策若夫襄十三年城防昭九年築郎囿皆在隆冬於時合矣而當時一欲早城一欲速成而臧武仲與叔孫昭子獨能為民請命不亦仁人之心乎然用民必書而費伯城郎不書新作南門不書左氏求其說而不得則皆曰非公命也竊謂不然隱公之始年猶未失政安有非公命而擅興大衆以城者至作南門近在國都而公弗知隱其充耳乎聖人削之當自有故不可求矣若乃春搜夏苖秋獮冬狩先王所以寓軍政於四時之田而作其果敢之氣使之嫻於步伐止齊諳於鼓鐸鐃鐲而蓄其威怒也然必有常時有定所如魯狩大野而郎則非所搜為春事而紅則非時並非所且以紅之搜考之是時公室衰微魯國兵權半歸季氏自根牟至於商衛革車千乘掃境內以為此役季實主之於昭公何與違天時易地利悍然直行其意之所欲以為凡可以非禮動民即用以犯上作亂而莫敢忤有如此搜矣故先儒以此為季氏履霜之漸也吁城築民力所繫搜狩軍政所關力當留餘於下政當操之自上其可不加之意哉左傳紀事本末卷十四
