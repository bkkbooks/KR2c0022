body:
  text: 左傳紀事本末卷二十二詹事府詹事高士竒撰陳氏傾齊桓公五年春正月甲戌己丑陳侯鮑卒再赴也於是陳亂文公子他殺太子免而代之公疾病而亂作國人分散故再赴莊公二十二年春陳人殺其太子御寇陳公子完與顓孫奔齊顓孫自齊來奔齊侯使敬仲為卿辭曰羇旅之臣幸若獲宥及於寬政赦其不間於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱高位以速官謗請以死告詩云翹翹車乘招我以弓豈不欲往畏我友朋使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也初懿氏卜妻敬仲其妻占之曰吉是謂鳳皇于飛和鳴鏘鏘有媯之後將育于薑五世其昌並于正卿八世之後莫之與京陳厲公蔡出也故蔡人殺五父而立之生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賔於王庭實旅百奉之以玉帛天地之美具焉故曰利用賔於王猶有觀焉故曰其在後乎風行而著於土故曰其在異國乎若在異國必薑姓也薑太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政襄公二十九年秋九月齊公孫蠆公孫竈放其大夫高止於北燕乙未出書曰出奔罪高止也高止好以事自為功且專故難及之為高氏之難故高豎以盧叛十月庚寅閭丘嬰帥師圍盧高豎曰茍使高氏有後請致邑齊人立敬仲之曾孫酀良敬仲也十一月乙卯高豎致盧而出奔晉晉人城綿而置旃三十一年齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故夏五月子尾殺閭丘嬰以説于我師工僂灑渻竈孔虺賈寅出奔莒出羣公子昭公二年韓宣子來聘遂如齊納幣見子雅子雅召子旗使見宣子宣子曰非保家之主也不臣見子尾子尾見強宣子謂之如子旗大夫多笑之惟晏子信之曰夫子君子也君子有信其有以知之矣三年齊侯使晏嬰請繼室於晉既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬己在齊矣初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公於是省於刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄己其是之謂乎及晏子如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜惟鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之齊公孫竈卒司馬竈見晏子曰又喪子雅矣晏子曰惜也子旗不免殆哉薑族弱矣而媯將始昌二惠競爽猶可又弱一個焉薑其危哉八年七月甲戌齊子尾卒子旗欲治其室丁丑殺梁嬰八月庚戍逐子成子工子車皆來奔而立子良氏之宰其臣曰孺子長矣而相吾室欲兼我也授甲將攻之陳桓子善於子尾亦授甲將助之或告子旗子旗不信則數人告將往又數人告於道遂如陳氏桓子將出矣聞之而還遊服而逆之請命對曰聞強氏授甲將攻子子聞諸曰弗聞子盍亦授甲無宇請從子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之其若先人何子盍謂之周書曰惠不惠茂不茂康叔所以服𢎞大也桓子稽顙曰頃靈福子吾猶有望遂和之如初九月楚師圍陳晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也歲在鶉火是以卒滅陳將如之今在析木之津猶將復由且陳氏得政于齊而後陳卒亡自幕至于瞽瞍無違命舜重之以明德置德於遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣十年齊惠欒高氏皆耆酒信內多怨強於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏子良曰先得公陳鮑焉往遂伐虎門晏平仲端委立于虎門之外四族召之無所往其徒曰助陳鮑乎曰何善焉助欒高乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之五月庚辰戰於稷欒高敗又敗諸莊國人追之又敗諸鹿門欒施高強來奔陳鮑分其室晏子謂桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強思義為愈義利之本也薀利生孽姑使無薀乎可以滋長桓子盡致諸公而請老於莒桓子召子山私具幄幕器用從者之衣屨而反棘焉子商亦如之而反其邑子周亦如之而與之夫于反子城子公公孫捷而皆益其祿凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟曰詩云陳錫載周能施也桓公是以霸公與桓子莒之旁邑辭穆孟姬為之請高唐陳氏始大昭子至自晉大夫皆見高強見而退昭子語諸大夫曰為人子不可不愼也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令德其子弗能任罪猶及之難不愼也喪夫人之力棄德曠宗以及其身不亦害乎詩曰不自我先不自我後其是之謂乎二十六年齊侯與晏子坐于路寢公歎曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釜鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也己公曰善哉是可若何對曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上之補逸晏子景公飲酒田桓子侍望見晏子而復於公曰請浮晏子公曰何故也無宇對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隱君之賜也公曰諾晏子坐酌者奉觴進之曰君命浮子晏子曰何故也田桓子曰君賜之卿位以尊其身寵之百萬以富其家羣臣之爵莫尊于子祿莫重于子今子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是則隱君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君之賜卿位以尊其身嬰非敢為顯受也為行君令也寵以百萬以富其家嬰非敢為富受也為通君賜也臣聞古之賢君有受厚賜而不顧其困族則過之臨事守職不勝其任則過之君之內𨽻臣之父兄若有離散在於野鄙此臣之罪也君之內𨽻臣之所職若有播越在於四方此臣之罪也兵革之不完戰車之不修此臣之罪也若夫敝車駑馬以朝意者非臣之罪乎且臣以君之賜父之黨無不乘車者母之黨無不足於衣食者妻之黨無凍餒者國之間士待臣而後舉火者數百家如此者為彰君賜乎為隱君賜乎公曰善為我浮無宇也史記司馬穰苴者田完之苖裔也齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴曰穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大説之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閲伍之中加之大夫之上士卒未附百姓不信人微權輕願得君之寵臣國之所尊以監軍乃可於是景公許之使莊賈往穰苴既辭與莊賈約曰旦日日中會于軍門穰苴先馳至軍立表下漏待賈賈素驕貴以為將已之軍而已為監不甚急親戚左右送之留飲日中而賈不至穰苴則仆表決漏入行軍勒兵申明約束約束既定夕時莊賈乃至穰苴曰何後期為賈謝曰不佞親戚大夫送之故留穰苴曰將受命之日則忘其家臨事約束則忘其親援枹鼓之急則忘其身今敵國深侵邦內騷動士卒暴露於境君寢不安席食不甘味百姓之命皆懸於君何謂相送乎召軍正問曰軍法期而後至者云何對曰當斬莊賈懼使人馳報景公請救既往未及反于是遂斬莊賈以徇三軍三軍之士皆振栗久之景公遣使者持節赦賈馳入軍中穰苴曰將在軍君令有所不受問軍正曰軍中不馳今使者馳云何正曰當斬使者大懼穰苴曰君之使不可殺之乃斬其僕車之左駙馬之左驂以徇三軍遣使者還報然後行士卒次舍井竈飲食問疾醫藥身自拊循之悉取將軍之資糧享士卒身與士卒平分糧食最比其羸弱者三日而後勒兵病者皆求行爭奮出為之赴戰晉師聞之為罷去燕師聞之渡水而解于是追擊之遂取所亡封內故境而引兵歸未至國釋兵旅解約束誓盟而後入邑景公與諸大夫郊迎勞師成禮然後歸寢既見穰苴尊為大司馬田氏日以益尊于齊已而大夫鮑氏高國之屬害之譛于景公景公退穰苴苴發病而死發明按陳桓子無宇生僖子乞執齊國之政操廢立之權者自僖子始穰苴之忠其亦田氏之獨出者歟哀公五年齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子高昭子立荼置羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎補逸晏子景公有男五人所使傅之者皆有車百乘者也晏子其一焉公召其傅曰勉之將以而所傅為子及晏子晏子辭曰君命其臣據其肩以盡其力臣敢不勉乎有車之家是一國之權臣也人人以君命命之曰將以而所傅為子此離樹别黨傾國之道也嬰不敢受命願君圖之淳于人納女于景公生孺子荼景公愛之諸田謀欲廢公子陽生而立荼公以告晏子晏子曰不可夫以賤匹貴國之害也置大立少亂之本也夫陽生而長國人戴之君其勿易夫服位有等故賤不陵貴立子有禮故孽不亂宗願君教荼以禮而弗陷于邪導之以義而勿湛于利長少行其道宗孽得其倫夫陽生敢毋使荼饜粱肉之味玩金石之聲而有患乎廢長立少不可以教下尊孽卑宗不可以利所愛長少無等宗孽無别是設賊樹姦之本也君其圖之古之明君非不知繁樂也以為樂淫則哀非不知立愛也以為義失則憂是故制樂以節立子以道若夫恃讒諛以事君者不足以責信今君用讒人之謀聽亂夫之言也廢長立少臣恐後人之有因君之過以資其邪廢少而立長以成其利者君其圖之公不聽景公沒田氏殺君荼立陽生殺陽生立簡公而取齊國六年齊陳乞偽事高國者每朝必驂乘焉所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰高國得君必逼我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入於公宫昭子聞之與惠子乘如公戰於莊敗國人追之國夏奔莒遂及高張晏圉弦施來奔八月齊邴意兹來奔陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬於季孫不入於上乘故又獻此請與子乘之出萊門而告之故闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至於齊國人知之僖子使子士之母養之與饋者皆入冬十月丁卯立之將盟鮑子醉而往其臣差車鮑點曰此誰之命也陳子曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江説囚王豹于句竇之丘公使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳八年齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取歡及闡或譛胡姬于齊侯曰安孺子之黨也六月齊侯殺胡姬秋及齊平九月臧賔如如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖鮑牧又謂羣公子曰使女有馬千乘乎公子訴之公謂鮑子或譛子子姑居于潞以察之若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麇之以入遂殺之冬十二月齊人歸歡及闡季姬嬖故也十四年齊簡公之在魯也闞止有寵焉及即位使為政陳成子憚之驟顧諸朝諸御鞅言于公曰陳闞不可並也君其擇焉弗聽子我夕陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沐備酒肉焉饗守囚者醉而殺之而逃子我盟諸陳於陳宗初陳豹欲為子我臣使公孫言己巳有喪而止既而言之曰有陳豹者長而上僂望視事君子必得志欲為子臣吾憚其為人也故緩以告子我曰何害是其在我也使為臣他日與之言政説遂有寵謂之曰我盡逐陳氏而立女若何對曰我逺於陳氏矣且其違者不過數人何盡逐焉遂告陳氏子行曰彼得君弗先必禍子子行舍于公宮夏五月壬申成子兄弟四乘如公子我在幄出逆之遂入閉門侍人禦之子行殺侍人公與婦人飲酒于檀臺成子遷諸寢公執戈將擊之太史子餘曰非不利也將除害也成子出舍于庫聞公猶怒將出曰何所無君子行抽劒曰需事之賊也誰非陳宗所不殺子者有如陳宗乃止子我歸屬徒攻闈與大門皆不勝乃出陳氏追之失道於弇中適豐丘豐丘人執之以告殺諸郭關成子將殺大陸子方陳逆請而免之以公命取車於道及耐衆知而東之出雍門陳豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讎何以見魯衛之士東郭賈奔衛庚辰陳恆執公于舒州公曰吾早從鞅之言不及此甲午齊陳恆弒其君壬于舒州補逸史記田常成子與監止俱為左右相相簡公田常心害監止監止幸于簡公權弗能去於是田常復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子臣士竒曰齊之有陳氏也自敬仲之奔始其終據齊權而盜有其國也自桓子之得政始其所以取民之術不過豆區釜鍾壺餐噢咻之小智而齊國又擅蒲魚鹽策之饒其民貪利如騖自桓伯以來五公子爭立肉骨相殘至于惠靈莊景罷民自奉刑政日弛百姓外敝于疆場內殘于刀鋸山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蛤祈望守之無涓滴之惠以及民陳氏乃得以私恩小腆陰驅而固結之安得不愛之如父母而從之如流水乎且也公族之失職久矣子城子公公孫捷之徒越在草莽桓子皆反之而皆益其祿凡公子公孫之無祿者私分之邑又不貪欒高之賞以示公於是齊之世家大族下逮貧約孤寡無不交口頌德歡欣歌舞而太公之社已潛移于媯氏不知矣凡三家專魯六卿分晉其術大抵皆然而其上不悟也王莽之篡漢陰謀狡智亦復類是彼亦自稱田氏之後追祖有虞而沙麓之崩史家附會以為巨君之祥又與鳯凰之占適相類陳氏盜國之術真後先一轍哉然敬仲實賢安羇旅辭上卿之位守禮法斷卜夜之飲是能抑情止欲不敢妄覬於非分者後之子孫不亦靦然有愧耶欒高之伐虎門也迹雖不臣未若陳氏之甚欒高勝猶公族也陳氏勝則媯姓矣權其輕重袒有左右而晏大夫端委公門坐觀成敗欒高奔而陳氏之勢益張矣不亦左乎逮陳乞陰賊高國再竄齊之羽翼翦剃殆盡荼及陽生簡公之際廢置俱出田陳闞止以逺間親欲與爭衡庸有濟乎豐丘執而舒州之亂遂作權以利成國隨勢奪理所必然而左氏歷引懿氏之繇史趙之對先儒疑戰國所作非丘明之書豈無見哉左傳紀事本末卷二十二
