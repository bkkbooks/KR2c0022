body:
  text: 左傳紀事本末卷十六詹事府詹事高士竒撰齊滅紀隱公元年八月紀人伐夷夷不告故不書二年九月紀裂繻來逆女卿為君逆也冬紀子帛莒子盟于密魯故也八年公及莒人盟于浮來以成紀好也桓公五年夏齊侯鄭伯朝于紀欲以襲之紀人知之六年夏會於成紀來咨謀齊難也冬紀侯來朝請王命以求成于齊公告不能十七年春盟于黃平齊紀且謀衛故也莊公三年秋紀季以酅入于齊紀於是乎始判冬公次于滑將會鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過信為次四年紀侯不能下齊以與紀季夏紀侯大去其國違齊難也補逸公羊傳大去者何滅也孰滅之齊滅之曷為不言齊滅之為襄公諱也春秋為賢者諱何賢乎襄公復讐也何讐爾逺祖也哀公烹乎周紀侯譖之以襄公之為于此焉者事祖禰之心盡矣盡者何襄公將復讐乎紀卜之曰師喪分焉寡人死之不為不吉也逺祖者幾世乎九世矣九世猶可以復讐乎雖百世可也家亦可乎曰不可國何以可國君一體也先君之恥猶今君之恥也今君之恥猶先君之恥也國君何以為一體國君以國為體諸侯世故國君為一體也今紀無罪此非怒與曰非也古者有明天子則紀侯必誅必無紀者紀侯之不誅至今有紀者猶無明天子也古者諸侯必有會聚之事相朝聘之道號辭必稱先君以相接然則齊紀無説焉不可以並立乎天下故將去紀侯者不得不去紀也有明天子則襄公得為若行乎曰不得也不得則襄公曷為為之上無天子下無方伯緣恩疾者可也臣士竒曰公羊稱齊襄公滅紀為九世復讐其言曰哀公烹乎周紀侯譖之襄公將復讐乎紀卜之曰師喪分焉寡人死之不為不吉其情激烈則復讐之説信然矣以今考之史記注引宋衷之言哀公荒淫無道者也其烹於周必有故紀侯之譖其果否亦不必辨但哀公死而立其弟胡公哀公之少弟山復殺胡公而自立自哀公至襄公凡十世而哀公乃其逺伯祖也於不共戴天之義似亦少殺且襄公鳥獸其行敗倫傷化忍心害理彼又豈知有祖宗之讐者不過假報復之名以利其土地耳按輿地志齊都臨淄在今青州古紀城在今壽光壽光距青州七十里則春秋時紀與齊相去直數十里間所謂卧榻之地不容他人安枕者也始焉托復讐之孝以攫之中焉假存紀之仁終焉竊葬伯姬之義以文飾之當時號齊襄為小伯亦狡矣哉謂其真能復九世之讐吾不知也紀魯世為婚姻又共盟歃不能救紀何望于鄭鄭固齊黨嘗並驅而朝紀欲以襲之者也莒益細甚竊竊為紀圖何濟乎但紀實王后之所出欲請王命以求成于齊而公告不能王之不足為諸侯重輕亦可見矣雖然紀既逼處齊封其勢必折而入于齊魯即能為纓冠之救何益成敗此紀侯之所以去而季之苟延血食于酅亦不得已之權也然其情實可悲矣左傳紀事本末卷十六
