body:
  text: 左傳紀事本末卷三十四詹事府詹事髙士竒撰宋殤閔昭公之弒隱公三年宋穆公疾召大司馬孔父而屬殤公焉曰先公舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭八月庚辰宋穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫商頌曰殷受命咸宜百祿是荷其是之謂乎四年宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之伐鄭桓公元年宋華父督見孔父之妻於路目逆而送之曰美而艷二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弒殤公君子以督為有無君之心而後動於惡故先書弒其君㑹於稷以成宋亂為賂故立華氏也宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公於鄭而立之以親鄭以郜大鼎賂公齊陳鄭皆有賂故遂相宋公夏四月取郜大鼎於宋戊申納於太廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲遊纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎於雒邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公不聽周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德莊公十年夏六月齊師宋師次於郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙皋比而先犯之公從之大敗宋師於乘丘齊師乃還十一年夏宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得雋曰克覆而敗之曰取某師京師敗曰王師敗績於某秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也悖焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御說之辭也臧孫達曰是宜為君有恤民之心乘丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之十二年秋宋萬弒閔公於蒙澤遇仇牧於門批而殺之遇大宰督於東宫之西又殺之立子遊羣公子奔蕭公子御說奔亳南宫牛猛獲帥師圍亳補逸公羊傳及者何纍也弒君多矣舍此無纍者乎孔父荀息皆纍也舍孔父荀息無纍者乎曰有有則此何以書賢也何賢乎仇牧仇牧可謂不畏強禦矣其不畏強禦奈何萬嘗與莊公戰獲乎莊公莊公歸散舍諸宫中數月然後歸之歸反為大夫於宋與閔公博婦人皆在側萬曰甚矣魯侯之淑魯侯之美也天下諸侯宜為君者唯魯侯爾閔公矜此婦人妒其言顧曰此虜也爾虜焉故魯侯之美惡乎至萬怒搏閔公絶其脰仇牧聞君弒趨而至遇之於門手劔而叱之萬臂摋仇牧碎其首齒著乎門闔仇牧可謂不畏強禦矣冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛於師殺子遊於宋立桓公猛獲奔衛南宫萬奔陳以乘車輦其母一日而至宋人請猛獲於衛衛人欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宫萬於陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之補逸禮記石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也文公七年夏四月宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司冦昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢攜二若之何去之不聽穆襄之族率國人以攻公殺公孫固公孫鄭於公宫六卿和宫室樂豫舍司馬以讓公子卬昭公即位而葬書曰宋人殺其大夫不稱名衆也且言非其罪也八年宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸來奔效節於府人而出公以其官逆之皆復之亦書以官皆貴之也十四年宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也十五年三月宋華耦來盟其官皆從之書曰宋司馬華孫貴之也公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅魯人以為敏十六年宋公子鮑禮於國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而艷襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司冦初司城蕩卒公孫夀辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之二也姑紓死焉雖亡子猶不亡族既夫人將使公田孟諸而殺之公知之盡以寶行蕩意諸曰盍適諸侯公曰不能其大夫至於君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寶賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之書曰宋人弒其君杵臼君無道也文公即位使母弟須為司城華耦卒而使蕩虺為司馬十七年春晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還十八年宋武氏之族道昭公子將奉司城須以作亂十二月宋公殺母弟須及昭公子使戴莊桓之族攻武氏於司馬子伯之館遂出武穆之族使公孫師為司城公子朝卒使樂吕為司冦以靖國人宣公三年宋文公即位三年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也成公二年八月宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為臣士竒曰宋宣公舍其子與夷而立穆穆復舍其子馮而立宣之子殤殤忌馮馮卒篡殤先儒謂宋之禍宣公為之非虛語也夫與子者主乎立嫡所以杜爭奪之原而正其亂也隱讓桓而桓弒隱諸樊兄弟交讓季子而啓王僚子光之爭故讓非三代以下所可言也殤公忌馮固逆天理然國宣公之國也馮不能體父志而欲與殤爭鄭人屢謀納馮殤公又復無道則華督之屬意於馮久矣其弒殤公為子馮也世但惡殤之忌馮而忘馮之篡殤使有南史馮亦在弒君之列矣諸侯取賂而立華氏春秋中弒君三十六其禍皆萌於此以其不誅討亂賊而反勸之惡也閔公再弒彼直循其故事耳南宫長萬乘丘之俘囚也不正典刑而反為大夫於宋又狎而與之博不避婦人其昏已甚一言攘臂而禍及君父仇牧雖未聞匡救於平時而慷慨急難義形於色手劔而叱之碎首齒闔不可謂不忠矣昭公不能其君祖母又欲盡去羣公子披枝葉而縱尋斧焉此敗亡之道也然襄夫人欲通公子鮑為之厚施以收衆卒殺昭公殆亦魯穆姜之類耳穆姜不幸而出僑如襄夫人幸而立宋鮑其為惡一也宋能討賊罪不有在乎觀昭公臨死之言順命而就戮亦似自知其過者而上不禮於王母下得罪於國人即弟哀亦不義而去之不可解也文公逐武氏之族並殺母弟與昭公子忮狠極矣沒而用殉且厚葬即錮南山詎足蓋其惡哉左傳紀事本末卷三十四
