body:
  text: 左傳紀事本末卷五十一詹事府詹事高士竒撰勾踐滅呉昭公三十二年夏呉伐越始用師於越也史墨曰不及四十年越其有呉乎越得嵗而呉伐之必受其凶定公五年越入呉呉在楚也十四年呉伐越越子勾踐禦之陳於檇李勾踐患呉之整也使死士再禽焉不動使罪人三行屬劍於頸而辭曰二軍有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈撃闔廬闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰不敢忘三年乃報越補逸呉越春秋呉王以越不從伐楚南伐越越王允常曰呉不信前日之盟棄貢賜之國而滅其交親闔閭不然其言遂伐破檇李闔閭謀擇諸公子可立者未有定計波秦子夫差日夜告於伍胥曰王欲立太子非我而誰當立此計在君耳伍子胥曰太子未有定我入則决矣闔閭有頃召子胥謀立太子子胥曰臣聞紀廢於絶後興於有嗣今太子不禄早失侍御今王欲立太子者莫大乎波秦之子夫差闔閭曰夫愚而不仁恐不能奉統於呉國子胥曰夫差信以愛人端於守節敦於禮義父死子代經之明文闔閭曰寡人從子立夫差為太子哀公元年春呉王夫差敗越於夫椒報檇李也遂入越越子以甲楯五千保於會稽使大夫種因呉太宰嚭以行成呉子將許之伍員曰不可臣聞之樹徳莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸於有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其徳而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物今呉不如過而越大於少康或將豐之不亦難乎勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讐於是乎克而弗取將又存之違天而長冦讐後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長冦讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外呉其為沼乎三月越及呉平呉入越不書呉不告慶越不告敗也補逸國語越王勾踐即位三年而欲伐呉范蠡進諫曰夫國家之事有持盈有定傾有節事王曰為三者奈何范蠡對曰持盈者與天定傾者與人節事者與地王不問蠡不敢言天道盈而不溢盛而不驕勞而不矜其功夫聖人隨時以行是謂守時天時不作弗為人客人事不起弗為之始今君王未盈而溢未盛而驕不勞而矜其功天時不作而先為人客人事不起而創為之始此逆於天而不和於人王若行之將妨於國家靡王躬身王弗聽范蠡進諫曰夫勇者逆徳也兵者凶噐也爭者事之末也隂謀逆徳好用凶噐始於人者人之所卒也淫佚之事上帝之禁也先行此者不利王曰無是貳言也吾已斷之矣果興師而伐呉戰於五湖不勝棲於㑹稽王召范蠡而問焉曰吾不用子之言以至於此為之奈何范蠡對曰君王其忘之乎持盈者與天定傾者與人節事者與地王曰與人奈何范蠡對曰卑辭尊禮玩好女樂尊之以名如此不已又身與之市王曰諾乃令大夫種行成於呉曰請士女女於士大夫女女於大夫隨之以國家之重噐呉人不許大夫種來而復往曰請委管籥屬國家以身隨之君王制之呉人許諾王曰蠡為我守於國范蠡對曰四封之内百姓之事蠡不如種也四封之外敵國之制立斷之事種亦不如蠡也王曰諾令大夫種守於國與范蠡入宦於呉三年而呉人遣之歸越王勾踐棲於㑹稽之上乃號令於三軍曰凡我父兄昆弟及國子姓有能助寡人謀而退呉者吾與之共知越國之政大夫種進對曰臣聞之賈人夏則資皮冬則資絺旱則資舟水則資車以待乏也夫雖無四方之憂然謀臣與爪牙之士不可不養而擇也譬如蓑笠時雨既至必求之今君王既棲於㑹稽之上然後乃求謀臣無乃後乎勾踐曰茍得聞子大夫之言何後之有執其手而與之謀遂使之行成於呉曰寡君勾踐乏無所使使其下臣種不敢徹聲聞於天王私於下執事曰寡君之師徒不足以辱君矣願以金玉子女賂君之辱請勾踐女女於王大夫女女於大夫士女女於士越國之寳噐畢從寡君帥越國之衆以從君之師徒唯君左右之若以越國之辠為不可赦也將焚宗廟係妻孥沈金玉於江越有帶甲五千人將以致死乃必有偶是以帶甲萬人以事君也無乃即傷君王之所愛乎與其殺是人也寜其得此國也其孰利乎夫差將欲聽與之成子胥諫曰不可夫呉之與越也仇讐敵戰之國也三江環之民無所移有呉則無越有越則無呉將不可改於是矣員聞之陸人居陸水人居水夫上黨之國我攻而勝之吾不能居其地不能乗其車夫越國吾攻而勝之吾能居其地吾能乗其舟此利也不可失也已君必滅之失此利也雖悔之亦無及已越人飾美女八人納之太宰嚭曰子茍赦越國之辠又有美於此者將進之太宰嚭諫曰嚭聞古之伐國者服之而已今已服矣又何求焉夫差與之成而去之勾踐説於國人曰寡人不知其力之不足也而又與大國執讐以暴露百姓之骨於中原此則寡人之辠也寡人請更於是𦵏死者問傷者養生者弔有憂賀有喜送往者迎來者去民之所惡補民之不足然後卑事夫差宦士三百人於呉其身親為夫差前馬勾踐之地南至於勾無北至於禦兒東至於鄞西至於姑蔑廣運百里乃致其父兄昆弟而誓之曰寡人聞古之賢君四方之民歸之若水之歸下也今寡人不能將帥二三子夫婦以蕃命壯者無取老婦老者無取壯妻女子十七不嫁其父母有罪丈夫二十不取其父母有罪將免者以告公令醫守之生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼當室者死三年釋其政支子死三月釋其政必哭泣𦵏埋之如其子令孤子寡婦疾疹貧病者納宦其子其達士潔其居美其服飽其食而摩厲之於義四方之士來者必廟禮之勾踐載稻與脂於舟以行國之孺子之游者無不餔也無不歠也必問其名非其身之所種則不食非其夫人之所織則不衣十年不收於國民居有三年之食呉越春秋越王勾踐五年五月與大夫種范蠡入臣於呉羣臣皆送至浙江之上臨水祖道軍陣固陵大夫文種前為祝其詞曰皇天祐助前沈後揚禍為徳根憂為福堂威人者滅服從者昌王雖牽致其後無殃君臣生離感動上皇衆夫哀悲莫不感傷臣請薦脯行酒三觴越王仰天太息舉杯垂涕黙無所言種復前祝曰大王徳壽無疆無極乾坤受靈神祇輔翼我王厚之祉祐在側徳銷百殃利受其福去彼呉庭來歸越國觴酒旣升請稱萬嵗遂别於浙江之上羣臣垂泣莫不咸哀越王仰天歎曰死者人之所畏若孤之聞死其於心胸中曾無怵惕遂登船徑去終不返顧越王夫人據船哭顧烏鵲啄江渚之蝦飛去復來因哭而歌之曰仰飛鳥兮烏鳶凌𤣥虗號翩翩集洲渚兮優恣啄蝦矯翮兮雲間任厥兮往還妾無罪兮負地有何辜兮譴天颿颿獨兮西往孰知返兮何年心惙惙兮若割淚泫泫兮雙懸又哀吟曰彼飛鳥兮鳶烏已迴翔兮翕蘇心在專兮素蝦何居食兮江湖徊復翔兮游颺去復返兮於乎始事君兮去家終我命兮君都終來遇兮何幸離我國兮去呉妻衣褐兮為婢夫去冕兮為奴嵗遥遥兮難極寃悲痛兮心惻腸千結兮服膺於乎哀兮忘食願我身兮如烏身翺翔兮矯翼去我國兮心揺情憤惋兮誰識越王聞夫人怨歌心中内慟乃曰孤何憂吾之六翮備矣於是入呉見夫差稽首再拜稱臣曰東海賤臣勾踐上愧皇天下負后土不裁功力汚辱王之軍士抵罪邊境大王赦其深辜裁加役臣使執箕帚誠䝉厚恩得保須臾之命不勝仰感俯愧臣勾踐叩頭頓首呉王夫差曰寡人於子亦過矣子不念先君之讐乎越王曰臣死則死矣惟大王原之伍子胥在旁目若熛火聲如雷霆乃進曰夫飛鳥在青雲之上尚欲繳微矢以射之豈况近臥於華池集於庭廡乎今越王放於南山之中游於不可存之地幸來涉我壤土入我梐梱此乃㕑宰之成事食也豈可失之乎呉王曰吾聞誅降殺服禍及三世吾非愛越而不殺也畏皇天之咎教而赦之太宰嚭諫曰子胥明於一時之計不通安國之道願大王遂其所執無拘羣小之口夫差遂不誅越王令駕車養馬秘於宫室之中三月呉王召越王入見越王伏於前范蠡立於後呉王謂范蠡曰寡人聞貞婦不嫁破亡之家仁賢不官絶滅之國今越王無道國已將亡社稷壞崩身死世絶為天下笑而子及主俱為奴僕來歸於呉豈不鄙乎吾欲赦于之罪子能改心自新棄越歸呉乎范蠡對曰臣聞亡國之臣不敢語政敗軍之將不敢語勇臣在越不忠不信令越王不奉大王命號用兵與大王相持至今獲罪君臣俱降䝉大王洪恩得君臣相保願得入備掃除出給趨走臣之願也此時越王伏地流涕自謂遂失范蠡矣呉王知范蠡不可得為臣謂曰子既不移其志吾復置子於石室之中范蠡曰臣請如命呉王起入宫中越王范蠡趨入石室越王服犢鼻著樵頭夫人衣無縁之裳施左關之襦夫斫剉養馬妻給水除糞灑掃三年不慍怒面無恨色呉王登高逺望見越王及夫人范蠡坐於馬糞之旁君臣之禮存夫婦之儀具王顧謂太宰嚭曰彼越王者一節之人范蠡一介之士雖在窮厄之地不失君臣之禮寡人傷之太宰嚭曰願大王以聖人之心哀窮孤之士呉王曰為子赦之後三月乃擇吉日而欲赦之召太宰嚭謀曰越王與呉同土連域勾踐愚黠親欲為賊寡人承天之神靈前王之遺徳誅討越㓂囚之石室寡人心不忍見而欲赦之於子奈何太宰嚭曰臣聞無徳不復大王垂仁恩加越越豈敢不報哉願大王卒意越王聞之召范蠡告之曰孤聞於外心獨喜之又恐其不卒也范蠡曰大王安心事將有意在玉門第一今年十二月戊寅之日時加日出戊囚日也寅陰後之辰也合庚辰嵗後會也夫以戊寅日聞喜不以其罪罰日也時加卯而賊戊功曹為騰蛇而臨戊謀利事在青龍青龍在勝光而臨酉死氣也而尅寅是時尅其日用又助之所求之事上下有憂此其非天網四張萬物盡傷者乎王何喜焉果子胥諌呉王曰昔桀囚湯而不誅紂囚文王而不殺天道還返禍轉成福故夏為湯所誅殷為周所滅今大王既囚越君而不行誅臣謂大王惑之深也得無夏殷之患乎呉王遂召越王久之不見范蠡文種憂而占之曰呉王見擒也有頃太宰嚭出見大夫種范蠡而言越王復拘於石室伍子胥復諌呉王曰臣聞王者攻敵國克之則加以誅故後無報復之憂遂免子孫之患今越王已入石室宜早圖之後必為呉之患太宰嚭曰昔者齊桓割燕所至之地以貺燕公而齊君獲其美名宋襄濟河而戰春秋以多其義功立而名稱君敗而徳存令大王誠赦越王則功冠於五覇名越於前古呉王曰待吾疾愈方為太宰赦之後一月越王出石室召范蠡曰呉王疾三月不愈吾聞人臣之道主疾臣憂且呉王遇孤恩甚厚矣疾之無瘳惟公卜焉范蠡曰呉王不死明矣到己巳日當瘳惟大王留意越王曰孤所以窮而不死者賴公之䇿耳中復猶豫豈孤之志哉可與不可惟公圖之范蠡曰臣竊見呉王真非人也數言成湯之義而不行之願大王請求問疾得見因求其糞而嘗之觀其顔色當拜賀焉言其不死以瘳起日期之既言信後則大王何憂越王明日謂太宰嚭曰囚臣欲一見問疾太宰嚭即入言於呉王王召而見之適遇呉王之便太宰嚭奉溲惡以出逢户中越王因拜請嘗大王之溲以决吉凶即以手取其便與惡而嘗之因入曰下囚臣勾踐賀於大王王之疾至己巳日有瘳至三月壬申病愈呉王曰何以知之越王曰下臣嘗事師聞糞者順榖味逆時氣者死順時氣者生今者臣竊嘗大王之糞其惡味苦且楚酸是味也應春夏之氣臣以是知之呉王大悦曰仁人也乃赦越王得離其石室去就其宫室執牧養之事如故越王從嘗糞惡之後遂病口臭范蠡乃令左右皆食岑草以亂其氣其後呉王如越王期日疾愈心念其忠臨政之後大縱酒於文臺呉王出令曰今日為越王陳北面之坐羣臣以客禮事之伍子胥趨出到舎上不御坐酒酣太宰嚭曰異乎今日坐者各有其詞不仁者逃其仁者留臣聞同聲相和同心相求今國相剛勇之人意者内慙至仁之存也而不御坐其亦是乎呉王曰然於是范蠡與越王俱起為呉王壽其辭曰下臣勾踐從小臣范蠡奉觴上千嵗之壽辭曰皇在上令昭下四時并心察慈仁者大王躬親洪恩立義行仁九徳四塞威服羣臣於乎休哉傳徳無極上感太陽降瑞翼翼大王延壽萬嵗長保呉國四海咸承諸侯賓服觴酒既升永受萬福於是呉王大悦明日伍子胥入諌曰昨日大王何見乎臣聞内懷虎狼之心外執美詞之説但為外情以存其身豺不可謂廉狼不可謂親今大王好聽須臾之説不慮萬嵗之患放棄忠直之言聽用讒夫之語不滅瀝血之仇不絶懷毒之怨猶縱毛爐炭之上幸其焦投卵千鈞之下望必全豈不殆哉臣聞桀登高自知危然不知所以自安也前據白刃自知死而不知所以自存也惑者知返迷道不逺願大王察之呉王曰寡人有疾三月曾不聞相國一言是相國之不慈也又不進口之所嗜心不相思是相國之不仁也夫為人臣不仁不慈焉能知其忠信者乎越王迷惑棄守邊之事親將其臣民來歸寡人是其義也躬親為虜妻親為妾不慍寡人寡人有疾親嘗寡人之溲是其慈也虗其府庫盡其寳幣不念舊故是其忠信也三者既立以養寡人寡人曽聽相國而誅之是寡人之不智也而為相國快意耶豈不負皇天乎子胥曰何大王之言反也夫虎之卑勢將以有撃也狸之卑身將求所取也雉以眩移拘於綢魚以有悦死於餌且大王初臨政負玉門之第九誠事之敗無咎矣今年三月甲戌時加鷄鳴甲戌嵗位之㑹將也青龍在酉徳在土刑在金是日賊其徳也知父將有不順之子君有逆節之臣大王以越王歸呉為義以飲溲食惡為慈以虛府庫為仁是故為無愛於人其不可親面聴貎觀以存其身今越王入臣於呉是其謀深也虗其府庫不見恨色是欺我王也下飲王之溲者是上食王之心也下嘗王之惡者是上食王之肝也大哉越王之崇呉呉將為所擒也惟大王留意察之臣不敢逃死以負前王一旦社稷丘􅇕宗廟荆棘其悔可追乎呉王曰相國置之勿復言矣寡人不忍復聞於是遂赦越王歸國送於蛇門之外羣臣祖道呉王曰寡人赦君使其返國必念終始王其勉之越王稽首曰今大王哀臣孤窮使得生全還國與種蠡之徒願死於轂下上天蒼蒼臣不敢負呉王曰於乎吾聞君子一言不再今已行矣王勉之越王再拜跪伏呉王乃引越王登車范蠡執御遂去至三津之上仰天歎曰嗟乎孤之屯厄誰念復生渡此津也謂范蠡曰今三月甲辰時加日昳孤䝉上天之命還歸故鄉得無後患乎范蠡曰大王勿疑直眡道行越將有福呉當有憂至浙江之上望見大越山川重秀天地再清王與夫人歎曰我已絶望永辭萬民豈料再還重復鄉國言竟掩面涕泣䦨干此時萬姓咸歡羣臣畢賀越王乃召相國范蠡大夫種大夫郢問曰孤欲以今日上明堂臨國政專恩致令以撫百姓何日可矣惟三聖紀綱維持范蠡曰今日丙午日也丙陽將也是日吉矣又因良時臣愚以為可無始有終得天下之中大夫種曰前車以覆後車必戒願王深察范蠡曰夫子故不一二見也吾王今以丙午復初臨政解救其本是一宜夫金制始而火救其終是二宜蓄金之憂轉而及水是三宜君臣有差不失其理是四宜王相俱起天下立矣是五宜臣願急升明堂臨政越王是日立政翼翼小心出不敢奢入不敢侈越王念復呉仇非一旦也苦身勞心夜以接日目臥則攻之以蓼足寒則漬之以水冬常抱氷夏還握火愁心苦志懸膽於户出入嘗之不絶於口中夜潛泣泣而復嘯越王曰呉王好服之離體吾欲採葛使女工織細布獻之以求呉王之心於子何如羣臣曰善乃使國中男女入山採葛以作黄絲之布欲獻之未及遣使呉王聞越王盡心自守食不重味衣不重綵雖有五臺之遊未嘗一日登玩吾欲因而賜之以書增之以封東至於勾甬西至於檇李南至於姑末北至於平原縱横八百餘里越王乃使大夫種索葛布十萬甘蜜九党文笥七枚狐皮五雙晉竹十庾以復封禮呉王得之日以越僻狄之國無珍今舉其貢貨而以復禮此越小心念切不忘呉之效也夫越本興國千里吾雖封之未盡其國子胥聞之退臥於舍謂侍者曰吾君失其石室之囚縱於南林之中今但因虎豹之野而與荒外之草於我之心其無損也呉王得葛布之獻乃復增越之封賜羽毛之飾几杖諸侯之服越國大悦采葛之婦傷越王用心之苦乃作苦之詩曰葛不連蔓􅀢台台我君心苦命更之嘗膽不苦甘如飴令我采葛以作絲女工織兮不敢遲弱於羅兮輕霏霏號絺素兮將獻之越王悦兮忘罪除呉王歡兮飛尺書增封益地賜羽奇几杖茵褥諸侯儀羣臣拜舞天顔舒我王何憂能不移於是越王内修其徳外布其道君不名教臣不名謀民不名使官不名事國中蕩蕩無有政令越王内實府庫墾其田疇民富國彊衆安道泰越王遂師八臣與其四友時問政焉大夫種曰愛民而已越王曰奈何種曰利之無害成之無敗生之無殺與之無奪越王曰願聞種曰無奪民所好則利也民不失其時則成之省刑去罰則生之薄其賦歛則與之無多臺游則樂之静而無苛則喜之民失所好則害之農失其時則敗之有罪不赦則殺之重賦厚歛則奪之多作臺游以罷民則苦之勞擾民力則怒之臣聞善為國者遇民如父母之愛其子如兄之愛其弟聞有饑寒為之哀見其勞苦為之悲越王乃緩刑薄罰省其賦斂於是人民殷富皆有帶甲之勇八月呉侵陳修舊怨也呉師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患呉矣昔闔廬食不二味居不重席室不崇壇噐不彤鏤宫室不觀舟車不飾衣服財用擇不取費在國天有菑癘親巡孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乗與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我發明按國語作子西歎於朝以夫差之強故而藍尹亹為是言以解之曰子修徳以待呉呉將斃内外傳出一人手而紀載亦有小異如此六年春呉伐陳復修舊怨也七年夏公會呉於鄫呉來徵百牢子服景伯對曰先王未之有也呉人曰宋百牢我魯不可以後宋且魯牢晉大夫過十呉王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦惟執事呉人弗聽景伯曰呉將亡矣棄天而背本不與必棄疾於我乃與之八年三月呉伐我次於泗上六月齊侯使如呉請師將以伐我九年春齊侯使公孟綽辭師於呉呉子曰昔嵗寡人聞命今又革之不知所從將進受命於君秋呉城邗溝通江淮冬呉子使來儆師伐齊十年公會呉子邾子郯子伐齊南鄙師於鄎齊人弑悼公赴於師呉子三日哭於軍門之外徐承帥舟師將自海入齊齊人敗之呉師乃還秋呉子使來復儆師十一年為郊戰故公㑹呉子伐齊五月克博壬申至於嬴中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍高無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約呉髮短東郭書曰三戰必死於此三矣使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼔而已不聞金矣甲戌戰於艾陵展如敗高子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乗甲首三千以獻於公將戰呉子呼叔孫曰而事何也對曰從司馬王賜之甲劍鈹曰奉爾君事敬無廢命叔孫未能對衛賜進曰州仇奉甲從君而拜公使太史固歸國子之元寘之新箧褽之以𤣥纁加組帯焉寘書於其上曰天若不識不衷何以使下國秋季孫命修守備曰小勝大禍也齊至無日矣呉將伐齊越子率其衆以朝焉王及列士皆有饋賂呉人皆喜惟子胥懼曰是豢呉也夫諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼呉其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種於兹邑是商所以興也今君易之將以求大不亦難乎弗聽使於齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死將死曰樹吾墓檟檟可材也呉其亡乎三年其始弱矣盈必毁天之道也補逸國語呉王夫差起師伐越越王勾踐起師逆之江大夫種乃獻謀曰夫呉之於越唯天所授王其無庸戰夫申胥華登簡服呉國之士於甲兵而未嘗有所挫也夫一人善射百夫决拾勝未可成夫謀必素見成事焉而後履之不可以授命王不如設戎約辭行成以喜其民以廣侈呉王之心吾以卜之於天天若棄呉必許吾成而不吾足也将必寛然有霸諸侯之心焉既罷敝其民而天奪之食安受其燼乃無有命矣越王許諾乃命諸稽郢行成於呉王曰寡君勾踐使下臣郢不敢顯然布幣行禮敢私告於下執事曰昔者越國見禍得辠於天王天王親趨玉趾以心孤勾踐而又宥赦之君王之於越也繄起死人而肉白骨也孤不敢忘天災其敢忘君王之大賜乎今勾踐申禍無良草鄙之人敢忘君王之大徳而思邊垂之小怨以重得辠於下執事勾踐用帥二三之老親委重辠頓顙於邊今君王不察盛怒屬兵將殘伐越國越國固貢獻之邑也君王不以鞭箠使之而辱軍士使冦令焉勾踐請盟一介嫡女執箕帚以䀭姓於王宫一介嫡男奉盤匜以隨諸御春秋貢獻不解於王府大王豈辱裁之亦征諸侯之禮也夫諺曰狐埋之而狐搰之是以無成功今天王既封殖越國以明聞於天下而又刈亡之是天王之無成勞也雖四方之諸侯則何實以事呉敢使下臣盡辭惟天王秉利度義焉呉王夫差乃告諸大夫曰孤將有大志於齊吾將許越成而無拂吾慮若越既改吾又何求若其不改反行吾振旅焉申胥諫曰不可許也夫越非實忠心好呉也又非懾畏吾甲兵之彊也大夫種勇而善謀將還玩吳國於股掌之上以得其志夫固知君王之葢威以好勝也故婉約其辭以從逸王志使淫樂於諸夏之國以自傷也使吾甲兵鈍敝民人離落而日以憔悴然後安受吾燼夫越王好信以愛民四方歸之年穀時熟日長炎炎及吾猶可以戰也為虺弗摧為蛇將若何呉王曰大夫奚隆於越越曾足以為大虞乎若無越則吾何以春秋耀吾軍士乃許之成將盟越王又使諸稽郢辭曰以盟為有益乎前盟口血未乾足以結信矣以盟為無益乎君王舍甲兵之威以臨使之而胡重於鬼神而自輕也呉王乃許之荒成不盟呉王夫差既許越成乃大戒師徒將以伐齊申胥進諌曰昔天以越賜呉而王弗受夫天命有反今越王勾踐恐懼而改其謀舍其愆令輕其征賦施民所善去民所惡身自約也裕其衆庻其民殷衆以多甲兵譬越之在呉也猶人之有腹心之疾也夫越王之不忘敗呉於其心也戚然服士以司吾閒今王非越是圖而齊魯以為憂夫齊魯譬諸疾疥癬也豈能涉江淮而與我争此地哉將必越實有呉土王盍亦鑑於人無鑑於水昔楚靈王不君其臣箴諌以不入乃築臺於章華之上闕為石郭陂漢以象帝舜罷敝楚國以間陳蔡不修方城之内踰諸夏而圖東國三嵗於沮汾以服呉越其民不忍饑勞之殃三軍畔王於乾谿王親獨行屏營徬徨於山林之中三日乃見其涓人疇王呼之曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以墣而去之王覺而無見也乃匍匐將入棘圍棘圍不納乃入芈尹申亥氏焉王縊申亥負王以歸而土埋之其室此志也豈遽忘於諸侯之耳乎今王既變鮌禹之功而高高下下以罷民於姑蘇天奪吾食都鄙薦饑今王將狠天而伐齊夫呉民離矣體有所傾譬如羣獸然一個負矢將百羣皆奔王其無方收也越人必來襲我王雖悔之其猶有及乎王弗聽十二年遂伐齊齊人與戰於艾陵齊師敗績呉人有功呉王夫差既勝齊人於艾陵乃使行人奚斯釋言於齊曰寡人帥不腆呉國之役遵汶之上不敢左右唯好之故今大夫國子興其衆庻以犯獵呉國之師徒天若不知有辠則何以使下國勝呉王還自伐齊乃訊申胥曰昔吾先王體徳聖明達於上帝譬如農夫作耦以刈殺四方之蓬蒿以立名於荆此則大夫之力也今大夫老而又不自安恬逸而處以念惡出則辠吾衆撓亂百度以妖孽呉國今天降衷於呉齊師受服孤豈敢自多先王之鐘鼓實式靈之敢告於大夫申胥釋劍而對曰昔吾先王世有輔弼之臣以能遂疑計惡以不陷於大難今王播棄黎老而孩童焉比謀曰余令而不違夫不違乃違也夫不違亡之階也夫天之所棄必驟近其小喜而逺其大憂王若不得志於齊而以覺寤王心呉國猶世吾先君之得之也必有以取之其亡之也亦有以棄之用能援持盈以没而驟救傾以時今王無以取之而天禄亟至是呉命之短也員不忍稱疾辟易以見王之親為越之禽也員請先死將死曰而縣吾目於東門以見越之入呉國之亡也遂自殺王慍曰孤不使大夫得有見也乃使取申胥之尸盛以䲭夷而投之於江十二年公㑹呉於橐臯秋衛侯㑹呉於鄖公及衛侯宋皇瑗盟而卒辭呉盟十三年公㑹單平公晉定公呉夫差於黄池補逸國語呉王夫差既退於黄池乃使王孫茍告勞於周曰昔者楚人為不道不承共王事以違我一二兄弟之國吾先君闔廬不貰不忍被甲帶劍挺鈹搢鐸以與楚昭王毒逐於中原柏舉天舍其衷楚師敗績王去其國遂至於郢王總其百執事以奉其社稷之祭其父子昆弟不相能夫槩王作亂是以復歸於呉今齊侯任不鑒於楚又不承共王命以逺我一二兄弟之國夫差不貰不忍被甲帶劍挺鈹搢鐸遵汶伐博簦笠相望於艾陵天舍其𠂻齊師還夫差豈敢自多文武實舍其𠂻歸不稔於嵗余沿江泝淮闕溝深水出於商魯之間以徹於兄弟之國夫差克有成事敢使茍告於下執事周王答曰茍伯父命女來明紹享余一人若余嘉之昔周室逢天之降禍遭民之不祥余心豈忘憂䘏不唯下土之不康靖今伯父曰戮力同徳伯父若能然余一人兼受而介福伯父多歴年以沒元身伯父秉徳已侈大哉夏六月丙子越子伐呉為二隊疇無餘謳陽自南方先及郊呉太子友王子地王孫彌庸壽於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也太子曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗呉師獲太子友王孫彌庸壽於姚丁亥入呉呉人告敗於王王惡其聞也自剄七人於幕下秋七月辛丑盟呉晉争先呉人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼔整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今呉王有墨國勝乎大子死乎且夷徳輕不忍久請少待之乃先晉人呉人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見於王伯合諸侯則侯帥子男以見於伯自王以下朝聘玉帛不同故敝邑之職貢於呉有豐於晉無不及焉以為伯也今諸侯㑹而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於呉八百乗若為子男則將半邾以屬於呉而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉呉人乃止既而悔之將囚景伯景伯曰何也立後於魯矣將以二乗與六人從遲速唯命遂囚以還及户牖謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉自襄以來未之改也若不會祝宗將曰呉實然且謂魯不共而執其賤者七人何損焉大宰嚭言於王曰無損於魯而祗為名不如歸之乃歸景伯呉申叔儀乞糧於公孫有山氏曰佩玉橤兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰粱則無矣麤則有之若登首山以呼曰庚癸乎則諾王欲伐宋殺其丈夫而囚其婦人大宰嚭曰可勝也而弗能居也乃歸冬呉及越平補逸國語呉王夫差既殺申胥不稔於嵗乃起師北征闕為深溝於商魯之間北屬之沂西屬之濟以㑹晉公午於黄池於是越王勾踐乃命范蠡舌庸率師沿海泝淮以絶呉路敗王子友於姑熊夷越王勾踐乃率中軍泝江以襲呉入其郛焚其姑蘇徙其大舟呉晉争長未成邊遽乃至以越亂告呉王懼乃合大夫而謀曰越為不道背其齊盟今吾道路悠逺無㑹而歸與㑹而先晉孰利王孫雄曰夫危事不齒雄敢先對二者莫利無㑹而歸越聞章矣民懼而走逺無正就齊宋徐夷曰呉既敗矣將夾溝而㢋我我無生命矣會而先晉晉既執諸侯之柄以臨我將成其志以見天子吾須之不能去之不忍若越聞愈章吾民恐畔必㑹而先之王乃步就王孫雄曰先之圖之將若何王孫雄曰王其無疑吾道路悠逺必無有二命焉可以濟事王孫雄進顧揖諸大夫曰危事不可以為安死事不可以為生則無為貴知矣民之惡死而欲富貴以長没也與我同雖然彼近其國有遷我絶慮無遷彼豈能與我行此危事也哉事君勇謀於此用之今夕必挑戰以廣民心請王厲士以奮其朋勢勸之以高位重畜備刑戮以辱其不厲者令各輕其死彼將不戰而先我我既執諸侯之柄以嵗之不穫也無有誅焉而先罷之諸侯必説既而皆入其地王安挺志一日惕一日留以安步王志必設以此民也封於江淮之間乃能至於呉呉王許諾呉王昏乃戒令秣馬食士夜中乃令服兵擐甲係馬舌出火竈陳士卒百人以為徹行百行行頭皆官帥􅗙鐸拱稽建肥胡奉文犀之渠十行一嬖大夫建旌提鼔挾經秉枹十旌一將軍載常建鼓挾經秉枹為萬人以為方陳皆白常白旗素甲白羽之矰望之如荼王親秉鉞載白旗以中陳而立左軍亦如之皆赤常赤旟丹甲朱羽之矰望之如火右軍亦如之皆𤣥常𤣥旗黒甲烏羽之矰望之如墨為帶甲三萬以勢攻鷄鳴乃定既陳去晉軍一里昧明王乃秉枹親就鳴鐘鼔丁寜錞于振鐸勇怯盡應三軍皆譁釦以振旅其聲動天地晉師大駭不出周軍飭壘乃令董褐請事曰兩君偃兵接好日中為期今大國越録而造於敝邑之軍壘敢請亂故呉王親對之曰天子有命周室卑約貢獻莫入上帝鬼神而不可以告無姬姓之振也徒遽來告孤日夜相繼匍匐就君君今非王室不安平是憂億負晉衆庻不式諸戎翟楚秦將不長弟以力征一二兄弟之國孤欲守吾先君之班爵進則不敢退則不可今㑹日薄矣恐事之不集以為諸侯笑孤之事君在今日不得事君亦在今日為使者之無逺也孤用親聽命於藩籬之外董褐将還王稱左畸曰攝少司馬兹與王士五人坐於王前乃皆進自剄於客前以酬客董􅄄既致命乃告諸趙鞅曰臣觀呉王之色類有大憂小則嬖妾嫡子死不則國有大難大則越入呉將毒不可與戰主其許之先無以待危然而不可徒許也趙鞅許諾晉乃令董褐復命曰寡君未敢觀兵身見使褐復命曰曩君之言周室既卑諸侯失禮於天子請貞於陽卜收文武之諸侯孤以下密邇於天子無所逃辠訊譲日至曰昔呉伯父不失春秋必率諸侯以顧在余一人今伯父有蠻荆之虞禮世不續用命孤禮佐周公以見我一二兄弟之國以休君憂今君掩王東海以淫名聞於天子君有短垣而自踰之况蠻荆則何有於周室夫命圭有命固曰呉伯不日呉王諸侯是以敢辭夫諸侯無二君而周無二王君若無卑天子以干其不祥而曰呉公孤敢不順從君命長弟許諾呉王許諾乃退就幕而㑹呉公先歃晉侯亞之呉王既㑹越聞愈章恐齊宋之為已害也乃命王孫雄先與勇獲帥徒師以為過賔於宋以焚其北郛焉而過之十七年三月越子伐呉呉子禦之笠澤夾水而陳越子為左右勾卒使夜或左或右鼔噪而進呉師分以禦之越子以三軍潛涉當呉中軍而鼔之呉師大亂遂敗之補逸呉越春秋大夫種曰夫九術者湯文得之以王桓穆得之以霸其攻城取邑易於脱屣願大王覽之種曰一曰尊天事鬼以求其福二曰重財幣以遺其君多貨賄以喜其臣三曰貴糴粟槀以虗其國利所欲以疲其民四曰遺美女以惑其心而亂其謀五曰遺之巧工良材使之起宫室以盡其財六曰遺之諛臣使之易伐七曰彊其諌臣使之自殺八曰君王國富而備利噐九曰利甲兵以承其弊凡此九術君王閉口無傳守之以神取天下不難而况於呉乎越王曰善乃行第一術立東郊以祭陽名曰東王公立西郊以祭隂名曰西王母祭陵山於㑹稽祀水澤於江州事鬼神一年國不被災越王曰善哉大夫之術願論其餘種曰呉王好起宫室用工不輟王選名山神材奉而獻之越王乃使木工千有餘人入山伐木一年師無所幸作士思歸皆有怨望之心而歌木客之吟一夜天生神木一雙大二十圍長五十尋陽為文梓隂為楩柟巧工施校制以規繩雕治圓轉刻削磨礱分以丹青錯畫文章嬰以白璧鏤以黄金狀類龍蛇分彩生光乃使大夫種獻之於呉王曰東海役臣臣孤勾踐使臣種敢因下吏聞於左右賴大王之力竊為小殿有餘材謹再拜獻之呉王大悦子胥諫曰王勿受也昔者桀起靈臺紂起鹿臺隂陽不和寒暑不時五榖不熟天與其災民虗國變遂取滅亡大王受之必為越王所戮呉王不聽遂受而起姑蘇之臺三年聚材五年乃成高見二百里行路之人道死巷哭不絶嗟嘻之聲民疲士苦人不聊生越王曰善哉第二術也十一年越王深念永思惟欲伐呉乃請計􅒍問曰吾欲伐呉恐不能破早欲興師惟問於子計􅒍對曰夫興師舉兵必且内蓄五榖實其金銀滿其府庫厲其甲兵凡此四者必察天地之氣原於隂陽明於孤虗審於存亡乃可量敵越王曰天地存亡其要奈何計􅒍曰天地之氣物有死生原隂陽者物貴賤也明孤虗者知㑹際也審存亡者别真偽也越王曰何謂死生真偽乎計􅒍曰春種八榖夏長而養秋成而聚冬蓄而藏夫天時有生而不救種是一死也夏長無苖二死也秋成無聚三死也冬藏無蓄四死也雖有堯舜之徳無如之何夫天時有生勸者老作者少反氣應數不失厥理一生也留意省察謹除苖穢穢除苖盛二生也前時設備物至則收國無逋税民無失穗三生也倉已封塗除陳入新君樂臣歡男女及信四生也夫隂陽者太隂所居之嵗留息三年貴賤見矣夫孤虗者謂天門地户也存亡者君之道徳也越王曰何子之年少於物之長也計􅒍曰有美之士不拘長少越王曰善哉子之道也乃仰觀天文集察緯宿厯象四時以下者上虗設八食從隂收著望陽出糶筴其極計三年五倍越國熾富勾踐歎曰吾知霸矣善計􅒍之謀也十二年越王謂大夫種曰孤聞呉王淫而好色惑亂沈湎不領政事因此而謀可乎種曰可破夫呉王淫而好色宰嚭佞以曳心徃獻美女其必受之惟王選擇美女二人而進之越王曰善乃使相諸國中得苧蘿山鬻薪之女曰西施鄭旦飾以羅縠教以容歩習於土城臨於都巷三年學服而獻於呉乃使相國范蠡進曰越王勾踐竊有二遺女越國洿下困迫不敢稽留謹使臣蠡獻之大王不以鄙陋寢容願納以供箕帚之用呉王大悦曰越供二女乃勾踐之盡忠於呉之證也子胥諌曰不可王勿受也臣聞五色令人目盲五音令人耳聾昔桀易湯而滅紂易文王而亡大王受之後必有殃臣聞越王朝書不倦晦誦竟夜且聚敢死之士數萬是人不死必得其願越王服誠行仁聽諌進賢是人不死必成其名越王夏被毛裘冬御絺綌是人不死必為對隙臣聞賢士國之寳美女國之咎夏亡以妺喜殷亡以妲己周亡以褒姒呉王不聽遂受其女越王曰善哉第三術也十九年春越人侵楚以誤呉也二十年秋呉公子慶忌驟諌呉子曰不改必亡弗聼出居於艾遂適楚聞越將伐呉冬請歸平越遂歸欲除不忠者以説於越呉人殺之攷異吕氏春秋呉王欲殺王子慶忌而莫之能殺呉王患之要離曰臣能之呉王曰汝惡能乎吾嘗以六馬逐之江上矣而不能及射之矢左右滿把而不能中今汝拔劍則不能舉臂上車則不能登軾汝惡能要離曰士患不勇耳奚患於不能王誠能助臣請必能呉王諾明旦加要離罪焉縶執妻子焚之而揚其灰要離走往見王子慶忌於衛王子慶忌喜曰呉王之無道也子之所見也諸侯之所知也今子得免而去之亦善矣要離與王子慶忌居有間謂王子慶忌曰呉之無道也愈甚請與王子往奪之國王子慶忌曰善乃與要離俱渉於江中江㧞劍刺王子慶忌王子慶忌捽之投之於江浮則又取而投之如此者三其卒曰汝天下之國士也幸汝以成而名要離得不死歸於呉呉王大悦請與分國要離曰不可臣請必死呉王止之要離曰夫殺妻子焚之而揚其灰以便事也臣以為不仁夫為故主殺新主臣以為不義夫捽而浮乎江三入三出特王子慶忌為之賜而不殺耳臣已為辱矣夫不仁不義又且已辱不可以生呉王不能止果伏劍而死發明按呉之要離紀傳所載實有其人非子虗亡是公也但公子慶忌左氏載於夫差將亡之日而諸書皆以為闔廬時人誤矣故仍以傳為主而附要離事於末簡以資見聞十一月越圍呉趙孟降於喪食楚隆曰三年之喪親暱之極也主又降之無乃有故乎趙孟曰黄池之役先主與呉王有質曰好惡同之今越圍呉嗣子不廢舊業而敵之非晉之所能及也我是以為降楚隆曰若使呉王知之若何趙孟曰可乎隆曰請嘗之乃徃先造於越軍曰呉犯間上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君志之不從請入視之許之告於呉王曰寡君之老無恤使陪臣隆敢展謝其不共黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問趙孟曰勾踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉二十二年冬十一月丁卯越滅呉請使呉王居甬東辭曰孤老矣焉能事君乃縊越人以歸補逸國語國之父兄請曰昔者夫差恥吾君於諸侯之國今越國亦節矣請報之勾踐辭曰昔者之戰也非二三子之罪也寡人之罪也如寡人者安與知恥請姑無庸戰父兄又請曰越四封之内親吾君也猶父母也子而思報父母之讐臣而思報君之讐其有敢不盡力者乎請復戰勾踐既許之乃致其衆而誓之曰寡人聞古之賢君不患其衆之不足也而患其志行之少恥也今夫差衣水犀之甲者億有三千不患其志行之少恥也而患其衆之不足也今寡人將助天滅之吾不欲匹夫之勇也欲其旅進旅退也進則思賞退則思刑如此則有常賞進不用命退則無恥如此則有常刑果行國人皆勸父勉其子兄勉其弟婦勉其夫曰孰是君也而可無死乎是故敗呉於囿又敗之於没又郊敗之反至於國王問於范蠡曰節事奈何范蠡對曰節事者與地唯地能包萬物以為一其事不失生萬物容畜禽獸然後受其名而兼其利美惡皆成以養生時不至不可彊生事不究不可彊成自若以處以度天下待其來者而正之因時之所宜而定之同男女之功除民之害以避天殃田野開闢府倉實民衆殷無曠其衆以為亂梯時將有反事將有間必有以知天地之恒制乃可以有天下之成利事無間時無反則撫民保教以須之王曰不榖之國家蠡之國家也蠡其圖之范蠡對曰四封之内百姓之事時節三樂不亂民功不逆天時五榖稑熟民乃蕃滋君臣上下交得其志蠡不如種也四封之外敵國之制立斷之事因隂陽之恒順天地之常柔而不屈彊而不剛徳虐之行因以為常死生因天地之刑天因人聖人因天人自生之天地形之聖人因而成之是故戰勝而不報取地而不反兵勝於外福生於内用力甚少而名聲章明種亦不如蠡也王曰諾令大夫種為之四年王召范蠡而問焉曰先人就世不穀即位吾年既少未有恒常出則禽荒入則酒荒吾百姓之不圖惟舟與車上天降禍於越委制於呉呉人之那不穀亦又甚焉吾欲與子謀之其可乎范蠡對曰未可也蠡聞之上帝不考時反是守彊索者不祥得時不成反受其殃失徳滅名㳅走死亡有奪有予有不予王無蚤圖夫呉君王之呉也王若蚤圖之其事又將未可知也王曰諾又一年王召范蠡而問曰吾與子謀呉子曰未可也今呉王淫於樂而忘其百姓亂民功逆天時信讒喜優憎輔逺弼聖人不出忠臣觧骨皆曲相御莫適相非上下相偷其可乎范蠡對曰人事至矣天應未也王姑待之王曰諾又一年王召范蠡而問焉曰吾與子謀呉子曰未可也今申胥驟諫其王王怒而殺之其可乎范蠡對曰逆節萌生天地未形而先為之征其事是以不成雜受其刑王姑待之王曰諾又一年王召范蠡而問焉曰吾與子謀呉子曰未可也今其稻蟹不遺種其可乎范蠡對曰天應至矣人事未盡也王姑待之王怒曰道固然乎妄其欺不穀耶吾與子言人事子應我以天時今天應至矣子應我以人事何也范蠡對曰王姑勿怪夫人事必將與天地相參然後乃可以成功今其禍新民恐其君臣上下皆知其資財之不足以支長久也彼將同其力致其死猶尚殆王其且馳騁弋獵無至禽荒宮中之樂無至酒荒肆與大夫觴飲無忘國常彼其上將薄其徳民將盡其力又使之望而不得食乃可以致天地之殛王姑待之至於𤣥月王召范蠡而問焉曰諺有之曰觥飯不及壺飱今嵗晚矣子將奈何范蠡對曰㣲君王之言臣固將謁之臣聞從時者猶救火追亡人也蹶而趨之惟恐弗及王曰諾遂興師伐呉至於五湖呉人聞之岀挑戰一日五反王弗忍欲許之范蠡進諫曰謀之廟廊失之中原其可乎王姑勿許也臣聞之得時無怠時不再來天予不取反為之災贏縮轉化後將悔之天節固然唯謀不遷王曰諾弗許范蠡曰臣聞古之善用兵者贏縮以為常四時以為紀無過天極究數而止天道皇皇日月以為常明者以為法㣲者則是行陽至而隂隂至而陽日困而還月盈而匡古之善用兵者因天地之常與之俱行後則用隂先則用陽近則用柔逺則用剛後無隂蔽先無陽察用人無蓺徃從其所剛彊以禦陽節不盡不死其野彼來從我固守勿與若將與之必因天地之災又觀其民之饑飽勞逸以參之盡其陽節盈吾隂節而奪之宜為人客剛彊而力疾陽節不盡輕而不可取宜為人主安徐而重固隂節不盡柔而不可迫凡陳之道設右以為牝益左以為牡蚤晏無失必順天道周旋無究今其來也剛彊而力疾王姑待之王曰諾弗與戰居軍三年呉師自潰呉王帥其賢良與其重禄以上姑蘇使王孫雄行成於越曰昔者上天降禍於呉得罪於㑹稽今君王其圖不穀不穀請復㑹稽之和王勿忍欲許之范蠡進諫曰臣聞之聖人之功時為之庸得時勿成天有還形天節不逺五年復返小凶則近大凶則逺先人有言曰伐柯者其則不逺今君王不斷其忘㑹稽之事乎王曰諾不許使者徃而復來辭俞卑禮俞尊王又欲許之范蠡諫曰孰使吾早朝而晏罷者非呉乎與我爭三江五湖之利者非呉邪夫十年謀之一朝而棄之其可乎王姑勿許其事將易冀已王曰吾欲弗許而難對其使者子其對之范蠡乃左提鼓右援枹以應使者曰昔者上天降禍於越委制於呉而呉不受今將反此義以報此禍吾王敢無聽天之命而聽君王之命乎王孫雄曰子范子先人有言曰無助天為虐助天為虐者不祥今吾稻蟹不遺種子將助天為虐不忌其不祥乎范蠡曰王孫子昔吾先君固周室之不成子也故濵於東海之陂黿鼉魚鼈之與處而鼃黽之與同陼余雖靦然人面哉吾猶禽獸也又安知是諓諓者乎王孫雄曰子范子將助天為虐助天為虐不祥雄請反辭於王范蠡曰君王已委制於執事之人矣子徃矣無使執事之人得罪於子使者辭反范蠡不報於王撃鼓興師以隨使者至於姑蘇之宫不傷越民遂滅呉反至五湖范蠡辭於王曰君王勉之臣不復入於越國矣王曰不穀疑子之所謂者何也范蠡對曰臣聞之為人臣者君憂臣勞君辱臣死昔者君王辱於會稽臣所以不死者為此事也今事已濟矣蠡請從會稽之罰王曰所不掩于之惡揚子之美者使其身無終没於越國子聽吾言與子分國不聽吾言身死妻子為戮范蠡對曰臣聞命矣君行制臣行意遂乗輕舟以浮於五湖莫知其所終極王命工以良金寫范蠡之状而朝禮之浹日而令大夫朝之環會稽三百里者以為范蠡地曰後世子孫有敢侵蠡之地者使無終沒於越國皇天后土四鄉地主正之以上范蠡之事呉王夫差還自黄池息民不戒越大夫種乃倡謀曰吾謂呉王將遂涉吾地今罷師而不戒以忘我吾不可以怠也日臣嘗卜於天今呉民既罷而大荒薦饑市無赤米而囷鹿空虗其民必移就蒲蠃於東海之濵天占既兆人事又見我蔑卜筮矣王若今起師以㑹奪之利無使失悛夫呉之邊鄙逺者罷而未至呉王將恥不戰必不須至之會也而以中國之師與我戰若事幸而從我我遂踐其地其至者亦將不能之㑹也已吾用禦兒臨之呉王若慍而又戰幸遂可出若不戰而結成王安厚取名而去之越王曰善哉乃大戒師將伐呉楚申包胥使於越越王勾踐問焉曰呉國為不道求殘我社稷宗廟以為平原弗使血食吾欲與之徼天之𠂻唯是車馬兵甲卒伍既具無以行之請問戰奚以而可包胥辭曰不知王固問焉乃對曰夫呉良國也能博取於諸侯敢問君王之所以與之戰者王曰在孤之側者觴酒豆肉簞食未嘗敢不分也飲食不致味聽樂不盡聲求以報呉願以此戰包胥曰善則善矣未可以戰也王曰越國之中疾者吾問之死者吾𦵏之老其老慈其幼長其孤問其病求以報呉願以此戰包胥曰善則善矣未可以戰也王曰越國之中吾寛民以子之忠惠以善之吾修令寛刑施民所欲去民所惡稱其善掩其惡求以報呉願以此戰包胥曰善則善矣未可以戰也王曰越國之中富者吾安之貧者吾予之救其不足裁其有餘使貧富皆利之求以報吳願以此戰包胥曰善則善矣未可以戰也王曰越國南則楚西則晉北則齊春秋皮幣玉帛子女以賔服焉未嘗敢絶求以報呉願以此戰包胥曰善哉蔑以加焉然猶未可以戰也夫戰知為始仁次之勇次之不知則不知民之極無以銓度天下之衆寡不仁則不能與三軍共饑勞之殃不勇則不能斷疑以發大計越王曰諾越王勾踐乃召五大夫曰呉為不道求殘吾社稷宗廟以為平原不使血食吾欲與之徼天之衷唯是車馬兵甲卒伍既具無以行之吾問於王孫包胥既命孤矣敢訪諸大夫問戰奚以而可勾踐願諸大夫言之皆以情告無阿孤孤將以舉大事大夫舌庸乃進對曰審賞則可以戰乎王曰聖大夫苦成進對曰審罰則可以戰乎王曰猛大夫種進對曰審物則可以戰乎王曰辨大夫蠡進對曰審備則可以戰乎王曰巧大夫臯如進對曰審聲則可以戰乎王曰可矣王乃命有司大令於國曰茍任戎者皆造於國門之外王乃令於國曰國人欲告者來告告孤不審將為戮不利過及五日必審之過五日道將不行王乃入命夫人王背屏而立夫人向屏王曰自今日以後内政無出外政無入内有辱是子也外有辱是我也我見子於此止矣王遂出夫人送王不出屏乃闔左闔填之以土去笄側席而坐不埽王背檐而立大夫向檐王命大夫曰食土不均地之不修内有辱於國是子也軍士不死外有辱是我也自今日以後内政無出外政無入吾見子於此止矣王遂出大夫送王不出檐乃闔左闔填之以土側席而坐不埽王乃之壇列鼓而行之至於軍斬有罪者以徇曰莫如此以環瑱通相問也明日徙舍斬有罪者以徇曰莫如此不從其伍之令明日徙舍斬有罪者以徇曰莫如此不用王命明日徙舍至於禦兒斬有罪者以徇曰莫如此淫逸不可禁也王乃命有司大徇於軍曰有父母耆老而無昆弟者以告王親命之曰我有大事子有父母耆老而子為我死子之父母將轉於溝壑子為我禮已重矣子歸沒而父母之世後若有事我與子圖之明日徇於軍曰有兄弟四五人皆在此者以告王親命之曰我有大事子有昆弟四五人皆在此事若不捷則是盡也擇子之所欲歸者一人明日徇於軍曰有眩瞀之疾者告王親命之曰我有大事子有眩瞀之疾其歸若已後日有事吾與子圖之明日徇於軍曰筋力不足以勝甲兵志行不足以聽命者歸莫告明日遷軍接龢斬有罪者以徇曰莫如此志行不果於是人有致死之心王乃命有司大徇於軍曰謂二三子歸而不歸處而不處進而不進退而不退左而不左右而不右身斬妻子鬻於是呉王起師軍於江北越王軍於江南越王乃中分其師以為左右軍以其私卒君子六千人為中軍明日將舟戰於江及昏乃令左軍銜枚泝江五里以須亦令右軍銜枚踰江五里以須夜中乃令左軍右軍涉江鳴鼔中水以須呉師聞之大駭曰越人分為二師將以夾攻我師乃不待旦亦中分其師將以禦越越王乃令其中軍銜枚潛涉不鼔不噪以襲攻之呉師大北越之左軍右軍乃遂涉而從之又大敗之於没又郊敗之三戰三北乃至於呉越師遂入呉國圍王宫呉王懼使人行成曰昔不穀先委制於越君君告孤請成男女服從孤無奈越之先君何畏天之不祥不敢絶祀許君成以至於今今孤不道得罪於君王君王以親辱於孤之敝邑孤敢請成男女服為臣御越王曰昔天以越賜呉而呉不受今天以呉賜越孤敢不聽天之命而聽君之令乎乃不許成因使人告於呉王曰天以呉賜越孤不敢不受以民生之不長王其無死民生於地上寓也其與幾何寡人其達王於甬句東夫婦三百唯王所安以沒王年夫差辭曰天既降禍於呉國不在前後當孤之身實失宗廟社稷凡呉土地人民越既有之矣孤何以視於天下夫差將死使人説於子胥曰使死者無知則已矣若其有知吾何面目以見員也遂自殺越滅呉上征上國宋鄭魯衛陳蔡執玉之君皆入朝夫唯能下其羣臣以集其謀故也呉越春秋二十三年十月越王復伐呉呉國困不戰士卒分散城門不守遂屠呉呉王率羣臣遁去晝馳夜走三日三夕達於秦餘杭山胸中愁憂目視茫茫行歩猖狂腹餒口饑顧得生稻而食之伏地而飲水顧左右曰此何名也對曰是生稻也呉王曰是公孫聖所言不得火食走傽偟也王孫駱曰飽食而去前有胥山西坂中可以匿止王行有頃因得生𤓰已熟呉王掇而食之謂左右曰何冬而生𤓰近道人不食何也左右曰謂糞種之物人不食也呉王曰何謂糞種左右曰盛夏之時人食生𤓰起居道傍子復生秋霜惡之故不食呉王歎曰子胥所謂且食者也謂太宰嚭曰吾戮公孫聖投胥山之巔吾以畏責天下之慙吾足不能進心不能徃太宰嚭曰死與生敗與成故有避乎王曰然曽無所知乎子試前呼之聖在當即有應呉王止秦餘杭山呼曰公孫聖三反呼聖從山中應曰公孫聖三呼三應呉王仰天呼曰寡人豈可返乎寡人世世得聖也須臾越兵至三圍呉范蠡在中行左手提鼔右手操枹而鼔之呉王書其矢而射種蠡之軍辭曰吾聞狡以死良犬就烹敵國如滅謀臣必亡今呉病矣大夫何慮乎大夫種相國蠡急而攻大夫種書矢射之曰上天蒼蒼若存若亡越君勾踐下臣種敢言之昔天以越賜呉呉不肯受是天所反勾踐敬天而功既得返國今上天報越之功敬而受之不敢忘也且呉有大過六以至於亡王知之乎有忠臣伍子胥忠諫而身死大過一也公孫聖直説而無功大過二也太宰嚭愚而佞言輕而讒諛妄語恣口聽而用之大過三也夫齊晉無返逆行無僭侈之過而呉伐二國辱君臣毁社稷大過四也且呉與越同音共律上合星宿下共一理而呉侵伐大過五也昔越親戕呉之前王罪莫大焉而幸伐之不從天命而棄其仇後為大患大過六也越王謹上列青天敢不如命大夫種謂越君曰中冬氣定天將殺戮不行犬殺反受其殃越王敬拜曰諾今圖呉王將為何如大夫種曰君被五勝之衣帶步光之劍仗屈盧之矛瞋目大言以執之越王曰諾乃如大夫種辭呉王曰誠以今日聞命言有頃呉王不自殺越王復使謂曰何王之忍辱厚恥也世無萬嵗之君死生一也今子尚有遺榮何必使吾師衆加刃於王呉王仍未肯自殺勾踐謂種蠡曰二子何不誅之種蠡曰臣人臣之位不敢加誅於人主願主急而命之天誅當行不可久留越王復瞋目怒曰死者人之所惡惡者無罪於天不負於人今君抱六過之罪不知愧辱而欲求生豈不鄙哉呉王乃太息四顧而望言曰諾乃引劍而伏之死越王謂太宰嚭曰子為臣不忠無信亡國滅君乃誅嚭并妻子呉王臨欲伏劍顧謂左右曰吾生既慙死亦愧矣使死者有知吾羞前君地下不忍覩忠臣伍子胥及公孫聖使其無知吾負於生死必連繴組以􅇁吾目恐其不蔽願復重羅繡三幅以為掩明生不昭我死勿見我形吾何可哉越王乃塟呉王以禮於秦餘杭山卑猶越王使軍士集於我戎之功人一隰土以塟之宰嚭亦葬卑猶之旁越王還於呉當歸而問於范蠡曰何子言之其合於天范蠡曰此素女之道一言即合大王之事王問為實金匱之要在於上下越王曰善哉吾不稱王其可悉乎蠡日不可昔呉之稱王僭天子之號天變於上日為隂蝕今君遂僭號不歸恐天變復見越王還於呉置酒文臺羣臣為樂乃命樂作伐呉之曲樂師曰臣聞即事作操功成作樂君王崇徳誨化有道之國誅無義之人復讎還恥威加諸侯受霸王之功功可象於圖畫德可刻於金石聲可託於絃管名可留於竹帛臣請引琴而鼔之遂作章暢辭曰屯乎今欲伐呉可未耶大夫種蠡曰呉殺忠臣伍子胥今不伐呉人何須大夫種進祝酒其辭曰皇天祐助我王受福良臣集謀我王之徳宗廟輔政鬼神承翼君不忘臣臣盡其力上天一蒼不可掩塞觴酒二升萬福無極於是越王黙然無言大夫種曰我王賢仁懐道抱徳滅讎破呉不忘返國賞無所恡羣邪杜塞君臣同和福祐千億觴酒三升萬壽難極臺上羣臣大悦而笑越王面無喜色范蠡知勾踐愛壤土不惜羣臣之死以其謀成國定必復不須功而返國也故面有憂色而不悦也范蠡從呉欲去恐勾踐未返失人臣之義乃從入越行謂文種曰子去矣越王必將誅子種不然言蠡復為書遺種曰吾聞天有四時春生冬伐人有盛衰㤗終必否知進退存亡而不失其正惟賢人乎蠡雖不才明知進退高鳥已散良弓就藏狡兔已盡良犬就烹夫越王為人長頸烏喙鷹視狼步可以共患難而不可共處樂可與履危不可與安子若不去將害於子明矣文種不信其言越王隂謀范蠡議欲去徼倖二十四年九月丁未范蠡辭於王曰臣聞主憂臣勞主辱臣死義一也今臣事大王前則無滅未萌之端後則無救已傾之禍雖然臣終欲成君霸國故不辭一死一生臣竊自惟乃使於呉王之慙辱蠡所以不死者誠恐讒於太宰嚭成伍子胥之事故不敢前死且須臾而生夫恥辱之心不可以大流汗之愧不可以忍幸賴宗廟之神靈大王之威徳以敗為成斯湯武克夏商而成王業者定功雪恥臣所以當席日久臣請從斯辭矣越王惻然泣下霑衣言曰國之士大夫是子庸國之人民是子使孤寄身託號以俟命矣今子云去欲將逝矣是天之棄越而喪孤也亦無所恃者矣孤竊有言公位乎分國共之去乎妻子受戮范蠡曰臣聞君子俟時計不數謀死不被疑内不自欺臣既逝矣妻子何法乎王其勉之臣從此辭乃乗扁舟出三江入五湖人莫知其所適范蠡既去越王愀然變色召大夫種曰蠡可追乎種曰不及也王曰奈何種曰蠡去時隂畫六陽畫三日前之神莫能制者𤣥武天空威行孰敢止者度天關渉天梁後入天一前翳神光言之者死視之者狂臣願大王勿復追也蠡終不還矣越王乃收其妻子封百里之地有敢侵之者上天所殃於是越王乃使良工鑄金象范蠡之形置之坐側朝夕論政自是之後計􅒍佯狂大夫曳庸扶同臯如之徒日益疎逺不親於朝大夫種内憂不朝人或讒之於王曰文種棄宰相之位而令君王霸於諸侯今官不加増位不益封乃懐怨望之心憤發於内色變於外故不朝耳異日種諫曰臣所以早朝而晏罷苦身疾作者但為呉耳今已滅之王何憂乎越王黙然時魯哀公患三桓欲因諸侯以伐之三桓亦患哀公之怒以故君臣作難哀公奔陘三桓攻哀公公奔衛又奔越魯國空虗國人悲之來迎哀公與之俱歸勾踐憂文種之不圖故不為哀公伐三桓也二十五年丙午平旦越王召相國大夫種而問之吾聞知人易自知難其知相國何如人也種曰哀哉大王知臣勇也不知臣仁也知臣忠也不知臣信也臣誠數以損聲色减淫樂竒説怪諭盡言竭忠以犯大王逆心咈耳必以獲罪臣非敢愛死不言言而後死昔子胥於呉當夫差之誅也謂臣曰狡兔死良犬烹敵國滅謀臣亡范蠡亦有斯言何大王問犯玉門之第八臣見王志也越王黙然不應大夫亦罷哺其耳以成人惡其妻曰君賤一國之相少王禄乎臨食不享哺以惡何妻子在側匹夫之能自致相國尚何望哉無乃為貪乎何其志忽忽若斯種曰悲哉子不知也吾王既免於患難雪恥於呉我悉徙宅自投死亡之地盡九術之謀於彼為佞在君為忠王不察也乃曰知人易自知難吾答之又無他語是凶妖之證也吾將復入恐不再還與子長訣相求於𤣥㝠之下妻曰何以知之種曰吾見王時正犯玉門之第八也辰剋其日上賊於下是為亂醜必害其良今日剋其辰上賊下止吾命須臾之間耳越王復召相國謂曰子有隂謀兵法傾敵取國九術之䇿今用三已破彊呉其六尚在子所願幸以餘術為孤前王於地下謀呉之前人於是種仰天嘆曰嗟乎吾聞大恩不報大功不還其此謂乎吾悔不隨范蠡之謀乃為越王所戮吾不食善言故哺以人惡越王遂賜文種屬盧之劍種得劍又歎曰南陽之宰而為越王之擒自笑曰後百世之末忠臣必以吾為喻矣遂伏劍而死越王葬種於國之西山樓舩之卒三千餘人造鼎足之羨或入三峯之下葬一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水潘侯者伍子胥也後重水者大夫種也以上文種之事臣士竒曰越王勾踐既棲㑹稽含垢忍恥以豢呉而臣之石室纍囚命懸掌股卒能出艱濟險重見越山其歸國也弔死問孤生聚教訓夏還抱火冬則握氷目倦至攻之以蓼懸膽於户出入必嘗刻苦淬厲極人世所不堪又有范蠡文種計􅒍諸賢佐或撫其内或營其外勾踐危心深慮言無不入計無不從遂環沼呉疆快償宿怨豈非堅忍志士之所為哉當闔閭之死檇李也夫差使人立庭而訓之曰夫差而忘越王之殺而父乎則對曰不敢忘三年卒報越降其君夫人而僕妾之不可謂非孝赦勾踐不殺不可謂非仁乃其噐小易盈破楚以來雄心益肆稱兵上國結釁齊魯戰勝攻克驕其中臺池嬪御蠱其外由是棄忠言而不納心腹之疾忽為疥瘍矣夫呉之與越勢不並存勾踐忍辱習苦以小忠曲謹為釣呉之餌下嘗其糞而上食王之心其為隱憂近患豈待抉東門之目而後見哉而夫差方且信宰嚭之讒爭黄池之長淫侈不道自取敗亡身死餘杭為天下笑槩觀前後何賢不肖之大相懸也子胥呉之老臣灑泣披肝忠貫日月少伯勾踐之寗武子也相從羇絏卒反故君文種實為居者九術用三呉以為沼此三人者皆呉越之所倚為存亡而沒猶百世祀者也一則不免鴟夷之湛一則卒就屬盧之誅藉令少伯不見幾逺引則亦藏弓烹狗之屬耳夫差固荒肓無足深責若勾踐則真長頸烏喙哉且夫檇李之戰闔閭傷將指還卒於陘則勾踐者夫差不共之仇讎也夫椒之報理實宜然既已納土歸命待以不死而又縱之而又封之不大有造於勾踐乎幸反故國守一言不再之信終身事呉夫差雖貪子胥雖忌未必即翦焉以肆東封也而乗虗伺釁俘其太子而襲其都何義乎及再破呉師夫差請成弗許即懲天與不取之覆轍亦當委曲而善全之奈何廹令自殺遂使至徳之裔忽焉不祀報施之道顧如是耶少伯覩微而亟去葢亦有見於此也夫差不忍甬東之辱與項王之不復渡江其事略同以比之烏喙不猶有烈士風哉左傳紀事本末卷五十一
