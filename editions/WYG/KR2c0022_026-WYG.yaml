body:
  text: 左傳紀事本末卷二十六詹事府詹事髙士竒撰晉楚爭伯靈公至厲公附楚莊王圖霸按春秋之世楚獨僭王春秋志在尊王故予伯予伯即所以尊王為其能攘楚也春秋終始予晉以伯故楚莊雖賢亦不得蔑晉之成景而以伯予之况伯非攘楚無以成伯顧可予楚以伯乎故於文襄之後悼公之前當晉靈成景厲暨楚穆莊之世題曰晉楚爭伯内晉而外楚也噫使靈成以下能為悼公則楚并不得而爭矣綱目分書南北朝兹竊取其例焉文公九年春范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平公子遂㑹晉趙盾宋華耦衛孔達許大夫救鄭不及楚師卿不書緩也以懲不恪夏楚侵陳克壺丘以其服於晉也秋楚公子朱自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平十年秋陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以徇或謂子舟曰國君不可戮也子舟曰當官而行何彊之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎厥貉之㑹麇子逃歸十一年春楚子伐麇成大心敗麇師于防渚潘崇復伐麇至于錫穴夏叔仲恵伯㑹晉郤缺于承匡謀諸侯之從于楚者秋襄仲聘于宋因賀楚師之不害也十三年冬公如晉朝且尋盟衛侯㑹公于沓請平于晉公還鄭伯㑹公于棐亦請平於晉公皆成之鄭伯與公宴于棐子家賦鴻雁季文子曰寡君未免於此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜十四年夏六月同盟于新城從於楚者服且謀邾也齊商人弑舍齊人定懿公十五年新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還凡勝國曰滅之獲大城焉曰入之秋齊人侵我西鄙故季文子告於晉冬十一月晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟於扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹書曰諸侯盟於扈無能為故也凡諸侯㑹公不與不書諱君惡也與而不書後也齊侯侵我西鄙謂諸侯不能也十六年冬十一月宋人弑其君杵臼十七年春晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也補逸國語宋人殺昭公趙宣子請師於靈公以伐宋公曰非晉國之急也對曰大者天地其次君臣所以為明訓也今宋人殺其君是反天地而逆民則也天必誅焉晉為盟主而不修天罰將懼及焉公許之乃發令於大廟召軍吏而戒樂正令三軍之鐘鼔必備趙同曰國有大役不鎮撫民而備鐘鼓何也宣子曰大罪伐之小罪憚之襲侵之事陵也是故伐備鐘鼔聲其罪也戰以錞于丁寧儆其民也襲侵密聲為蹔事也今宋人殺其君罪莫大焉明聲之猶恐其不聞也吾備鐘鼔為君故也乃使旁告於諸侯治兵振旅鳴鐘鼓以至於宋夏四月晉侯蒐於黄父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子曰寡君即位三年召蔡侯而與之事君九月蔡侯入于敝邑以行敝邑以侯宣多之難寡君是以不得與蔡侯偕十一月克減侯宣多而隨蔡侯以朝於執事十二年六月歸生佐寡君之嫡夷以請陳侯於楚而朝諸君十四年七月寡君又朝以蕆陳事十五年五月陳侯自敝邑往朝於君往年正月燭之武往朝夷也八月寡君又往朝以陳蔡之密邇於楚而不敢貳焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝於襄而再見於君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也鋌而走險急何能擇命之罔極亦知亡矣將悉敝賦以待於鯈唯執事命之文公二年六月壬申朝於齊四年二月壬戌為齊侵蔡亦獲成於楚居大國之間而從於强令豈其罪也大國若弗圖無所逃命晉鞏朔行成于鄭趙穿公壻池為質焉冬十月鄭太子夷石楚為質于晉補逸史記莊王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫莊王左抱鄭姬右抱越女坐鐘鼔之間伍舉曰願有進隱曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣居數月淫益甚大夫蘇從乃入諫王曰若不聞令乎對曰殺身以明君臣之願也於是乃罷滛樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大説呉越春秋王即位三年不聽國政沈湎於酒滛于聲色左手擁秦姬右手抱越女身坐鐘鼓之間而令曰有敢諫者死於是伍舉進諫曰有一大鳥集楚國之庭三年不飛亦不鳴此何鳥也於是莊王曰此鳥不飛飛則沖天不鳴鳴則驚人伍舉曰不飛不鳴將為射者所圖弦矢卒發豈得沖天而驚人乎於是莊王棄其秦姬越女罷鐘鼓之樂用孫叔敖任以國政遂霸天下威伏諸侯説苑楚莊王立為君三年不聽朝乃令于國曰寡人惡為人臣而遽諫其君者今寡人有國家立社稷有諫則死無赦蘇從曰處君之髙爵食君之厚禄愛其死而不諫其君則非忠臣也乃入諫莊王立鼔鐘之間左伏楊姬右擁越姬左裯袵右朝服曰吾鼔鐘之不暇何諫之聽蘇從曰臣聞之好道者多資好樂者多迷好道者多糧好樂者多亡荆國亡無日矣死臣敢以告王王曰善左執蘇從手右抽隂刀刎鐘鼔之懸明日授蘇從為相吕氏春秋荆莊王立三年不聽而好讔成公賈入諫王曰不榖禁諫者今子諫何故對曰臣非敢諫也願與君王讔也王曰胡不設不榖矣對曰有鳥止於南方之阜三年不動不飛不鳴是何鳥也王射之曰有鳥止於南方之阜其三年不動將以定志意也其不飛將以長羽翼也其不鳴將以覽民則也是鳥雖無飛飛將冲天雖無鳴鳴將駭人賈出矣不穀知之矣明日朝所進者五人所退者十人羣臣大說荆國之衆相賀也故詩曰何其久也必有以也何其處也必有與也其莊王之謂耶宣公元年宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟於晉又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉秋楚子侵陳遂侵宋晉趙盾帥師救陳宋㑹于棐林以伐鄭也楚蒍賈救鄭遇于北林囚晉解揚晉人乃還晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於楚二年春鄭公子歸生受命于楚伐宋宋華元樂吕御之二月壬子戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乘俘二百五十人馘百人狂狡輅鄭人鄭人入於井倒㦸而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聽之之謂禮殺敵為果致果為毅易之戮也將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎殘民以逞宋人以兵車百乘文馬百駟以贖華元於鄭半入華元逃歸立於門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而來奔宋城華元為植巡功城者謳曰晘其目皤其腹棄甲而復于思于思棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡秦師伐晉以報崇也遂圍焦夏晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬬椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之三年晉侯伐鄭及郔鄭及晉平士㑹入盟楚子伐陸渾之戎遂至於雒觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏徳鼎遷於商載祀六百商紂暴虐鼎遷於周徳之休明雖小重也其姦囘昏亂雖大輕也天祚明徳有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也夏楚人侵鄭鄭即晉故也四年冬楚子伐鄭鄭未服也五年冬楚子伐鄭陳及楚平晉荀林父救鄭伐陳六年春晉衛侵陳陳即楚故也冬楚人伐鄭取成而還七年鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黑壤王叔桓公臨之以謀不睦八年冬陳及晉平楚師伐陳取成而還九年秋㑹于扈討不睦也陳侯不㑹晉荀林父以諸侯之師伐陳晉侯卒于扈乃還冬宋人圍滕因其喪也陳靈公與孔寧儀行父通于夏姬皆衷其衵服以戲于朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎補逸榖梁傳稱國以殺其大夫殺無罪也泄冶之無罪如何陳靈公通于夏徴舒之家公孫寧儀行父亦通其家或衣其衣或衷其襦以相戲於朝泄冶聞之入諫曰使國人聞之則猶可使仁人聞之則不可君愧于泄冶不能用其言而殺之列女傳陳女夏姬者大夫夏徴舒之母也其狀美好無匹内挾技術葢老而復壯者三三為王后七為夫人公侯爭之莫不迷惑失意公孫寧儀行父與陳靈公皆通於夏姬或衣其衣以戲於朝泄冶見之謂曰君有不善子宜掩之今自子率君而為之不待幽閒於朝廷以戲士民其謂爾何二人以告靈公靈公曰衆人知之吾不善無害也泄冶知之寡人恥焉乃使人微賊泄冶而殺之說苑陳靈公行僻而言失泄冶曰陳其亡矣吾驟諫君君不我聽而愈失威儀夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡是故人君之動不可不慎也夫樹曲木者惡得直景人君不直其行不敬其言者未有能保帝王之號垂顯令之名者也易曰夫君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出於身加于民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主君子之所以動天地可不慎乎天地動而萬物變化詩慎爾出話敬爾威儀無不柔嘉此之謂也今君不是之慎而縱恣焉不亡必弑靈公聞之以泄冶為妖言而殺之後果弑於徴舒國語定王使單襄公聘於宋遂假道於陳以聘於楚火朝覿矣道茀不可行也候不在疆司空不視塗澤不陂川不梁野有庾積場功未畢道無列樹墾田若蓻膳宰不致餼司里不授館國無寄寓縣無施舎民將築臺於夏氏及陳陳靈公與孔寧儀行父南冠以如夏氏留賔弗見單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備蔵隕霜而冬裘具清風至而修城郭宫室故夏令曰九月除道十月成梁其時儆曰收而場功偫而畚挶營室之中土功其始火之初見期於司里此先王之所以不用財賄而廣施徳於天下者也今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁是廢先王之教也周制有之曰列樹以表道立鄙食以守路國有郊牧畺有寓望藪有圃草囿有林池所以禦災也其餘無非榖土民無縣耜野無奥草不奪民時不蔑民功有優無匱有逸無罷國有班事縣有序民今陳國道路不可知田在草閒功成而不收民罷於逸樂是棄先王之法制者也周之秩官有之敵國賔至闗尹以告行理以節逆之候人為導卿出郊勞門尹除門宗祝執祀司里授館司徒具徒司空視塗司冦詰姦虞人入材甸人積薪火師監燎水師監濯膳宰致餐廩人獻餼司馬陳芻工人展車百官各以物至賔入如歸是故小大莫不懷愛其貴國之賔至則以班加一等益䖍至於王使則皆宫正涖事上卿監之若王巡守則君親監之今雖朝也不才有分族於周承王命以為過賔於陳而司事莫至是蔑先王之官也先王之令有之曰天道賞善而罰淫故凡我造國無從非彞無即慆滛各守爾典以承天休今陳侯不念𦙍續之常棄其伉儷妃嬪而帥其卿佐以滛於夏氏不亦瀆姓矣乎陳我大姬之後也棄衮冕而南冠以出不亦簡彞乎是又犯先王之令也昔先王之教茂帥其徳也猶恐隕越若廢其教而棄其制蔑其官而犯其令將何以守國居大國之間而無此四者其能久乎六年單子如楚八年陳侯殺於夏氏九年楚子入陳楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于栁棼國人皆喜唯子良憂曰是國之災也吾死無日矣十年夏陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廏射而殺之二子奔楚滕人恃晉而不事宋六月宋師伐滕鄭及楚平諸侯之師伐鄭取成而還冬楚子伐鄭晉士㑹救鄭逐楚師於潁北諸侯之師戍鄭十一年春楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟於辰陵陳鄭服也楚左尹子重侵宋王待諸郔令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板榦稱畚築程土物議逺邇略基趾具餱糧度有司事三旬而成不愆於素冬楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徴舒轘諸栗門因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懐而與之也乃復封陳鄉取一人焉以歸謂之夏州故書曰楚子入陳納公孫寧儀行父于陳書有禮也補逸家語孔子讀史至楚復陳喟然歎曰賢哉楚王輕千乘之國而重一言之信匪申叔之言不能達其義匪楚莊王之賢不能受其訓考異說苑楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰其城郭髙溝壑深蓄積多其國寧也王曰陳可伐也夫陳小國也而蓄積多蓄積多則賦斂重賦斂重則民怨上矣城郭髙溝壑深則民力罷矣興兵伐之遂取陳楚莊王伐陳吳救之雨十日十夜晴左史倚相曰吳必夜至甲列壘壞彼必薄我何不行列鼔出待之吳師至楚見成陳而還左史倚相曰追之呉行六十里而無功王罷卒寢果擊之大敗吳師厲之役鄭伯逃歸自是楚未得志焉鄭既受盟於辰陵又徼事於晉十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨於大宫且巷出車吉國人大臨守陴者皆哭楚子退師鄭人修城進復圍之三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不惟命是聴其俘諸江南以實海濵亦惟命其翦以賜諸侯使臣妾之亦惟命若恵顧前好徼福於厲宣桓武不冺其社稷使改事君夷於九縣君之恵也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質夏六月晉師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及于鄭而勦民焉用之楚歸而動不後隨武子曰善㑹聞用師觀釁而動徳刑政事典禮不易不可敵也不為是征楚軍討鄭怒其貳而哀其卑叛而伐之服而舎之徳刑成矣伐叛刑也柔服徳也二者立矣昔嵗入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉商農工賈不敗其業而卒乘輯睦事不奸矣蒍敖為宰擇楚國之令典軍行右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備能用典矣其君之舉也内姓選於親外姓選於舊舉不失徳賞不失勞老有加恵旅有施舎君子小人物有服章貴有常尊賤有等威禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以務烈所可也彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵强而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟知莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如已也故曰律否臧且律竭也盈而以竭夭且不整所以凶也不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎韓獻子謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也事之不捷惡有所分與其専罪六人同之不猶愈乎師遂濟楚子北師次於郔沈尹將中軍子重將左子反將右將飲馬于河而歸聞晉師既濟王欲還嬖人伍㕘欲戰令尹孫叔敖弗欲曰昔嵗入陳今兹入鄭不無事矣戰而不捷㕘之肉其足食乎㕘曰若事之捷孫叔為無謀矣不捷㕘之肉將在晉軍可得食乎令尹南轅反斾伍㕘言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者専行不獲聽而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次于管以待之晉師在敖鄗之間鄭皇戍使如晉師曰鄭之從楚社稷之故也未有貳心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗彘子曰敗楚服鄭於此在矣必許之欒武子曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申儆之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路籃縷以啟山林箴之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不徳而徼怨于楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕數及日中左則受之以至於昏内官序當其夜以待不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子知季曰原屏咎之徒也趙莊子曰欒伯善哉實其言必長晉國楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行也將鄭是訓定豈敢求罪于晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹于鄭曰無辟敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興于前射麋麗龜晉鮑癸當其後使攝叔奉麋獻焉曰以嵗之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也既免晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之及滎澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給於鮮敢獻於從者叔黨命去之趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰勿敢從也楚人求成弗能好也師無成命多備何為士季曰備之善若二子怒楚楚人乘我喪師無日矣不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也彘子不可士季使鞏朔韓穿帥七覆於敖前故上軍不敗趙嬰齊使其徒先具舟於河故敗而先濟潘黨既逐魏錡趙旃夜至於楚軍席於軍門之外使其徒入之楚子為乘廣三十乘分為左右右廣鷄鳴而駕日中而說左則受之日入而說許偃御右廣養由基為右彭名御左廣屈蕩為右乙卯王乘左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳晉人懼二子之怒楚師也使軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啟行先人也軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動工尹齊將右拒卒以逐下軍楚子使唐狡與蔡鳩居告唐恵侯曰不穀不徳而貪以遇大敵不穀之罪也然楚不克君之羞也敢藉君靈以濟楚師使潘黨率游闕四十乘從唐侯以為左拒以從上軍駒伯曰待諸乎隨季曰楚師方壯若萃於我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗王見右廣將從之乘屈蕩尸之曰君以此始亦必以終自是楚之乘廣先左晉人或以廣隊不能進楚人惎之脫扃少進馬還又惎之拔斾投衡乃出顧曰吾不如大國之數奔也趙旃以其良馬二濟其兄與叔父以他馬反遇敵不能去棄車而走林逢大夫與其二子乘謂其二子無顧顧曰趙傁在後怒之使下指木曰尸女於是授趙旃綏以免明日以表尸之皆重獲在木下楚熊負羇囚知罃知莊子以其族反之㕑武子御下軍之士多從之每射抽矢菆納諸㕑子之房㕑子怒曰非子之求而蒲之愛董澤之蒲可勝既乎知季曰不以人子吾子其可得乎吾不可以茍射故也射連尹襄老獲之遂載其尸射公子穀臣囚之以二者還及昏楚師軍於邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至於邲遂次於衡雍潘黨曰君盍築武軍而收晉尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之又作武其卒章曰耆定爾功其三曰鋪時繹思我徂惟求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無亡其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無徳而强爭諸侯何以和衆利人之幾而安人之亂以為已榮何以豐財武有七徳我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又可以為京觀乎祀於河作先君宫告成事而還補逸公羊傳大夫不敵君此其稱名氏以敵楚子何不與晉而與楚子為禮也曷為不與晉而與楚子為禮也莊王伐鄭勝乎皇門放乎路衢鄭伯肉袒左執茅旌右執鸞刀以逆莊王曰寡人無良邊垂之臣以干天禍是以使君王沛焉辱到敝邑君如矜此喪人錫之不毛之地使帥一二耋老而綏焉請唯君王之命莊王曰君之不令臣交易為言是以使寡人得見君之玉面而㣲至乎此莊王親自手旌左右撝軍退舎七里將軍子重諫曰南郢之與鄭相去數千里諸大夫死者數人厮役扈養死者數百人今君勝鄭而不有無乃失臣民之力乎莊王曰古者杅不穿皮不蠧則不出於四方是以君子篤於禮而薄於利要其人而不要其土告從不赦不詳吾以不詳道民災及吾身何日之有既則晉師之救鄭者至曰請戰莊王許諾將軍子重諫曰晉大國也王師淹病矣君請弗許也莊王曰弱者吾威之彊者吾辟之是以使寡人無以立乎天下令之還師而逆晉冦莊王鼔之晉師大敗晉衆之走者舟中之指可掬矣莊王曰嘻吾兩君不相好百姓何罪令還師而佚晉冦新書昔者楚莊王即位自静三年以講得失乃退僻邪而進中正能者任事而後在高位内領國政辟草而施教百姓富民恒一路不拾遺國無獄訟當是時也周室壞㣲天子失制宋鄭無道欺昧諸侯莊王圍宋伐鄭鄭伯肉袒牽羊奉簪而獻國莊王曰古之伐者亂則整之服則舍之非利之也遂弗受乃南與晉人戰于兩棠大克晉人會諸侯于漢陽申天子之辟禁而諸侯說服莊王歸過申侯之邑申侯進飯日中而王不食申侯請罪曰臣齋而具食甚潔日中而不飯臣敢請罪莊王喟然歎曰非子之罪也吾聞之曰其君賢君也而又有師者王其君中君也而又有師者伯其君下君也而羣臣又莫若者亡今吾下君也而羣臣又莫若不穀不穀恐亡自憂也吾聞之世不絶賢天下有賢而我獨不得若吾生者何以食為故莊王戰服大國義從諸侯戚然憂懼聖知在身而自錯不肖思得賢佐日中忘飯可謂明君矣說苑楚莊王賜羣臣酒日暮酒酣燈燭滅乃有人引美人之衣者美人援絶其冠纓告王曰今者燭滅有引妾衣者妾援得其冠纓持之趣火來上視絶纓者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絶冠纓者不歡羣臣百有餘人皆絶去其冠纓而上火卒盡歡而罷居三年晉與楚戰有一臣常在前五合五奮首却敵卒得勝之莊王怪而問曰寡人徳薄又未嘗異子子何故出死不疑如是對曰臣當死往者醉失禮王隱忍不加誅也臣終不敢以䕃蔽之徳而不顯報王也常願肝腦塗地用頸血湔敵久矣臣乃夜絶纓者也遂敗晉軍楚得以彊此有陰徳者必有陽報也楚莊王獵于雲夢射科雉得之申公子倍攻而奪之王將殺之大夫諫曰子倍自好也爭王雉必有說王姑察之不出三月子倍病而死邲之戰楚大勝晉歸而賞功申公子倍之弟進賞於王曰人之有功也賞於車下王曰奚謂也對曰臣之兄讀故記曰射科雉者不出三月必死臣之兄爭而得之故夭死也王命發乎府而視之於記果有焉乃厚賞之楚莊王與晉戰勝之懼諸侯之畏己也乃築為五仞之臺臺成而觴諸侯諸侯請約莊王曰我薄徳之人也諸侯請為觴乃仰而曰將將之臺窅窅其謀我言而不當諸侯伐之於是逺者來朝近者入賔楚莊王見天不見妖而地不出孽則禱於山川曰天其忘予與此能求過於天必不逆諫矣安不忘危故能終而成霸功焉是役也鄭石制實入楚師將以分鄭而立公子魚臣辛未鄭殺僕叔及子服君子曰史佚所謂毋怙亂者謂是類也詩曰亂離瘼矣爰其適歸歸於怙亂者也夫鄭伯許男如楚秋晉師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬬况國相乎及楚殺子王公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位公羊傳所載事與左同不具録補逸吕氏春秋孫叔敖沈尹莖相與友叔敖遊於郢三年聲問不知脩行不聞沈尹莖謂孫叔敖曰說義以聽方術信行能令人主上至於王下至於伯吾不若子也耦世接俗說義調均以適主心子不如我也子何以不歸耕乎我將為子遊沈尹莖遊於郢五年荆王欲以為令尹沈尹莖辭曰期思之鄙人有孫叔敖者賢人也王必用之臣不若也荆王於是使人以王輿迎叔敖以為令尹十二年而莊王霸此沈尹莖之力也冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰弗殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊遂傅於蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之晉原縠宋華椒衛孔達曹人同盟於清丘曰恤病討貳於是卿不書不實其言也宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之十三年夏楚子伐宋以其救蕭也君子曰清丘之盟唯宋可以免焉清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰茍利社稷請以我說罪我之由我則為政而亢大國之討將以誰任我則死之十四年春孔達縊而死衛人以說於晉而免遂告於諸侯曰寡君有不令之臣達搆我敝邑於大國既伏其罪矣敢告衛人以為成勞復室其子使復其位夏晉侯伐鄭為邲故也告於諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良於楚鄭伯如楚謀晉故也鄭以子良為有禮故召之楚子使申舟聘於齊曰無假道於宋亦使公子馮聘於晉不假道於鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女吾伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及于窒皇劒及于寢門之外車及於蒲胥之市秋九月楚子圍宋冬孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貎采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公說十五年春公孫歸父㑹楚子于宋宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與争雖晉之彊能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之禄也寡君有信臣下臣獲考死又何求楚子舍之以歸夏五月楚師將去宋申犀稽首於王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聴命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞補逸公羊傳莊王圍宋軍有七日之糧耳盡此不勝將去而歸爾於是使司馬子反乘堙而闚宋城宋華元亦乘堙而出見之司馬子反曰子之國何如華元曰憊矣曰何如曰易子而食之析骸而炊之司馬子反曰嘻甚矣憊雖然吾聞之也圍者拑馬而秣之使肥者應客是何子之情也華元曰吾聞之君子見人之厄則矜之小人見人之厄則幸之吾見子之君子也是以告情於子也司馬子反曰諾勉之矣我軍亦有七日之糧耳盡此不勝將去而歸爾揖而去之反於莊王莊王曰何如司馬子反曰憊矣曰何如曰易子而食之析骸而炊之莊王曰嘻甚矣憊雖然吾今取此然後而歸爾司馬子反曰不可臣已告之矣軍有七日之糧爾莊王怒曰吾使子往視之子曷為告之司馬子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾舎而止雖然吾猶取此然後歸爾司馬子反曰然則君請處於此臣請歸爾莊王曰子去我而歸我孰與處於此吾亦從子而歸爾引師而去之史記楚以圍宋五月不解宋城中急無食華元乃夜私見楚將子反子反告莊王王問城中何如曰析骨而炊易子而食莊王曰誠哉言我軍亦有二日糧以信故遂罷兵去十八年秋七月甲戊楚子旅卒呂氏春秋楚莊王使文無畏於齊過於宋不先假道還反華元言於宋昭公曰往不假道來不假道是以宋為野鄙也楚之㑹田也故鞭君之僕於孟諸請誅之乃殺文無畏於揚梁之隄莊王方削袂聞之曰嘻投袂而起履及諸庭劍及諸門車及之蒲蔬之市遂舍於郊興師圍宋九月宋人易子而食之析骨而爨之宋公肉袒執犧委服告病曰大國若宥圖之唯命是聽莊王曰情矣宋公之言也乃為却四十里而舍於盧門之闔所以為成而歸也王孫子楚莊王攻宋㕑有臭肉罇有敗酒將軍子重諫曰今君㕑肉臭而不可食罇酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢尸子雨雪楚莊王披裘當戸曰我猶寒彼百姓賔客甚矣乃使巡國中求百姓賔客之無居宿絶糧者賑之國人大說說苑楚莊王欲伐陽夏師久而不罷羣臣欲諫而莫敢莊王獵於雲夢椒舉進諫曰王所以多得獸者馬也而王國亡王之馬豈可得哉莊王曰善不穀知詘强國之可以長諸侯也知得地之可以為富也而忘吾民之不用也明日飲諸大夫酒以椒舉為上客罷陽夏之師楚莊王好獵大夫諫曰晉楚敵國也楚不謀晉晉必謀楚今王無乃耽于樂乎王曰吾獵將以求士也其榛藂刺虎豹者吾是以知其勇也其攫犀搏兕者吾是以知其勁有力也罷田而分所得吾是以知其仁也因是道也而得三士焉楚國以安故曰茍有志則無非事者此之謂也淮南子楚文王好服獬冠楚國效之楚莊王裾衣博袍令行乎天下遂霸諸侯令尹子佩請飲莊王莊王許諾子佩疏揖北面立於殿下曰昔者君王許之今不果往意者臣有罪乎莊王曰吾聞子具於强臺强臺者南望料山以臨方皇左江而右淮其樂忘死若吾薄徳之人不可以當此樂也恐留而不能返故老子曰不見可欲使心不亂楚莊王問詹何曰治國奈何對曰何明於治身而不明於治國楚王曰寡人得立宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也未嘗聞身亂而國治者也故本任於身不敢對以末楚王曰善史記優孟者故楚之樂人也長八尺多辨嘗以談笑諷諫楚相孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖之子也父且死時屬我貧困往見優孟優孟曰若無逺有所之即為孫叔敖衣冠抵掌談語嵗餘像孫叔敖莊王左右不能别也莊王置酒優孟前為夀莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言謂何孟曰婦言慎毋為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為亷吏奉法守職竟死不敢為非亷吏安可為也楚相孫叔敖持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘四百戸以奉其祀後十世不絶攷證漢延熹三年立叔敖碑云楚相孫君諱饒字叔敖本是縣人其碑載叔敖徳業最詳而優孟一歌與史記異所封之田亦不曰寢丘而曰潘鄉臣士竒曰晉自文襄以來主盟中夏本非楚匹也自靈成景厲昏庸相繼無有先君之明趙盾當國亦頗専恣荀林父雖忠將略非所長趙穿先縠魏錡趙旃之徒進而㕘之亦無先大夫之肅楚則適遇莊王之賢庸大鳥之諷屏鐘鼓而不御郤子佩之飲罷强臺而不登求賢如不及則當饋而歎保邦於未危則求過於天絶美人之纓則鬭士奮納沈尹之綆則賢相登葢亦一時之令主也而其臣如蒍敖伍舉申叔時輩又皆盡忠竭智翊贊於其間用能爭衡上國狎主齊犧而晉反處其下矣夫伯主之所以足為中原倚庇者勤而撫之思患而豫綢繆之然後敵有所悚懼而不敢有輕量我之心今觀范山之言曰晉君少不在諸侯北方可圖也於是楚有狼淵之師吁晉君雖少盾大夫安在乎既不能消釁於未然而又無武震合四國之兵以救鄭而不及楚師宇下安得不籍籍多事哉傳曰以懲不恪葢晉伯不競之由未有失䇿於此者也且晉之於楚鬭力不如鬭智鬭智尤不如鬭義義莫大於誅亂臣討賊子自厥貉次而二三與國半折而入於楚晉之所為攘楚者無他竒䇿止新城一歃乞靈於鬼神耳至皇皇大義可恃以無恐而不知取也舍雖無威齊君也商人烏得而弑之則合六國以討齊而竟以賂還一失也宋有杵臼之變覆載所不容宣子請討則曰非國之急也靈已不君矣已而治兵振旅鳴鐘鼓以至於宋庶幾快舉而又以利隳二失也陳靈宣淫固云不道然人臣無將徴舒敢以一矢加遺洿瀦不足蔽其辜晉為伯主置若罔聞而以問罪之聲遺之荆楚三失也此三者皆大義所闗晉不能為而楚為之其何以服諸侯而係天下之望故自取賂釋宋而鄭穆公薄其不足與乃受盟於楚人心解體伯勢陵夷職是之故哉鬭椒救鄭趙盾計無復之而託之將斃諉曰姑益其疾何不思之甚也至縣陳而尋復其封入鄭而又退之舍楚事事合義晉事事隳義而知難冒進自貽掬指之羞將誰懟哉滅蕭而同清丘之歃圍宋而馳虚聲之使晉之不能亦可知矣其原則自君臣泄泄不在諸侯而又不知以義服人之過也然而晉雖弱伯也若楚雖强安得以伯許之此問鼎觀兵所以見黜於春秋也左傳紀事本末卷二十六
