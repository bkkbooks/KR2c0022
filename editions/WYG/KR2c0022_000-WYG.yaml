body:
  text: 左傳紀事本末目録紀事本末類周卷一王朝交魯卷二桓王伐鄭卷三王臣之事王朝交列國朝定靈婚齊附諸侯王併附卷四王室庶孽之禍魯卷五隠公嗣國桓公篡弑附卷六魯與列國通好宋衞節共姬之附卷七文姜之亂莊公忘仇附卷八列卿嗣世孟孫孫叔孫叔季孫臧子氏卷九三桓弱公室卷十魯陪臣交叛南蒯侯犯陽虎宿公孫魯與邾莒搆怨魯伐滅小國附小國來伐亦卷十二小國交魯戎狄兵好俱附卷十三郊祀雩祭旱而不雩見災異視朔附卷十四城築蒐狩卷十五孔子仕魯仲由賜冉求柴端木髙齊卷十六齊滅紀卷十七齊襄公之弑卷十八齊桓公之伯卷十九齊五公子爭立卷二十靈景經畧小國晏子相齊附卷二十一崔慶之亂卷二十二陳氏傾齊晉卷二十三曲沃併晉卷二十四晉滅虞虢驪姬之亂惠懐之立卷二十五晉文公之伯襄公繼伯附卷二十六晉楚爭伯靈公至厲公附楚莊王圖伯卷二十七晉景楚共爭伯厲公鄢陵之戰附卷二十八秦晉交兵卷二十九晉悼公復伯卷三十晉楚弭兵卷三十一晉卿族廢興卷三十二晉并戎狄長狄附卷三十三晉失諸侯宋卷三十四宋殤閔昭公之弑卷三十五宋襄公圖伯卷三十六宋公族廢興魚石之亂地子罕之賢魋華向之亂尹樂大心辰之亂桓之亂大之亂滅内附景公曹衞卷三十七衞州吁宣姜之亂懿公亡國附文公定狄難卷三十八寗武子弭晉難卷三十九孫甯廢立卷四十衞靈公之立瞶輒父子爭國寵齊豹之亂南子之附鄭卷四十一鄭莊强國克段子入許附諸公爭國卷四十二鄭穆公之立靈公僖公之弑附卷四十三鄭滅許卷四十四子産相鄭西宫純門之難諸臣興廢附楚卷四十五楚伐滅小國成王之弑附卷四十六楚諸令尹代政武王以後靈王以前卷四十七楚靈王之亂滅陳蔡俱平王得國附昭惠復興楚國白公之亂附惠王滅陳吳卷四十九吳通上國季札讓國附卷五十闔閭入郢卷五十一勾踐滅吳秦卷五十二穆公伯西戎列國卷五十三春秋災異臣等謹案左傳紀事本末五十三卷國朝髙士奇撰士奇字澹人錢塘人居平湖以諸生授詹事府主簿改翰林侍讀厯官詹事歸里即家拜禮部侍郎諡文恪此書仿宋袁樞通鑑紀事本末之例排纂左傳所載列國事蹟分門件繫以便觀覽其例有曰補逸則雜採諸子史傳與左氏相表裏者曰考異則與左氏異詞可備叅訂者曰辨誤則糾其傳聞失實蹖駁不倫者曰攷証則取有依据可為典要者又時附以已見謂之發明凡周四卷魯十一卷齊七卷晉十一卷宋三卷衛四卷鄭四卷楚四卷吳三卷秦一卷列國一卷目各如其卷之數自宋以來學者以左傳敘事隔涉年月不得其統往往為之詮次類編其見於史志者有楊均葉清臣宋敏修黄潁周武仲勾龍傳桂績吕祖謙陳持章沖徐得之孫調楊泰之毛友徐安道孫范等諸家今其書多亡佚不傳中如吕祖謙之左傳類編雖尚散見永樂大典中而簡略失次且多脱闕未為善本惟章沖左氏事類始末全書尚存其體亦頗與士奇所撰相近蓋士奇未見沖書故復為之然沖書以十二公為紀此則以國為紀義例略殊又沖書門目太傷繁碎且於左氏原文頗多裁損至有裂句摘字聨合而成者士奇則大事必書而略於其細眉目朗晰尋文易知雖其詳備不及沖書而部居州次端緒可尋於讀盲史者亦未嘗無所助也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀凡例一左氏之書雖傳春秋實兼綜列國之史茲用宋袁樞紀事本末例凡列國大事各從其類不以時序而以國序一首王室尊周也次魯重宗國也春秋之所託也次齊晉崇霸綂也次宋衞鄭三國皆為與國其事多且春秋中之樞紐也次楚次吳越其國大其事繁後之者黜其僭也次秦志其代周且惡之也陳蔡曹許諸小國散見於諸大國之中微而畧之也晉楚之爭霸俱詳晉事中晉為主楚為客也一是書凡左氏傳文罕有所遺或有一傳而闗涉數事者其文不得不重見則隨其事之所主為文之詳畧一三代秦漢之書經史諸子雜出繁多其與左氏相表裏者皆博取而附載之謂之補逸其與左氏異同迥别者並存其説以備參伍謂之攷異其有蹖駁不倫傳聞失實者為釐辨之謂之辨誤其有證據明白可為典要者别而誌之謂之攷證參以管見聊附臆説謂之發明云
