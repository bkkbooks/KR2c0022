body:
  text: 左傳紀事本末卷二十四詹事府詹事髙士竒撰晉滅虞虢驪姬之亂附惠懷之立桓公十年春虢仲譛其大夫詹父於王詹父有辭以王師伐虢夏虢公出奔虞初虞叔有玉虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寶劍叔曰是無厭也無厭將及我遂伐虞公故虞公出奔共池莊公二十六年秋虢人侵晉冬虢人又侵晉二十七年冬晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰將饑三十二年秋七月有神降于莘惠王問諸內史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也王從之內史過往聞虢請命反曰虢必亡矣虐而聽於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而一者也依人而行虢多凉德其何土之能得補逸國語內史過曰昔夏之興也融降於崇山其亡也回祿信於聆隧商之興也檮杌次於丕山其亡也夷羊在牧周之興也鸑鷟鳴於岐山其衰也杜伯射王於鄗是皆明神之志者也王曰今是何神也對曰昔昭王娶於房曰房后實有爽德協於丹朱丹朱馮身以儀之生穆王焉實臨照周之子孫而禍福之夫神一不逺徙遷焉若由是觀之其丹朱乎王曰其誰受之對曰在虢土王曰然則何為對曰臣聞之道而得神是謂逢福淫而得神是謂貪禍今虢少荒其亡乎王曰吾其若之何對曰使太宰以祝史帥貍姓奉犧牲粢盛玉帛往獻焉無有祈也王使太宰忌父帥傅氏及祝史奉犧牲玉鬯往獻焉內史過從至虢虢公亦使祝史請土焉內史過歸告王曰虢必亡十九年晉取虢虢公夢在廟有神人面白毛虎爪執鉞立於西阿公懼而走神曰無走帝命曰使晉襲於爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也天事官成公使囚之且使國人賀夢舟之僑告其諸族曰衆謂虢亡不久吾乃今知之君不度而賀大國之襲於己何瘳吾聞之曰大國道小國襲焉曰服小國敖大國襲焉曰誅民疾君之侈也是以遂於逆命今嘉其夢侈必展是天奪之鑒而益其疾民疾其態天又誑之大國來誅出令乃逆宗國既卑諸侯逺已內外無親其誰云救之吾不忍俟也將行以其族適晉六年虢乃亡僖公二年晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能强諫且少長於君君昵之雖諫將不聽乃使荀息假道於虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦惟君故今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪於虢虞公許之且請先伐虢宫之竒諫不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽先書虞賄故也發明璧馬假道事公榖二傳文俱佳以其事無同異故不具録秋虢公敗戎於桑田晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒而益其疾也必易晉而不撫其民矣不可以五稔五年秋晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰大伯虞仲太王之昭也太伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勳在王室藏之盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不惟逼乎親以寵逼猶尚害之况以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德繄物如是則非德民不和神不享矣神所馮依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月甲午晉侯圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謠云丙之晨龍尾伏辰均服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子朔晉滅虢虢公醜奔京師師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王故書曰晉人執虞公罪虞且言易也以上晉滅虞虢補逸公羊傳五年晉取虞虞公抱寶牽馬而至荀息見曰臣之謀何如獻公曰子之謀則已行矣寶則吾寶也雖然吾馬之齒亦已長矣蓋戲之也考異齊桓公之郭問父老曰郭何故亡父老曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭君善善不能用惡惡不能去所以亡也榖梁以虢為郭郭君即虢公郭亡即虢亡未可知也莊公二十八年晉獻公娶於賈無子蒸於齊姜生秦穆夫人及大子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆埸無主則啓戎心戎之生心民慢其政國之患也若使大子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎晉侯說之夏使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙惟二姬之子在絳二五卒與驪姬譛羣公子而立奚齊晉人謂之二五耦補逸國語獻公卜伐驪戎史蘇占之曰勝而不吉公曰何謂也對曰遇兆挾以銜骨齒牙為猾戎夏交捽交捽是交勝也臣故云且懼有口􅠬民國移心焉公曰何口之有口在寡人寡人弗受誰敢興之對曰茍可以􅠬其入也必甘受逞而不知胡可壅也公不聽遂伐驪戎克之獲驪姬以歸有寵立以為夫人公飲大夫酒令司正實爵與史蘇曰飲而無肴夫驪戎之役女曰勝而不吉故賞女以爵罰女以無肴克國得妃其有吉孰大焉史蘇卒爵冉拜稽首曰兆有之臣不敢蔽蔽兆之紀失臣之官有二罪焉何以事君大罰將及不惟無肴抑君亦樂其吉而備其凶凶之無有備之何害若其有之備之為瘳臣之不信國之福也何敢憚罰飲酒出史蘇告大夫曰夫有男戎必有女戎若晉以男戎勝戎而戎亦必以女戎勝晉其若之何里克曰何如史蘇曰昔夏桀伐有施有施人以妹喜女焉妹喜有寵於是乎與伊尹比而亡夏殷辛伐有蘇有蘇氏以妲己女焉妲己有寵於是乎與膠鬲比而亡殷周幽王伐有褒有褒人以褒姒女焉褒姒有寵生伯服於是乎與虢石父比逐太子宜咎而立伯服太子出奔申申人繒人召西戎以伐周周於是乎亡今晉寡德而安俘女又增其寵雖當三季之王不亦可乎且其兆云挾以銜骨齒牙為猾我卜伐驪龜往離散以應我夫若是賊之兆也非我宅也離則有之不跨其國可謂挾乎不得其君能銜骨乎若跨其國而得其君雖逢齒牙以猾其中其誰云弗從諸夏從戎非敗而何從政者不可以不戒亡無日矣郭偃曰夫三季王之亡也宜民之主也縱惑不疚肆侈不違流志而行無所不疚是以及亡而不獲追鑑今晉國之方偏侯也其土又小大國在側雖欲縱惑未獲専也大家鄰國將師保之多而驟立不其集亡雖驟立不過五矣且夫口三五之門也是以讒口之亂不過三五且夫挾小鯁也可以小戕而不能喪國當之者戕焉於晉何害雖謂之挾而猾以齒牙口弗堪也其與幾何晉國懼則甚矣亡猶未也商之衰也其銘有之曰嗛嗛之德不足就也不可以矜而祗取憂也嗛嗛之食不足狃也不能為膏而祗離咎也雖驪之亂其離咎而已其何能服吾聞以亂得聚者非謀不卒時非人不免難非禮不終年非義不盡齒非德不及世非天不離數今不據其安不可謂能謀行之以齒牙不可謂得人廢國而向已不可謂禮不度而迂求不可謂義以寵賈怨不可謂德少族而多敵不可謂天德義不行禮義不則棄人失謀天亦不贊吾觀君夫人也若為亂其猶𨽻農也雖獲沃田而勤易之將弗克饗為人而已士蒍曰戒莫如豫豫而後給夫子戒也抑二大夫之言其皆有焉既驪姬不克晉正于秦五立而後平史記獻公五年伐驪戎得驪姬驪姬弟俱愛幸之十二年驪姬生奚齊獻公有意廢大子乃曰曲沃吾先祖宗廟所在而蒲邊秦屈邊翟不使諸子居之我懼焉於是使大子申生居曲沃公子重耳居蒲公子夷吾居屈獻公與驪姬子奚齊居絳晉國以此知大子不立也大子申生其母齊桓公女也曰齊姜早死申生同母女弟為秦穆公夫人重耳母翟之狐氏女也夷吾母重耳母女弟也獻公子八人而大子申生重耳夷吾皆有賢行及得驪姬乃逺此三子國語獻公立驪姬為夫人生奚齊其娣生卓子驪姬請使申生處曲沃以速縣重耳處蒲城夷吾處屈奚齊處絳以警無辱之故公許之史蘇朝告大夫曰二三大夫其戒之乎亂本生矣日君以驪姬為夫人民之疾心固皆至矣昔者之伐也起百姓以為百姓也是以民能欣之故莫不盡忠極勞以致死今君起百姓以自封也民外不得其利而內惡其貪則上下既有判矣然而又生男其天道也天彊其毒民疾其態其亂生哉吾聞君子好好而惡惡樂樂而安安是以能有常伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂今君滅其父而畜其子禍之基也畜其子又從其欲子思報父之恥而信其欲雖好色必惡心不可謂好好其色必授之情彼得其情必厚其欲從其惡心必敗國且深亂亂必自女戎三代皆然驪姬果作難殺大子而逐二公子君子曰知難本矣驪姬生奚齊其娣生卓子公將黜大子申生而立奚齊里克丕鄭荀息相見里克曰夫史蘇之言將及矣其若之何荀息曰吾聞事君者竭力以役事不聞違命君立臣從何二之有丕鄭曰吾聞事君者從其義不阿其惑也惑則誤民民誤失德是棄民也民之有君以治義也義以生利利以豐民若之何其民之與處而棄之也必立太子里克曰我不佞雖不識義亦不阿惑吾其靜也三大夫乃别公之優曰施通於驪姬驪姬問焉曰吾欲作大事而難三公子之徒如何對曰蚤處之使知其極夫人知其極鮮有慢心雖其慢乃易殘也驪姬曰吾欲為難安始而可優施曰必於申生其為人也小心精潔而大志重又不忍人精潔易辱重僨可疾不忍人必自忍也辱之近行驪姬曰重無乃難遷乎優施曰知辱可辱可辱遷重若不知辱亦必不知固秉常矣今子內固而外寵且善不莫不信若外單善而內辱之無不遷矣且吾聞之甚精必愚精為易辱愚不知避難雖欲無遷其得之乎是故先施讒於申生蒸於武公公稱疾不與使奚齊涖事猛足言於大子曰伯氏不出奚齊在廟子盍圖乎大子曰吾聞之羊舌大夫曰事君以敬事父以孝受命不遷為敬敬順所安為孝棄命不敬作令不孝又何圖焉且夫間父之愛而嘉其况有不忠焉廢人以自成有不貞焉孝敬忠貞君父之所安也棄安而圖逺於孝矣吾其止也獻公田見翟柤之氛歸寢不寐卻叔虎朝公語之對曰牀笫之不安耶抑驪姬之不在側邪公辭焉出遇士蒍曰今夕君不寐必為翟柤也夫翟柤之君好専利而不忌其臣競諂以求媚其進者壅塞其退者距違其上貪以忍其下偷以幸有縱君而無諫臣有冒上而無忠下君臣上下各厭其私以縱其回民各有心無所據依以是處國不亦難乎君若伐之可克也吾不言子必言之士蒍以告公說乃伐翟柤卻叔虎將乘城其徒曰棄政而役非其任也卻叔虎曰既無老謀而又無壯事何以事君被羽先升遂克之閔公元年冬晉侯作二軍公將上軍大子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為大子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰大子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳大伯不亦可乎猶有令名與其及也且諺曰心茍無瑕何恤乎無家天若祚大子其無晉乎補逸國語十六年公作二軍公將上軍大子將下軍以伐霍師未出士蒍言於諸大夫曰夫大子君之二也恭以俟嗣何官之有今君分之土而官之是左之也吾將諫以觀之乃言於公曰夫大子君之二也而帥下軍無乃不可乎公曰下軍上軍之二也寡人在上申生在下不亦可乎士蒍對曰下不可以二上公曰何故對曰二若體焉上下左右以相心目用而不倦身之利也上二代舉下二代履周旋變動以役心目故能治事以制百物若下攝上與上攝下周旋不變以違心目其反為物用也何事能治故古之為軍也軍有左右闕從補之成而不知是以寡敗若以下二上闕而不變敗弗能補也變非聲章弗能移也聲章過數則有釁有釁則敵入敵入而凶救敗不暇誰能退敵敵之如志國之憂也可以陵小難以征大君其圖之公曰寡人有子而制焉非子之憂也對曰夫大子國之棟也棟成乃制之不亦危乎公曰輕其所任雖危何害士蒍出語人曰大子不得立矣改其制而不患其難輕其任而不憂其危君有異心又焉得立行之克也將以害之若其不克其因以罪之雖克與不無所避罪與其勤而不入不如逃之君得其欲大子逺死且有令名為吳大伯不亦可乎大子聞之曰子輿之為我謀忠矣然吾聞之為人子者患不從不患無名為人臣者患不勤不患無祿今我不才而得勤與從又何求焉焉能及吳大伯乎大子遂行克霍而反讒言彌興二年冬晉侯使大子申生伐東山臯落氏里克諫曰大子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師専行謀誓軍旅君與國政之所圖也非大子之事也師在制命而已禀命則不威専命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見大子大子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修己而不責人則免於難大子帥師公衣之偏衣佩之金玦狐突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要逺災親以無災又何患焉狐突歎曰時事之徴也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣之尨服逺其躬也佩以金玦棄其衷也服以逺之時以閟之尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有內讒不如違之狐突欲行羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之大子將戰狐突諫曰不可昔辛伯諗周桓公云內寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也補逸國語優施教驪姬夜半而泣謂公曰吾聞申生甚好仁而彊甚寬惠而慈於民皆有所行之今謂君惑於我必亂國夫無乃以國故而行彊於君君未終命而不沒君其若之何盍殺我無以一妾亂百姓公曰夫豈惠其民而不惠於其父乎驪姬曰妾亦懼矣吾聞之外人之言曰為仁與為國不同為仁者愛親之謂仁為國者利國之謂仁故長民者無親衆以為親茍衆利而百姓和豈能憚君以衆故不敢愛親衆况厚之彼將惡始而美終以晚蓋者也凡民利是生殺君而厚利衆衆孰沮之殺親無惡於人人孰去之茍交利而得寵志行而衆說欲其甚矣孰不惑焉雖欲愛君惑不釋也今夫以君為紂若紂有良子而先喪紂無章其惡而厚其敗鈞之死也無必假手於武王而其世不廢祀至於今吾豈知紂之善不哉君欲弗恤其可乎若大難至而恤之其何及矣公懼曰若何而可驪姬曰君盍老而授之政彼得政而行其欲得其所索乃其釋君且君其圖之自桓叔以來孰能愛親惟無親故能兼翼公曰不可與政我以武與威是以臨諸侯未沒而亡政不可謂武有子而不勝不可謂威我授之政諸侯必絶能絶於我必能害我失政而害國不可忍也爾弗憂吾將圖之驪姬曰以臯落翟之朝夕苛我邊鄙使無日以牧田野君之倉廩固不實又恐削封疆君盍使之伐翟以觀其果於衆也與衆之信輯睦焉若不勝翟雖濟其罪可也若勝翟則善用衆矣求必益廣乃可厚圖也且夫勝翟諸侯驚懼吾邉鄙不警倉廩盈四鄰服封疆信君得其賴又知可不其利多矣君其圖之公說是故使申生伐東山衣之偏裻之衣佩之金玦僕人贊聞之曰大子殆哉君賜之竒竒生怪怪生無常無常不立使之出征先以觀之故告之以離心而示之以堅忍之權則必惡其心而害其身矣惡其心必內險之害其身必外危之危自中起難哉且是衣也狂夫阻之衣也其言曰盡敵而反雖盡敵其若內讒何僖公四年初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長且其繇曰専之渝攘公之羭一薰一蕕十年尚猶有臭必不可弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂大子曰君夢齊姜必速祭之大子祭於曲沃歸胙於公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由大子大子奔新城公殺其傅杜原欵或謂大子子辭君必辨焉大子曰君非姬氏居不安食不飽我辭姬必有罪君老矣我又不樂曰子其行乎大子曰君實不察其罪被此名也以出人誰納我十二月戊申縊于新城姬遂譛二公子曰皆知之重耳奔蒲夷吾奔屈補逸國語至於稷桑翟人出逆申生欲戰狐突諫曰不可突聞之曰國君好艾大夫殆好內適子殆社稷危若惠於父而逺於死惠於衆而利社稷其可以圖之乎况其危身於翟以起讒於內也申生曰不可君之使我非歡也抑欲測我心也是故賜我竒服而告我權又有甘言焉言之太甘其中必苦譛在中矣君故生心雖蝎譛焉避之不若戰也不戰而反我罪滋厚我戰雖死有令名焉果戰敗翟于稷桑而反讒言益起狐突杜門不出君子曰善深謀史記獻公私謂驪姬曰吾欲廢大子以奚齊代之驪姬泣曰大子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬陽譽大子而隂令人譛惡大子而欲立其子國語驪姬謂公曰吾聞申生之謀愈深日我固告君曰得衆衆弗利焉能勝翟今矜翟之善其志益廣狐突不順故不出吾聞之申生甚好信而彊又失言於衆矣雖欲有退衆將責焉言不可食衆不可弭是以深謀君若不圖難將至矣公曰吾不忘也抑未有以致罪焉驪姬告優施曰君既許我殺大子而立奚齊矣吾難里克奈何優施曰吾來里克一日而已子為我具特羊之饗吾以從之飲酒我優也言無郵驪姬許諾乃具使優施飲里克酒中飲優施起舞謂里克妻曰主孟啖我我教兹暇豫事君乃歌曰暇豫之吾吾不如鳥烏人皆集於苑已獨集於枯里克笑曰何謂苑何謂枯優施曰其母為夫人其子為君可不謂苑乎其母既死其子又有謗可不謂枯乎枯且有傷優施出里克辟奠不飱而寢夜半召優施曰曩而言戲乎抑有所聞之乎曰然君既許驪姬殺大子而立奚齊謀既成矣里克曰吾秉君以殺大子吾不忍通復故交吾不敢中立其免乎優施曰免旦而里克見丕鄭曰夫史蘇之言將及矣優施告我君謀成矣將立奚齊丕鄭曰子謂何曰吾對以中立丕鄭曰惜也不如曰不信以疏之亦固大子以攜之多為之故以變其志志少疏乃可閒也今子曰中立况固其謀彼有成矣難以得閒里克曰往言不可及且人中心唯無忌之何可敗也子將何如丕鄭曰吾無心是故事君者君為我心制不在我里克曰殺君以為亷長亷以驕心因驕以制人家吾不敢抑撓志以從君為廢人以自利也利方以求成人吾不能將伏也明日稱疾不朝三旬難乃成驪姬以君命命申生曰今夕君夢見齊姜必速祠而歸福申生許諾乃祭於曲沃歸福於絳公田驪姬受福乃置鴆於酒置堇於肉公至召申生獻公祭之地地墳申生恐而出驪姬與大肉犬斃飲小臣酒亦斃公命殺杜原欵申生奔新城杜原欵將死使小臣圉告於申生曰欵也不才寡知不敏不能教導以至於死不能深知君之心度棄寵求廣土而竄伏焉小心狷介不敢行也是以言至而無所訟之故陷於大難乃逮於讒然欵也不敢愛死惟與讒人均是惡也吾聞君子不去情不反讒讒行身死可也猶有令名焉死不遷情彊也守情說父孝也殺身以成志仁也死不忘君敬也孺子勉之死必遺愛死民之思不亦可乎申生許諾人謂申生曰非子之罪何不去乎申生曰不可去而罪釋必歸於君是惡君也章父之惡而笑諸侯吾誰鄊而入內困於父母外困於諸侯是重困也棄君去罪是逃死也吾聞之仁不惡君知不重困勇不逃死若罪不釋去而必重去而罪重不知逃死而惡君不仁有罪不死無勇去而厚惡惡不可重死不可避吾將伏以俟命驪姬見申生而哭之曰有父忍之况國人乎忍父而求好人人孰好之殺父以求利人人孰利之皆民之所惡也難以長生驪姬退申生乃雉經於新城之廟將死乃使猛足言於狐突曰申生有罪不聽伯氏以至於死申生不敢愛其死雖然吾君老矣國家多難伯氏不出奈吾君何伯氏茍出而圖吾君申生受賜以至於死雖死何悔是以諡為共君驪姬既殺大子申生又譛二公子曰重耳夷吾與知共君之事公令奄楚刺重耳重耳逃於翟令賈華刺夷吾夷吾逃於梁盡逐羣公子乃立奚齊焉始為令國無公族焉檀弓晉獻公將殺其世子申生公子重耳謂之曰子盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則盍行乎世子曰不可君謂我欲弒君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為恭世子也五年晉侯使以殺大子申生之故來告初晉侯使士蒍為二公子築蒲與屈不慎置薪焉夷吾訴之公使讓之士蒍稽首而對曰臣聞之無喪而戚憂必讐焉無戎而城讐必保焉冦讐之保又何慎焉守官廢命不敬固讐之保不忠失忠與敬何以事君詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用慎退而賦曰狐裘尨茸一國三公吾誰適從及難公使寺人披伐蒲重耳曰君父之命不校乃狥曰校者吾讐也踰垣而走披斬其袪遂出奔翟六年春晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁補逸國語葵丘之會獻公將如會遇宰周公曰君可無會也夫齊侯好示務施與力而不務德故輕致諸侯而重遣之使至者勸而畔者慕懷之以典言薄其要結而厚德之以示之信三屬諸侯存亡國三以示之施是以北伐山戎南伐楚西為此會也譬之如室既鎮其甍矣又何加焉吾聞之惠難遍也施難報也不遍不報卒於怨讎夫齊侯將施惠如出責是之不果奉而暇晉是皇雖後之會將在東矣君無懼焉其有勤也公乃還宰孔謂其御曰晉侯將死矣景霍以為城而汾河涑澮以為淵戎翟之民實環之汪是土也茍違其違誰能懼之今晉侯不量齊德之豐否不度諸侯之勢釋其閉修而輕於行道失其心矣君子失心鮮不天昏是嵗也獻公卒八年為淮之會桓公在殯宋人伐之九年秋九月晉獻公卒里克㔻鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎冬十月里克殺奚齊於次書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉補逸國語獻公卒里克將殺奚齊先告荀息曰三公子之徒將殺孺子子將如何荀息曰死吾君而殺其孤吾有死而已吾蔑從之矣里克曰子死孺子立死不亦可乎子死孺子廢焉用死哉荀息曰昔君問臣事君于我我對以忠貞君曰何謂也我對曰可以利公室力有所能無不為忠也葬死者養生者死人復生不悔生人不愧貞也吾言既往矣豈能欲行吾言而又愛吾身乎雖死焉辟之里克告丕鄭曰三公子之徒將殺孺子子將何如丕鄭曰荀息謂何對曰荀息曰死之丕鄭曰子勉之夫二國士之所圖無不遂也我為子行之子帥七輿大夫以待我我使翟以動之援秦以搖之立其薄者可以得重賂厚者可使無入國誰之國也里克曰不可克聞之夫義者利之足也貪者怨之本也廢義則利不立厚貪則怨生夫孺子豈獲罪于民將以驪姬之惑蠱君而誣國人讒羣公子而奪之利使君迷亂信而亡之殺無罪以為諸侯笑使百姓莫不有藏惡於其心中恐其如壅大川潰而不可救禦也是故將殺奚齊而立公子之在外者以定民弭憂於諸侯且為援庶幾曰諸侯義而撫之百姓欣而奉之國可以固今殺君而賴其富貪且反義貪則民怨反義則富不為賴賴富而民怨亂國而身殆懼為諸侯載不可常也丕鄭許諾于是殺奚齊卓子及驪姬而請君於秦晉郤芮使夷吾重賂秦以求入曰人實有國我何愛焉入而能民土於何有從之齊隰朋帥師會秦師納晉惠公秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讎夷吾弱不好弄能鬬不過長亦不改不識其他公謂公孫枝曰夷吾其定乎對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也補逸國語里克及丕鄭使屠岸夷告公子重耳於翟曰國亂民擾得國在亂治民在擾子盍入乎吾請為子鉥重耳告舅犯曰里克欲納我舅犯曰不可夫堅樹在始始不固本終必槁落夫長國者惟知哀樂喜怒之節是以導民不哀喪而求國難因亂以入殆以喪得國則必樂喪樂喪必哀生因亂以入則必喜亂喜亂必怠德是哀樂喜怒之節易也何以導民民不我導誰長重耳曰非喪誰代非亂誰納我舅犯曰偃也聞之喪亂有小大大喪大亂之剡也不可犯也父母死為大喪讒在兄弟為大亂今適當之是故難公子重耳出見使者曰子惠顧亡人重耳父生不得供備灑掃之臣死又不敢蒞喪以重其罪且辱大夫敢辭夫固國者在親衆而善鄰在因民而順之茍衆所利鄰國之所立大夫其從之重耳不敢違呂甥及郤稱亦使蒲城午告公子夷吾於梁曰子厚賂秦人以求入吾主子夷吾告冀芮曰呂甥欲納我冀芮曰子勉之國亂民擾大夫無常不可失也非亂何入非危何安幸茍君之子惟其索之方亂以擾孰適禦我大夫無常茍衆所置孰能弗從子盍盡國以賂外內無愛虛以求入既入而後圖聚公子夷吾出見使者再拜稽首許諾吕甥出告大夫曰君死自立則不敢久則恐諸侯之謀徑召君於外也則民各有心恐厚亂盍請君於秦乎大夫許諾乃使梁由靡告於秦穆公曰天降禍於晉國讒言繁興延及寡君使寡君之紹續昆裔隱悼播越託在草莽未有所依又重之以寡君之不祿喪亂並臻以君之靈鬼神降衷罪人克伏其辜羣臣莫敢寧處將待君命君若惠顧社稷不忘先君之好辱收其逋遷裔胄而建立之以主其祭祀且填撫其國家及其民人雖四鄰諸侯之聞之也其誰不警懼於君之威而欣喜於君之德終君之重愛受君之重况而羣臣受其大德晉國其誰非君之羣𨽻臣也秦穆公許諾反使者乃召大夫子明及公孫枝曰夫晉國之亂吾誰使先若夫二公子而立之以為朝夕之急大夫子明曰君使縶也縶敏且知禮敬以知微敏能竄謀知禮可使敬不隊命微知可不君其使之乃使公子縶弔公子重耳於翟曰寡君使縶弔公子之憂又重之以喪寡人聞之得國常於喪失國常於喪時不可失喪不可久公子其圖之重耳告舅犯舅犯曰不可亡人無親信仁以為親是故置之者不殆父死在堂而求利人孰仁我人實有之我以徼幸人孰信我不仁不信將何以長利公子重耳出見使者曰君惠弔亡臣又重有命重耳身亡父死不得與於哭泣之位又何敢有他志以辱君義再拜不稽首起而哭退而不私公子縶退弔公子夷吾于梁如弔公子重耳之命夷吾告冀芮白秦人勤我矣冀芮曰公子勉之亡人無狷潔狷潔不行重賂配德公子盡之無愛財人實有之我以徼幸不亦可乎公子夷吾出見使者再拜稽首起而不哭退而私於公子縶曰中大夫里克與我矣吾命之以汾陽之田百萬嬖大夫丕鄭與我矣吾命之以負葵之田七十萬君茍輔我蔑天命矣我必遂矣亡人茍入掃除宗廟定社稷亡人何國之與有君實有郡縣且入河外列城五豈謂君無有亦為君之東游津梁之上無有難急也亡人之所懷挾嬰瓖以望君之塵垢者黃金四十鎰白玉之珩六雙不敢當公子請納之左右公子縶反致命穆公穆公曰吾與公子重耳重耳仁再拜不稽首不沒為後也起而哭愛其父也退而不私不沒於利也公子縶曰君之言過矣君若求置晉君而載之置仁不亦可乎君若求置晉君以成名於天下則不如置不仁以滑其中且可以進退臣聞之仁有置武有置仁置德武置服是故先置公子夷吾實為惠公十年夏四月周公忌父王子黨會齊隰朋立晉侯晉侯殺里克以說將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死於是㔻鄭聘於秦且謝緩賂故不及補逸榖梁傳稱國以殺罪纍上也里克弒二君與一大夫其以纍上之辭言之何也其殺之不以其罪也其殺之不以其罪奈何里克所為弒者為重耳也夷吾曰是又將殺我乎故殺之不以其罪也其為重耳弒奈何晉獻公伐虢得麗姬獻公私之有二子長曰奚齊稚曰卓子麗姬欲為亂故謂君曰吾夜者夢夫人趨而來曰吾苦畏胡不使大夫將衛士而衛冢乎公曰孰可使曰臣莫尊於世子則世子可故君謂世子曰麗姬夢夫人趨而來曰吾苦畏女能將衛士而往衛冡乎世子曰敬諾築宫宫成麗姬又曰吾夜者夢夫人趨而來曰吾苦飢世子之宫已成則何為不使祠也故獻公謂世子曰其祠世子祠已祠致福於君君田而不在麗姬以鴆為酒藥脯以毒獻公田來麗姬曰世子以祠故致福於君君將食麗姬跪曰食自外來者不可不試也覆酒於地而地墳以脯與犬犬死麗姬下堂而啼呼曰天乎天乎國子之國也子何遲於為君君喟然嘆曰吾與女未有過切是何與我之深也使人謂世子曰爾其圖之世子之傅里克謂世子曰入自明入自明則可以生不入自明則不可以生世子曰吾君已老矣已昏矣若此而入自明明則麗姬必死麗姬死則吾君不安所以使吾君不安者吾不若自死吾寧自殺以安吾君以重耳為寄矣刎脰而死故里克所為弒者為重耳也夷吾曰是又將殺我也國語惠公入而背內外之賂輿人誦之曰佞之見佞果喪其田詐之見詐果喪其賂得國而狃終逢其咎喪田不懲禍亂其興既里丕死禍公隕於韓郭偃曰善哉夫衆口禍福之門也是以君子省衆而動監戒而謀謀度而行故無不濟內謀外度考省不倦日考而習戒備畢矣惠公既殺里克而悔之曰芮也使寡人過殺我社稷之鎮郭偃聞之曰不謀而諫者冀芮也不圖而殺者君也不謀而諫不忠不圖而殺不祥不忠受君之罰不祥罹天之禍受君之罰死僇罹天之禍無後志道者勿忘將及矣及文公入秦人殺冀芮而施之晉侯改葬共大子秋狐突適下國遇大子大子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝於韓補逸國語惠公即位出共世子而改葬之臭達於外國人誦之曰貞之無報也孰是人斯而有是臭也貞為不聽信為不誠國斯無刑偷居幸生不更厥貞大命其傾威兮懷兮各聚爾有以待所歸兮猗兮違兮心之哀兮嵗之二七其靡有微兮若翟公子吾是之依兮鎮撫國家為王妃兮郭偃曰甚哉善之難也君改葬共君以為榮也而惡滋章夫人美於中必播於外而越於民民實戴之惡亦如之故行不可不慎也必或知之十四年君之冢嗣其替乎其數告於民矣公子重耳其入乎其魄兆於民矣若入必霸諸侯以見天子其光耿於民矣數言之紀也魄意之術也光明之耀也紀言以叙之述意以導之明耀以照之不至何待欲先導者行乎將至矣㔻鄭之如秦也言於秦伯曰呂甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣冬秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及七輿大夫左行共華右行賈華叔堅騅歂纍虎特宫山祁皆里㔻之黨也㔻豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君補逸國語㔻鄭如秦謝緩賂乃謂穆公曰君厚問以召呂甥郤稱冀芮而止之以師奉公子重耳臣之屬內作晉君必出穆公使泠至報問且召三大夫鄭也與客將事冀芮曰鄭之使薄而報厚其言我於秦也必使誘我弗殺必作難是以殺丕鄭及七輿大夫共華賈華叔堅騅歂纍虎特宫山祁皆里丕之黨也丕豹出奔秦丕鄭之自秦反也而聞里克死見共華曰可以入乎共華曰二三子皆在而不及子使於秦可哉丕鄭入君殺之共賜謂共華曰子行乎其及也共華曰夫子之入吾謀也將待及賜曰孰知之共華曰不可知而背之不信謀而困人不智困而不死無勇任大惡三行將安入子其行矣我姑待死丕鄭之子曰豹出奔秦謂穆公曰晉君大失其衆背君賂殺里克而忌處者衆固不說今又殺臣之父及七輿大夫此其黨半國矣君若伐之其君必出穆公曰失衆安能殺人且夫禍惟無斃足者不處處者不足勝敗若化以禍為違孰能出君爾俟我十一年春晉侯使以㔻鄭之亂來告天王使召武公內史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世補逸國語襄王使召公過及內史過賜晉惠公命吕甥郤芮相晉侯不敬晉侯執玉卑拜不稽首內史過歸以告王曰晉不亡其君必無後且吕郤將不免王曰何故對曰長衆使民之道非精不和非忠不立非禮不順非信不行今晉侯即位而背外內之賂虐其處者棄其信也不敬王命棄其禮也施其所惡棄其忠也以惡實心棄其精也四者皆棄則逺不至而近不和矣將何以守國夫晉侯非嗣也而得其位亹亹怵惕保任戒懼猶曰未也若將廣其心而逺其鄰陵其民而卑其上將何以固守夫執玉卑替其摯也拜不稽首誣其王也替摯無鎮誣王無民夫天事恆象任重享大者必速及故晉侯誣王人亦將誣之欲替其鎮人亦將替之大臣享其祿弗諫而阿之亦必及焉襄王三年而立晉侯八年而隕於韓十六年而晉人殺懷公無胄秦人殺子金子公十三年冬晉荐饑使乞糴於秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟於晉自雍及絳相繼命之曰泛舟之役十四年秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國冬秦饑使乞糴於晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於冦不如弗與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉十五年晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉侯謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脈僨興外彊中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少於我鬬士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命韓簡退曰吾幸而得囚壬戍戰於韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使吾兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其大子必得大成晉未可滅而殺其君只以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕呂飴甥且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也衆皆哭晉於是乎作爰田呂甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說晉于是乎作州兵初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無衁也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敗于宗丘歸妹睽孤冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益詩曰下民之孽匪降自天僔沓背憎職競由人十月晉隂飴甥會秦伯盟於王城秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讎寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是我心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是嵗晉又饑秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者於是秦始征晉河東置官司焉補逸史記晉興兵將攻秦穆公發兵使丕豹將自往擊之九月壬戌與晉惠公夷吾合戰於韓地晉君棄其軍與秦爭利還而馬騺穆公與麾下馳追之不能得晉君反為晉軍所圍晉擊穆公穆公傷於是岐下食善馬者三百人馳冒晉軍晉軍解圍遂脫穆公而反生得晉君初穆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之穆公曰君子不以畜産害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見穆公窘亦皆推鋒爭死以報食馬之德於是穆公虜晉君以歸令於國齊宿吾將以晉君祠上帝周天子聞之曰晉我同姓為請晉君夷吾姊亦為穆公夫人夫人聞之乃衰絰跣曰妾兄弟不能相救以辱君命穆公曰吾得晉君以為功今天子為請夫人是憂乃與晉君盟國語公未至蛾晢謂慶鄭曰君之止子之罪也今君將來子何俟慶鄭曰鄭也聞之曰軍敗死之將止死之二者不行又重之以誤人而喪其君有大罪三將安適君若來將待刑以快君志君若不來將獨伐秦不得君必死之此所待也臣得其志而使君瞢是犯也君行犯猶失其國而况臣乎公至於絳郊聞慶鄭止使家僕徒召之曰鄭也有罪猶在乎慶鄭曰臣怨君始入而報德不降降而聽諫不戰戰而用良不敗既敗而誅又失有罪不可以封國臣是以待即刑以成君政君曰刑之慶鄭曰下有直言臣之行也上有直刑君之明也臣行君明國之利也君雖勿刑必自殺也蛾晢諫曰臣聞之奔刑之臣不若教之以報讐君盍赦之以報於秦梁由靡曰不可我能行之秦豈不能且戰不勝而報之以賊不武出戰不克入處不安不知成而反之不信失刑亂政不威出不能用入不能治敗國且殺孺子不若刑之君曰斬鄭無使自殺家僕徒曰有君不忌有臣死刑其聞賢於刑之梁由靡曰夫君政刑是以治民不聞命而擅進退犯政也快意喪君犯刑也鄭也賊而亂國不可失也且戰而自退退而自殺臣得其志君失其刑後不可用君命司馬說刑之司馬說進三軍之士而數慶鄭曰夫韓之誓曰失次犯令死將止不面夷死僞言誤衆死今鄭失次犯令而罪一也鄭擅進退而罪二也女誤梁由靡使失秦公而罪三也君親止女不面夷而罪四也鄭也就刑慶鄭曰說三軍之士皆在有人能坐待刑而不能面夷趣行事乎丁丑斬慶鄭乃入絳十七年夏晉大子圉為質於秦秦歸河東而妻之惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉二十二年秋晉大子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉大子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸二十三年九月晉惠公卒懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服己則不明而殺人以逞不亦難乎民不見德而惟戮是聞其何後之有臣士竒曰虞虢脣齒相依逼在晉之南鄙而晉獻公忮狠廣欲方有吞滅諸侯狡焉啓疆之志蓋未嘗須臾忘南牧也虢公荒虐不恤神主而徼福於淫昏之鬼屢敗狄師矜其武功不虞晉之欲寢處我也天奪其鑒矣虞公貪璧馬而忘逺圖棄忠言不恤揖豺狼以行堂奧之內而更為之先驅一之不已且再焉輕棄鄰交卒與俱斃君子觀假道之事未嘗不恨晉人之狡笑虞公之愚而利之足以敗人國家如此也獻公內夷公族外披虞虢翟柤耿霍魏次第破平而以耿賜趙夙魏賜畢萬已兆三家分晉之萌至既勝驪戎俘其美姬快心得志方且舉史蘇之爵謂其言之無驗而不知女戎之禍已芽蘖於其間禍福倚伏之機甚可畏也獻公蒸於齊姜滅同姓之國絶先祖之裔逆倫害理宜有家禍至溺牀笫之言牽帷房之愛逺申生重耳夷吾於鄙而惟妖姬姊娣之所出是崇是嬖蓋天欲奪其鑒而降以積惡之罰不然以士蒍里克之忠諫何其不敵二五與一驪姬也當臯落授命之日厖涼玦離申生之不立無愚智皆知之諸大夫鰓鰓過計惟梁餘子養死而不孝不如逃之之言最為果決罕夷曰不如違之所見亦同而士蒍為吳太伯之策皆善處人骨肉之際者也申生仁柔寡斷恭慎有餘而智慮不足昧于小杖大杖之義不能脫然逺引將兵敗敵功愈高而忌愈深留連宗邑迹愈嫌而謗愈起申生之言曰天下豈有無父之國哉不過謂逃死則父惡彰然不知死孝則父有殺子之名而所以陷父于惡者益大守株以俟斧鑕卒死新城與泉鳩同一寃痛吁為人子而不知春秋則䝉不孝之名若申生者守命恭時則有之矣以為能權則未也里克亦共世子傅也入主孟之啖怵鳥烏之說中立祈免而殺世子之計遂決荀息能為奚齊卓子死而克乃茍且全身不獨有愧於杜原欵矣至其欲立文公可謂擇主而事者而夷吾以賂得國怨里克之不與已而殺之非矣然獨惜克之不早以死徇申生也秦穆知重耳之仁而復惑於置不仁以滑其中之邪說舍重耳而立夷吾王伯之分正在於此夷吾背施辜德卒踐韓原之妖夢秦復歸之閔其凶飢而又輸之粟其誼亦厚特取其河外列城使置君義舉市利以歸有慚光偉耳懷公嗣立又殺狐突而突之死也以其子從於重耳故何以教天下之為臣子者昏悖若此宜不足以長世而傳稱惠懷無親內外棄之吁此天之所以資文公也夫左傳紀事本末卷二十四
