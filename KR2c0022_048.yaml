body:
  text: 左傳紀事本末卷四十八詹事府詹事髙士竒撰昭惠復興楚國曰公之亂王滅陳附惠定公四年初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以薦食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆埸之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出考證史記始伍員與申包胥為交員之亡也謂包胥曰我必覆楚包胥曰我必存之及吳兵入郢伍子胥求昭王既不得乃掘楚平王墓出其尸鞭之三百然後已申包胥亡於山中使人謂子胥曰子之報仇其以甚乎吾聞之人衆者勝天天定亦能破人今子故平王之臣親北面而事之今至於僇死人此豈其無天道之極乎伍子胥曰為我謝申包胥曰吾日暮途逺吾故倒行而逆施之於是申包胥走秦告急求救於秦秦不許包胥立於秦庭晝夜哭七日七夜不絶其聲秦哀公憐之曰楚雖無道有臣若是可無存乎乃遣車五百乘救楚擊吳五年申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知吳道使楚人先與吳人戰而自稷會之大敗夫槩王於沂吳人獲薳射於柏舉其子帥奔徒以從子西敗吳師於軍祥秋七月子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗奔楚為堂溪氏吳師敗楚師於雍澨秦師又敗吳師吳師居麇子期將焚之子西曰父兄親暴骨焉不能收又焚之不可子期曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰吳師敗又戰於公壻之溪吳師大敗吳子乃歸囚闉輿罷闉輿罷請先遂逃歸葉公諸梁之弟后臧從其母於吳不待而歸葉公終不正視楚子入於郢初鬭辛聞吳人之爭宫也曰吾聞之不讓則不和不和不可以逺征吳爭於楚必有亂有亂則必歸焉能定楚王之奔隨也將涉於成臼藍尹亹涉其帑不與王舟及寧王欲殺之子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡王賞鬭辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懷子西曰請舍懷也王曰大德滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求且我尤子旗其又為諸遂逃賞王將嫁季芈季芈辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹王之在隨也子西為王輿服以保路國於脾泄聞王所在而後從王王使由于城麇復命子西問高厚焉弗知子西曰不能如辭城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盜於雲中余受其戈其所猶在袒而視之背曰此余所能也脾泄之事余亦弗能也六年四月己丑吳大子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕懼亡子期又以陵師敗於繁陽令尹子西喜曰乃今可為矣於是乎遷郢於鄀而改紀其政以定楚國十四年頓子牂欲事晉背楚而絶陳好二月楚滅頓十五年吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡哀公元年春楚子圍蔡報柏舉也里而栽廣丈高倍夫屯晝夜九日如子西之素蔡人男女以辨使疆於江汝之間而還蔡於是乎請遷於吳吳之入楚也使石陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨逄滑當公而進曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莽而未見德焉天其或者正訓楚也禍之適吳其何日之有陳侯從之及夫差克越乃修先君之怨秋八月吳侵陳修舊怨也二年秋吳泄庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓冬蔡遷於州來四年春蔡昭侯將如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴夏楚人既克夷虎乃謀北方左司馬眅申公夀餘葉公諸梁致蔡於負函致方城之外於繒關曰吳將泝江入郢將奔命焉為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍於菟和右師軍於倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師於三户司馬致邑立宗焉以誘其遺民而盡俘以歸六年春吳伐陳復修舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師於城父秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾庚寅昭王攻大冥卒於城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還是歲也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由已率常可矣補逸列女傳楚昭越姬者越王句踐之女昭王燕遊蔡姬在左越姬參右王親乘駟以馳逐遂登附社之臺以望雲夢之囿觀士大夫逐者既歡乃顧謂二姬曰樂乎蔡姬對曰樂王曰吾願與子生若此死又若此蔡姬曰昔敝邑寡君固以衆黎民之役事君王之馬足故以婢子之身為苞苴玩好今乃比於妃嬪固願生俱樂死同時王顧謂史書之蔡姬許從孤死矣乃復謂越姬越姬對曰昔者我先君莊王淫樂三年不聽政事終而能改卒霸天下妾以君王為能法我先君將改斯樂而勤於政也今則不然而要婢子以死其可得乎且君王以束帛乘馬取婢子於敝邑寡君受之太廟也不約死妾聞之諸姑婦人以死彰君之善益君之寵不聞其以茍從其暗死為榮妾不敢聞命居二十五年王救陳二姬從王病在軍中有赤雲夾日如飛鳥王問周史周史曰是害王身然可移於將相將相聞之將請以身禱於神王曰將相之於孤猶股肱也今移禍焉庸為去是身乎不聽越姬曰大哉君王之德以是妾願從王矣請願先驅狐狸於地下王曰昔日之遊樂吾特戲之耳若將必死是益彰孤之不德也越姬曰昔日妾雖口不言心既許之矣妾聞之信者不負其言義者不虛設其事妾死王之義不死王之好也遂自殺王薨於軍中蔡姬竟不能死王弟子閭與子西子期謀曰母信者其子必仁乃伏師閉壁迎越姬之子熊章立是為惠王然後罷兵歸葬昭王楚昭王出遊留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符夫人曰王與宫人約令召宫人必以符今使者不持符妾不敢行使者曰今水方大至還而取符則恐後矣夫人曰貞女之義不犯約勇者不畏死妾知從使者必生留必死然棄約越義而求生不若留而死耳於是使者取符則水大至臺崩夫人流而死王曰嗟夫守義死節不為茍生處約持信以成其貞乃號之曰貞薑九年夏楚人伐陳陳即吳故也十年冬楚子期伐陳吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還補逸韓非子荆伐陳吳救之軍間三十里雨十日夜星左史倚相謂子期曰雨十日甲輯而兵聚吳人必至不如備之乃圍陳陳未成而吳人至見荆陳而反左史曰吳反復六十里其君子必休其小人必食我行三十里擊之必可敗也從之十一年夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女有餘以為已大器國人逐之故出道渴其族轅咺進稻醴粱糗腵脯焉喜曰何其給也對曰器成而具曰何不吾諌對曰懼先行十五年夏楚子西子期伐吳及桐汭陳侯使公孫貞子弔焉及良而卒將以尸入吳子使大宰嚭勞且辭曰以水潦之不時無乃廩然隕大夫之尸以重寡君之憂寡君敢辭上介芈尹蓋對曰寡君聞楚為不道薦伐吳國滅厥民人寡君使蓋備使弔君之下吏無祿使人逢天之戚大命隕隊絶世於良廢日共積一日遷次今君命逆使人曰無以尸造於門是我寡君之命委於草莽也且臣聞之曰事死如事生禮也於是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也其何以為諸侯主先民有言曰無穢虐士備使奉尸將命茍我寡君之命逹於君所雖隕於深淵則天命也非君與涉人之過也吳人內之十六年楚大子建之遇讒也自城父奔宋又辟華氏之亂於鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木請行而期焉子木暴虐於其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在吳子西欲召之葉公曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊竟使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處吳境為白公請伐鄭子西曰楚未節也不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讎不逺矣勝自厲劍子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛勝謂石乞曰王與二卿士皆五百人當之則可矣乞曰不可得也曰市南有熊宜僚者若得之可以當五百人乃從白公而見之與之言説告之故辭承之以劍不動勝曰不為利諂不為威惕不泄人言以求媚者去之吳人伐愼白公敗之請以戰備獻許之遂作亂秋七月殺子西子期於朝而劫惠王子西以袂掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死石乞曰焚庫弒王不然不濟白公曰不可弒王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡方城之外皆曰可以入矣子高曰吾聞之以險徼幸者其求無饜偏重必離聞其殺齊管修也而後入白公欲以子閭為王子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若將專利以傾王室不顧楚國有死不能遂殺之而以王如髙府石乞尹門圉公陽穴宫負王以如昭夫人之宫葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望歲焉日月以幾若見君面是得艾也民知不死其亦夫有奮心猶將旌君以徇於國而又掩面以絶民望不亦甚乎乃免胄而進遇針尹固帥其屬將與白公子高曰微二子者楚不國矣棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之生拘石乞而問白公之死焉對曰余知其死所而長者使余勿言曰不言將烹乞曰此事克則為卿不克則烹固其所也何害乃烹石乞王孫燕奔頯黃氏沈諸梁兼二事國寧乃使寧為令尹使寬為司馬而老於葉補逸國語子西使人召王孫勝沈諸梁聞之見子西曰聞子召王孫勝信乎曰然子高曰將焉用之曰吾聞之勝直而剛欲置之境子高曰不可其為人也展而不信愛而不仁詐而不知毅而不勇直而不衷周而不淑復言而不謀身展也愛而不謀長不仁也以謀蓋人詐也強忍犯義毅也直而不顧不衷也周言棄德不淑也是六德者皆有其華而不實者將焉用之彼其父為戮於楚其心又狷而不潔若其狷也不忘舊怨而不以潔悛德思報怨而已則其愛也足以得人其展也足以復之其詐也足以謀之其直也足以帥之其周也足以蓋之其不潔也足以行之而加之以不仁奉之以不義蔑不克矣夫造勝之怨者皆不在矣若來而無寵速其怒也若其寵之毅貪而無厭既而得入而曜之以大利不仁以長之思舊怨以修其心茍國有釁必不居矣非子職之其誰乎彼將思舊怨而欲大寵動而得人怨而有術若果用之害可待也余愛子與司馬故不敢不言子西曰德其忘怨乎余善之夫乃其寧子高曰不然吾聞之曰唯仁者可好也可惡也可高也可下也好之不逼惡之不怨高之不驕下之不懼不仁者則不然人好之則逼惡之則怨髙之則驕下之則懼驕有欲焉懼有惡焉欲惡怨逼所以生詐謀也子將若何若召而下之將戚而懼為之上者將怒而怨詐謀之心無所靖矣有一不義猶敗國家今一五六而必欲用之不亦難乎吾聞國家將敗必用姦人而嗜其疾味其子之謂乎夫誰無疾眚能者蚤除之舊怨滅宗國之疾眚也為之關籥蕃籬而逺備間之猶恐其至也是之為日惕若召而近之死無日矣人有言曰狼子野心怨賊之人其又可善乎若子不我信盍求若敖氏與子干子晳之族而近之安用勝也其能幾何昔齊騶馬繻以胡公入於貝水邴歜間職戕懿公於囿竹晉長魚蟜殺三郤於榭魯圉人犖殺子般於次夫是誰之故也非唯舊怨乎是皆子所聞也人之求多聞善敗以鑑戒也今子聞而棄之猶蒙耳也吾語子何益吾知逃而已子西笑曰子之尚勝也不從遂使為白公子高以疾間居於蔡及白公之亂子西子期死葉公聞之曰吾怨其棄吾言而德其治楚國楚國之能平均以復先王之業者夫子也以小怨置大德吾不義也將入殺之帥方城之外以入殺白公而定王室葬二子之族説苑石乞侍坐於屈建屈建曰白公其為亂乎石乞曰是何言也白公至於室無營所下士者三人與已相若臣者五人所與同衣食者千人白公之行若此何故為亂屈建曰此建之所謂亂也以君子行則可於國家行過禮則國家疑之且茍不難下其臣必不難高其君矣建是以知夫子將為亂也處十月白公果為亂列子白公問孔子曰人可與微言乎孔子不應白公問曰若以石投水何如孔子曰吳之善沒者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可與微言乎孔子曰何為不可唯知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至為無為夫淺知之所爭者末矣白公不得已遂死於浴堂説苑齊人有子蘭子者事白公勝勝將為難乃告子蘭子曰吾將舉大事於國願與子共之子蘭子曰我事子而與子殺君是助子之不義也畏患而去子是遁子於難也故不與子殺君以成吾義挈領於庭以遂吾行韓詩外傳楚有士曰申鳴治園以養父母孝聞於楚王召之申鳴辭不往其父曰王欲用汝何謂辭之申鳴曰何舍為子乃為臣乎其父曰使汝有祿於國有位於廷汝樂而我不憂矣我欲汝之仕也申鳴曰諾遂之朝受命楚王以為左司馬其年遇白公之亂殺令尹子西司馬子期申鳴因以兵之衛白公謂石乞曰申鳴天下勇士也今將兵為之奈何石乞曰吾聞申鳴孝子劫其父以兵使人謂申鳴曰子與我則與子楚國不與我則殺乃父申鳴流涕而應之曰始則父之子今則君之臣已不得為孝子矣安得不為忠臣乎援桴鼓之遂殺白公其父亦死焉王歸賞之申鳴曰受君之祿避君之難非忠臣也正君之法以殺其父又非孝子也行不兩全名不兩立悲夫若此而生亦何以示天下之士哉遂自刎而死詩曰進退惟谷列女傳白公死其妻紡績不嫁吳王聞其美且有行使大夫持金百鎰白璧一雙以聘焉以輜軿三十乘迎之將以為夫人白妻辭之曰白公生之時妾幸得執箕帚掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從欲者汚也見利忘死者貪也夫貪汚之人王何以為哉妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死者亦然妾既不仁不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其守節有義號曰貞姬十七年楚白公之亂陳人恃其聚而侵楚楚既寧將取陳麥楚子問帥於大師子榖與葉公諸梁子穀曰右領差車與左史老皆相令尹司馬以伐陳其可使也子高曰率賤民慢之懼不用命焉子穀曰觀丁父郡俘也武王以為軍率是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息朝陳蔡封畛於汝唯其任也何賤之有子高曰天命不諂令尹有憾於陳天若亡之其必令尹之子是與君盍舍焉臣懼右領與左史有二俘之賤而無其令德也王卜之武城尹吉使帥師取陳麥陳人御之敗遂圍陳秋七月己卯楚公孫朝帥師滅陳王與葉公枚卜子良以為令尹沈尹朱曰吉過於其志葉公曰王子而相國過將何為他日改卜子國而使為令尹補逸淮南子大宰子朱侍飯於令尹子國令尹子國啜羮而熱投巵漿而沃之明日太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百十八年巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志故命之及巴師至將卜帥王曰寧如志何卜焉使帥師而行請承王曰寢尹工尹勤先君者也三月楚公孫寧吳由于薳固敗巴師於鄾故封子國於析君子曰惠王知志夏書曰官占惟能蔽志昆命於元龜其是之謂乎志曰聖人不煩卜筮惠王其有焉補逸新序楚惠王食寒葅而得蛭因遂吞之腹有疾而不能食令尹入問曰王安得此疾也王曰我食寒葅而得蛭念譴之而不行其罪乎是法廢而威不立也非所以使國聞也譴而行其誅乎則庖宰食監法皆當死心又不忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親惟德是輔君有仁德天之所奉也病不為傷是夕也惠王之後蛭出故其久病心腹之疾皆愈天之視聽不可不察也史記惠王四十二年楚滅蔡四十四年楚滅杞與秦平是時越已滅吳而不能正江淮北楚東侵廣地至泗上簡王元年北伐滅莒臣士竒曰平王惡積楚國幾亡昭王初立不能改紀其政有申包胥沈尹戌子西子期諸臣不知用而惟囊瓦之是聽辱唐蔡二君導吳破楚辱逮先人之墓及奔走流離始增德慧藍尹涉帑之怨戒子常而貸之救陳卜戰不吉曰再敗楚師不如死乃舍其子而讓羣臣以國義聲感激卒立越章至若違周史赤鳥之占拒羣臣祭河之請孔子謂其知道可為能以晚蓋者矣其糞除宗廟逐吳師報唐蔡滅頓胡克夷虎而謀北方幾繼共莊之迹蓋亦有由哉然當時﨑嶇患難如子西之偽為輿服以保路子期之割心以盟隨忠亦至焉及其反國二人協志以靖楚繁揚之敗楚人大惕懼亡而子西乃喜曰今而可為矣於是遷國於鄀政令一新後此白公之亂沈諸梁聞子西子期死曰吾怨其棄吾言而德其治楚國楚國之能平均以復先王之業者夫子也吁不有君子其能國乎申包胥間關重繭依墻七日卒出秦師逐長蛇而踐復楚之約此其志良苦其義視子員為尤正而又能不貪其賞孤忠峻節豈直魯仲連之流亞耶惜乎文公表綿上之田勾踐鑄少伯之貌而昭王自包胥辭賞後未聞别有異數也何以勸天下之忠節乎白公父子隂狡禍賊俱就誅鋤然則子建之不立亦無足惜子西忠貞有餘智斷不足引頸揖盜可謂大愚葉公子髙始而逺害終能討賊至使國人望之如歲雖高子之感魯人何以加焉申鳴殺父雖死其尚有餘恨哉自柏舉以來昭惠相繼俱有令圖巴師至而不煩卜筮直將子國可謂有知人之明食葅吞蛭既恐廢法又恐罪及庖宰其克己順命綽有父風况有子高子國為之秉政戮力協謀故能卒縣陳蔡拓境至於泗上楚之危而復安弱而能強者實賴之於賢君也季芈以鍾建負我不憚下嫁越姬殉昭王以義不以好漸臺失符寧甘魚鱉貞姬紡績不慕吳王一時女子竒行照耀簡册不獨男子市南熊僚也國亂而偏駁之氣實産竒人亦可異哉左傳紀事本末卷四十八
