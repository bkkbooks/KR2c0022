body:
  text: 左傳紀事本末卷三詹事府詹事髙士竒撰王臣之事王朝交列國朝定靈婚齊附諸侯王併附隠公七年初戎朝於周發幣於公卿凡伯弗賔冬王使凡伯來聘還戎伐之於楚丘以歸莊公二十九年樊皮叛王三十年春王命虢公討樊皮夏四月丙辰虢公入樊執樊仲皮歸於京師僖公十年春狄滅温蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衞文公三年夏四月乙亥王叔文公卒來赴弔如同盟禮也辨誤榖梁傳曰叔服也按王子虎與叔服自是二人榖梁誤十四年春頃王崩周公閲與王孫蘇爭政故不赴凡崩薨不赴則不書禍福不告亦不書懲不敬也周公將與王孫蘇訟于晉王叛王孫蘇而使尹氏與耼啟訟周公于晉趙宣子平王室而復之十七年秋周甘歜敗戎于邥垂乗其飲酒也宣公六年夏定王使子服求后于齊冬召桓公逆王后于齊十五年王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衞卒立召襄十六年夏成周宣榭火人火之也凡火人火曰火天火曰災為毛召之難故王室復亂王孫蘇奔晉晉人復之冬晉侯使士㑹平王室定王享之原襄公相禮殽烝武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法補逸國語晉侯使隨㑹聘于周定王享之殽烝原公相禮范子私于原公曰吾聞王室之禮無毁折今此何禮也王見其語也召原公而問之原公以告王召士季曰子弗聞乎郊禘之事則有全烝王公立飫則有房烝親戚宴饗則有殽烝今女非它也而叔父使士季實來修舊德以奬王室唯是先王之宴禮欲以貽女余一人敢設飫禘焉忠非親禮而干舊職以亂前好且唯夫戎翟則有體薦夫戎翟冒没輕儳貪而不讓其血氣不治若禽獸焉其適來班貢不俟馨香嘉味故坐諸門外而使舌人體委與之女今我王室之一二兄弟以時相見將和協典禮以示民訓則無亦擇其柔嘉選其馨香潔其酒醴品其百籩修其簠簋奉其犧象出其尊彞陳其鼎豆靜其巾羃敬其祓除體解節折而共飲食之於是乎有折俎加豆酬幣宴貨以示容合好胡有子然其效戎翟也夫王公諸侯之有飫也將以講事成章建大德昭大物也故立成禮烝而已飫以顯物宴以食好嵗飫不倦時宴不淫月㑹旬修日完不忘服物昭庸采飾顯明文章比象周旋序順容貌有崇威儀有則五味實氣五色精心五聲昭德五義紀宜飲食可享和同可觀財用可嘉則順而建德古之善禮者將焉用全烝武子遂不敢對而退歸乃講聚三代之典禮於是乎修執秩以為晉法成公元年春晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎三月癸未敗績于徐吾氏秋王人來告敗十一年周公楚惡惠襄之偪也且與伯輿爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉十二年春王使以周公之難來告書曰周公出奔晉凡自周無出周公自出故也十三年春三月公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦成子受脤于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎夏成肅公卒于瑕襄公五年王使王叔陳生愬戎于晉晉人執之士魴如京師言王叔之貳于戎也十年王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以説焉不入遂處之晉侯使士匄平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄于王庭士匄聽之王叔之宰曰篳門閨竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟曰世世無失職若篳門閨竇其能來東底乎且王何賴焉今自王叔之相也政以賄成而刑放于寵官之師旅不勝其富吾能無篳門閨竇乎唯大國圖之下而無直則何謂正矣范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉不書不告也單靖公為卿士以相王室十二年靈王求后于齊齊侯問對于晏桓子桓子對曰先王之禮辭有之天子求后于諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里結之十四年王使劉定公賜齊侯命曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海王室之不壊繄伯舅是賴今余命女環茲率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命十五年官師從單靖公逆王后于齊卿不行非禮也三十年初王儋季卒其子括將見王而歎單公子愆期為靈王御士過諸廷聞其歎而言曰烏乎必有此夫人以告王且曰必殺之不慼而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也昭公七年單獻公棄親用羇冬十月辛酉襄頃之族殺獻公而立成公九年周甘人與晉閻嘉爭閻田晉梁丙張趯率隂戎伐潁王使詹桓伯辭于晉曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢隊是為豈如弁髦而因以敝之先王居檮杌于四裔以禦螭魅故允姓之姦居于𤓰州伯父惠公歸自秦而誘以來使偪我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕拔本塞原專棄謀主雖戎狄其何有余一人叔向謂宣子曰文之伯也豈能改物翼戴天子而加之以共自文以來世有衰德而暴滅宗周以宣示其侈諸侯之貳不亦宜乎且王辭直子其圖之宣子説王有姻喪使趙成如周弔且致閻田與襚反潁俘王亦使賔滑執甘大夫襄以説于晉晉人禮而歸之十一年單子㑹韓宣子于戚視下言徐叔向曰單子其將死乎朝有著定㑹有表衣有襘帶有結㑹朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事于㑹視不登帶言不過步貌不道容而言不昭矣不道不共不昭不從無守氣矣十二月單成公卒十二年周原伯絞虐其輿臣使曹逃冬十月壬申朔原輿人逐絞而立公子跪尋絞奔郊甘簡公無子立其弟過過將去成景之族成景之族賂劉獻公丙申殺甘悼公而立成公之孫鰌丁酉殺獻大子之傅庾皮之子過殺瑕辛于市及宫嬖綽王孫没劉州鳩隂忌老陽子十八年春王二月乙卯周毛得殺毛伯過而代之萇𢎞曰毛得必亡是昆吾稔之日也侈故之以而毛得以濟侈于王都不亡何待定公元年周鞏簡公棄其子弟而好逺人二年夏四月辛酉鞏氏之羣子弟賊簡公臣士竒曰人臣之于國家無委脱之事而亦無偏據之權虛公以奉國和衷以取濟則庶績咸熈而天下享無事之福周之興也周召同心而治其再振也共和相倚而亦治其東也鄭虢爭政而王室遂微自是以後覆轍相尋未有不由于大臣之水火而國勢亦隨之者也夫權者天下之大柄也偏據則必爭爭則交傷而兩敗凶于而家害于而國歴有顯徴就使其未至于甚害而以有用之精神不為國家建功樹策徒擲之蜩螗門户中甚可惜也樊皮蘇子之叛逆自取滅亡無論矣頃王方經大故而周公閲與王孫蘇者乃以爭政不行告赴之禮知有勢利而不知有大義周室幾何而不陵夷耶王黨周公而叛王孫蘇至使尹耼訟周公于晉趙簡子平王室而復之進退不能自操而仰重于霸國王靈替矣其後王孫蘇又與召氏毛氏爭政而殺召公毛伯王室復亂士㑹平之周公又與伯輿爭政怒而出王使盟之卒奔晉而不復也迨王叔陳生又與伯輿爭政王心直伯輿而不能斷至煩霸國之老坐獄于王庭而後定之則當時王臣之營私植黨莫有奉公憂國者其為衰削之由于此可見而王之贅疣亦可知矣王叔陳生之貳心于狄也不獨與伯輿忿爭為可罪也儋括之欲立王子佞夫佞夫不知而劉單諸人輒殺之是失刑也原伯絞以虐被逐甘過以欲去成景之族反為所害而原甘之族微也毛得殺毛伯過而代之其汰已甚也鞏簡公之棄子弟而用逺人與單獻公之棄親用羇其失一也而一死子弟之手一死襄頃之族何其無所忌也成子之受脤不敬與單子之視下言徐皆衰氣也劉康公知民之所由生詹桓伯伸爭田之辨愆期察詹括之歎萇𢎞識毛得之亡葢亦王臣之矯矯者而究無裨于禍敗豈所謂大厦非一木之支者耶若夫凡伯之見辱于楚丘王師之敗北于徐吾雖有邥垂之勝未足為榮晉先平戎于王而以閻田之故又率隂戎以伐潁不義甚矣吁平桓以下王室蠢蠢威福下移相傾相軋棼若亂絲而不可理也是誰之過歟左傳紀事本末卷三
