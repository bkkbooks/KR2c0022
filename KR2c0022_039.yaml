body:
  text: 左傳紀事本末卷三十九詹事府詹事髙士竒撰衛孫寗廢立成公七年衛定公惡孫林父冬孫林父出奔晉衛侯如晉晉反戚焉十四年春衛侯如晉晉侯强見孫林父焉定公不可夏衛侯既歸晉侯使郤犫送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈于亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之衛侯有疾使孔成子寗惠子立敬姒之子衎以為太子冬十月衛定公卒夫人姜氏既哭而息見太子之不哀也不内酌飲歎曰是夫也將不唯衛國之敗其必始于未亡人嗚呼天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器于衛盡寘諸戚而甚善晉大夫補逸列女傳定姜者衛定公之夫人公子之母也公子既娶而死其婦無子定姜歸其婦自送之至於野乃賦詩曰燕燕于飛差池其羽之子于歸逺送于野瞻望不及涕泣如雨送去歸泣而望之又作詩曰先君之思以朂寡人君子謂定姜為慈姑襄公七年衛孫文子來聘且拜武子之言而尋孫桓子之盟公登亦登叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂従者也衡而委蛇必折十四年衛獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿二子従之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使大師歌巧言之卒章大師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行従近闗出公使子蟜子伯子皮與孫子盟於丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒於阿澤鄄人執之初尹公佗學射於庾公差庾公差學射於公孫丁二子追公公孫丁御公子魚曰射為背師不射為戮射為禮乎射兩軥而還尹公佗曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂子鮮従公及竟公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪公使厚成叔弔於衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私於執事曰有君不弔有臣不敏君不赦宥臣亦不帥職增淫發洩其若之何衛人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺厚孫歸復命語臧武仲曰衛君其必歸乎有大叔儀以守有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲寄衛侯及其復也以郲糧歸右宰榖從而逃歸衛人將殺之辭曰余不説初矣余狐裘而羔袖乃赦之衛人立公孫剽孫林父寗殖相之以聴命於諸侯衛侯在郲臧紇如齊唁衛侯衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧孫説謂其人曰衛君必入夫二子者或輓之或推之欲無入得乎師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子葢之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有貳宗士有朋友庻人工商皂𨽻牧圉皆有親䁥以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父子兄弟以補察其政史為書瞽為詩工誦箴諫大夫規誨士傳言庶人謗商旅於市百工獻藝故夏書曰遒人以木鐸狥於路官師相規工執藝事以諌正月孟春於是乎有之諌失常也天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎冬會於戚謀定衛也十九年衛石共子卒悼子不哀孔成子曰是謂蹷其本必不有其宗二十年衛寗恵子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寗殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾恵子遂卒二十五年晉侯使魏舒宛沒逆衛侯將使衛與之夷儀崔子止其帑以求五鹿衛獻公入於夷儀衛獻公自夷儀使與寗喜言寗喜許之大叔文子聞之曰烏乎詩所謂我躬不説皇恤我後者寗子可謂不恤其後矣將可乎哉殆必不可君子之行思其終也思其復也書曰慎始而敬終終以不困詩曰夙夜匪解以事一人今寗子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉二十六年衛獻公使子鮮為復辭敬姒強命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寗喜言寗喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命於敬姒以公命與寗喜言曰茍反政由寗氏祭則寡人寗喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近闗出告右宰穀右宰穀曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以貳穀曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寛言猶夫人也若不已死無日矣悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘於齊孫襄居守二月庚寅甯喜右宰穀伐孫氏不克伯國傷甯子出舍於郊伯國死孫氏夜哭國人召寗子寗子復攻孫氏克之辛夘殺子叔及大子角書曰寗喜弑其君剽言罪之在寗氏也孫林父以戚如晉書曰入於戚以叛罪孫氏也臣之禄君實有之義則進否則奉身而退専禄以周旋戮也甲午衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已公至使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羇絏以從扞牧圉臣之罪一也有出者有居者臣不能貳通外内之言以事君臣之罪二也有二罪敢忘其死乃行從近闗出公使止之衛人侵戚東鄙孫氏愬於晉晉戍茅氏殖綽伐茅氏殺晉戍三百人孫蒯追之弗敢擊文子曰厲之不如遂從衛師敗之圉雍鉏獲殖綽復愬於晉晉人為孫氏故召諸侯將以討衛也夏中行穆子來聘召公也六月公會晉趙武宋向戍鄭良霄曹人於澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏趙武不書尊公也向戍不書後也鄭先宋不失所也於是衛侯㑹之晉人執寗喜北宫遺使女齊以先歸衛侯如晉晉人執而囚之於士弱氏秋七月齊侯鄭伯為衛侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也國子使晏平仲私於叔向曰晉君宣其明徳於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晉侯晉侯言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮晉侯乃許歸衛侯叔向曰鄭七穆罕氏其後亡者也子展儉而壹衛人歸衛姬於晉乃釋衛侯君子是以知平公之失政也二十七年衛寗喜専公患之公孫免餘請殺之公曰微寗子不及此吾與之言矣事未可知祇成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寗氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寗氏殺寗喜及右宰榖尸諸朝石惡將㑹宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟於河託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰愬乎吾不可以立於人之朝矣終身不仕公喪之如税服終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上禄亂也臣弗敢聞且寗子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不貳能贊大事君其命之乃使文子為卿補逸公羊傳衛殺其大夫寗喜則衛侯之弟鱄曷為出奔晉為殺寗喜出奔也曷為為殺寗喜出奔衛寗殖與孫林父逐衛侯而立公孫剽寗殖病將死謂喜曰黜公者非吾意也孫氏為之我即死汝能固納公乎喜曰諾寗殖死喜立為大夫使人謂獻公曰黜公者非寗氏也孫氏為之吾欲納公何如獻公曰子茍納我我請與子盟喜曰無所用盟請使公子鱄約之獻公謂公子鱄曰寗氏將納我吾欲與之盟其言曰無所用盟謂使公子鱄約之子固為我與之約矣公子鱄辭曰夫負羇縶執斧鑕從君東西南北則是臣僕庻孽之事也若夫約言為信則非臣僕庻孽之所敢與也獻公怒曰黜我者非寗氏與孫氏凡在爾公子鱄不得已而與之約已約歸至殺寗喜公子鱄挈其妻子而去之將濟於河挈其妻子而與之盟曰茍有履衛地食衛粟者昧雉彼視榖梁傳稱國以殺罪累上也寗喜弑君其以累上之辭言之何也嘗為大夫與之涉公事矣寗喜出君弑君而不以弑君之罪罪之者惡獻公也専喜之徒也専之為喜之徒何也已雖急納其兄與人之臣謀弑其君是亦弑君者也専其曰弟何也専有是信者君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛専之去合乎春秋吕氏春秋郈成子為魯聘於晉過衛右宰榖臣止而觴之陳樂而不樂酒酣而送之以璧顧反過而弗辭其僕曰鄉者右宰穀臣之觴吾子也甚懽今侯渫過而弗辭郈成子曰夫止而觴我與我懽也陳樂而不樂告我憂也酒酣而送我以璧寄之我也若由是觀之衛其有亂乎倍衛三十里聞寗喜之難作右宰穀臣死之還車而臨三舉而歸至使人迎其妻子隔宅而異之分禄而食之其子長而反其璧孔子聞之曰夫智可以微謀仁可以託財者其郈成子之謂乎二十八年衛人討寗氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也二十九年吳公子札來聘適衛自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不徳必加於戮夫子獲罪於君以在此君又在殯而可以樂乎遂去之文子聞之終身不聴琴瑟昭公七年秋八月衛襄公卒晉大夫言於范獻子曰衛事晉為睦晉不禮焉庇其賊人而取其地故諸侯貳詩曰䳭鴒在原兄弟急難又曰死喪之威兄弟孔懐兄弟之不睦於是乎不弔况逺人誰敢歸之今又不禮於衛之嗣衛必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衛弔且反戚田臣士竒曰觀定姜數衛衎之三罪與師曠荅平公逐君之説則衎之自絶於衛非獨孫寗之過也然人臣於君雖甚無道亦必竭股肱之力加之以忠貞彌縫匡救至於必不悛改而後引身以退其宗老大臣或以社稷存亡之故不能逺引亦必有道以處此矣於桐之放昌邑之廢葢不得已之權也林父聞定姜之歎即置其重器於戚而甚善晉大夫是明以戚為狡兔之窟晉為叛主之援而無一念之忠於所事矣當林父之聘魯也公登亦登見誚於叔孫穆子既不辭亦無悛容其䟦扈不臣之氣已見不至於逐君不已由是觀之豈得曰其君實甚哉况衎之奔而復入於義未絶有太叔儀以守有母弟鱄以出或撫其内或營其外鄰國之大夫皆知其必歸則衎雖無道非孫寗之所能逐矣寗殖懼惡名之在䇿沒而屬其子以反正曰若能掩之則吾子也不能猶有鬼神吾有餒而已其言可謂慘痛然不知何以處夫衛剽也衎出得罪於一君剽弑且得罪於二君舉棋之不慎雖悔於終不若審之於始使以是問殖殖仍餒而矣寗喜承易簀之言欲以晚葢仗子鮮之信徼幸於必不可信之昏主其殺身葢亦有由焉夫君之所以為君者政而已今曰政由寗氏祭則寡人是徒擁虚位耳束縛幽囚之耳奚取乎為君其言先不可信矣卒殺寗氏使子鮮抱賣友之憾竄身木門是誰之過與林父怙終稔惡竊禄叛君晉為主盟反助之焰其亦未知君父之大義哉終能反戚猶善補過者也左傳紀事本末卷三十九
