body:
  text: 左傳紀事本末卷三十六詹事府詹事高士竒撰宋公族廢興魚石之亂地子罕之賢魋華向之亂樂大心辰之亂桓之亂大尹之亂滅內附景公曹成公十五年秋八月葬宋共公於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向帶為大宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師茍獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元於河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺其大夫山言背其族也魚石向為人鱗朱向帶魚府出舍於睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之則決睢澨閉門登陴矣左師二司冦二宰遂出奔楚華元使向戍為左師老佐為司馬樂裔為司冦以靖國人十八年夏六月楚子辛鄭皇辰同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入宋人患之七月宋老佐華喜圍彭城老佐卒焉冬十一月楚子重救彭城伐宋宋華元如晉告急十二月孟獻子會於虛朾謀救宋也宋人辭諸侯而請師以圍彭城襄公元年春己亥圍宋彭城非宋地追書也於是為宋討魚石故稱宋且不登叛人也謂之宋志彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘以上魚石之亂六年宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初九年春宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戍討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯警宫二師令四鄉正敬享祝宗用馬於四墉祀盤庚於西門之外晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也十五年宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與吾皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉納此以請死也子罕置諸其里使玉人為之攻之富而後使復其所十七年宋華閲卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰臯比私有討於吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之左師為已短策茍過華臣之門必騁十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳宋皇國父為大宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執撲以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也二十九年鄭子展卒子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟宋司城子罕聞之曰鄰於善民之望也宋亦饑請於平公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無饑人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎民之歸也施而不德樂氏加焉其以宋升降乎以上子罕之賢二十六年初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉大子痤美而狠合左師畏而惡之寺人惠牆伊戾為大子內師而無寵秋楚客聘於晉過宋大子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徴之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃亨伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之發明按向戍承順風㫖以殺太子視里克猶為罪人也宜其有子向寧之禍二十九年齊高子容與宋司徒見知伯女齊相禮賓出司馬侯言於知伯曰二子皆將不免子容専司徒侈皆亡家之主也知伯曰何如對曰專則速及侈將以其力斃專則人實斃之將及矣昭公六年宋寺人柳有寵大子佐惡之華合比曰我殺之柳聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟於北郭矣公使視之有焉遂逐華合比合比奔衛於是華亥欲代右師乃與寺人柳比從為之徴曰聞之久矣公使代之見於左師左師曰女夫也必亡女喪而宗室於人何有人亦於女何有詩曰宗子維城毋俾城壞毋獨斯畏女其畏哉十年冬十二月宋平公卒初元公惡寺人柳欲殺之及喪柳熾炭於位將至則去之比葬又有寵十二年夏宋華定來聘通嗣君也公享之為賦蓼蕭弗知又不答賦昭子曰必亡宴語之不懷寵光之不宣令德之不知同福之不受將何以在二十年春王二月己丑日南至梓慎望氛曰今茲宋有亂國幾亡三年而後弭蔡有大喪叔孫昭子曰然則戴桓也汰侈無禮已甚亂所生也宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥僞有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廪公如華氏請焉弗許遂劫之癸卯取太子欒與母弟辰公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質宋華向之亂公子城公孫忌樂舍司馬彊向宜向鄭楚建郳甲出奔鄭其徒與華氏戰於鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司冦牼以歸曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所二十一年宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人亟言之公曰司馬以吾故亡其良子死亡有命吾不可以再亡之對曰君若愛司馬則如亡死如可逃何逺之有公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬司馬嘆曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐尤之曰必有故使子皮承宜僚以劍而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐衍華牼禦諸橫華氏居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之冬十月華登以吳師救華氏齊烏枝鳴戍宋㕑人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師於鴻口獲其二帥公子苦􅀈偃州員華登帥其餘以敗宋師公欲出㕑人濮曰吾小人可藉死而不能送亡君請待之乃狥曰揚徽者公徒也衆從之公自楊門見之下而巡之曰國亡君死二三子之恥也豈專孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒從之華氏北復即之㕑人濮以裳裹首而荷以走曰得華登矣遂敗華氏於新里翟僂新居於新里既戰說甲於公而歸華姓居於公里亦如之十一月癸未公子城以晉師至曹翰胡會晉荀吳齊苑何忌衛公子朝救宋丙戍與華氏戰於赭丘鄭翩願為鸛其御願為鵝子祿御公子城莊堇為右干犫御吕封人華豹張丐為右相遇城還華豹曰城也城怒而反之將注豹則關矣曰平公之靈尚輔相余豹射出其間將注則又關矣曰不狎鄙抽矢城射之殪張丐抽殳而下射之折股扶伏而擊之折軫又射之死干犫請一矢城曰余言女於君對曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我迋不幸而後亡使華登如楚乞師華貙以車十五乘徒七十人犯師而出食於睢上哭而送之乃復入楚薳越帥師將逆華氏大宰犯諫曰諸侯唯宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣二十二年楚薳越使告於宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不𠂻以奬亂人孤之望也唯君圖之楚人患之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚宋公使公孫忌為大司馬邊卭為大司徒樂祁為司城仲幾為左師樂大心為右師樂挽為大司冦以靖國人以上華向之亂二十五年春叔孫婼聘於宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡夏會於黃父趙簡子令諸侯之大夫輸王粟宋樂大心曰我不輸粟我於周為客若之何使客士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉十一月宋元公將為公故如晉夢大子欒即位於廟已與平公服而相之旦召六卿公曰寡人不佞不能事父兄以為二三子憂寡人之罪也若以羣子之靈獲保首領以歿唯是楄柎所以藉幹者請無及先君仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死君命祗辱宋公遂行己亥卒於曲棘二十六年葬宋元公如先君禮也定公九年宋公使樂大心盟於晉且逆樂祁之尸辭僞有疾乃使向巢如晉盟且逆子梁之尸子明謂桐門右師出曰吾猶衰絰而子擊鐘何也右師曰喪不在此故也既而告人曰已衰絰而生子余何故舍鐘子明聞之怒言於公曰右師將不利戴氏不肯適晉將作亂也不然無疾乃逐桐門右師十年宋公子地嬖蘧富獵十一分其室而以其五與之公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子公子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也吾以國人出君誰與處冬母弟辰暨仲他石彄出奔陳十一年春宋公母弟辰暨仲他石彄公子地入於蕭以叛秋樂大心從之大為宋患以上樂大心辰地之亂十五年鄭罕達敗宋師於老丘齊侯衛侯次於蘧拿謀救宋也哀公七年宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋初曹人或夢衆君子立於社宫而謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白雁獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政夢者之子乃行彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘八年宋公伐曹將還褚師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之以上景公滅曹十二年宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕達救嵒丙申圍宋師十四年宋向魋救其師鄭子賸使狥曰得桓魋者有賞魋也逃歸遂取宋師於嵒獲成歡郜延以六邑為虛十一年衛大叔疾奔宋臣向魋納美珠焉宋公求之魋不與由是得罪十四年宋桓魋之寵害於公公使夫人驟請享焉而將討之未及魋先謀公請以鞍易薄公曰不可薄宗邑也乃益鞍七邑而請享公焉以日中為期家備盡往公知之告皇野曰余長魋也今將禍余請即救司馬子仲曰有臣不順神之所惡也而况人乎敢不承命不得左師不可請以君命召之左師每食擊鐘聞鐘聲公曰夫子將食既食又奏公曰可矣以乘車往曰迹人來告曰逢澤有介麋焉公曰雖魋未來得左師吾與之田若何君憚告子野曰嘗私焉君欲速故以乘車逆子與之乘至公告之故拜不能起司馬曰君與之言公曰所難子者上有天下有先君對曰魋之不共宋之禍也敢不唯命是聽司馬請瑞焉以命其徒攻桓氏其父兄故臣曰不可其新臣曰從吾君之命遂攻之子頎騁而告桓司馬司馬欲入子車止之曰不能事君而又伐國民不與也秪取死焉向魋遂入於曹以叛六月使左師巢伐之欲質大夫以入焉不能亦入於曹取質魋曰不可既不能事君又得罪於民將若之何乃舍之民遂叛之向魋奔衛向巢來奔宋公使止之曰寡人與子有言矣不可以絶向氏之祀辭曰臣之罪大盡滅桓氏可也若以先臣之故而使有後君之惠也若臣則不可以入矣司馬牛致其邑與圭焉而適齊向魋出於衛地公文氏攻之求夏后氏之璜焉與之他玉而奔齊陳成子使為次卿司馬牛又致其邑焉而適吳吳人惡之而反趙簡子召之陳成子亦召之卒於魯郭門之外坑氏葬諸丘輿以上桓魋之亂十七年宋皇瑗之子麇有友曰田丙而奪其兄酁般邑以與之酁般愠而行告桓司馬之臣子儀克子儀克適宋告夫人曰麇將納桓氏公問諸子仲初子仲將以杞姒之子非我為子麇曰必立伯也是良材子仲怒弗從故對曰右師則老矣不識麇也公執之皇瑗奔晉召之十八年春宋殺皇瑗公聞其情復皇氏之族使皇緩為右師二十六年宋景公無子取公孫周之子得與啓畜諸公宫未有立焉於是皇緩為右師皇非我為大司馬皇懷為司徒靈不緩為左師樂茷為司城樂朱鉏為大司冦六卿三族降聽政因大尹以達大尹常不告而以其欲稱君命以令國人惡之司城欲去大尹左師曰縱之使盈其罪重而無基能無敝乎冬十月公游於空澤辛巳卒於連中大尹興空澤之士千甲奉公自空桐入如沃宫使召六子曰聞下有師君請六子畫六子至以甲劫之曰君有疾病請二三子盟乃盟於少寢之庭曰無為公室不利大尹立啓奉喪殯於大宫三日而後國人知之司城茷使宣言於國曰大尹惑蠱其君而専其利今君無疾而死死又匿之是無他矣大尹之罪也得夢啓北首而寢於盧門之外已為烏而集於其上咮加於南門尾加於桐門曰余夢美必立大尹謀曰我不在盟無乃逐我復盟之乎使祝為載書六子在唐盂將盟之祝襄以載書告皇非我皇非我因子潞門尹得左師謀曰民與我逐之乎皆歸授甲使狥於國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之大尹狥曰戴氏皇氏將不利公室與我者無憂不富衆曰無别戴氏皇氏欲伐公樂得曰不可彼以陵公有罪我伐公則甚焉使國人施於大尹大尹奉啓以奔楚乃立得司城為上卿盟曰三族共政無相害也以上大尹之亂考異按史記景公卒宋公子特攻殺太子而自立是為昭公昭公者元公之曾庶孫也昭公父公孫紏紏父公子褍秦褍秦即元公少子也景公殺昭公父紏故昭公怨殺太子而自立此與傳大同小異但謂昭公自立則非也臣士竒曰魚石之難始於蕩澤之弱公室殺公子肥也華元如晉請討而魚府與石乃止華元於河上至五大夫出亡華元親止之斯亦善矣既而決澨登陴又惟恐其入者不知何見夫討亂者誅止首惡並其族而逐之不已過乎遂使盜據彭城置瓠丘而後定所謂人而不仁疾之已甚者也華弱與樂轡少相親而長相怨轡以弓梏弱於朝曲在轡矣乃舍轡而逐弱失刑已甚不獨同罪異罰如子罕所云也而樂轡怨懟反射子罕之門子罕容而善之懦矣華臣弱臯比之室賊殺無辜干國之紀左師復為含蓋其失則均不有瘈狗將遂無法乎若夫獻玉而以不貪為寶聞謳而以執撲分謗慕義而使宋無飢人子罕之賢亦不可沒罕氏後亡有以也夫苪司徒之女妖同褒姒卒生龍蛇以禍宋伊戾之殺子痤其計甚憯合左師不能洗湔其寃而承風㫖以助之平公昏瞢誤聽雖悔於終何補歸來望思之痛乎元公復不懲前車而以熾炭殷勤又寵閹柳可畏哉寺人之能惑溺人主也至無信多私而君臣劫質國亂甚矣復聽多僚之譖使子皮憤怒劫司馬而召亡人於是華亥向寧華定之徒入於南里以叛與宋分國而居向非齊晉明鷹鸇之義楚總其罪人以臨之宋之亡可翹足而待也幸而叛人出走腹心之患除而公室之枝葉亦幾盡梓慎之占不信而有徴乎桐門右師與叔孫婼語而卑宋大夫知其必亡黃父之役不具王粟及使修盟伯國又以疾不行其見逐也自取焉爾公子地嬖蘧富獵十一分其室而以其五與之公取其白馬以與嬖魋地復使其徒抶魋而奪之誠為不恕宋公亦不能盡親愛之道而使地奔於異國子辰為之請而不聽亦鋌險焉入蕭以叛右師因而從之宋於是凡三有叛臣之禍及平元之族自蕭奔鄭向巢取錫而殺之則皆寵魋之為也而魋又以寵害於公公將圖之又入於曹以叛凶人為害可不戒乎其初以朱鬛結歡其後以美珠召亂禍皆起於多欲也大尹矯遺命以行廢置强盟六卿自取奔北於是司城為上卿盟曰三族共政無相害也其亦有懲於戴桓華向之自相殘賊而有悔心歟噫嘻晚矣左傳紀事本末卷三十六
