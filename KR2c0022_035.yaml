body:
  text: 左傳紀事本末卷三十五詹事府詹事髙士竒撰宋襄公圖伯僖公八年冬宋公疾太子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退攷異説苑以目夷為後妻子夫兹父固為太子而曰目夷長則非後妻子明矣九年春宋桓公卒未𦵏而襄公會諸侯故曰子凡在喪王曰小童公侯曰子冬宋襄公即位以公子目夷為仁使為左師以聴政於是宋治故魚氏世為左師發明目夷之後十世猶當宥之後此華元之於魚石情亦恝矣補逸禮記宋襄公𦵏其夫人醯醢百甕曾子曰既曰明器矣而又實之十五年冬宋人伐曹討舊怨也十六年春隕石於宋五隕星也六鷁退飛過宋都風也周内史叔興聘於宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大喪明年齊有亂君將得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所生也吉凶由人吾不敢逆君故也十七年齊桓公與管仲屬孝公於宋襄公以為大子冬桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十八年春宋襄公以諸侯伐齊鄭伯始朝於楚楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鐘夏五月宋敗齊師於甗立孝公而還十九年春宋人執滕宣公宋公曹人邾人盟於曹南鄫子㑹盟於邾夏宋公使邾文公用鄫子於次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄徳今一㑹而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸秋宋人圍曹討不服也子魚言於宋公曰文王聞崇徳亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御於家邦今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動陳穆公請修好於諸侯以無忘齊桓之徳冬盟於齊修桓公之好也二十年冬宋襄公欲合諸侯臧文仲聞之曰以欲従人則可以人従欲鮮濟二十一年春宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國争盟禍也宋其亡乎幸而後敗秋諸侯㑹宋公於盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬㑹於薄以釋之子魚曰禍猶未也未足以懲君補逸公羊傳此楚子也其稱人何貶曷為貶為執宋公貶曷為為執宋公貶宋公與楚子期以乗車之㑹公子目夷諌曰楚夷國也強而無義請君以兵車之㑹往宋公曰不可吾與之約以乗車之㑹自我為之自我隳之曰不可終以乗車之㑹往楚人果伏兵車執宋公以伐宋宋公謂公子目夷曰子歸守國矣國子之國也吾不従子之言以至於此公子目夷復曰君雖不言國國固臣之國也於是歸設守械而守國楚人謂宋人曰子不與吾國吾將殺子君矣宋人應之曰吾賴社稷之神靈吾國已有君矣楚人知雖殺宋公猶不得宋國於是釋宋公宋公釋乎執走之衛公子目夷復曰國為君守之君曷為不入然後逆襄公歸惡乎捷捷乎宋曷為不言捷乎宋為襄公諱也此圍辭也曷為不言其圍為公子目夷諱也執未有言釋之者此其言釋之何公與為爾也公與為爾奈何公與議爾也二十二年春三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣秋楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已弗聴冬十一月己巳朔宋公及楚人戰於泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也二十三年春齊侯伐宋圍緡以討其不與盟於齊也夏五月宋襄公卒傷於泓故也補逸史記襄公之時修行仁義欲為盟主其大夫正考父美之故追道契湯髙宗殷所以興作商頌襄公既敗於泓而君子或以為多傷中國闕禮義褒之也宋襄之有禮讓也二十四年秋宋及楚平宋成公如楚還入於鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有喪拜焉豐厚可也鄭伯従之享宋公有加禮也臣士竒曰宋襄公以亡國之餘起而圖伯葢迹齊桓而為之者也首用兵於齊假置君之義其意以為伯國既款而宇下諸侯亦不待痛而服矣夫齊桓之所以成伯非定襄王之位與葵丘之申五禁乎孝公雖桓之所屬而無虧長衛姬之所出也兄弟之序甚明乃遽伐齊喪奉少奪長致無虧不得其死亂上下之分長篡弑之階其何以為天下盟主哉至兵威所及尚不能服一曹而欲與楚爭伯星隕鷁飛天變見於上目夷深憂逺慮人事著於下鹿上執辱可為明戒而又伐鄭以挑楚怒兵敗身傷踰年竟卒甚矣哉宋襄之愚也至泓之敗或以其不従司馬之言不扼楚於險不忍重傷與二毛而宋襄亦至死無悔謂其能行仁義之師不幸而敗吁宋襄其誰欺乎夫禍莫憯於殘人之骨内而以國君為芻狗無虧之殺鄫子之用以視重傷與二毛孰大逆天害理之事宋襄敢行之而故飾虚名以取實禍此所謂婦人之仁也以是圖伯不亦難乎若夫欲速見小亟於合諸侯而昩長駕逺馭之大略先儒於曹南傳已暢言之而不知其失算尤在伐齊置孝公之始左傳紀事本末卷三十五
