body:
  text: 左傳紀事本末卷二十七詹事府詹事髙士竒撰晉景楚共爭霸厲公鄢陵之戰附宣公十三年春齊師伐莒莒恃晉而不事齊也十七年春晉侯使郤克徵會于齊齊頃公帷婦人使觀之郤子登婦人笑于房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使髙固晏弱蔡朝南郭偃會及斂盂髙固逃歸夏會于斷道討二也盟于卷楚辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于溫苗賁皇使見晏桓子歸言于晉侯曰夫晏子何罪昔者諸侯之事我先君皆如不逮舉言羣臣不信諸侯皆有二志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故髙子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而來吾若善逆彼以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又久之以成其悔何利之有焉使反者得辭而害來者以懼諸侯將焉用之晉人緩之逸補逸穀梁傳季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘于齊齊使秃者御秃者使眇者御眇者使跛者御跛者使僂者御僂者蕭同姪子處臺上而笑之聞于客客不悅而去相與立胥閭而語移日不解齊人有知之者曰齊之患必自此始矣秋八月晉師還范武子將老召文子曰燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以已亂也弗已者必益之卻子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子唯敬乃請老郤獻子為政十八年春晉侯衛太子臧伐齊至于陽穀齊侯會晉侯盟于繒以公子疆為質于晉晉師還蔡朝南郭偃逃歸夏公使如楚乞師欲以伐齊楚莊王卒楚師不出既而用晉師楚於是乎有蜀之役成公元年春為齊難故作丘甲聞齊將出楚師夏盟于赤棘冬臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞二年春齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也夏有石成子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居新築人仲叔于奚救孫桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑惟器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已孫桓子還于新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乘許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師會之及衛地韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也師從齊師于莘六月壬申師至于靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也齊髙固入晉師桀石以投人禽之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇癸酉師陳於鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥夢子輿謂已曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越於車下射其右斃於車中綦毋張喪車從韓厥曰請寓乘從左右皆肘之使立於後韓厥俯定其右逢丑父與公易位將及華泉驂絓於木而止丑父寢於轏中蛇出於其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出每出齊師以帥退入於狄卒狄卒皆抽戈楯冒之以入於衛師衛師免之遂自徐關入齊侯見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也豫之石􅐎晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹德而濟同欲焉五伯之霸也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是遒子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許讐我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿以為魯衛請若茍有以藉口而復於寡君君之惠也敢不惟命是聽禽鄭自師逆公秋七月晉師及齊國佐盟於爰婁使齊人歸我汶陽之田公會晉師於上鄍賜三帥先路三命之服司馬司空輿師候正亞旅皆受一命之服九月衛穆公卒晉三子自役弔焉哭於大門之外衛人逆之婦人哭於門內送亦如之遂常以葬晉師歸范文子後入武子曰無為我望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉宣公使求好於楚莊王卒宣公薨不克作好公即位受盟於晉會晉伐齊衛人不行使於楚而亦受盟於晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧夫文王猶用衆况吾儕乎且先君莊王屬之曰無德以及逺方莫如惠恤其民而善用之乃大户已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆強冠之冬楚師侵衛遂侵我師於蜀使臧孫往辭曰楚逺而久固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斫執針織紝皆百人公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟於蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯况其下乎詩曰不解於位民之攸塈其是之謂矣楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以棄魯國國將若之何誰居後之人必有任是夫國棄矣是行也晉辟楚畏其衆也君子曰衆之不可以已也大夫為政猶以衆克况明君而善用其衆乎大誓所謂商兆民離周十人同者衆也晉侯使鞏朔獻齊捷於周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功於齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又姦先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍三年春諸侯伐鄭次於伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戍如楚獻捷夏公如晉拜汶陽之田許恃楚而不事鄭鄭子良伐許秋叔孫僑如圍棘取汶陽之田棘不服故圍之冬十一月晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛禮也十二月齊侯朝於晉將授玉郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也補逸國語靡笄之役也郤獻子伐齊齊侯來獻之以得隕命之禮曰寡君使克也不腆敝邑之禮為君之辱敢歸諸下執政以憖御人苗棼皇曰郤子勇而不知禮矜其伐而恥國君其與幾何四年夏公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎秋公至自晉欲求成於楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書將中軍荀首佐之士燮佐上軍以救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成五年夏許靈公訴鄭伯於楚六月鄭悼公如楚訟不勝楚人執皇戍及子國故鄭伯歸使公子偃請成於晉秋八月鄭伯及晉趙同盟於垂棘宋公子圍龜為質於楚而歸華元享之請鼓譟以出鼓譟以復入曰習攻華氏宋公殺之冬同盟於蟲牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難六年春鄭伯如晉拜成子遊相授玉於東楹之東士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久二月季文子以鞍之功立武宫非禮也聽於人以救其難不可以立武立武由已非由人也三月晉伯宗夏陽説衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋以其辭會也師於針衛人不保説欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛惟信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人登陴六月鄭悼公卒子叔聲伯如晉命伐宋秋孟獻子叔孫宣伯侵宋晉命也楚子重伐鄭鄭從晉故也冬季文子如晉賀遷也晉欒書救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌於民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎七年春鄭子良相成公以如晉見且拜師秋楚子重伐鄭師於汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉八月同盟於馬陵尋蟲牢之盟且莒服故也晉人以鍾儀歸囚諸軍府八年春晉侯使韓穿來言汶陽之田歸之於齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之晉欒書侵蔡遂侵楚獲申驪楚師之還也晉侵沈獲沈子揖初從知范韓也君子曰從善如流宜哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣是行也鄭伯將會晉師門於許東門大獲焉秋晉侯使申公巫臣如吳假道於莒與渠丘公立於池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎九年春為歸汶陽之田故諸侯二於晉晉人懼會於蒲以尋馬陵之盟季文子謂范文子曰德則不競尋盟何為范文子曰勤以撫之寬以待之堅強以御之明神以要之柔服而伐二德之次也是行也將始會吳吳人不至楚人以重賂求鄭鄭伯會楚子成於鄧秋鄭伯如晉晉人討其二於楚也執諸銅鞮欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭晉侯觀於軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰泠人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝於嬰齊而夕於側也不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公從之重為之禮使歸求成冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫詩曰雖有絲麻無棄菅蒯雖有姬薑無棄蕉萃凡百君子莫不代匱言備之不可以已也秦人白狄伐晉諸侯二故也鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君十二月楚子使公子辰如晉報鍾儀之使請修好結成十年春晉侯使糴茷如楚報大宰子商之使也衛子叔黑背侵鄭晉命也鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立大子州蒲以為君而會諸侯伐鄭鄭子罕賂以襄鍾子然盟於修澤子駟為質辛巳鄭伯歸鄭伯討立君者戊申殺叔申叔禽君子曰忠為令德非其人猶不可况不令乎夏六月丙午晉侯獳卒秋公如晉晉人止公使送葬於是糴茷未反冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也十一年春王三月公至自晉晉人以公為二於楚故止公公請受盟而後使歸郤犫來聘且涖盟夏季文子如晉報聘且涖盟也秋宣伯聘於齊以修前好宋華元善於令尹子重又善於欒武子聞楚人既許晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成十二年春宋華元克合晉楚之成夏五月晉士燮會楚公子罷許偃癸亥盟於宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討其不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成會於瑣澤成故也狄人間宋之盟以侵晉而不設備秋晉人敗敵於交剛冬晉郤至如楚聘且涖盟楚子享之子反相為地室而縣焉郤至將登金奏作於下驚而走出子反曰日云莫矣寡君須矣吾子其入也賔曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂寡君須矣吾子其入也賔曰若讓之以一矢禍之大者其何福之為世之治也諸侯間於天子之事則相朝也於是乎有享宴之禮享以訓共儉宴以示慈惠共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰赳赳武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為已腹心股肱爪牙故詩曰赳赳武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫冬楚公子罷如晉聘且涖盟十二月晉侯及楚公子罷盟於赤棘十三年六月丁卯夜鄭公子班自訾求入於大宫不能殺子印子羽反軍於市己巳子駟帥國人盟於大宫遂從而盡焚之殺子如子駹孫叔孫知十五年春會於戚討曹成公也夏楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰十六年春楚子自武城使公子成以汝隂之田求成於鄭鄭叛晉子駟從楚子盟於武城夏四月鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍於夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也衛侯伐鄭至於鳴雁為晉故也晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之郤錡將上軍荀偃佐之韓厥將下軍郤至佐新軍荀罃居守郤犫如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣戊寅晉師起鄭人聞有晉師使告於楚姚句耳與往楚子救鄭司馬將中軍令尹將左右尹子辛將右過申子反入見申叔時曰師其何如對曰德刑詳義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦厖和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民而外絶其好瀆齊盟而食話言姦時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之我不復見子矣姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚懼不可用也五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇於鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆強不盡力子孫將弱今三強服矣敵楚而已唯聖人能外內無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范丐趨進曰塞井夷竈陳於軍中而疏行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加囂各顧其後莫有鬭心舊不必良以犯天忌我必克之楚子登巢車以望晉軍子重使太宰伯州犂侍於王後王曰騁而左右何也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰虔卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也戰乎曰未可知也乘而左右皆下矣曰戰禱也伯州犂以公卒告王苗賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公筮之史曰吉其卦遇復曰南國蹙射其元王中厥目國蹙王傷不敗何待公從之有淖於前乃皆左右相違於淖步毅御晉厲公欒針為右彭名御楚共王潘黨為右石首遇鄭成公唐茍為右欒范以其族夾公行陷於淖欒書將載晉侯針曰書退國有大任焉得專之且侵官冒也失官慢也離局姦也有三罪焉不可犯也乃掀公以出於淖癸巳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝吕錡夢射月中之退入於泥占之曰姬姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射共王中目王召養由基與之兩矢使射吕錡中項伏韜以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗注君子也識見不榖而趨無乃傷乎郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間蒙甲胄不敢拜命敢告不寧君命之辱為事之故敢肅使者三肅使者而退晉韓厥從鄭伯其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止郤至從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下郤至曰傷國君有刑亦止石首曰衛懿公唯不去其旗是以敗於熒乃內旌於韜中唐茍謂石首曰子在君側敗者一大我不如子子以君免我請止乃死楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷欒針見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇請攝飲焉公許之使行人執榼承飲造於子重曰寡君乏使使針御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎受而飲之免使者而復鼓旦而戰見星未已子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀穀陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有德之謂楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒戰之日齊國佐髙無咎至於師衛侯出於衛公出於壞隤補逸國語鄢陵之役晉伐鄭荆救之欒武子將上軍范文子將下軍欒武子欲戰范文子不欲曰吾聞之唯厚德者能受多福無德而服者衆必自傷也稱晉之德諸侯皆叛國可以少安唯有諸侯故擾擾焉凡諸侯難之本也且唯聖人能無外患又無內憂距非聖人不有外患必有內憂盍姑釋荆與鄭以為外患乎諸臣之內相與必將輯睦今我戰又勝荆與鄭吾君將伐知而多力怠教而重斂大其私昵而益婦人田不奪諸大夫田則焉取以益此諸臣之委室而徒退者將與幾人戰若不勝則晉國之福也戰若勝亂地之秩者也其産將害大盍姑無戰乎欒武子曰昔韓之役惠公不復舍邲之役三軍不振旅箕之役先軫不復命晉國固有大恥三今我任晉國之政不損晉恥又以違蠻夷以重之雖有患非吾所知也范文子曰擇福莫若重擇禍莫若輕福無所用輕禍無所用重晉國固有大恥與其君臣不相聽以為諸侯笑也盍姑以違蠻夷為恥乎欒武子不聽遂與荆人戰於鄢陵大勝之於是乎君伐知而多力怠教而重斂大其私昵殺三郤而尸諸朝納其室以分婦人於是乎國人弗蠲遂殺諸翼葬之翼東門之外以車一乘厲公之所以死者唯無德而功烈多服者衆也厲公六年伐鄭且使苦成叔及欒黶興齊魯之師楚共王帥東夷救鄭楚半陳公令擊之欒書曰君使黶也興齊魯之師請俟之郤至曰不可楚師將退我擊之必以勝歸夫陳不違忌一間也夫南夷與楚來而弗與陳二間也夫楚與鄭陳而不與整三間也且其士卒在陳而譁四間也夫衆聞譁則必懼五間也鄭將顧楚楚將顧夷莫有鬭心不可失也公説於是敗楚師於鄢陵欒書是以怨郤至韓非子昔者楚共王與晉厲公戰於鄢陵楚師敗而共王傷其目酣戰之時司馬子反渴而求飲豎穀陽操觴酒而進之子反曰嘻退酒也豎穀陽曰非酒也子反受而飲之子反之為人也嗜酒而甘之弗能絶於口而醉戰既罷共王欲復戰令人召司馬子反司馬子反辭以心疾共王駕而往視之入幄中聞酒臭而還曰今日之戰不穀親傷所恃者司馬也而司馬又醉如此是亡楚國之社稷而不恤吾衆也不榖無復戰矣於是還師而去斬司馬子反以為大戮故豎穀陽之進酒不以讎子反也其心忠愛之而適足以殺之故曰行小忠則大忠之賊也秋會於沙隨謀伐鄭也七月公會尹武公及諸侯伐鄭諸侯之師次於鄭西我師次於督揚不敢過鄭諸侯遷於制田知武子佐下軍以諸侯之師侵陳至於鳴鹿遂侵蔡未反諸侯遷於潁上戊午鄭子罕宵軍之宋齊衛皆失軍冬晉侯使郤至獻楚捷於周十七年春王正月鄭子駟侵晉虛滑衛北宫括救晉侵鄭至於髙氏夏五月鄭大子髠頑侯獳為質於楚楚公子成公子寅戌鄭公會尹武公單襄公及諸侯伐鄭自戲童至於曲洧乙酉同盟於柯陵尋戚之盟也楚子重救鄭師於首止諸侯還冬諸侯伐鄭十月庚午圍鄭楚公子申救鄭師於汝上十一月諸侯還十八年晉弒其君州蒲襄公十三年夏楚子疾告大夫曰不穀不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師於鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之臣士竒曰晉伯至景厲而愈微矣郤克徵會於齊頃公帷婦人以觀彼自失禮耳為一笑之怒取必於其君屬甲八百乘不用之誅暴禁亂而以泄睚眥之怨范武子復為請老授之以政以逞其志一戰綿地五百里焚雍門之茨侵車東至海及其請成又不以德命東封質母鄙悖已甚義不足以服人而隂使魯衛為之辭茍且乞盟又以其所獲誇示周室致來誚讓尚得為伯討哉楚為陽橋之役以救齊遂侵魯師於蜀孟孫納賂公衡出質勢亦棘矣楚則跛踦盡行晉亦衆倍城濮之賦未見其不敵也不能少待以迎楚之鋒而擊之為東諸侯捍患致使宗邦屈辱於蠻庭而蜀之盟蔡許秦宋陳衛鄭齊諸國儼然戴嬰齊以為從約長蔡伯許男失位而乘楚車鞍之戰所以挑楚怒而速諸姬之禍也奄然誇戰勝受三命之賞不亦誣乎至若晉既勝齊命反諸侯之侵地汶陽歸魯魯君實勞玉趾親拜嘉惠弗可改也已復有韓穿之二命俾歸諸齊七年之內反覆如掌自是諸侯解體共不直晉蒲之口血奚益乎惟桑隧旋師戒心遷戮庸韓范之老謀收從善之勝算獲申驪止沈揖一時所以制敵者差強人意而晉復使申公巫臣如吳以謀楚益見其患楚深而楚勢張矣然楚以重賂求鄭鄭不擇音而請成於楚曷亦修德待時以柔之可也銅鞮之執何為者執君不已又伐其國又戮其使不已甚乎秦狄交伐而諸侯皆二職此之由景公既卒厲公嗣立追鍾儀之夙約合華元之好成西門之壇未掃南冠之詛益甚及至鄢陵幸勝志盈氣驕外患寧而內憂作諸侯離叛曽莫能訓定首止汝上之間紛紛多故然後知范文子釋楚外懼之言炳如龜蓍也厲之侈虐百不如共有一范文子而不能用此伯業所以中微也歟左傳紀事本末卷二十七
