body:
  text: 左傳紀事本末卷十九詹事府詹事高士竒撰齊五公子爭立僖公二年齊寺人貂始漏師於多魚十七年齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好內多內寵內嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋補逸韓非子人有設桓公隱者曰一難二難三難何也桓公不能對以告管仲管仲對曰一難近優而逺士二難也去其國而數之海三難也君老而晚置太子桓公曰善不擇日而廟禮太子或曰管仲之射隱不得也物之所謂難者必借人成勢而勿侵害已可謂一難也貴妾不使二后二難也愛孽不使危正嫡專聽一臣而不敢偶君此則可謂三難也呂氏春秋管仲有病桓公往問之曰仲父之疾病矣漬甚國人弗諱寡人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在于朝夕之中臣奚能言桓公曰此大事也願仲父之教寡人也管仲敬諾曰公誰欲相公曰鮑叔牙可乎管仲對曰不可夷吾善鮑叔牙鮑叔牙之為人也清亷潔直視不已若者不比于人一聞人之過終身不忘勿已則隰朋其可乎隰朋之為人也上志而下求醜不若黃帝而哀不已若者其于國也有不聞也其于物也有不知也其于人也有不見也勿己乎則隰朋可也夫相大官也處大官者不欲小察不欲小智故曰大匠不斫大庖不豆大勇不鬬大兵不冦桓公行公用私惡用管子而為五伯長行私阿所愛用豎刁而蟲出于戶史記管仲病桓公問曰羣臣誰可相者管仲曰知臣莫如君公曰易牙如何對曰殺子以適君非人情不可公曰開方如何對曰倍親以適君非人情難近公曰豎刁如何對曰自宮以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子專權呂氏春秋管仲有疾桓公往問之曰仲父之疾病矣將何以教寡人管仲曰齊鄙人有諺曰居者無載行者無埋今臣將有逺行胡可以問桓公曰願仲父之無讓也管仲對曰願君之逺易牙豎刁常之巫衛公子啓方公曰易牙烹其子以慊寡人猶尚可疑耶管仲對曰人之情非不愛其子也其子之忍又將何有于君公又曰豎刁自宮以近寡人猶尚可疑耶管仲對曰人之情非不愛其身也其身之忍又將何有于君又曰常之巫審于死生能去苛病猶尚可疑耶管仲對曰死生命也苛病失也君不任其命守其本而恃常之巫彼將以此無不為也公又曰衛公子啓方事寡人十五年矣其父死而不敢歸哭猶尚可疑耶管仲對曰人之情非不愛其父也其父之忍又將何有于君公曰諾管仲死盡逐之食不甘宮不治苛病起朝不肅居三年公曰仲父不亦過乎孰謂仲父盡之乎于是皆復召而反明年公有病常之巫從中出曰公將以某日薨易牙豎刁常之巫相與作亂塞宮門築高墻不通人矯以公令有一婦人踰垣入至公所公曰我欲食婦人曰吾無所得公又曰吾欲飲婦人曰吾無所得公曰何故對曰常之巫從中出曰公將以某日薨易牙豎刁常之巫相與作亂塞宮門築高墻不通人故無所得衛公子啓方以書社四十下衛公慨焉流涕出曰嗟乎聖人之所見豈不逺哉若死者有知我將何靣目以見仲父乎蒙衣袂而絶乎壽宮蟲流出於户上蓋以楊門之扇三月不葬十八年春宋襄公以諸侯伐齊三月齊人殺無虧齊人將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還二十六年東門襄仲臧文仲如楚乞師冬公以楚師伐齊取榖凡師能左右之曰以置桓公子雍于榖易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫于楚二十七年夏齊孝公卒有齊怨不廢喪紀禮也文公十四年子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位秋七月乙卯夜齊商人弒舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂齊人定懿公使來告難故書以九月齊公子元不順懿公之為政也終不曰公曰夫己氏襄仲使告于王請以王寵求昭姬于齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬十五年春季文子如晉為單伯與子叔姬故也齊人許單伯請而赦之使來致命書曰單伯至自齊貴之也齊人來歸子叔姬王故也齊人侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣十六年春王正月及齊平公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間夏五月公四不視朔疾也公使襄仲納賂于齊侯故盟于郪丘十七年夏四月癸亥葬聲薑有齊難是以緩齊侯伐我北鄙襄仲請盟六月盟于榖襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死十八年春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎齊懿公之為公子也與邴歜之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏五月公遊于申池二人浴于池歜以撲抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弒懿公納諸竹中歸舍爵而行齊人立公子元秋襄仲莊叔如齊惠公立故也臣士竒曰無知之禍桓身厯之會首止而倫定戒樹子而禁申似非不知國本之為重者奈何暗于自謀建儲不決致如隱之所謂三難也桓公無適子諸姬所出凡六人長曰無虧次惠公次孝公次昭公次懿公次公子雍無虧當立而桓公與管仲乃屬孝公于宋襄公以為太子及雍巫有寵于衛共姬因易牙以薦羞又許立無虧雖昧奕者舉棋之義而無虧以長固為治命矣但既許無虧以立而儲位未正又無罷黜孝公之命使宋襄無所藉口則其勢必至于爭總之一念牀笫之私情纒綿寡斷不知實以階之禍耳桓公死無虧立國人相與奉之踰年為君矣宋襄擁孝公來伐諭之以辭命可也舉齊國之衆以拒之可也拒之不敵奉無虧以出上告天王下控方伯徐圖反正亦無不可也若何一戰不勝而遽以無虧為説齊尚有人耶然孝公篡而繼其世者昭公也昭公生舍為商人所弒商人即懿公也懿公被弒于歜職公子元嗣立即惠公也桓公之子五人後先皆主其國亦一異也管仲諫行言聽能得之於取威定伯之始及其霸業既成狎昵羣小雖以將死丁寧之言格而不入豈非言于憂患者易為功言于安樂者難為力耶吁亦可慨矣左傳紀事本末卷十九
