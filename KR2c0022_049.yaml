body:
  text: 左傳紀事本末卷四十九詹事府詹事髙士竒撰吳通上國季札讓國附成公七年春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣楚圍宋之役師還子重請取於申吕以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至於漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黑要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死申公巫臣請使於吳晉侯許之吳子夀夢説之乃通吳於晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之會吳入州來子重自鄭奔命子重子反於是乎一歲七奔命蠻夷屬於楚者吳盡取之是以始大通吳於上國八年秋晉侯使申公巫臣如吳冬晉士燮來聘言伐郯也以其事吳故公賂之請緩師文子不可曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師會伐郯九年春會於蒲是行也將始會吳吳人不至十五年十一月會吳於鍾離始通吳也補逸吳越春秋夀夢元年朝周適楚觀諸侯禮樂魯成公會於鍾離深問周公禮樂成公悉為陳前王之禮樂因為詠歌三代之風夀夢曰孤在夷蠻徒以椎髻為俗豈有斯之服哉因歎而去曰於乎哉禮也襄公三年春楚子重伐吳為簡之師克鳩兹至於衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒六月公會單頃公及諸侯已未同盟於雞澤晉侯使荀會逆吳子於淮上吳子不至五年夏吳子使夀越如晉辭不會於雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先會吳且告會期故孟獻子孫文子會吳於善道九月丙午盟於戚會吳也十年春會於柤會吳子夀夢也十二年秋吳子夀夢卒臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟補逸史記夀夢立而吳始益大稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興大凡從太伯至夀夢十九世吳越春秋十七年夀夢以巫臣子狐庸為相任以國政二十五年夀夢病將卒有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢夀夢欲立之季札讓曰禮有舊制奈何廢前王之禮而行父子之私乎夀夢乃命諸樊曰我欲傳國及札爾無忘寡人之言諸樊曰周之太王知西伯之聖廢長立少王之道興今欲授國於札臣誠耕於野王曰昔周行之德加於四海今汝於區區之國荆蠻之鄉奚能成天子之業乎且今子不忘前人之言必授國以次及於季札諸樊曰敢不如命夀夢卒諸樊以適長攝行事當國政十三年秋楚共王卒吳侵楚養由基奔命子庚以師繼之養叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰於庸浦大敗吳師獲公子黨君子以吳為不弔詩曰不弔昊天亂靡有定十四年春吳告敗於晉會於向為吳謀楚故也范宣子數吳之不德也以退吳人吳子諸樊既除喪將立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢姦君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之補逸吳越春秋吳王諸樊元年已除喪讓季札曰昔前王未薨之時嘗晨昧不安吾望其色也意在於季札又復三朝悲吟而命我曰吾知公子札之賢欲廢長立少重發言於口雖然吾心已許之然前王不忍行其私計以國付我我敢不從命乎今國者子之國也吾願逹前王之義季札謝曰夫適長當國非前王之私乃宗廟社稷之制豈可變乎諸樊曰茍可施於國何先王之命有太王改為季歷二伯來入荆蠻遂城為國周道就成前人誦之不絶於口而子之所習也札復謝曰昔曹公卒庶存適亡諸侯與曹人不義而立於國子臧聞之行吟而歸曹君懼將立子臧子臧去之以成曹之道札雖不才願附子臧之義吾誠避之吳人固立季札季札不受而耕於野吳人舍之諸樊驕恣輕慢鬼神仰天求死將死命弟餘祭曰必以國及季札乃封季札於延陵號曰延陵季子秋楚子為庸浦之役故子囊師於棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜穀二十四年夏楚子為舟師以伐吳不為軍政無功而還冬吳人為楚舟師之役召舒鳩人舒鳩人叛楚二十五年秋舒鳩人卒叛楚令尹子木伐之吳人救之吳師大敗十二月吳子諸樊伐楚以報舟師之役門於巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒二十六年夏楚子秦人侵吳及雩婁聞吳有備而還二十九年吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不愼舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳日美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘於齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒高之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政愼之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢於幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難補逸公羊傳吳無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也其讓國奈何謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝曰天茍有吳國尚速有悔於豫身故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也季子使而亡焉僚者長庶也即之季子使而反至而君之爾闔廬曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎於是使專諸刺僚而致國乎季子季子不受曰爾弒吾君吾受爾國是我與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去之延陵終身不入吳國故君子以其不受為義以其不殺為仁賢季子則吳何以有君有大夫以季子為臣則宜有君者也札者何吳季子之名也春秋賢者不名此何以名許夷狄者不一而足也季子者所賢也曷為不足乎季子許人臣者必使臣許人子者必使子也禮記延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉其斂以時服既葬而封廣輪掩坎其高可隱也既封左袒右還其封且號者三曰骨肉復歸於土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎説苑延陵季子遊於晉入其境曰嘻暴哉國乎入其都曰嘻力屈哉國乎立其朝曰嘻亂哉國乎從者曰夫子之入晉境未久也何其名之不疑也延陵季子曰然吾入其境田畝荒穢而不休雜增崇髙吾是以知其國之暴也吾入其都新室惡而故室美新牆卑而故牆髙吾是以知其民力之屈也吾立其朝君能視而不下問其臣善伐而不上諌吾是以知其國之亂也新序延陵季子將西聘晉帶寶劍以過徐君徐君觀劍不言而色欲之延陵季子為有上國之使未獻也然其心許之矣致使於晉故反則徐君死於楚於是脫劍致之嗣君從者止之曰此吳國之寶非所以贈也延陵季子曰吾非贈之也先日吾來徐君觀吾劍不言而其色欲之吾為有上國之使未獻也雖然吾心許之矣今死而不進是欺心也愛劍偽心廉者不為也遂脫劍致之嗣君嗣君曰先君無命孤不敢受劍於是季子以劍帶徐君墓樹而去徐人嘉而歌之曰延陵季子兮不忘故脫千金之劍兮帶丘墓韓詩外傳吳延陵季子遊於齊見遺金呼牧者取之牧者曰子居之髙視之下貌之君子而言之野也吾有君不君有友不友當暑衣裘君疑取金者乎延陵季子知其為賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去延陵季子立而望之不見乃止孔子曰非禮勿視非禮勿聽三十一年吳子使屈狐庸聘於晉通路也趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立昭公十五年春王正月吳子夷昧卒考異吳越春秋十七年餘祭卒餘昧立四年卒欲授位季札季札讓逃去曰吾不受位明矣昔前君有命已附子臧之義潔身清行仰高履尚惟仁是處富貴之於我如秋風之過耳遂逃歸延陵吳人立餘昧子州于號為吳王僚也發明按餘祭弒於襄公二十九年夷昧卒於昭公十五年吳越春秋之文與傳殊舛二十七年吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛使延州來季子聘於上國遂聘於晉以觀諸侯吳公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不我廢也鱄設諸曰王可弒也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門階戶席皆王親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入於堀室鱄設諸置劍於魚中以進抽劍刺王鈹交於胸遂弒王闔廬以其子為卿季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待臣士竒曰吳雖泰伯之裔僻處荆蠻椎髻文身無中國之禮楫馬舟宫雲合鳥散亦未嘗有射御驅侵戰陳之法也自屈巫銜分室之怨導晉通吳又使其子狐庸往為謀主凡中國之長技皆與吳共之於是渡江爭長楚之邊鄙無歲不有吳師于蒲雞澤二役諸侯期吳而吳不至已有輕上國之心晉人不悟必欲連諸侯以昵就之吳自是益大夀夢遂僭號稱王晉之意不過謂用吳可以制楚不知退一豺復進一狼曽何愈於楚則吳之得通中國楚有以成之而晉亦自撤其藩籬也夀夢賢季札欲立之又牽於少長之序約以次傳必致國於季子此與宋杜太后之欲太祖兄弟並為天子而終反之於德昭皆誤計也無論歲月綿邈事體未可料假令諸樊餘祭夷昧俱登大耋而季子或不幸而先死則惓惓與賢之意成子虛矣至札之讓國固出至誠然子臧之義可慕而父兄之志亦不可違也季札過徐徐君欲其寶劍還役而徐君已死挂其劍於墓樹曰吾已心許之吁徐君傾蓋之交也深體其心至於如此獨於父兄之志不能曲成無乃輕重之不倫耶至夷昧既卒又不反國而歸之諸樊之子光使王僚越次得立以啓爭端專諸之刃難免由我之憾矣身為叔父社禝之鎮公子乃坐視骨肉相殘如秦越之肥瘠莫之匡正其得謂之賢乎觀其嬴博掩坎三號遽去札蓋曠逹而遠於情理者也從來曠逹之士視萬物如芻狗齊得喪於一致札之能委千乘者以此而其不能綏定吳國者亦以此尚何責焉若其觀詩而知列國之興亡入境而辨晉邦之將亂當時名聞諸侯所至傾動顧不翩翩濁世之賢公子哉惜其知經而不知權過讓以生亂春秋所以備責賢者也左傳紀事本末卷四十九
