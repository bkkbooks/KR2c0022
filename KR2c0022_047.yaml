body:
  text: 左傳紀事本末卷四十七詹事府詹事髙士竒撰楚靈王之亂滅陳蔡俱平王得國附襄公二十六年楚子秦人侵吳及雩婁聞吳有備而還遂侵鄭五月至於城麇鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍怒抽戈逐王子圍弗及楚人以皇頡歸印堇父與皇頡戌城麇楚人囚之以獻於秦鄭人取貨於印氏以請之子大叔為令正以為請子産曰不獲受楚之功而取貨於鄭不可謂國秦不其然若曰拜君之勤鄭國㣲君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不予更幣從子産而後獲之二十九年楚郟敖即位王子圍為令尹鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖三十年春王正月楚子使薳罷來聘通嗣君也穆叔問王子之為政何如對曰吾儕小人食而聴事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉助之匿其情矣蔡景侯為大子般娶於楚通焉大子弑景侯六月鄭子産如陳涖盟歸復命告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫敖政多門以介於大國能無亡乎不過十年矣楚公子圍殺大司馬蔿掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也絶民之主去民之偏艾王之體以禍其國無不祥大焉何以得免三十一年十二月北宫文子相衛侯以如楚北宫文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之徳曰大國畏其力小國懐其徳言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也昭公元年春楚公子圍聘於鄭遂㑹於虢三月甲辰盟楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宫有前不亦可乎楚伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎齊國子曰吾代二子愍矣陳公子招曰不憂何成二子樂矣衛齊子曰苟或知之雖憂何害宋合左師曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣吾從之退㑹子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家持之皆保世之主也齊衛陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之三大夫兆憂憂能無至乎言以知物其是之謂矣令尹享趙孟賦大明之首章趙孟賦小宛之二章事畢趙孟謂叔向曰令尹自以為王矣何如對曰王弱令尹彊其可哉雖可不終趙孟曰何故對曰彊以克弱而安之彊不義也不義而彊其斃必速詩曰赫赫宗周褒姒滅之彊不義也令尹為王必求諸侯晉少懦矣諸侯將往若獲諸侯其虐滋甚民弗堪也將何以終夫以彊取不義而克必以為道道以淫虐弗可久己矣楚公子圍使公子黒肱伯州犂城犫櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘於鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之遂殺其二子幕及平夏右尹子干出奔晉宫廏尹子晳出奔鄭殺太宰伯州犂於郟葬王於郟謂之郟敖使赴於鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長子干奔晉從車五乘叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰底禄以徳徳鈞以年年同以尊公子以國不聞以富且夫以千乘去其國彊禦已甚詩曰不侮鰥寡不畏彊禦秦楚匹也使后子與子干齒辭曰鍼懼選楚公子不獲是以皆來亦唯命且臣與羇齒無乃不可乎史佚有言曰非羇何忌楚靈王即位薳罷為令尹薳啓彊為大宰鄭㳺吉如楚葬郟敖且聘立君歸謂子産曰具行器矣楚王汰侈而自説其事必合諸侯吾往無日矣子産曰不數年未能也三年秋七月鄭罕虎如晉賀夫人且告曰楚人日徵敝邑以不朝立王之故敝邑之徃則畏執事其謂寡君而固有外心其不徃則宋之盟云進退罪也寡君使虎布之宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君茍思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉君實有心何辱命焉君其徃也茍有寡君在楚猶在晉也十月鄭伯如楚子産相楚子享之賦吉日既享子産乃具田備王以田江南之夢四年春王正月許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有惠賜盟於宋曰晉楚之從交相見也以嵗之不易寡人願結驩於二三君使舉請間君若茍無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚惟天所相不可與爭君其許之而修徳以待其歸若歸於徳吾猶將事之况諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修徳音以亨神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇若何虞難齊有仲孫之難而獲桓公至今賴之晉有里㔻之難而獲文公是以為盟主衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修政徳亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉椒舉遂請昏晉侯許之楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛偪於齊而親於晉惟是不來其餘君之所及也誰敢不至王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟夏諸侯如楚魯衛曹邾不㑹曹邾辭以難公辭以時祭衛侯辭以疾鄭伯先待於申六月丙午楚子合諸侯於申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此㑹也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宫之朝穆有塗山之㑹齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男㑹公之禮六君子謂合左師善守先代子産善相小國王使椒舉侍於後以規過卒事不規王問其故對曰禮吾所未見者有六焉又何以規宋大子佐後至王田於武城久而弗見椒舉請辭焉王使徃曰屬有宗祧之事於武城寡君將墮幣焉敢謝後見徐子吳出也以為貳焉故執諸申楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所以用命也夏桀為仍之㑹有緡叛之商紂為黎之蒐東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聴子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄善亦如之徳逺而後興秋七月楚子以諸侯伐吳宋大子鄭伯先歸宋華費遂鄭大夫從使屈申圍朱方八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封惟逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子面縛衘璧士袒輿櫬從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之遷賴於鄢楚子欲遷許於賴使鬭韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也補逸穀梁傳此入而殺其不言入何也慶封封乎吳鍾離其不言伐鍾離何也不與吳封也慶封其以齊氏何也為齊討也靈王使人以慶封令於軍中曰有若齊慶封弑其君者乎慶封曰子亦息我亦且一言曰有若楚公子圍弑其兄之子而代之為君者乎軍人粲然皆笑慶封弑其君而不以弑君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懐惡而討雖死不服其斯之謂與冬吳伐楚入棘櫟麻以報朱方之役楚沈尹射奔命於夏汭箴尹宜咎城鍾離薳啓彊城巢然丹城州來東國水不可以城彭生罷賴之師五年楚子以屈申為貳於吳乃殺之以屈生為莫敖使與令尹子蕩如晉逆女過鄭鄭伯勞子蕩於汜勞屈生於莬氏晉侯送女於邢丘子産相鄭伯㑹晉侯於邢丘晉韓宣子如楚送女叔向為介鄭子皮子大叔勞諸索氏大叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子朝其大夫曰晉吾讐敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽以羊舌肸為司宫足以辱晉吾亦得志矣可乎大夫莫對薳啓彊曰可茍有其備何故不可恥匹夫不可以無備况恥國乎是以聖王務行禮不求恥人朝聘有珪享頫有璋小有述職大有巡功設机而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也國家之敗失之道也則禍亂興城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦是以楚弗能報而求親焉既獲姻親又欲恥之以召冦讐備之若何誰其重此若有其人恥之可也若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至求昏而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行吳魏舒范鞅知盈羊舌肸之下祁午張趯籍談女齊梁丙張骼輔躒苗賁皇皆諸侯之選也韓襄為公族大夫韓須受命而使矣箕襄邢帶叔禽叔椒子羽皆大家也韓賦七邑皆成縣也羊舌四族皆彊家也晉人若喪韓起楊肸五卿八大夫輔韓須楊石因其十家九縣長轂九百其餘四十縣遺守四千奮其武怒以報其大恥伯華謀之中行伯魏舒帥之其蔑不濟矣君將以親易怨實無禮以速冦而未有其備使羣臣徃遺之禽以逞君心何不可之有王曰不穀之過也大夫無辱厚為韓子禮王欲敖叔向以其所不知而不能亦厚其禮韓起反鄭伯勞諸圉辭不敢見禮也冬十月楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師㑹於夏汭越大夫常夀過帥師㑹楚子於瑣聞吳師出薳啟彊帥師從之遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大馬國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟於羅汭沈尹赤㑹楚子次於萊山薳射帥繁揚之師先入南懐楚師從之及汝清吳不可入楚子遂觀兵於坻箕之山是行也吳早設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命於巢薳啟彊待命於雩婁禮也六年楚公子棄疾如晉報韓子也過鄭鄭罕虎公孫僑游吉從鄭伯以勞諸柤辭不敢見固請見之見如見王以其乘馬八匹私面見子皮如上卿以馬六匹見子産以馬四匹見子大叔以馬二匹禁芻牧採樵不入田不樵樹不採蓺不抽屋不强匄誓曰有犯命者君子廢小人降舍不為暴主不慁賓往來如是鄭三卿皆知其將為王也韓宣子之適楚也楚人弗逆公子棄疾及晉竟晉侯將亦弗逆叔向曰楚辟我𠂻若何效辟詩曰爾之教矣民胥效矣從我而已焉用效人之辟書曰聖作則無寧以善人為則而則人之辟乎匹夫為善民猶則之况國君乎晉侯説乃逆之徐儀楚聘於楚楚子執之逃歸懼其叛也使薳洩伐徐吳人救之令尹子蕩帥師伐吳師於豫章而次於乾谿吳人敗其師於房鍾獲宫廏尹棄疾子蕩歸罪於薳洩而殺之冬叔弓如楚聘且弔敗也七年楚子之為令尹也為王旌以田芈尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之無宇之閽入焉無宇執之有司弗與曰執人於王宫其罪大矣執而謁諸王王將飲酒無宇辭曰天子經略諸侯正封古之制也封略之内何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之濵莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人於王宫將焉執之周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隠器與盜同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣王曰取而臣以往盜有寵未可得也遂赦之楚子成章華之臺願與諸侯落之大宰薳啟彊曰臣能得魯侯薳啟彊來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命於蜀奉承以來弗敢失隕而致諸宗祧曰我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至惟襄公之辱臨我喪孤與其二三臣悼心失圖社稷之不皇况能懐思君徳今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈惟寡君君若不來使臣請問行期寡君將承質幣而見於蜀以請先君之貺公將往夢襄公祖梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之楚子享公於新臺使長鬛者相好以大屈既而悔之薳啟彊聞之見公公語之拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰慎守寶矣敢不賀乎公懼乃反之補逸國語靈王為章華之臺與伍舉升焉曰臺美夫對曰臣聞國君服寵以為美安民以為樂聽徳以為聰致逺以為明不聞其以土木之崇髙彤鏤為美而以金石匏竹之昌大囂庶為樂不聞其以觀大視侈淫色以為明而以察清濁為聰也先君莊王為匏居之臺髙不過望國氛大不過容宴豆木不妨守備用不煩官府民不廢時務官不易朝常問誰宴焉則宋公鄭伯問誰相禮則華元駟騑問誰賛事則陳侯蔡侯許男頓子其大夫侍之先君是以除亂克敵而無惡於諸侯今君為此臺也國民罷焉財用盡焉年穀敗焉百官煩焉舉國留之數年乃成願得諸侯與始升焉諸侯皆距無有至者而後使大宰啓彊請於魯侯懼之以蜀之役而僅得以來使富都那豎贊焉而使長鬛之士相焉臣不知其美也夫美也者上下外内小大逺邇皆無害焉故曰美若於目觀則美縮於財用則匱是聚民利以自封而瘠民也胡美之為夫君國者將民之與處民實瘠矣君安得肥且夫私欲𢎞侈則徳義鮮少徳義不行則邇者騷離而逺者距違天子之貴也惟其以公侯為官正而以伯子男為師旅其有美名也惟其施令徳於逺近而小大安之也若斂民利以成其私欲使民蒿焉忘其安樂而有逺心其為惡也甚矣安用目觀故先王之為臺榭也榭不過講軍實臺不過望氛祥故榭度於大卒之居臺度於臨觀之高其所不奪穡地其為不匱財用其事不煩官業其日不廢時務瘠磽之地於是乎為之城守之末於是乎用之官僚之暇於是乎臨之四時之隙於是乎成之故周詩曰經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏夫為臺榭將以教民利也不知其以匱之也若君謂此臺美而為之正楚其殆矣新書翟王使使至楚楚王誇使者以章華之臺臺甚髙三休乃至楚王曰翟國亦有此臺乎使者曰否翟窶國也惡見此臺也翟王之自為室也堂髙三尺壤陛三絫茅茨弗剪采椽弗刮且翟王猶以作之者太苦居之者太佚翟國惡見此臺也楚王媿魯連子楚成章華之臺魯君先至楚王悦之與大曲之弓不琢之璧已而悔之八年陳哀公元妃鄭姬生悼太子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留夏四月辛亥哀公縊干徵師赴於楚且告有立君公子勝愬之於楚楚人執而殺之公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也楚人執陳行人干徴師殺之罪不在行人也陳公子招歸罪於公子過而殺之九月楚公子棄疾帥師奉孫吳圍陳宋戴惡㑹之冬十一月壬午滅陳輿嬖袁克殺馬毁玉以葬楚人將殺之請寘之既又請私私於幄加絰於顙而逃使穿封戍為陳公曰城麇之役不諂侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎對曰若知君之及此臣必致死禮以息楚九年春叔弓宋華亥鄭游吉衛趙黶㑹楚子於陳二月庚申楚公子棄疾遷許於夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人於陳以夷濮西田益之遷方城外人於許夏四月陳災鄭裨竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年十一年春景王問於萇𢎞曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般弑其君之嵗也嵗在豕韋弗過此矣楚將有之然壅也嵗及大梁蔡復楚凶天之道也楚子在申召蔡靈侯靈侯將徃蔡大夫曰王貪而無信唯蔡於感今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而饗蔡侯於申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緡以喪其國紂克東夷而隕其身楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不恤亡國將焉用之秋㑹於厥憖謀救蔡也鄭子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而不徳天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣晉人使狐父請蔡於楚弗許冬十一月楚子滅蔡用隠大子於岡山申無宇曰不祥五牲不相為用况用諸侯乎王必悔之十二月楚子城陳蔡不羮使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而寘子元焉使昭公不立齊桓公城穀而寘管仲焉至於今賴之臣聞五大不在邊五細不在庭親不在外羇不在内今棄疾在外鄭丹在内君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子㳺齊渠丘實殺無知衛蒲戚實出獻公若由是觀之則害於國末大必折尾大不掉君所知也補逸説苑蔡侯宋公鄭伯朝於晉蔡侯謂叔向曰子亦奚以語我對曰蔡言地計衆不若宋鄭其車馬衣裘侈於二國諸侯其有圖蔡者乎處期年荆伐蔡而殘之十二年楚子狩於州來次於潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次於乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出僕析父從右尹子革夕王見之去冠被舍鞭與之語曰昔我先王熊繹與吕伋王孫牟燮父禽父並事康王四國皆有分我獨無有今我使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路藍縷以處草莽跋涉山林以事天子惟是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將惟命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者専足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剥圭以為鏚柲敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲沒於祗宫臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克以及於難仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾谿補逸國語左史倚相廷見申公子亹子亹不出左史謗之舉伯以告子亹怒而出曰女無亦謂我老耄而舍我而又謗我左史曰惟子老耄故欲見以交儆子若子方壯能經營百事倚相將奔走承序於是不給而何暇得見昔衛武公年數九十有五矣猶箴儆於國曰自卿以下至於師長士茍在朝者無謂我老耄而舍我必共恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我在輿有旅賁之規位宁有官師之典倚几有誦訓之諫居寢有􅉏御之箴臨事有瞽史之道宴居有師工之誦史不失書矇不失誦以訓御之於是乎作懿戒以自儆也及其沒也謂之叡聖武公子實不叡聖於倚相何害周書曰文王至於日中昃不皇暇食恵於小民惟政之恭文王猶不敢惰今子老楚國而欲自安也以禦數者王將何為若常如此楚其難哉子亹懼曰老之過也乃驟見左史十三年楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與於守而行申之㑹越大夫戮焉王奪鬭韋龜中犫又奪成然邑而使為郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啟越大夫常夀過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟於鄧依陳蔡人以國楚公子比公子黒肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊陳蔡欲為名故請為武軍蔡公知之曰欲速且役病矣請藩而已乃藩為軍蔡公使須務牟與史猈先入因正僕人殺大子禄及公子罷敵公子比為王公子黑肱為令尹次於魚陂公子棄疾為司馬先除王宫使觀從從師於乾谿而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠於溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再秪取辱焉然丹乃歸於楚王㳂夏將欲入鄢芈尹無宇之子申亥曰吾父再奸王命王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸夏五月癸亥王縊於芈尹申亥氏申亥以其二女殉而葬之觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣乙夘夜棄疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺丙辰棄疾即位名曰熊居葬子干於訾實訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗為令尹楚師還自徐吳人敗諸豫章獲其五帥平王封陳蔡復遷邑致羣賂施舍寛民宥罪舉職召觀從王曰惟爾所欲對曰臣之先佐開卜乃使為卜尹使枝如子躬聘於鄭且致犫櫟之田事畢弗致鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王問犫櫟降服而對曰臣過失命未之致也王執其手曰子毋勤姑歸不穀有事其告子也他年芈尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸初共王無冢適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬宻埋璧於大室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐鬭韋龜屬成然焉且曰棄禮違命楚其危哉子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰能同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羇終世可謂無民亡無愛徵可謂無徳王虐而不忌楚君子干涉五難以弑舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉苛慝不作盜賊伏隠私欲不違民無怨心先神命之國民信之芈姓有亂必季實立楚之常也獲神一也有民二也令徳三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣民無懐焉國無與焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵於僖有鮑叔牙賔須無隰朋以為輔佐有莒衛以為外主有國髙以為内主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不貳生十七年有士五人有先大夫子餘子犯以為腹心有魏犫賈佗以為股肱有齊宋秦楚以為外主有欒郤狐先以為内主亡十九年守志彌篤恵懐棄民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異於子干共有寵子國有奥主無施於民無援於外去晉而不送歸楚而不逆何以冀國補逸説苑楚恭王多寵子而世子之位不定屈建曰楚必多亂夫一兎走於街萬人追之一人得之萬人不復走分未定則一兎走使萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世太子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶兎走也恭王聞之立康王為太子其後猶有令尹圍公子棄疾之亂也楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也隠大子之子廬歸於蔡禮也悼大子之子吳歸於陳禮也冬十月葬蔡靈公禮也吳滅州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之十四年夏楚子使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼養老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新叙舊禄勲合親任良物官使屈罷簡東國之兵於召陵亦如之好於邊疆息民五年而後用師禮也十六年楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也十九年令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣舍前之忿可也乃歸蹶由發明平王初年尚能聽子瑕之言此後惟無極之言是聽矣臣士竒曰楚共王有寵子五人莫適所立乃埋璧於大室之庭以神為卜其不重國本亦甚矣夫年鈞以徳徳鈞以卜要必先徳而後卜未聞専聽命於冥冥之鬼神者也走一兎於街而紛紛逐之者未知誰主屈建所以有楚必多亂之憂哉及康王死而郟敖立子圍為令尹假王旌以田則見抑於申無宇蒲宫有前則徧譏於列國之大夫不臣之心夫路人皆知之而其君弗戒松柏之下厥草不殖固其宜矣子圍手弑其君又殺其君之子此洿瀦之所不赦也當時諸侯坐視其滔天稔惡而莫敢興一旅問罪之師又復援天以自解免反助之逆而共相推戴焉使一時冠帶之國滅者滅遷者遷以致欲盈氣憍抵龜詬天而謂是區區者之不予畀也吁楚靈不死周室其殆哉乾谿之潰申亥之縊天非特以償郟敖與蔡陳諸君侯之寃實所以存周也至棄疾以當璧之符又多市徳恵名聞於諸侯知其必將為王而身復董師破滅兩國太阿握其掌内蔓草難圖昭然可見乃使之居於邊鄙與羣不逞之徒狎處忘隠憂忽大患猶欲耀兵於鄰竟師老怨作雖欲為祗宫之沒何可得哉平王弑二君而殺一兄殘忍悖逆莫此為甚不待聽無極之讒殺子妻婦而後知其有亡理矣當時論取國之五利猶謂其令徳三也豈以其小仁曲恵足以要結陳蔡之人心耶復諸亡國其名似美而楚亦因之以弱平王用蔡以入楚卒之吳師破郢蔡實導之禍福相倚蓋自古為然矣左傳紀事本末卷四十七
