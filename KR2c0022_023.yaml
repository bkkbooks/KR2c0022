body:
  text: 左傳紀事本末卷二十三詹事府詹事髙士竒撰曲沃併晉隱公五年春曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨夏六月曲沃叛王秋王命虢公伐曲沃而立哀侯于翼補逸史記昭侯七年晉大臣潘父弑其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父孝侯八年曲沃桓叔卒子鱓代桓叔是為曲沃莊伯孝侯十五年曲沃莊伯弑其君晉孝侯於翼晉人攻曲沃莊伯莊伯復入曲沃晉人復立孝侯子郄為君是為卾侯卾侯六年卒曲沃莊伯聞晉鄂侯卒乃興兵伐晉周平王使虢公將兵伐曲沃莊伯莊伯走保曲沃晉人共立卾侯子光是為哀侯六年春翼九宗五正頃父之子嘉父逆晉侯於隨納諸卾晉人謂之卾侯補逸史記哀侯二年曲沃莊伯卒子稱立是為曲沃武公三年荀人董伯皆叛曲沃桓公二年初晉穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千畆之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命大子曰仇弟曰成師始兆亂矣兄其替乎恵之二十四年晉始亂故封桓叔于曲沃靖侯之孫欒賓傅之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有貳宗士有𨽻子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎恵之三十年晉潘父弑昭侯而納桓叔不克晉人立孝侯恵之四十五年曲沃莊伯伐翼弑孝侯翼人立其弟卾侯卾侯生哀侯哀侯侵陘庭之田陘庭南鄙啟曲沃伐翼三年春曲沃武公伐翼次於陘庭韓萬御戎梁𢎞為右逐翼侯於汾隰驂絓而止夜獲之及欒共叔補逸國語武公伐翼殺哀侯止欒共子曰茍無死吾以子見天子令子為上卿制晉國之政辭曰成聞之民生於三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故壹事之唯其所在則致死焉報生以死報賜以力人之道也臣敢以私利廢人之道君何以訓矣且君知成之從也未知其待於曲沃也從君而貳君焉用之遂鬬而死發明欒共子名欒成欒賓之子欒賓晉靖侯之孫晉室六卿惟欒氏猶為公族故諸大夫先亡之辨誤史記哀侯八年晉侵陘庭與曲沃武公謀九年伐晉于汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯小子元年曲沃武公使韓萬殺所虜晉哀侯曲沃益强晉無如之何七年冬曲沃伯誘晉小子侯殺之八年春滅翼冬王命虢仲立晉哀侯之弟緡於晉九年秋虢仲芮伯梁伯荀侯賈伯伐曲沃莊公十六年冬王使虢公命曲沃伯以一軍為晉侯補逸史記曲沃武公伐晉侯緡滅之盡以其寳器賂獻於周釐王釐王命曲沃武公為晉君列為諸侯於是盡併晉地而有之更號曰晉武公始都晉國十八年春虢公晉侯朝王王饗醴命之宥皆賜玉五㲄馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人以下附獻公除八族二十三年夏晉桓莊之族偪獻公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譛富子而去之二十四年秋晉士蒍又與羣公子謀使殺游氏之二子士蒍告晉侯曰可矣不過二年君必無患二十五年秋晉士蒍使羣公子盡殺游氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子二十六年春晉士蒍為大司空夏士蒍城絳以深其宫臣士竒曰自晉穆侯以千畆之戰命其次子曰成師已與太子仇有並嫡之勢師服所為太息於兆亂也及魯恵之二十四年晉國弗靖而别建桓叔於曲沃雖為本大末小之戒亦曰藉之以為公室輔庶㡬緩急足恃耳而桓叔包藏禍心輒有併吞之志潘父弑昭侯而納之不克乃立孝侯桓叔死子鱓代立是為曲沃莊伯孝侯之十五年莊伯弑孝侯於翼晉人立卾侯六年卒莊伯伐翼平王使虢公討之晉人立哀侯哀侯二年莊伯死子稱嗣立是為曲沃武公魯桓之三年武公伐翼殺哀侯晉人立其子小子是為小子侯七年武公誘殺小子侯明年滅翼王命虢仲立哀侯之弟緡莊公十六年武公伐晋侯緡滅之周取其賂始命曲沃以一軍為諸侯移都晉國傳子獻公剪除强宗吞噬諸小國晉於是乎始大則皆成師之裔而晉之大宗不血食矣此曲沃與翼争衡之始末也平王雖弱當莊伯之伐哀侯猶能以一旅聲其罪而釐王貪滅翼之寳器竟立武公齒於諸侯之列曲沃命而五伯摟伐之漸開趙籍韓䖍魏斯命而七國戰争之禍起未嘗不扼腕三歎於王鈇之失加也師服老謀深慮當日果懲其言大都耦國之害其可以已欒共子明在三之義寜喪其元不屈於曲沃可愧後世之為人臣而懐貳心者矣士蒍為獻公謀去羣公子始焉與羣公子譛富子而殺之繼焉又與謀殺游氏之二子未㡬又盡殺游氏之族而後城聚以處羣公子一鼓而殱旃雖所患悉除然桓莊之族何罪而以為戮葛藟庇根獨無所以全之之道乎殘忍隂忮若此蒍真傾危之士哉左傳紀事本末卷二十三
