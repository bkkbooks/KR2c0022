  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0022_WYG_013-1a, image: WYG0369/WYG0369-0102c.png}
body:
  text: 左傳紀事本末卷十三詹事府詹事高士竒撰郊祀雩祭旱而不雩見災異視朔附桓公五年秋大雩書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸過則書閔公二年夏吉禘于莊公速也僖公五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也三十一年夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也補逸公羊傳曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮四卜何以非禮求吉之道三禘嘗不卜郊何以卜卜郊非禮也卜郊何以非禮魯郊非禮也魯郊何以非禮天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封內者則不祭也曷為或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而遍雨乎天下者唯泰山爾河海潤于千里猶者何通可以已也何以書譏不郊而望祭也文公元年於是閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖二年春二月丁丑作僖公主書不時也秋八月丁卯大事于大廟躋僖公逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民十三年秋七月大室之屋壞書不共也補逸公羊傳世室者何魯公之廟也周公稱太廟魯公稱世室羣公稱宮此魯公之廟也曷為謂之世室世室猶世室也世世不毁也周公何以稱太廟于魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主然則周公之魯乎曰不之魯也封魯公以為周公主然則周公曷為不之魯欲天下之一乎周也魯祭周公何以為牲周公用白牲魯公用騂剛羣公不毛魯祭周公何以為盛周公盛魯公燾羣公廪世室屋壞何以書譏何譏爾久不修也十六年夏五月公四不視朔疾也宣公三年春不郊而望皆非禮也望郊之屬也不郊亦無望可也襄公三年秋大雩旱也七年夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也八年秋九月大雩旱也二十八年秋八月大雩旱也昭公六年秋九月大雩旱也十五年春將禘于武宮戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也十六年九月大雩旱也二十四年秋八月大雩旱也二十五年秋書再雩旱甚也補逸定公元年九月大雩榖梁傳雩月雩之正也秋大雩非正也冬大雩非正也秋大雩雩之為非正何也毛澤未盡人力未竭未可以雩也雩月雩之正也月之為雩之正何也其時窮人力盡然後雩雩之正也何為其時窮人力盡是月不雨則無及矣是年不艾則無食矣是謂其時窮人力盡也雩之必待其時窮人力盡何也雩者為旱求者也求者請也古之人重請何重乎請人之所以為人者讓也請道去讓也則是舍其所以為人也是以重之焉請哉請乎應上公古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉夫請者非可詒託而往也必親之者也是以重之春秋繁露大雩者何旱祭也難者曰大旱雩祭而請雨大水鳴鼓而攻社天地之所為隂陽之所起也或請焉或怒焉者何曰大旱者陽滅隂也陽滅隂者尊壓卑也固其義也雖大甚拜請之而已無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也日食亦然皆下犯上以賤傷貴逆節也故鳴鼓而攻之朱絲脅之為其不義也此亦春秋之為強禦也故變天地之位正隂陽之序直行其道而不忘其難義之至也是故脅嚴社而不為不敬靈出天王而不為不尊上辭父之命而不為不承親絶母之屬而不為不孝義乎臣士竒曰成王以周公有大勳勞于王室賜以郊禘大雩之重祭如三恪得用先代禮樂蓋殊典也伯禽之辭與否或辭而成王不聽皆不可知揆之大分必非人臣之所安者矣夫郊之為祭大報天而主日天無二日土無二王惟天子首出萬物覆幬之所及照臨之所至其精氣無所不通故祭天而天神來格饗帝而上帝是歆望于山川遍于羣神而百靈罔不攸會諸侯一國之主耳雖欲矯誣淫祀非分而冥冥有吐之者矣禘則禘其始祖之所自出諸侯以肇封為始祖廟數止于五若魯則祀周公而且不得祖后稷况所自出之帝耶大雩者天子雩五方上帝配以其帝周公不得配天已闕陪祀之位諸侯祈旱山川於上帝五人帝何與故魯之郊禘大雩皆非禮也周公其衰夫子歎之矣郊之屢卜而不從正所謂神不歆非類者其卜而從亦偶焉耳魯人不知警悟力改前非而猶欲詹詹為三望之舉以塗飾耳目向使望必須卜河海有靈安見不如林放乎至因旱而舉不得為之盛祭祗足干天怒而致藴隆非旱備也經之書大因旱以顯僭與不時何與然則必龍見之月乃得雩餘月將坐視其旱而不恤乎榖梁時窮力盡之説尤為謬戾莊公之吉禘過于速僖公之作主過於緩夏父之躋僖于閔武公之宜祧而猶禘失之諂閏不告月世室屋壞四不視朔失之慢僖公登臺以書雲物文公閏在三月傳譏其非禮蓋至是而周禮之在魯者渺乎不可問矣左傳紀事本末卷十三
