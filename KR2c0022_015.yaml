body:
  text: 左傳紀事本末卷十五詹事府詹事高士竒撰孔子仕魯仲木由端賜冉求高柴定公十年春及齊平夏公會齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵刼魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加于載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享齊人來歸鄆讙龜陰之田十二年夏仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宮登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公斂處父謂孟孫墮成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克哀公七年公㑹呉于鄫太宰嚭召季康子康子使子貢辭太宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉有由然也十一年春齊為鄎故國書高無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子强問之對曰小人慮材而言量力而共者也叔武曰是謂我不成丈夫也退而蒐乘孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右季孫曰須也弱有子曰就用命焉季氏之甲七千冉有以武城人三百為己徒卒老㓜守官次于雩門之外五日右師從之公叔務人見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰于郊齊師自稷曲師不踰溝樊遲曰非不能也不信子也請三刻而踰之如之衆從之師入齊軍右師奔齊人從之陳瓘陳莊渉泗孟之側後入以為殿抽矢策其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐歩而死師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許孟孺子語人曰我不如顔羽而賢於邴洩子羽銳敏我不欲戰而能黙洩曰驅之公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛於齊師故能入其軍孔子曰義也孔文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則甞學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也將止魯人以幣召之乃歸季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度以禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽十有二年春用田賦公㑹呉于橐臯呉子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟呉徵㑹于衛初衛人殺呉行人且姚而懼謀於行人子羽子羽曰呉方無道無乃辱吾君不如止也子木曰呉方無道國無道必棄疾於人呉雖無道猶足以患衛徃也長木之斃無不摽也國狗之瘈無不噬也而况大國乎秋衛侯會呉于鄖公及衛侯宋皇瑗盟而卒辭呉盟呉人籓衛侯之舍子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼以相辭也今呉不行禮於衛而籓其君舍以難之子盍見大宰乃請束錦以行語及衛故大宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讎而懼諸侯或者難以霸乎大宰嚭說乃舍衛侯衛侯歸效夷言子之尚㓜曰君必不免其死於夷乎執焉而又說其言從之固矣十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能甲午齊陳恒弑其君壬于舒州孔丘三日齊而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言十五年秋齊陳瓘如楚過衛仲由見之曰天或者以陳氏為斧斤既斵喪公室而他人有之不可知也其使終饗之亦不可知也若善魯以待時不亦可乎何必惡焉子玉曰然吾受命矣子使告我弟冬及齊平衛孔圉取太子蒯聵之姊生悝孔氏之豎渾良夫長而美孔文子卒通于内太子在戚孔姬使之焉太子與之盟為請于伯姬閏月良夫與太子入舍于孔氏之外圃昬二人䝉衣而乘適伯姬氏孔伯姬杖戈而先太子與五人介輿豭從之迫孔悝於厠遂刼以登臺欒寧將飲酒聞亂使告季子季子將入遇子羔將出季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出子路入太子聞之懼下石乞孟黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣十六年夏四月己丑孔丘卒公誄之曰旻天不弔不憗遺一老俾屏余一人以在位煢㷀余在疚嗚呼哀哉尼父無自律子贛曰君其不没於魯乎夫子之言曰禮失則昬名失則愆失志為昬失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之二十一年秋八月公及齊侯邾子盟于顧齊人責稽首因歌之曰魯人之臯數年不覺使我高蹈惟其儒書以為二國憂是行也公先至於陽榖齊閭丘息曰君辱舉玉趾以在寡君之軍羣臣將傳遽以告寡君比其復也君無乃勤為僕人之未次請除館於舟道辭曰敢勤僕人發明按儒書一言豈非孔子之遺風尚足以折衝而禦侮耶臣士竒曰天之生孔子為天下萬世也非為魯也故魯卒不得而用之然而聖人大可為之兆已畧見于魯矣夾谷之㑹犂彌言于齊侯曰孔丘知禮而無勇若以萊人刼魯侯必得志焉吁孔子豈無勇者哉聖人所以勝天下者理而已仁義足以為甲胄忠信足以為干櫓故曾子謂子襄曰吾甞聞大勇于夫子矣自反而不縮雖褐寛博吾不惴焉自反而縮千萬人吾徃矣大勇者理勝之謂也登壇數語而裔俘卻兵車拒野享罷久縕之三田不待兵革而自歸魯于時不誠赫然一變其積弱之舊哉夫鄰封震慴而内之蝥賊不除則公室欲張而不得也為是申大都不耦國家富不藏甲之制墮三都翦羽翼揮申須之戈從容以定變誅亂政之首次第以改絃當是時使不以彼婦之口中沮其用俾至于朞月三年東周之治豈徒託諸空言哉惜乎魯之不能用也諸弟子多才多藝文武兼資由之信義著于諸侯至以千乘之國不信于盟而重其言三都之墮由實左右之賜也掉三寸之舌屢抗長蛇之吻康子不出門敦槃不再設藩舍之衛君獲有寧宇而于郊稷曲之役遲也慫恿之求也用矛以入之柴雖懦其儒行亦足以光重魯國則不可謂聖賢之無益于時也若夫田賦用而微詞以示箴舒州弑而抗聲以請討聖人雖老不得志何甞㤀心當世者傷麟道窮兩楹告夢生不能用死乃誄之誠可惜也雖然聖人之生非為魯也為天下萬世也左傳紀事本末卷十五
