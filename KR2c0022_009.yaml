body:
  text: 左傳紀事本末卷九詹事府詹事高士竒撰三桓弱公室莊公二十三年夏公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡狩以大習之非是君不舉矣君舉必書書而不法後嗣何觀補逸榖梁傳常事曰視非常曰觀觀無事之辭也以是為尸女也無事不出境秋丹桓宫之楹二十四年春刻其桷皆非禮也御孫諌曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎考異按二條國語略同但一作匠師慶一作夏父展俱不曰御孫二十五年春陳女叔來聘始結陳好也嘉之故不名二十七年秋公子友如陳葬原仲非禮也原仲季友之舊也補逸公羊傳原仲者何陳大夫也大夫不書葬此何以書通乎季子之私行也何通乎季子之私行避內難也君子避內難而不避外難內難者何公子慶父公子牙公子友皆莊公之母弟也公子慶父公子牙通乎夫人以脅公季子起而治之則不得與于國政坐而視之則親親因不忍見也故于是復請至于陳而葬原仲也三十二年初公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門公疾問後于叔牙對曰慶父材問于季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後于魯國不然死且無後飲之歸及逵泉而卒立叔孫氏八月癸亥公薨于路寢子般即位次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏成季奔陳立閔公補逸公羊傳莊公病將死召季子季子至而授之以國政曰寡人即不起此病吾將焉致乎魯國季子曰般也存君何憂焉公曰庸得若是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎夫何敢俄而牙弒械成季子和藥而飲之曰公子從吾言而飲此則必可以無為天下僇笑必有後乎魯國不從吾言而不飲此則必為天下僇笑必無後于魯國于是從其言而飲之飲之無纍氏至乎王隄而死公子牙今將爾辭曷為與親弒者同君親無將將而誅焉然則善之與曰然殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得辟兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使託若以疾死然親親之道也閔公元年春不書即位亂故也補逸公羊傳公何以不言即位繼弒君不言即位孰繼繼子般也孰弒子般慶父也殺公子牙今將爾季子不免慶父弒君何以不誅將而不免遏惡也既而不可及因獄有所歸不探其情而誅焉親親之道也惡乎歸獄歸獄僕人鄧扈樂曷為歸獄僕人鄧扈樂莊公存之時樂曽淫于宫中子般執而鞭之莊公死慶父謂樂曰般之辱爾國人莫不知盍弒之矣使弒子般然後誅鄧扈樂而歸獄焉季子至而不變也夏六月葬莊公亂故是以緩秋八月公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之季子來歸嘉之也冬齊仲孫湫來省難書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間攜二覆昏亂霸王之器也辨誤按二傳以仲孫為公子慶父其謬已甚甚矣公榖之劣于左也專家之師往往膠固如此二年夏吉禘于莊公速也初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公于武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊閔公哀姜之娣叔姜之子也故齊人立之共仲通于哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之以上慶父弒閔公成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之成風聞成季之繇乃事之而屬僖公焉故成季立之僖公元年春不稱即位公出故也公出復入不書諱之也諱國惡禮也冬莒人來求賂公子友敗諸酈獲莒子之弟拏公賜季友汶陽之田及費夫人氏之喪至自齊君子以齊人之殺哀姜也為已甚矣女子從人者也八年秋禘而致哀姜焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也十七年師滅項淮之會公有諸侯之事未歸而取項齊人以為討而止公秋聲姜以公故會齊侯于卞九月公至書曰至自會猶有諸侯之事焉且諱之也發明滅項之舉三桓專政之漸也此時季友子不見于經傳公孫兹亦方卒惟公孫敖存是舉當屬敖所為胡氏以為季孫非是蓋敖方帥師救徐兵柄在手理或有之也三十三年齊國莊子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言于公曰國子為政齊猶有禮君其朝焉臣聞之服于有禮社稷之衛也冬公如齊朝且弔有狄師也反薨于小寢即安也葬僖公緩作主非禮也凡君薨卒哭而祔祔而作主特祀于主蒸嘗禘于廟文公元年四月丁巳葬僖公冬穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也二年丁丑作僖公主書不時也八月丁卯大事于大廟躋僖公逆祀也九年秦人來歸僖公成風之襚禮也諸侯相弔賀也雖不當事茍有禮焉書也以無忘舊好以上季友立僖公以下仲遂立宣公之始文公二年襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也四年逆婦姜于齊卿不行非禮也君子是以知出姜之不允于魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也十八年二月丁丑公薨六月葬文公秋襄仲莊叔如齊惠公立故且拜葬也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏夫人姜氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀姜宣公元年春王正月公子遂如齊逆女尊君命也三月遂以夫人婦姜至自齊尊夫人也夏季文子如齊納賂以請會會于平州以定公位東門襄仲如齊拜成六月齊人取濟西之田為立公故以賂齊也五年春公如齊高固使齊侯止公請叔姬焉夏公至自齊書過也秋九月齊高固來逆女自為也故書曰逆叔姬卿自逆也冬來反馬也七年春衛孫桓子來盟始通且謀會晉也夏公㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰會晉侯之立也公不朝焉又不使大夫聘晉人止公于會盟于黃父公不與盟以賂免故黑壤之盟不書諱之也八年有事于大廟襄仲卒而繹非禮也戊子夫人嬴氏薨冬葬敬嬴旱無麻始用葛茀雨不克葬禮也禮卜葬先逺日辟不懷也十年春公如齊齊侯以我服故歸濟西之田夏齊惠公卒公如齊奔喪季文子初聘于齊國武子來報聘十四年冬公孫歸父會齊侯于榖見晏桓子與之言魯樂桓子告高宣子曰子家其亡乎懷于魯矣懷必貪貪必謀人謀人人亦謀已一國謀之何以不亡十五年初稅畝非禮也榖出不過藉以豐財也十八年公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命于介既復命袒括髮即位哭三踊而出遂奔齊書曰歸父還自晉善之也成公十六年九月晉人執季孫行父舍之于苕丘冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自會乙酉刺公子偃俱詳列卿世嗣十八年己丑公薨于路寢言道也十二月孟獻子會于虛朾謀救宋也宋人辭諸侯而請師以圍彭城孟獻子請于諸侯而先歸會葬丁未葬我君成公書順也時成公薨襄公以冲年即位故政權下移而季氏益强襄公二年夏齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉詩曰其惟哲人告之話言順德之行季孫于是為不哲矣且姜氏君之妣也詩曰為酒為醴蒸畀祖妣以洽百禮降福孔偕齊侯使諸姜宗婦來送葬四年秋定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為己樹六檟于蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎辛未季文子卒見列卿世嗣七年城費見陪臣交叛補逸說苑衛將軍文子問子貢曰季文子三窮而三通何也子貢曰其窮事賢其通舉窮其富分貧其貴禮賤窮以事賢則不侮通而舉窮則忠于朋友富而分貧則宗族親之貴而禮賤則百姓戴之其得之固道也失之命也曰失而不得者何也曰其窮不事賢其通不舉窮其富不分貧其貴不禮賤其得之命也其失之固道也九年公送晉侯晉侯以公宴于河上問公年季武子對曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也十一年春季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍考異國語季武子為三軍叔孫穆子曰不可天子作師公帥之以征不德元侯作師卿帥之以承天子諸侯有卿無軍帥教衛以贊元侯自伯子男有大夫無卿帥賦以從諸侯是以上能征下下無姦慝今我小侯也處大國之間繕貢賦以共從者猶懼有討若為元侯之所以怒大國無乃不可乎弗從遂作中軍自是齊楚代討于魯襄昭皆如楚考異據外傳穆子以為不可據內傳則穆子似所甚願者他日杜泄之言亦然今並存之十五年春宋向戍來聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間考異新序孟獻子聘于晉宣子觴之三徙鐘石之懸不移而具獻子曰富哉家宣子曰子之家孰與我家富獻子曰我家甚貧惟有二士曰顔回兹無靈者使我邦家安平百姓和協惟此二者耳我盡于此矣客出宣子曰彼君子也以養賢為富我鄙人也以鐘石金玉為富孔子曰孟獻子之富可著于春秋按顔回去孟獻子甚遠此或姓名偶同韓非子孟獻伯相魯堂下生藿藜門外長荆棘食不二味不重席無衣帛之妾居不粟馬出不從車叔向聞之以告苖賁皇賁皇非之曰是出主之爵祿以附下也一曰孟獻伯拜上卿叔向往賀門有御馬不食禾向曰子無二馬二輿何也獻伯曰我觀國人尚有饑色是以不秣馬班白者不徒行故不二輿向曰吾始賀子之拜卿今賀子之儉也向出語苖賁皇曰助吾賀獻伯之儉也苖子曰何賀焉夫爵祿旗章所以異功伐别賢不肖也故晉國之法上大夫二輿二乘中大夫二輿一乘下大夫專乘此明等級也且夫卿必有軍事是故循車馬比卒乘以備戎事有難則以備不虞平夷則以給朝事今亂晉國之政乏不虞之備以成節儉以潔私名獻伯之儉也可與又何賀禮記孟獻子禫縣而不樂比御而不入夫子曰獻子加于人一等矣孟獻子之喪司徒旅歸四布夫子曰可也二十九年夏四月葬楚康王公及陳侯鄭伯許男送葬公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭强之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑于季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我范獻子來聘拜城杞也公享之展莊叔執幣射者三耦公臣不足取于家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦三十一年公作楚宮穆叔曰太誓云民之所欲天必從之君欲楚也夫故作其宮若不復適楚必死是宮也六月辛巳公薨于楚宮叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也己亥孟孝伯卒立敬歸之娣齊婦之子公子裯穆叔不欲曰大子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰衽如故衰于是昭公十九年矣猶有童心君子是以知其不能終也癸酉葬襄公昭公元年春會于虢三月季武子伐莒取鄆莒人告于會楚告于晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨于叔孫而為之請使請帶焉弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯來會衛社稷也我以貨免魯必受師是禍之也何衛之為趙孟聞之乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也乃免叔孫叔孫歸曽夭御季孫以勞之旦及日中不出曽夭謂曽阜曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其內焉用之阜曰數月于外一旦于是庸何傷賈而欲贏而惡囂乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之叔弓帥師疆鄆田因莒亂也四年叔孫不食乙卯卒季孫謀去中軍豎牛曰夫子固欲去之五年春王正月舍中軍卑公室也毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜泄告于殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善于禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羇弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食于他思莫在公不圖其終為國君難將及身不恤其所禮之本末將于此乎在而屑屑焉習儀以亟言善于禮不亦逺乎君子謂叔侯于是乎知禮十年叔孫婼如晉葬平公十有一年五月齊歸薨大搜于比蒲非禮也九月葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有大喪國不廢搜有三年之喪而無一日之戚國不恤喪不忌君也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國二十一年夏晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢二十五年叔孫婼聘于宋宋公享昭子賦新宮昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之公若從謂曹氏勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣魯君喪政四公矣無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣魯君失民矣焉得逞其志靖以待命猶可動必憂有鸜鵒來巢書所無也師已曰異哉吾聞文武之世童謠有曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢遠哉遙遙稠父喪勞宋父以驕鸜鵒鸜鵒往歌來哭童謠有是今鸜鵒來巢其將及乎秋書再雩旱甚也初季公鳥娶妻于齊鮑文子生申公鳥死季公亥與公思展與公鳥之臣申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶己以示秦遄之妻曰公若欲使余余不可而抶余又訴于公甫曰展與夜姑將要余秦姬以告公之公之與公甫告平子平子拘展于卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使豎勿內日中不得請有司逆命公之使速殺之故公若怨平子季郈之雞鬬季氏介其雞郈氏為之金距平子怒益宮于郈氏且讓之故郈昭伯亦怨平子臧昭伯之從弟會為讒于臧氏而逃于季氏臧氏執旃平子怒拘臧氏老將禘于襄公萬者二人其衆萬于季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓于公為且與之出射于外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若泄臣不獲死乃館于公叔孫昭子如闞公居于長府九月戊戍伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待于沂上以察罪弗許請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將蕰蕰蓄民將生心生心同求將合君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言于其衆曰若之何莫對又曰我家臣也不敢知國凡有季氏與無于我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執冰而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之于南門之西遂伐公徒子家子曰諸臣僞劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行己亥公孫于齊次于陽州齊侯將唁公于平陰公先至于野井齊侯曰寡人之罪也使有司待于平陰為近故也書曰公孫于齊次于陽州齊侯唁公于野井禮也將求于人則先下之禮之善物也齊侯曰自莒疆以西請致千社以待君命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜子家子曰天祿不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無繾綣從公無通外內以公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪或欲通內外且欲去君二三子好亡而惡定焉可同也陷君于難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰茍使意如得改事君所謂生死而肉骨昭子從公于齊與公言子家子命適公館者執之公與昭子言于幄內曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊于其寢使祝宗祈死戊辰卒左師展將以公乘馬而歸公徒執之十一月宋元公將為公故如晉卒于曲棘補逸公羊傳唁公者何昭公將弒季氏告子家駒曰季氏為無道僭于公室久矣吾欲弒之何如子家駒曰諸侯僭于天子大夫僭于諸侯久矣昭公曰吾何僭矣哉子家駒曰設兩觀乘大輅朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也且夫牛馬維婁委己者也而柔焉季氏得民衆久矣君無多辱焉昭公不從其言終弒而敗焉走之齊齊侯唁公于野井曰奈何君去魯國之社稷昭公曰喪人不佞失守魯國之社稷執事以羞再拜顙慶子家駒曰慶子免君于大難矣子家駒曰臣不佞陷君于大難君不忍加之以鈇鑕賜之以死再拜顙高子執簞食與四脡脯國子執壺漿曰吾寡君聞君在外餕饔未就敢致糗于從者昭公曰君不忘吾先君延及喪人錫之以大禮再拜稽首以衽受高子曰有夫不祥君無所辱大禮昭公蓋祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請昭公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰喪人其何稱景公曰孰君而無稱昭公于是噭然而哭諸大夫皆哭既哭以人為菑以幦為席以鞍為几以遇禮相見孔子曰其禮與其辭足觀矣十二月庚辰齊侯圍鄆二十六年春王正月庚申齊侯取鄆三月公至自齊處于鄆言魯地也夏齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人高齮能貨子猶為高氏後粟五千庾高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言于齊侯曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯邪抑魯君有罪于鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之茲無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衛國也請我受師許之請納質弗許曰信女足矣告于齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩于齊齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆魯成備而後告曰不勝衆師及齊師戰于炊鼻齊子淵捷從泄聲子射之中楯瓦繇朐汰輈匕入者三寸聲子射其馬斬鞅殪改駕人以為鬷戾也而助之子車曰齊人也將擊子車子車射之殪其御曰又之子車曰衆可懼也而不可怒也子囊帶從野泄叱之泄曰軍無私怒報乃私也將亢子又叱之亦叱之冉豎射陳武子中手失弓而罵以告平子曰有君子白晳鬒鬚眉甚口平子曰必子彊也無乃亢諸對曰謂之君子何敢亢之林雍羞為顔鳴右下苑何忌取其耳顔鳴去之苑子之御曰視下顧苑子刜林雍斷其足鑋而乘于他車以歸顔嗚三入齊師呼曰林雍乘秋盟于鄟陵謀納公也二十七年春公如齊公至自齊處于鄆言在外也秋會于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨于季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡于是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而說甲執冰以游叔孫氏懼禍之濫而自同于季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復孟懿子陽貨伐鄆鄆人將戰子家子曰天命不慆久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死于此乎公使子家子如晉公徒敗于且知冬公如齊齊侯請饗之子家子曰朝夕立于其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出十二月晉籍秦致諸侯之戍于周魯人辭以難二十八年春公如晉將如乾侯子家子曰有求于人而即其安人孰矜之其造于竟弗聽使請逆于晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安于甥舅其亦使逆君使公復于竟而後逆之二十九年春公至自乾侯處于鄆齊侯使高張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯平子每歲賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬衛侯來獻其乘馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以幄裹之公賜公衍羔裘使獻龍輔于齊侯遂入羔裘齊侯喜與之陽榖公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公私喜于陽榖而思于魯曰務人為此禍也且後生而為兄其誣也久矣乃黜之而以公衍為太子夏四月庚子叔詣卒補逸榖梁傳作叔倪季孫意如曰叔倪無病而死是皆無公也此天命也非我罪也發明按此言則叔詣殆忠于公者亦叔孫昭子之流與然昭子不及殺鬷戾亦是恨事冬十月鄆潰補逸榖梁傳潰之為言上下不相得也昭公出奔民如釋重負三十年春王正月公在乾侯不先書鄆與乾侯非公且徵過也三十一年春王正月公在乾侯言不能外內也晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如會晉荀躒于適歷荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討于意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復于寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸三十二年春王正月公在乾侯言不能外內又不能用其人也十二月公疾遍賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜己未公薨子家子反賜于府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也趙簡子問于史墨曰季氏出其君而民服焉諸侯與之君死于外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死于外其誰矜之社稷無常奉君臣無常位自古以然故詩曰高岸為谷深谷為陵三后之姓于今為庶主所知也在易卦雷乘乾曰大壯天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功于魯受費以為上卿至于文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君于是乎失國政在季氏于此君也四公矣民不知君何以得國是以為君慎器與名不可以假人定公元年夏叔孫成子逆公之喪于乾侯季孫曰子家子亟言于我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也若從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也冦而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問于榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止秋七月癸巳葬昭公于墓道南孔子之為司寇也溝而合諸墓昭公出故季平子禱于煬公九月立煬宮十五年壬申公薨于高寢補逸說苑春秋曰壬申公薨于高寢傳曰高寢者何正寢也曷為或言高寢或言路寢曰諸侯正寢三一曰高寢二曰左路寢三曰右路寢高寢者始封君之寢也二路寢者繼體之君寢也其二何曰子不居父之寢故二寢繼體君世世不可居高祖之寢故有高寢名曰高也路寢其立奈何高寢立中路寢左右春秋曰天子入于成周傳曰成周者何東周也然則天子之寢奈何曰亦三承明繼體守文之君之寢曰左右之路寢謂之承明何曰承乎明堂之後者也故天子諸侯三寢立而名實正父子之義章尊卑之事别大小之德異矣秋七月壬申姒氏卒不稱夫人不赴且不祔也葬定公雨不克襄事禮也葬定姒不稱小君不成喪也冬城漆書不時告也哀公十二年春王正月用田賦夏五月昭夫人孟子卒昭公娶于吳故不書姓死不赴故不稱夫人不反哭故不言葬小君孔子與弔適季氏季氏不絻放絰而拜二十三年春宋景曹卒季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人曰以肥之得備彌甥也有不腆先人之産馬使求薦諸夫人之宰其可以稱旌繁乎以上意如逐昭公以下哀公孫越哀公十六年夏四月孔丘卒公誄之曰旻天不弔不憗遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律子貢曰君其不沒于魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之二十一年夏五月越人始來二十三年秋八月叔青如越始使越也越諸鞅來聘報叔青也二十四年公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶于薛孝惠娶于商自桓以下娶于齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡之閏月公如越得太子適郢將妻公而多與之地公孫有山使告于季孫季孫懼使因大宰嚭而納賂焉乃止補逸禮記悼公之母死哀公為之齊衰有若曰為妾齊哀禮與公曰吾得已乎哉魯人以妻我二十五年六月公至自越季康子孟武伯逆于五梧郭重僕見二子曰惡言多矣君請盡之公宴于五梧武伯為祝惡郭重曰何肥也季孫曰請飲彘也以魯國之密邇仇讐臣是以不獲從君克免于大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂公與大夫始有惡二十七年夏四月己亥季康子卒公弔焉降禮補逸禮記季孫之母死哀公弔焉曽子與子貢弔焉閽人以君在弗內也曽子與子貢入于其廄而修容焉子貢先入閽人曰向者已告矣曽子後入閽人辟之涉內霤卿大夫皆辟位公降一等而逆之君子言之曰盡飾之道斯其行者逺矣公患三桓之侈也欲以諸侯去之三桓亦患公之妄也故君臣多間公游于陵阪遇孟武伯于孟氏之衢曰請有問于子余及死乎對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月甲戍公如公孫有陘氏因孫于邾乃遂如越國人施公孫有山氏補逸史記哀公子寧立是為悼公悼公之時三桓勝魯如小侯卑于三桓之家臣士竒曰三桓者孟孫叔孫季孫皆桓公之所出也自慶父叔牙首行弒逆為公室削弱之由成季鴆叔牙走慶父擁立閔僖二君其忠莫比而專魯國之政亦自此始蓋從古權臣未有不廢置在手而太阿因以倒授之者也傳稱成風聞成季之繇私事之而屬僖公夫人臣無私僖公之屬將以何為哉即是觀之而季已非純臣矣敗莒獲拏奄然受汶陽及費之賞大都耦國强私弱公已有其端至僖公方會于淮而輒自取項雖未知其何人而先儒以為季氏為之仲遂殺惡及視援立宣公當是時將順其意為之納賂通殷勤于齊者行父也歸父欲去三桓以張公室行父一言而東門見逐炎炎之勢真可畏也夫行父以上號稱忠賢者也及宿而心術愈不可問矣其父甫沒而費城矣三軍作矣取卞以自封矣范獻子來聘而公臣不能具三耦矣未幾而中軍復舍矣四分公室而季氏且有其二矣益以意如之凶逆是時魯君浮寄旦夕莫必其命幸而逃死寧俟孫齊適越之後哉故魯削之成于三桓而季為之魁宿及意如不容誅而責備賢者乃在季友行父以其為事權所由始也昭公習儀以亟居喪而無戚容骩骳鮮恥受制于權臣固不能以自立然伐亦亡不伐亦亡觀公之兩以戈逐獻謀者不可謂不密卒傷困辱投袂興師此亦山陽密詔高貴登車之槩也惜乎登臺之請不達權變違棄子家之言坐取奔敗天實為之謂之何哉至其流離瑣尾內制于左右外辱于大國梁丘據范鞅之徒溺于貨寶黨護意如百計以阻徒使宋元殞身叔舍含恨而昭公又昧于小不忍之義終以老死乾侯賦旄丘之葛誠不能不痛心疾首于齊晉之君臣也哀公之時視稠父微弱益甚五梧之逆杯酒失歡又不及昭之沉密乃欲恃鞭長以去三桓適越不復悲夫左傳紀事本末卷九
