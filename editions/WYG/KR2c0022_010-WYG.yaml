body:
  text: 左傳紀事本末卷十詹事府詹事高士竒撰魯陪臣交叛南蒯侯犯陽虎上下公孫宿襄公七年南遺為費宰叔仲昭伯為隧正欲善季氏而求媚于南遺謂遺請城費吾多與而役故季氏城費發明季氏城費所以自封也詎知為異日陪臣據叛之資乎蠶食于公厚殖于已悖而入者亦悖而出且南蒯即南遺之子也天道誠不僭矣昭公十二年季平子立而不禮于南蒯南蒯謂子仲吾出季氏而歸其室于公子更其位我以費為公臣子仲許之南蒯語叔仲穆子且告之故季悼子之卒也叔孫昭子以再命為卿及平子伐莒克之更受三命叔仲子欲搆二家謂平子曰三命踰父兄非禮也平子曰然故使昭子昭子曰叔孫氏有家禍殺適立庶故婼也及此若因禍以斃之則聞命矣若不廢君命則固有著矣昭子朝而命吏曰婼將與季氏訟書辭無頗季孫懼而歸罪于叔仲子故叔仲小南蒯公子憗謀季氏憗告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊南蒯之將叛也其鄉人或知之過之而歎且言曰恤恤乎湫乎攸乎深思而淺謀邇身而逺志家臣而君圖有人矣哉南蒯枚筮之遇坤之比曰黄裳元吉以為大吉也示子服惠伯曰卽欲有事何如惠伯曰吾甞學此矣忠信之事則可不然必敗外彊内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黄上美為元下美則裳參成可筮猶有闕也筮雖吉未也將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其隣者恥乎已乎已乎非吾黨之士乎平子欲使昭子逐叔仲小小聞之不敢朝昭子命吏謂小待政于朝曰吾不為怨府十三年春叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之饑者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏十四年南蒯之將叛也盟費人司徒老祁慮癸偽廢疾使請于南蒯曰臣願受盟而疾興若以君靈不死請待間而盟二子因民之欲叛也請朝衆而盟遂刼南蒯曰羣臣不忘其君畏子以及今三年聽命矣子若弗圖費人不忍其君將不能畏子矣子何所不逞欲請送子請期五日遂奔齊侍飲酒于景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉司徒老祁慮癸來歸費齊侯使鮑文子致之以上南蒯之叛定公五年六月季平子行東野還未至丙申卒于房陽虎將以璵璠歛仲梁懐弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既葬桓子行東野及費子洩為費宰逆勞于郊桓子敬之勞仲梁懐仲梁懐弗敬子洩怒謂陽虎子行之乎補逸家語季平子卒將以君之璠璵歛贈以珠玉孔子為中都宰聞之歴級而救焉曰送死而以寶玉是猶曝尸于中原也其示民以姦利之端而有害于死者安用之且孝子不順情以危親忠臣不兆姦以陷君乃止乙亥陽虎囚季桓子及公父文伯而逐仲梁懐冬十月丁亥殺公何藐己丑盟桓子于稷門之内庚寅大詛逐公父歜及秦遄皆奔齊六年春二月公侵鄭取匡為晉討鄭之伐胥靡也徃不假道于衛及還陽虎使季孟自南門入出自東門舍于豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質此羣臣之所聞也今將以小忿䝉舊德無乃不可乎大姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止夏季桓子如晉獻鄭俘也陽虎强使孟懿子徃報夫人之幣晉人兼享之孟孫立于房外謂范獻子曰陽虎若不能居魯而息肩于晉所不以為中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故强為之請以取入焉陽虎又盟公及三桓于周社盟國人于亳社詛于五父之衢七年齊人歸鄆陽關陽虎居之以為政齊國夏伐我陽虎御季桓子公歛處父御孟懿子將宵軍齊師齊師聞之墮伏而待之處父曰虎不圖禍而必死苫夷曰虎陷二子于難不待有司余必殺女虎懼乃還不敗八年春王正月公侵齊門于陽州士皆坐列曰顔高之弓六鈞皆取而傳觀之陽州人出顔高奪人弱弓籍丘子鉏擊之與一人俱斃偃且射子鉏中頰殪顔息射人中眉退曰我無勇吾志其目也師退冉猛偽傷足而先其兄會乃呼曰猛也殿公侵齊攻廪丘之郛主人焚衝或濡馬褐以救之遂毁之主人出師奔陽虎偽不見冉猛者曰猛在此必敗猛逐之顧而無繼偽顛虎曰盡客氣也苫越生子將待事名之陽州之役獲焉名之曰陽州季寤公鉏極公山不狃皆不得志于季氏叔孫輒無寵于叔孫氏叔仲志不得志于魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛卯禘于僖公壬辰將享季氏于蒲圃而殺之戒都車曰癸巳至成宰公歛處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及于子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徵死死無益于主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰徃也孟氏選圉人之壯者三百人以為公期築室于門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎刼公與武叔以伐孟氏公歛處父帥成人自上東門入與陽氏戰于南門之内弗勝又戰于棘下陽氏敗陽虎說甲如公宮取寶玉大弓以出舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜于徵死何暇追余從者曰嘻速駕公歛陽在公歛陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之子言辨舍爵于季氏之廟而出陽虎入于讙陽關以叛攷異公羊傳盜者孰謂謂陽虎也陽虎者曷為者也季氏之宰也季氏之宰則微者也惡乎得國寶而竊之陽虎專季氏季氏專魯國陽虎拘季孫孟氏與叔孫氏迭而食之睋而鋟其板曰某月某日將殺我于蒲圃力能救我則于是至乎日若時而出臨南者陽虎之出也御之于其乘焉季孫謂臨南曰以季氏之世世有子子可以不免我死乎臨南曰有力不足臣何敢不勉陽越者陽虎之從弟也為右諸陽之從者車數十乘至于孟衢臨南投策而墜之陽越下取策臨南駷馬而由乎孟氏陽虎從而射之矢著于莊門然而甲起于琴如弑不成却反舍于郊皆說然息或曰弑千乘之主而不克舍此可乎陽虎曰夫孺子得國而己如丈夫何睋而曰彼哉彼哉趣駕既駕公歛處父帥師而至慬然後得免自是走之晉寶者何璋判白弓繡質龜青純左公氏作林楚公羊作臨南九年夏陽虎歸寳玉大弓書曰得器用也凡獲器用曰得得用焉曰獲六月伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諌曰臣甞為隷于施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵于季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富于季氏而大于魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之載葱靈寢于其中而逃追而得之囚于齊又以葱靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎補逸家語陽虎既奔齊自齊奔晉適趙氏孔子聞之謂子路曰趙氏其世有亂乎子路曰權不在焉豈能為亂孔子曰非女所知夫陽虎親富而不親仁有寵于季孫又將殺之不克而奔求容于齊齊人囚之乃亡歸晉齊魯二國已去其疾趙簡子好利而多信必溺其說而從其謀禍敗所終非一世可知也韓非子陽虎逐于魯疑于齊走而之趙趙簡主迎而相之左右曰虎善竊人國政何相也簡主曰陽虎務取之我務守之遂執術而御之陽虎不敢為非以善事簡主興主之强幾至于霸也發明按當時權臣柄國專尚詐力故盜賊亦得以售其奸雖曰使貪使詐明主亦時有之然終非盛世事也十年初叔孫成子欲立武叔公若藐固諌曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰吾以劔過朝公若必曰誰之劔也吾稱子以告必觀之吾偽固而授之末則可殺也使如之公若曰爾欲呉王我乎遂殺公若侯犯以郈叛武叔懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事于齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言于郈中曰侯犯將以郈易于齊齊人將遷郈民衆兇懼駟赤謂侯犯曰衆言異矣子不如易于齊與其死也猶是郈也而得紓焉何必此齊人欲以此偪魯必倍與子地且盍多舍甲于子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易于齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤將射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿毎出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈武叔聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家隷勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜十二年仲由為季氏宰將墮三都于是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宮登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公斂處父謂孟孫墮成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克哀公十四年初孟孺子洩將圉馬于成成宰公孫宿不受曰孟孫為成之病不圉馬焉孺子怒襲成從者不得入乃反成有司使孺子鞭之秋八月辛丑孟懿子卒成人奔喪弗内袒免哭于衢聽共弗許懼不歸十五年春成叛于齊武伯伐成不克遂城輸冬及齊平子服景伯如齊子贛為介見公孫成曰人皆臣人而有背人之心况齊人雖為子役其有不貳乎子周公之孫也多饗大利猶思不義利不可得而喪宗國將焉用之成曰善哉吾不早聞命陳成子館客曰寡君使恒告曰寡人願事君如事衛君景伯揖子贛而進之對曰寡君之願也昔晉人伐衛齊為衛故伐晉冠氏喪車五百因與衛地自濟以西禚媚杏以南書社五百呉人加敝邑以亂齊因其病取讙與闡寡君是以寒心若得視衛君之事君也則固所願也成子病之乃歸成公孫宿以其兵甲入于嬴攷異孔叢子孟氏之臣叛武伯問孔子曰臣人而叛天下所不容也子姑待之三旬果自歸孟氏武伯將執之訪于夫子夫子曰無也子之于臣禮意不至是以去子今其自反又何執焉子修禮以待之則臣去子將安徃武伯乃止臣士竒曰傳曰所惡于上者無以使下所惡于下者無以事上故順事恕施者非獨以稱物情亦所以杜禍亂之原而慎反爾之幾也魯三桓朘削公室固都城以為狡兎之窟使其君民食于他自謂得計而不虞家臣之議其後者相隨屬也其父好兵其子必且行刦主欲背公而欲其臣不效尤得乎經傳所載昭定哀以來陪臣之據邑以叛者凡四季之叛者二孟孫叔孫之叛者各一南蒯也狃輒也侯犯也公孫宿也此不過憑倚强都介恃隣境而又有司徒老祁慮癸駟赤以為之間至費與成則孔子謀之子路子貢從而贊之不旋踵而叛人奔竄城郭依然其患猶未劇也惟陽虎以梟雄之姿不仁之性中據魯國而執其政柄欲囚桓子則囚之欲盟三桓則盟之欲逐其所不快則逐之當是時魯人畏之如雷電鬼神之不可犯及其既敗脫甲于公宮取寶玉大弓以出舍于五梧之衢從容逸豫無有能致難之者使蒲圃之事竟成則去一三桓而得一三桓公室之存亡未可知也而豈止私家之患也哉然以季氏之强取民有衆其不臣之迹孟與叔不如是之甚也而費凡再叛更益以陽虎之逞亂幾墜厥宗天道好還不可為人臣以所惡于下者事其上之戒哉左傳紀事本末卷十
