  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0022_WYG_005-1a, image: WYG0369/WYG0369-0037a.png}
body:
  text: 左傳紀事本末卷五詹事府詹事髙士竒撰魯隠公嗣國桓公篡弑附惠公元妃孟子孟子卒繼室以聲子生隠公宋武公生仲子仲子生而有文在手曰為魯夫人故仲子歸于我生桓公而惠公薨是以隠公立而奉之辨誤史記初惠公適夫人無子公賤妾聲子生子息息長為娶于宋宋女至而好惠公奪而自娶之生子允登宋女為夫人以允為太子及惠公卒為允少故魯人共令息攝政不言即位按惠公雖非魯之令主然魯秉周禮不應有衞宣楚平之事史遷之説近誣元年春王周正月不書即位攝也補逸公羊傳曰公何以不言即位成公意也何成乎公之意公將平國而反之桓曷為反之桓桓幼而貴隠長而卑立子以貴不以長桓何以貴母貴也子以母貴母以子貴三月公及邾儀父盟于蔑邾子克也未王命故不書爵曰儀父貴之也公攝位而欲求好于邾故為蔑之盟秋七月天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至贈死不及尸弔生不及哀豫凶事非禮也冬十月庚申改葬惠公公弗臨故不書惠公之薨也有宋師太子少葬故有闕是以改葬衞侯來㑹葬不見公亦不書衆父卒公不與小斂故不書日二年春公㑹戎于潛修惠公之好也戎請盟公辭司空無駭入極費庈父勝之戎請盟秋盟于唐復修戎好也三年夏君氏卒聲子也不赴于諸侯不反哭于寢不袝于姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏攷異歐陽修曰公榖以尹氏卒為正卿左氏以尹氏卒尹氏作君氏為隠公母一以為男子一以為婦人得于所傳者葢如是四年夏公及宋公遇于清詳見魯與宋衞通好秋諸侯伐鄭詳見州吁之亂宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也五年春公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民于軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春蒐夏苗秋獮冬狩皆于農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登于俎皮革齒牙骨角毛羽不登于器則公不射古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也公曰吾將畧地焉遂往陳魚而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言逺地也九月考仲子之宫將萬焉公問羽數于衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之于是初獻六羽始用六佾也攷異榖梁傳考者何也考者成之也成之為夫人也禮庶子為君為其母築宫使公子主其祭也于子祭于孫止仲子者惠公之母隠孫而修之非隠也初始也榖梁子曰舞夏天子八佾諸公六佾諸侯四佾初獻六羽始僭樂矣尸子曰舞夏自天子至諸侯皆用八佾初獻六羽始厲樂矣宋人取邾田邾人告于鄭曰請君釋憾于宋敝邑為道鄭人以王師㑹之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問于使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也冬十二月辛巳臧僖伯卒公曰叔父有憾于寡人寡人弗敢忘葬之加一等六年春鄭人來渝平更成也夏盟于艾始平于齊也七年齊侯使夷仲年來聘結艾之盟也八年春鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也夏四月齊人卒平宋衞于鄭冬齊侯使來告成三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明德無駭卒羽父請諡與族公問族于衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏九年夏宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭伯以王命來告伐宋冬公㑹齊侯于防謀伐宋也十年春王正月公㑹齊侯鄭伯于中丘癸丑盟于鄧為師期夏五月羽父先㑹齊侯鄭伯伐宋六月戊申公㑹齊侯鄭伯于老桃壬戌公敗宋師于菅庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我君子謂鄭莊公于是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也十一年冬羽父請殺桓公將以求大宰公曰為其少故也吾將授之矣使營莵裘吾將老焉羽父懼反譖公于桓公而請弑之公之為公子也與鄭人戰于狐壤止焉鄭人囚諸尹氏賂尹氏而禱于其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊于社圃館于寪氏壬辰羽父使賊弑公于寪氏立桓公而討寪氏有死者不書葬不成喪也桓公元年春公即位修好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也夏四月丁未公及鄭伯盟于越結祊成也盟曰渝盟無享國冬鄭伯拜盟十七年春及邾儀父盟于趡尋蔑之盟也秋伐邾宋志也臣士竒曰隠公攝讓之是非四傳論之詳矣夫讓美德也太伯仲雍行之伯夷叔齊又行之君子不以為非何獨疑于隠公也説者謂隠公雖長當立不當探惠公之邪心而成之隠惟不自取以攝啟爭卒有鍾巫之及是則然矣顧隠之失不在于讓而所以處讓之道有未善也桓公始生之年雖不可考但隠居攝十年被弑而桓立立三年而成昏于齊距隠居攝之始年十三嵗耳古未有十三嵗而成昏者以此推之隠元年桓即幼亦不下三五嵗使隠能如周公輔成王故事抱負以臨羣臣聽國政即不然令桓毓質深宫已則身都魯相而代之經理其發號施令入告王朝通問隣國一稱桓君而已無與焉則名分定而已之心迹亦明雖有百奸人烏能離間于其間哉不此之圖而奄然立乎其位國之人皆指而目之曰此魯君也㑹盟摟伐之所至羣指而目之曰此魯君也其于𤓰李之嫌謂何矣且隠始年桓尚幼及子翬請殺之時桓已十餘嵗矣猶不反國而歸之藉口少故莵裘雖營何以解于桓公之疑而亦何以杜羽父之譖哉若隠者讓則有之而謂其能絶逺嫌疑以為讓則未也夫其始戰狐壤而被止是無勇也禱鍾巫而以其淫祀之主來是不智也攝位而首從事于盟坎是不信也改葬惠公而身不臨是不孝也衆父卒而不與小斂是不仁也㑹潛盟唐是紊防也入極渝平取郜防是貪得也羽父請以師伐鄭而不能禁是縱權也草次遇清是簡禮也因使者之失時而輕絶隣好是反覆也于棠畧地是文過也入祊易許是無君親也迹隠公十年經傳所載諸行事鮮有當人意者世但以其讓桓而桓弑之惡桓深則其賢隠也若不啻口而不知如隠之讓則實足以啟爭端而為禍媒者也太伯仲雍夷齊讓而能逺其跡隠雖讓桓貪其位而攝之此寪氏之刃所由及也左傳紀事本末卷五
