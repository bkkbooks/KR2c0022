body:
  text: 左傳紀事本末卷三十二詹事府詹事髙士竒撰晉并戎狄詳文襄伯業者不復重載長狄附僖公八年晉里克帥師梁由靡御虢射為右以敗狄於采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月十六年秋狄侵晉取狐厨受鐸涉汾及昆都因晉敗也二十二年初平王之東遷也辛有適伊川見披髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎於伊川文公十一年鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘冬十月甲午敗狄於鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門以命宣伯初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御皇父充石公子穀甥為右司冦牛父駟乘以敗狄於長丘獲長狄緣斯皇父之二子死焉宋公於是以門賞耐班使食其征謂之耐門晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首於周首之北門衛人獲其季弟簡如鄋瞞由是遂亡宣公六年秋赤狄伐晉圍懷及邢丘晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也七年夏赤狄侵晉取向陰之禾十一年晉郤成子求成於衆狄衆狄疾赤狄之役遂服於晉秋會於欑函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非德莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤况寡德乎十三年秋赤狄伐晉及清先縠召之也十五年潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三俊才不如待後之人伯宗曰必伐之狄有五罪俊才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其俊才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄於曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之秋七月壬午晉侯治兵於稷以略狄土立黎侯而還晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣十六年春晉士會帥師滅赤狄甲氏及留吁鐸辰成公三年晉郤克衛孫良夫伐牆咎如討赤狄之餘焉牆咎如潰上失民也昭公元年晉中行穆子敗無終及羣狄於大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之十二年晉荀吳偽會齊師者假道於鮮虞遂入昔陽秋八月壬午滅肥以肥子綿臯歸晉伐鮮虞因肥之役也十三年鮮虞人聞晉師之悉起也而不警邊且不修備晉荀吳自著雍以上軍侵鮮虞及中人驅衝競大獲而歸十五年晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子鳶鞮歸十七年晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘於文宫二十一年公如晉及河鼓叛晉晉將伐鮮虞故辭公二十二年晉之取鼓也既獻而反鼓子焉又叛於鮮虞六月荀吳略東陽使師偽糴者負甲以息於昔陽之門外遂襲鼓滅之以鼓子鳶鞮歸使涉他守之定公三年秋九月鮮虞人敗晉師於平中獲晉觀虎恃其勇也五年晉士鞅圍鮮虞報觀虎之役也臣士奇曰晉四面皆狄惟薑戎役屬於晉為不侵不犯之臣赤狄在其北即潞氏也陸渾在其南秦晉之所遷於伊川者也鮮虞在其東所謂中山不服者也白狄在其西嘗與秦伐晉者也故曰狄之廣莫晉之啓土不亦宜乎蓋以其兼羣狄而為疆也夫狄不可以信義服非大創之不足以震其魄而冀數年之安故里克懼之之言不如虢射之善采桑敗而期年復來亦可以為禦戎者之明鑒矣長狄或謂即赤狄潞氏也兄弟三人宕軼中國矢石莫能傷意殆防風氏之類國於鄋瞞滅潞所獲特流而之潞者耳非潞種也酆舒殺伯姬又傷嬰兒之目雖有雋才不容不討但戮其罪人於法已足貪其土而殄滅之亦太酷矣肥與鮮虞皆晉之所欲吞噬者也而圍鼓之役不納其叛人及請以城降見其猶有食色令修而城待食盡力竭然後取之於以勸義而懲怠非為鼓人兼為晉國也至鳶鞮既俘而又歸之終為不義自取滅亡非晉罪矣陸渾逼在王都而南昵於楚此門庭之冦不可不除者也晉能請王命總王師以臨之蔑不得志而敢為詐諼之術上欺天子蓋利陸渾之土地而懼王室分有之耳中行穆子貪大鹵之捷毁車崇卒遂令車戰法亡亦可慨矣夫左傳紀事本末卷三十二
