body:
  text: 左傳紀事本末卷四十六詹事府詹事高士竒撰楚諸令尹代政武王以後靈王以前莊公三十年楚公子元歸自伐鄭而處王宫鬭射師諫則執而梏之秋申公鬭班殺子元鬭穀於菟為令尹自毁其家以紓楚國之難文公九年冬楚子越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也十年初楚范巫矞似謂成王與子玉子西曰三君皆將强死城濮之役王思之故使止子玉曰母死不及止子西子西縊而縣絶王使適至遂止之使為商公㳂漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為工尹又與子家謀弒穆王穆王聞之五月殺鬭宜申及仲歸十二年楚令尹大孫伯卒成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢十四年楚莊王立子孔潘崇將襲羣舒使公子燮與子儀守而伐舒蓼二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商密廬戢黎及叔麇誘之遂殺鬭克及公子燮初鬭克囚於秦秦有殽之敗而使歸求成成而不得志公子燮求令尹而不得故二子作亂宣公四年初楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及令尹子文卒鬭般為令尹子越為司馬蒍賈為工正譖子揚而殺之子越為令尹已為司馬子越又惡之乃以若敖氏之族圄伯嬴於轑陽而殺之遂處蒸野將攻王王以三王之子為質焉弗受師於漳澨秋七月戊戌楚子與若敖氏戰於臯滸伯棼射王汰輈及鼓跗著於丁寧又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏初若敖娶於䢵生鬭伯比若敖卒從其母畜於䢵淫於䢵子之女生子文焉䢵夫人使棄諸夢中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳穀謂虎於莵故命之曰鬭穀於莵以其女妻伯比實為令尹子文其孫針尹克黃使於齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生補逸說苑楚令尹子文之族有干法者廷理拘之聞其令尹之族也而釋之子文召廷理而責之曰凡立廷理者將以司犯王令而察觸國法也夫直士持法柔而不撓剛而不折今棄法而背令而釋犯法者是為理不端懷心不公也豈吾營私之意也何廷理之駮於法也吾在上位以率士民士民或怨而吾不能免之於法今吾族犯法甚明而使廷理因緣吾心而釋之是吾不公之心明著於國也執一國之柄而以私聞與吾生不以義不若吾死也遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人成王聞之不及履而至於子文之室曰寡人幼少置理失其人以違夫子之意於是黜廷理而尊子文使及內政國人聞之曰若令尹之公也吾黨何憂乎乃相與作歌曰子文之族犯國法程廷理釋之子文不聽恤顧怨萌方正公平十一年令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板幹稱畚築程土物議逺邇略基趾具餱糧度有司事三旬而成不愆於素成公二年楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明德慎罰文王所以造周也明德務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也君其圖之王乃止子反欲取之巫臣曰是不祥人也是夭子蠻殺御叔弒靈侯戮夏南出孔儀喪陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是子反乃止王以豫連尹襄老襄老死於邲不獲其尸其子黑要蒸焉巫臣使道焉曰歸吾聘女又使自鄭召之曰尸可得也必來迎之姬以告王王問諸屈巫對曰其信知罃之父成公之嬖也而中行伯之季弟也新佐中軍而善鄭皇戌甚愛此子其必因鄭而歸王子與襄老之尸以求之鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姬歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之及共王即位將為陽橋之役使屈巫聘於齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至以臣於晉晉人使為邢大夫子反請以重幣錮之王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣且彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉七年楚圍宋之役師還子重請取於申吕以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至於漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黑要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子夀夢說之乃通吳於晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之㑹吳入州來子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者吳盡取之襄公二年楚公子申為右司馬多受小國之賂以逼子重子辛楚人殺之故書曰楚殺其大夫公子申三年春楚子重伐吳為簡之師克鳩兹至於衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而己子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒五年楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑詩曰周道挺挺我心扃扃講事不令集人來定已則無信而殺人以逞不亦難乎夏書曰成允成功十二年秦嬴歸於楚楚司馬子庚聘於秦為夫人寧禮也十四年楚子囊還自伐吳卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘增其名將死不忘衛社稷可不謂忠乎忠民之望也詩曰行歸於周萬民所望忠也補逸吕氏春秋荆人與吳人將戰荆師寡吳師衆荆將軍子囊曰我與吳人戰必敗敗王師辱王名虧壤土忠臣不忍為也不復於王而遁至於郊使人復於王曰臣請死王曰將軍之遁也以其為利也今誠利將軍何死子囊曰遁者無罪則後世之為王者將皆依不利之名而效臣遁若是則荆國終為天下撓遂伏劍而死王曰請成將軍義乃為之桐棺三寸加斧鑕其上十五年楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子橐師為右司馬公子成為左司馬屈到為莫敖公子追舒為針尹屈蕩為連尹養由基為宫廄尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懷人置彼周行能官人也王及公侯伯子男甸采衛大夫各居其列所謂周行也補逸韓非子荆王弟在秦秦不出也中射之士曰資臣百金臣能出之因載百金之晉見叔向曰荆王弟在秦秦不出也請以百金委叔向受金而以見之晉平公曰可以城壺丘矣平公曰何也對曰荆王弟在秦秦不出也是秦惡荆也必不敢禁我城壺丘若禁之我曰為我出荆王之弟我不城也彼如出之可以德荆彼不出是卒惡也必不敢禁吾城壺丘矣公曰善乃城壺丘謂秦公曰為我出荆王之弟吾不城也秦因出之荆王大說以練金百鎰遺晉考異按說苑作楚公子牛即子庚也二十一年夏楚子庚卒楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹二十二年楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗忍也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之二十五年薳子馮卒屈建為令尹屈蕩為莫敖補逸國語屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之宗老曰夫子屬之子木曰不然夫子承楚國之政其法刑在民心而藏在王府上之可以比先王下之可以訓後世雖微楚國諸侯莫不譽其祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用楚蒍掩為司馬子木使庀賦數甲兵甲午蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃量入修賦賦車籍馬賦車兵徒兵甲楯之數既成以授子木禮也二十六年初楚伍參與蔡大師子朝友其子伍舉與聲子相善也伍舉娶於王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戍將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也商頌有之曰不僭不濫不敢怠皇命於下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譖雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二卻必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師􅑒子反死之鄭叛吳興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其爵祿而復之聲子使椒鳴逆之二十七年崔氏之亂申鮮虞來奔僕賃於野以喪莊公冬楚人召之遂如楚為右尹昭公十二年楚子謂成虎若敖之餘也遂殺之或譛成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懷寵也臣士竒曰楚雖見黜於春秋然其卿大夫往往多才傑深謀逺慮忘家忘私與齊晉賢臣相頡頏者子元之入處王宫也勢將盜楚而有之維時非用穀於菟自毁其家以紓楚國之難禍未豸也觀其三仕三己不見喜愠及麛裘而朝諸事豈不誠賢矣哉越椒狼子野心必滅若敖氏之宗子文豫知而請殺之與叔向之母之惡叔虎也皆如左契而子良不忍卒以圯族針尹慷慨就理不敢棄君之命有乃祖風若敖之幸而不餒有以也蒍艾獵起於海濵相楚三年至不辨乘馬之牝牡忠勤纍著故能以其君伯城沂之慮事以素其一節耳此二人皆楚國令尹之最賢者子重子囊諸人何足數耶子反以一艷婦怨屈巫遂滅其族而分其室致令通吳於上國以搖蕩我邉疆卒疲於奔命以死怨毒之於人甚矣哉子囊視子反較賢圍宋之役茍焉結成何功之有而欲請申吕以自封悖矣無申吕則晉鄭必至於郢屈巫之言甚正而附子反以分其室是皆憑私結怨而不知有奉公之義者也城郢之忠亦何以解於誤國之罪乎子申以多受小國之賂死子辛以侵欲於陳死皆自取之公子午當晉悼三駕之後欲息兵為社稷利不得已而數出以觀釁非其本志蓋亦賢者薳子馮懲申叔之言遽辭相位戒子南之戮立謝寵人不有藥石安能生死而肉骨乎成虎懷祿竟以焚身誠迷而不悟之下愚也歷觀聲子班荆之語䇿士俊才為敵國用如析公雍子子靈苗賁皇輩疾首拊心斫喪宗國敗軌相尋奈何又以子牟之故鋌而伍大夫也向非聲子善辭椒舉其不復乎歷觀楚之興亡其機皆係於令尹之賢否用舍可不慎乎哉左傳紀事本末卷四十六
