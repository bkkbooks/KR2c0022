body:
  text: 左傳紀事本末卷三十七詹事府詹事高士竒撰衛州吁宣姜之亂懿公亡國附文公定狄難隱公三年衛莊公娶於齊東宫得臣之妹曰莊姜美而無子衛人所為賦碩人也又娶於陳曰厲媯生孝伯早死其娣戴媯生桓公莊姜以為已子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁游禁之不可桓公立乃老補逸史記莊公五年取齊女為夫人好而無子又娶陳女為夫人生子早死陳女女弟亦幸於莊公而生子完完母死莊公令夫人齊女子之立為大子莊公有寵妾生子州吁十八年州吁長好兵莊公使將石碏諫莊公曰庶子好兵使將亂自此起不聽列女傳齊女為衛莊公夫人號曰莊姜始往操行衰惰心淫佚冶容傅母見其婦道不正諭之云子之家世世尊榮當為民法則子之質聰達於事當為人表式儀貌莊麗不可不自修整衣錦絅裳飾在輿馬是不貴德也乃作詩曰碩人其頎衣錦絅衣齊侯之子衛侯之妻東宫之妹邢侯之姨談公惟私砥厲女以高節女遂感而自修君子善傅母之防未然也四年春衛州吁弒桓公而立公與宋公為會將尋宿之盟未及期衛人來告亂夏公及宋公遇於清宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲曰衛州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也諸侯之師敗鄭徒兵取其禾而還州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告於陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖於衛九月衛人使右宰醜涖殺州吁於濮石碏使其宰獳羊肩涖殺石厚於陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎衛人逆公子晉於邢冬十二月宣公即位書曰衛人立晉衆也五年夏葬衛桓公衛亂是以緩四月鄭人侵衛牧以報東門之役衛之亂也郕人侵衛故衛師入郕桓公三年夏齊侯衛侯胥命於蒲不盟也十六年初衛宣公蒸於夷姜生急子屬諸右公子為之娶於齊而美公取之生夀及朔屬夀於左公子夷姜縊宣姜與公子朔搆急子公使諸齊使盜待諸莘將殺之夀子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒夀子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子泄右公子職立公子黔牟惠公奔齊考異史記初宣公愛夫人夷姜夷姜生子伋為太子而令右公子傅之右公子為太子娶齊女未入室而宣公見所欲為太子婦者好說而自取之更為太子取他女發明按史則夷姜乃宣公夫人也左氏以為蒸恐非十七年春盟於黃平齊紀且謀衛故也莊公五年冬伐衛納惠公也六年春王人救衛夏衛侯入放公子黔牟於周放寧跪於秦殺左公子泄右公子職乃即位君子以二公子之立黔牟為不度矣夫能固位者必度於本末而後立衷焉不知其本不謀知本之不枝弗强詩云本枝百世閔公二年冬十二月狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰公與石祁子玦與寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子渠孔御戎子伯為右黃夷前驅孔嬰齊殿及狄人戰於熒澤衛師敗績遂滅衛衛侯不去其旗是以甚敗狄人囚史華龍滑與禮孔以逐衛人二人曰我大史也實掌其祭不先國不可得也乃先之至則告守曰不可待也夜與國人出狄入衛從之又敗諸河初惠公之即位也少齊人使昭伯蒸於宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬於曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩補逸呂氏春秋衛懿公有臣曰𢎞演有所於使翟人攻衛其民曰君之所豫位祿者鶴也所貴富者宮人也君使宫人與鶴戰余焉能戰遂潰而去翟人至及懿公於滎澤殺之盡食其肉獨舍其肝𢎞演至報使於肝畢呼天而啼盡哀而止曰臣請為襮因自殺先出其腹實內懿公之肝桓公聞之曰衛之亡也以為無道也今有臣若此不可不存於是復立衛於楚丘𢎞演可謂忠矣殺身出生以殉其君非徒殉其君也又令衛之宗廟復立祭祀不絶可謂有功矣史記初翟殺懿公也衛人憐之思復立宣公前死太子伋之後伋子又死而代伋死者子夀又無子太子伋同母弟二人其一曰黔牟黔牟嘗代惠公為君八年復去其二曰昭伯昭伯黔牟皆已前死故立昭伯子申為戴公戴公卒復立其弟燬為文公文公初立輕賦平罪身自勞與百姓同苦以收衛民僖之元年齊桓公遷邢於夷儀二年封衛於楚丘邢遷如歸衛國忘亡衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘僖公十八年冬邢人狄人伐衛圍菟圃衛侯以國讓父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師於訾婁狄師還十九年秋衛人伐邢以報菟圃之役於是衛大旱卜有事於山川不吉寧莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之師興而雨二十年秋齊狄盟於邢為邢謀衛難也於是衛方病邢二十四年衛人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕二十五年春衛人伐邢二禮從國子巡城掖以赴外殺之正月丙午衛侯燬滅邢同姓也故名禮至為銘曰余掖殺國子莫余敢止臣士竒曰國家之患莫大於驕淫驕淫由於寵昵欲動情肆而不能裁之以禮義鮮不釀無窮之禍而寖至於敗亡州吁嬖人之子也莊姜惡之與武姜之愛叔段相去逺矣武姜欲立叔段武公弗許猶足以致亂况州吁之憑寵好兵莊公弗禁石碏之切諫棄若罔聞州吁卒殺桓公而自立安忍阻兵毒流四國衛之禍莊公為之也宣公蒸於夷姜又納子伋之婦淫昏無道史册罕聞夀子急載旌之難而惠公不能容一黔牟連五國之兵抗王官以入國柏舟之詩何不聞焉昭伯復蒸於宣姜生二子與二夫人而其由則自齊人使之亷恥喪矣上蒸下淫衛於是滅倫傷化者再世何怪桑間濮上相習成風而不可止耶孔子序詩備録牆茨鶉奔諸什於春秋歷紀夷姜宣姜中冓之事以志衛為狄滅之由福善禍淫其應如響而或以懿公之亡國緣於好鶴其亦未之察矣𢎞演報使於肝以身為襮千古傷之而左氏失紀衛當東渡遺民男女僅七百有三十人康叔武公之祀不絶如線矣夫人墮載馳之淚公子下廬漕之甲而戴公短祚國燼僅存非文公崇帛冠布衣之節務材訓農敬教勸學以勵精興復為事安能舉訾婁之師而靖邢狄之難哉夫一衛也曩以驕淫敗後以勤儉興斯亦古今得失之林而有國者所宜鑒也左傳紀事本末卷三十七
