body:
  text: 左傳紀事本末卷十一詹事府詹事高士竒撰魯與邾莒搆怨魯伐滅小國附小國來伐并附隱公元年公及邾儀父盟于蔑五年邾人鄭人伐宋七年伐邾為宋討也桓公二年秋七月杞侯來朝不敬杞侯歸乃謀伐之九月入杞討不敬也三年公㑹杞侯于郕杞求成也補逸桓公七年焚咸丘公羊傳曰邾婁之邑也其不言邾咸丘何也疾其以火攻十七年春二月公及邾儀父盟于趡秋伐邾宋志也莊公二年伐於餘丘邾邑也僖公元年九月公敗邾師于偃虛丘之戍將歸者也發明杜注虛丘邾地云云正義曰犖之盟也邾人在焉公既盟而敗其師傳不明言其故直云虚丘之戍不知虛丘誰地何故戍之服䖍云虛丘魯邑魯有亂邾使兵戍虛丘魯與邾無怨因兵將還要而敗之所以惡僖公也邾之與魯本無怨惡僖公奔邾則為之外主國亂則戍其内邑無故而敗其師亡信背義莫斯之甚非僖公作頌之主所當行也杜以為不然故别為此說亦無所據要其理當然也冬莒人來求賂公子友敗諸酈獲莒子之弟挐非卿也嘉獲之也補逸榖梁傳莒無大夫其曰莒挐何也以吾獲之目之也内不言獲此其言獲何也惡公子之紿紿者奈何公子友謂莒挐曰吾二人不相說士卒何罪屏左右而相摶公子友處下左右曰孟勞孟勞者魯之寳刀也公子友以殺之然則何以惡乎紿也曰棄師之道也僖公二十一年任宿須句顓臾風姓也實司太皥與有濟之祀以服事諸夏邾人滅須句須句子來奔因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皥濟而修祀紓禍也二十二年春伐邾取須句反其君焉禮也邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰又曰敬之敬之天維顯思命不易哉先王之明德猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聽八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門補逸檀弓邾婁復之以矢葢自戰于升陘始也二十五年衛人平莒于我十二月盟于洮修衛文公之好且及莒平也二十六年春王正月公㑹莒兹㔻公寗莊子盟于向尋洮之盟也齊師侵我西鄙討是二盟也二十七年春杞桓公來朝用夷禮故曰子公卑杞杞不共也秋入杞責無禮也三十三年公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾文公七年春公伐邾間晉難也三月甲戌取須句寘文公子焉非禮也十三年邾子卒邾文公卜遷于繹史曰利于民而不利于君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命十四年邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾邾文公元妃齊姜生定公二妃晉姬生㨗菑文公卒邾人立定公㨗菑奔晉晉趙盾以諸侯之師八百乘納㨗菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還攷異按納㨗菑者公羊曰郤缺榖梁曰缺克宣公四年公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮九年秋取根牟言易也十年師伐邾取繹冬子家如齊伐邾故也十三年春齊師伐莒莒恃晉而不事齊故也十八年秋七月邾人戕鄫子于鄫凡自虐其君曰弑自外曰戕成公六年取鄟言易也八年聲伯如莒逆也十八年八月邾宣公來朝即位而來見也襄公元年九月邾子來朝禮也四年冬公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇於仇讐而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之冬十月邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘國人逆喪者皆髽魯於是乎始髽國人誦之曰臧之狐裘敗我于狐駘我君小子朱儒是使朱儒朱儒使我敗於邾補逸家語子路問于孔子曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多喪而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之古之道也其君在焉者有詔則無討禮記檀弓魯婦人之髽而弔也自敗于臺駘始也五年春公至自晉穆叔覿鄫大子于晉以成屬鄫書曰叔孫豹鄫大子巫如晉言比諸魯大夫也九月盟于戚穆叔以屬鄫為不利使鄫大夫聽命于會六年莒人滅鄫鄫恃賂也冬穆叔如邾聘且修平晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命攷異榖梁傳曰莒人滅鄫非滅也立異姓以莅祭祀滅亡之道也公羊傳曰莒女有為鄫夫人者葢欲立其出矣八年莒人伐我東鄙以疆鄫田十年莒人間諸侯之有事也故伐我東鄙十二年春莒人伐我東鄙圍台季武子救台遂入鄆取其鐘以為公盤十三年夏邿亂分為三師救邿遂取之凡書取言易也用大師焉曰滅弗地曰入十有五年秋邾人伐我南鄙使告于晉晉將為會以討邾莒晉侯有疾乃止冬晉悼公卒遂不克會十六年春葬晉悼公平公即位會于溴梁命歸侵田以我故執邾宣公莒犂比公且曰通齊楚之使十七年冬邾人伐我南鄙為齊故也十九年春諸侯還自沂上盟于督揚曰大毋侵小執邾悼公以其伐我故遂次于泗上疆我田取邾田自漷水歸之于我二十年春及莒平孟莊子會莒人盟于向督揚之盟故也邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之二十一年春公如晉拜師及取邾田也邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司㓂將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皁牧輿馬其小者衣裳劔帯是賞盜也賞而去之其或難焉紇也聞之在上位者洒濯其心壹以待人軌度其信可明徵也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由己壹也信由己壹而後功可念也庶其非卿也以地來雖賤必書重地也二十八年夏邾悼公來朝時事也三十一年莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弑之乃立去疾奔齊齊出也展輿呉出也書曰莒人弑其君買朱鉏言罪之在也昭公元年春會于虢三月季武子伐莒取鄆莒人告于㑹楚告于晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨于叔孫而為之請使請帯焉弗與梁其踁曰貨以藩身子何愛焉叔孫曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為趙孟聞之乃請諸楚曰魯雖有罪其執事不避難畏威而敬命矣子若免之以勸左右可也莒魯爭鄆為日久矣茍無大害于其社稷可無亢也乃免叔孫莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔呉叔弓帥師疆鄆田因莒亂也於是莒務婁瞀胡及公子滅明以大龎與常儀靡奔齊君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣四年秋九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取五年夏莒牟夷以牟婁及防兹來奔牟夷非卿而書尊地也莒人愬于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公秋七月公至自晉莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也六年夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也茍免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為驩也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨十年秋七月平子伐莒取郠獻俘始用人於亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義詩曰德音孔昭視民不佻佻之謂甚矣而壹用之將誰福哉十一年孟僖子會邾莊公盟于䘲祥修好禮也十二年公如晉至河乃復取郠之役莒人愬于晉晉有平公之喪未之治也故辭公公子憗遂如晉十三年夏為取郠故晉將以諸侯來討七月遂合諸侯于平丘邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公甲戍同盟于平丘公不與盟晉人執季孫意如以幕䝉之使狄人守之司鐸射懐錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從公如晉荀呉謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河十三年季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二吾豈無大國穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠於會宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君微武子之賜不至於今雖獲歸骨於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館於西河其若之何且泣平子懼先歸惠伯待禮十四年春意如至自晉尊晉罪已也尊晉罪已禮也十八年六月鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女十九年鄅夫人宋向戍之女也故向寧請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘夏邾人郳人徐人會宋公乙亥同盟于蟲二十三年春邾人城翼還將自離姑公孫鉏曰魯將御我欲自武城還循山而南徐鉏丘弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師獲鉏弱地邾人愬于晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聽其辭而愬諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以蒭蕘之難從者之病將館子於都叔孫旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其墻屋去之如始至公為叔孫故如晉及河有疾而復二十四年晉士彌牟逆叔孫于箕叔孫使梁其踁待于門内曰余左顧而欬乃殺之右顧而笑乃止叔孫見士伯士伯曰寡君以為盟主之故是以久子不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸二月婼至自晉尊晉也三十一年冬邾黒肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所名而不如其已以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回不為義疚或求名而不得或欲葢而名章懲不義也齊豹為衛司㓂守嗣大夫作而不義其書為盜邾庶其莒牟夷邾黒肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之民將寘力焉是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之補逸公羊傳文何以無邾婁通濫也曷為通濫賢者子孫宜有地也賢者孰謂謂叔術也何賢乎叔術讓國也其讓國奈何當邾婁顔之時邾婁女有為魯夫人者則未知其為武公與懿公與孝公㓜顔淫九公子於宮中因以納賊則未知其為魯公子與邾婁公子與臧氏之母養公者也君㓜則宜有養者大夫之妾士之妻則未知臧氏之母者曷為者也養公者必以其子入養臧氏之母聞有賊以其子易公抱公以逃賊至凑公寢而弑之臣有鮑廣父與梁買子者聞有賊趨而至臧氏之母曰公不死也在是吾以吾子易公矣於是負孝公之周愬天子天子為之誅顔而立叔術反孝公于魯顔夫人者嫗盈女也國色也其言曰有能為我殺殺顔者吾為其妻叔術為之殺殺顔者而以為妻有子焉謂之盱夏父者其所為有於顔者也盱幼而皆愛之食必坐二子於其側而食之有珍怪之食盱必先取足焉夏父曰以來人未足而盱有餘叔術覺焉曰嘻此誠爾國也夫起而致國於夏父夏父受而中分之叔術曰不可三分之叔術曰不可四分之叔術曰不可五分之然後受之公扈子者邾婁之父兄也習乎邾婁之故其言曰惡有言人之國賢若此者乎誅顔之時天子死叔術起而致國於夏父當此之時邾婁人常被兵于周曰何故死吾天子通濫則文何以無邾婁天下未有濫也天下未有濫則其言以濫來奔何叔術者賢大夫也絶之則為叔術不欲絶不絶則世大夫也大夫之義不得世故於是推而通之也榖梁傳其不言邾黒肱何也别乎邾也其不言濫子何也非天子所封也來奔内不言叛也發明按公羊傳文則黒肱乃邾叔術之後然左氏並無其事必有錯誤姑存之以備考先序訛傳之事次為叔術辨誣文特曲而峭補逸公羊傳三十二年取闞闞者何邾婁之邑也曷為不繫乎邾婁諱亟也有經無傳發明是時昭公失國取闞以自封疑闞為魯邑非邾邑也定公二年邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之三年春二月辛卯邾子在門臺臨廷閽以瓶水沃庭邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于牀廢于鑪炭爛遂卒先葬以車五乘殉五人莊公卞急而好潔故及是冬盟于郯修邾好也十五年春邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀䘮戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也哀公二年春伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟補逸榖梁傳取漷東田漷東未盡也及沂西田沂西未盡也癸巳叔孫州仇仲孫何忌及邾子盟於句繹三人伐而二人盟何也各盟其得也七年公會呉于鄫反自鄫以呉為無能為也季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於德失二德者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鐘聲大夫諫不聽茅成子請告於呉不許曰魯擊柝聞於邾呉二千里不三月不至何及於我且國内豈不足成子以茅叛師遂入邾處其公宮衆師晝掠邾衆保于繹師宵掠以邾子益來獻于亳社囚諸負瑕負瑕故有繹邾茅夷鴻以束帛乘韋自請救于呉曰魯弱晉而逺呉馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之貳也邾賦六百乘君之私也以私奉貳唯君圖之呉子從之八年呉為邾故將伐魯問於叔孫輒叔孫輒對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讐國未臣而有伐之奔命焉死之可也所託也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我子張病之王問於子洩對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讐也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月呉伐我子洩率故道險從武城初武城人或有因於呉竟田焉拘鄫人之漚菅者曰何故使我水滋及呉師至拘者道之以伐武城克之王犯甞為之宰澹臺子羽之父好焉國人懼懿子謂景伯若之何對曰呉師來斯與之戰何患焉且召之而至又何求焉呉師克東陽而進舍於五梧明日舍於蠶室公賔庚公甲叔子與戰于夷獲叔子與析朱鉏獻於王王曰此同車必使能國未可望也明日舍于庚宗遂次於泗上微虎欲宵攻王舍私屬徒七百人三踊於幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害呉而多殺國士不如己也乃止之呉子聞之一夕三遷呉人行成將盟景伯曰楚人圍宋易子而食析骸而㸑猶無城下之盟我未及虧而有城下之盟是棄國也呉輕而逺不能久將歸矣請少待之弗從景伯負載造於萊門乃請釋子服何於呉呉人許之以王子姑曹當之而後止呉人盟而還齊侯使如呉請師將以伐我乃歸邾子邾子又無道呉王使太宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政十年春邾隱公來奔齊甥也故遂奔齊二十二年夏四月邾隱公自齊奔越曰呉為無道執父立子越人歸之大子革奔越二十四年邾子又無道越人執之以歸而立公子何何亦無道二十七年春越子使后庸來聘且言邾田封于駘上二月盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰然何不召曰固將召之文子曰他日請念臣士竒曰邾在魯國之南擊柝相聞莒亦東封之友邦也方當隱公初年與邾為昧之盟二年紀子伯莒子盟于密其文雖闕而傳曰魯故也則其徼與同好可知乃數年而有為宋之討昧之要言成逝水矣及僖之世而有莒拏之獲密之載書又安可問乎自是疆埸之釁一彼一此竟與春秋相終始可慨已夫甞綜其事考之宋怨入郛與魯無預而隱則棄昧之盟桓則棄趡之盟兩用師于邾而快宋志焉曲在魯矣及檉之盟方同伯好而虛丘之戍魯又邀而覆之反面成仇亦至於是則魯之曲益甚須句子魯僖母夫人之同姓也邾暴滅之曲在邾矣魯取須句而置其君亦未為過升陘之戰辱逮魚門何以禁訾婁之報也然一之為甚襄仲再伐之則曲在魯矣文公之卒弔使失儀何至於伐惠伯之報適相當耳宣公十年伐邾取繹其曲在魯成襄之間邾相繼來朝可謂恭矣但魯請屬鄫實出伯命邾悍然不顧而疾討于鄫以有狐駘之役魯師撓敗國人以髽然猶不念舊怨使穆叔修平而南鄙又見伐矣此所以致湨梁之執也悼公不悛復挑魯釁再辱督揚身方見釋而又修怨于魯莊子之報亦宜乃至納其叛人而貪其土利曲在魯矣襄昭之世一朝于魯再盟䘲祥而復譖訴于伯國上卿執辱離姑之釁所由開也邾為是再愬伯庭行人纍係魯復納其叛人曲直均也及定公初年邾修朝禮而魯伐之取其漷沂田曲在魯矣至處宮宵掠以其君來則魯曲益甚何怪乎齊呉之投袂而起也莒當莊公世受文姜之奔及慶父走莒不能明同惡之大義而責賂于魯敗酈之役曲在莒矣洮向修平庶幾終好以平郯之不獲而伐取繼之何義乎聲伯以姻婭結成滅鄫之舉復奸伯命而仇魯魯方以亡鄫見責而東鄙繼伐則莒曲為甚魯之入鄆所自來也犂比公以鄫故被執亦足以釋忿矣况又有督揚之同好莒復君弑國危而魯乘亂伐莒披其鄆邑莒之訴于會也固宜五年納牟夷之叛十年取郠至用人于亳社曲在魯矣自是莒復訴魯于晉晉人以為討而魯莒之交遂絶夫邾莒皆蕞爾小國不能盡事大之禮魯亦惟利是視莫知有字小之義也使魯得逞志于邾莒則亦邿與根牟之續耳然邾莒見陵强大不能順事恕施戕鄫滅鄫俘鄅舍女狂悖若此乃施諸已而不願者則呶呶焉訴之大國亦獨何哉左傳紀事本末卷十一
