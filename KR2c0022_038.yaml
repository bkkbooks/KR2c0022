body:
  text: 左傳紀事本末卷三十八詹事府詹事髙士竒撰寧武子弭晉難僖公二十三年晉公子重耳之及於難也遂奔狄過衛衛文公不禮焉出於五鹿乞食於野人野人與之塊公子怒二十四年春王正月秦伯納之二十八年春晉侯伐衛取五鹿晉侯齊侯盟於斂盂衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説於晉衛侯出居於襄牛公子買戍衛楚人救衛不克夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次於城濮己巳晉師陳於莘北楚師敗績衛侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯寧武子與衛人盟於宛濮曰天禍衛國君臣不協以及此憂也今天誘其𠂻使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟於爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不二衛侯先期入寧子先長牂守門以為使也與之乘而入公子歂犬華仲前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之歂犬走出公使殺之元咺出奔晉冬衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士衛侯不勝殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之於京師置諸深室寧子職納槖饘焉元咺歸於衛立公子瑕三十年晉侯使醫衍鴆衛侯寧俞貨醫使薄其鴆不死公為之請納玉於王與晉侯皆十玨王許之秋乃釋衛侯衛侯使賂周歂冶厪曰茍能納我吾使爾為卿周冶殺元咺及子適子儀公入祀先君周冶既服將命周歂先入及門遇疾而死冶厪辭卿三十一年冬狄圍衛衛遷於帝丘卜曰三百年衛成公夢康叔曰相奪豫享公命祀相寧武子不可曰鬼神非其族類不歆其祀杞鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命三十二年夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟文公四年衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾冬成風薨臣士竒曰晉文公隆怨而拒衛於斂盂之盟其褊已極成公若能婉詞謝過屬齊宋為之請晉未必不從乃違國人之所不欲而甘心入楚則失䇿之甚者也元咺欲立叔武事未有據而遽殺其子角叔武攝位國已有君成公之歸實賴乎此不待期而先入已有疑忮之心矣使公而誠能愛弟者前驅之約束豈不宜預而使捉髮走迎歡欣踴躍之公子斃於歂犬之手誠可痛也及其再執而再歸雖惡元咺子瑕何罪而以為戮殘忍賊恩一至於此安知前驅之矢非承望風旨而為之者枕股之哭甚惡其涕之無從矣殺􅞰犬以塞咎何足償伯仁由我之恨乎成之殺叔武也雖負大不義於天下然成公君也咺臣也心不直其所為不食其祿而逃之可也忠臣去國不説人以無罪而敢於訟君儼然坐獄深室之囚幾死鴆毒又樹立子瑕阻其歸路為人臣者當如是耶向非寧武子以一身捍衛其間內則盟宛濮以協國人外則負羇絏以從患難不幾庾死深室而無歸國之望哉醫衍之賂饘槖之納玨玉之效忠貞委曲直欲貫金石而感神鬼此可以教天下之為人臣者矣湛露彤弓之不答乃志敬之一端耳奚足盡武子之生平乎子曰其知可及其愚不可及夫惟其愚是以能間關﨑嶇卒反衛侯而不干大國之怒也如元咺者烏可同日語哉左傳紀事本末卷三十八
