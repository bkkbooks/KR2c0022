body:
  text: 左傳紀事本末卷五十二詹事府詹事高士竒撰秦穆公伯西戒桓公三年芮伯萬之母芮薑惡芮伯之多寵人也故逐之出居於魏四年秋秦師侵芮敗焉小之也冬王師秦師圍魏執芮伯以歸十年秋秦人納芮伯萬於芮僖公九年晉郤芮使夷吾重賂秦以求入曰人實有國我何愛焉入而能民土於何有從之齊隰朋帥師會秦師納晉惠公十年殺丕鄭丕豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君十三年冬晉薦飢使乞糴於秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟於晉自雍及絳相繼命之曰泛舟之役十四年冬秦飢使乞糴於晉晉人弗與十五年冬秦伯伐晉戰於韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之良由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其太子必得大成晉未可滅而殺其君祗以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕吕飴甥且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也衆皆哭晉於是乎作爰田吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆説晉於是乎作州兵初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無􅎺也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車説其輹火焚其旗不利行師敗於宗丘歸妹睽孤冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虗及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益詩曰下民之孽匪降自天僔沓背憎職競由人十月晉隂飴甥會秦伯盟於王城秦伯曰晉國和乎對曰不知小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讎寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是嵗晉又飢秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者於是秦始征晉河東置官司焉十七年夏晉太子圉為質於秦秦歸河東而妻之惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉二十二年晉太子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸十八年梁伯益其國而不能實也命曰新里秦取之十九年春遂城而居之梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁二十三年晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳不可曰保君父之命而享其生祿於是乎得人有人而校罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顛頡魏武子司空季子狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子處狄十二年而行過衛衛文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜我也稽首受而載之及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上以告薑氏薑氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之薑曰行也懷與安實敗名公子不可薑與子犯謀醉而遣之醒以戈逐子犯及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羇之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自二焉乃饋盤飱置璧焉公子受飱反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公不禮焉叔詹諫曰臣聞天之所啓人弗及也晉公子有三焉天其或者將建諸君其禮焉男女同姓其生不蕃晉公子姬出也而至於今一也離外之患而天不靖晉國殆將啓之二也有三士足以上人而從之三也晉鄭同儕其過子弟固將禮焉况天之所啓乎弗聽及楚楚子饗之曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寬忠而能力晉侯無親外內惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懷嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜二十四年春王正月秦伯納之不書不告入也及河子犯以璧授公子曰臣負羇絏從君巡於天下臣之罪甚多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧於河二十五年秦伯師於河上將納王狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰於阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有之睽曰吉遇公用享於天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也晉侯辭秦師而下三月甲辰次於陽樊右師圍溫左師逆王夏四月丁巳王入於王城取大叔於溫殺之於隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原欑茅之田晉於是始啓南陽陽樊不服圍之倉葛呼曰德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民秋秦晉伐鄀楚以申息之師戍商密秦人過析隈入而係輿人以圍商密昏而傅焉宵坎血加書偽與子儀子邉盟者商密人懼曰秦取析矣戌人反矣乃降秦師秦師囚申公子儀息公子邊以歸三十年九月甲午晉侯秦伯圍鄭以其無禮於晉且二於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯説與鄭人盟使杞子逢孫揚孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之三十二年冬晉文公卒杞子自鄭使告於秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉秦師遂東補逸公羊傳其謂之秦何夷狄之也曷為夷狄之秦伯將襲鄭百里子與蹇叔于諫曰千里而襲人未有不亡者也秦伯怒曰若爾之年者宰上之木拱矣爾曷知師出百里子與蹇叔子送其子而戒之曰爾即死必於殽之嶔巖是文王之所辟風雨者也我將尸爾焉子揖師而行百里子與蹇叔子從其子而哭之秦伯怒曰爾曷為哭吾師對曰臣非敢哭君師哭臣之子也弦高者鄭商也遇之殽矯以鄭伯之命而犒師焉或曰往矣或曰反矣然而晉人與薑戎要之殽而擊之匹馬隻輪無反者其言及薑戎何薑戎微也稱人亦微者也何言乎薑戎之微先軫也或曰襄公親之襄公親之則其稱人何貶曷為貶君在乎殯而用師危不得葬也詐戰不日此何以日盡也穀梁傳不言戰而言敗何也狄秦也其狄之何也秦越千里之險入虗國進不能守退敗其師徒亂人子女之教無男女之别秦之為狄自殽之戰始也秦伯將襲鄭百里子與蹇叔子諫曰千里而襲人未有不亡者也秦伯曰子之冡木已拱矣何知師行百里子與蹇叔子送其子而戒之曰女死必於殽之巖崯之下我將尸汝於是師行百里子與蹇叔子隨其子而哭之秦伯怒曰何為哭我師也二子曰非敢哭師也哭吾子也我老矣彼不死則我死矣晉人與薑戎要而擊之殽匹馬倚輪無反者晉人者晉子也其曰人何也微之也何為微之不正其釋殯而主乎戰也日葬危不得葬也三十三年春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告於鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以間敝邑若何杞子奔齊逢孫揚孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還夏四月辛巳晉人及薑戎敗秦帥於殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮於秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長冦讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼓使歸就戮於秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德考異書序秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓發明秦誓之作序以為在敗崤還歸之時史謂在取王官封尸之後文公元年殽之役晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聼言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政二年春王二月甲子晉侯及秦師戰於彭衙秦師敗績秦伯猶用孟明孟明增修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而增德不可當也詩曰母念爾祖聿修厥德孟明念之矣念德不怠其可敵乎冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇德三年秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉四年秋晉侯伐秦圍邧新城以報王官之役楚人滅江秦伯為之降服出次不舉過數大夫諌公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣補逸史記晉獻公滅虞虢虜虞君與其大夫百里傒以璧馬賂於虞故也既虜百里傒以為秦穆公夫人媵於秦百里傒亡秦走宛楚鄙人執之穆公聞百里傒賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里傒在焉請以五羖羊皮贖之楚人遂許與之當是時百里傒年已七十餘穆公釋其囚與語國事謝曰臣亡國之臣何足問穆公曰虞君不用子故亡非子罪也固問語三日穆公大説授之國政號曰五羖大夫百里傒讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣常遊困於齊而乞食䬹人蹇叔收臣臣因而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君難是以知其賢於是穆公使人厚幣迎蹇叔以為上大夫説苑秦穆公使賈人載鹽徴諸賈人賈人買百里奚以五羖羊之皮使將車之秦秦穆公觀鹽見百里奚牛肥曰任重道逺以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司具沐浴為衣冠與語公大説異日與公孫支論政公孫支大不寧曰君耳目聰明思慮審察君其得聖人乎公曰然吾説夫奚之言彼類聖人也公孫支遂歸取鴈以賀曰君得社稷之聖臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚曰秦國處僻民陋以愚無知危亡之本也臣自知不足以處其上請以讓之公不許公孫支曰君不用賔相而得社稷之聖臣君之祿也臣見賢而讓之臣之祿也今君既得其祿矣而使臣失祿可乎請終致之公不許公孫支曰臣不肖而處上位是君失倫也不肖失倫臣之過進賢而退不肖君之明也今臣處位廢君之德而逆臣之行也臣將逃公乃受之故百里奚為上卿以制之公孫支為次卿以佐之也韓詩外傳禽息秦大夫薦百里奚不見納繆公出當車以頭擊闑腦乃精出曰臣生無補於國不如死也繆公感悟而用百里奚秦以大化吕氏春秋秦穆公相百里奚晉使叔虎齊使東郭蹇如秦公孫枝請見之公曰請見客子之事與對曰非也相國使子乎對曰不也公曰然則子事非子之事也秦國僻陋戎夷事服其任人事其事猶懼為諸侯笑今子為非子之事退將論而罪公孫枝出自敷於百里氏百里奚請之公曰此所聞於相國歟枝無罪奚請有罪奚請焉百里奚歸辭公孫枝公孫枝徙自敷於街百里奚令吏行其罪定分官此古人之所以為法也今繆公鄉之矣其霸西戎豈不宜哉史記戎王使由余於秦由余其先晉人也亡入戎能晉言聞繆公賢故使由余觀秦秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎狄無此何以為治不亦難乎由余笑曰此乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅以小治及其後世日以驕淫阻法度之威以責督於下下罷極則以仁義怨望於上上下交爭怨而相篡弒至於滅宗皆以此類也夫戎夷不然上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也於是繆公退而問內史廖曰孤聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈之何內史廖曰戎王處僻匿未聞中國之聲君試遺其女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠於政繆公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡察而後令內史廖以女樂二八遺戎王戎王受而説之終年不還於是秦乃歸由余由余數諫不聽繆公又數使人間要由余由余遂去降秦繆公以客禮禮之問伐戎之形三十七年秦用由余謀伐戎王益國十二開地千里遂霸西戎天子使召公過賀繆公以金鼓五年初鄀叛楚即秦又二於楚夏秦人入鄀六年秦伯任好卒以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂若之何奪之古之王者知命之不長是以並建聖哲樹之風聲分之采物著之話言為之律度陳之藝極引之表儀豫之法制告之訓典教之防利委之常秩道之以禮則使母失其土宜衆𨽻賴之而後即命聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也臣士竒曰秦穆公春秋之賢諸侯也驪姬之亂晉君數弒國幾亡穆公立夷吾及夷吾背德有韓原之戰執晉侯以歸而卒反之晉飢又輸之粟曰吾怨其君而矜其民惠懷無親外內棄之則又置文公以定其難襄王之未入也秦伯師於河上將納王以晉文公納之而止此其天資仁厚舉動光偉加於人一等矣生平之失惟貪燭之武東道主之言而背晉惑杞子逄孫揚孫之説而襲鄭則皆利令智昏之所致耳然自敗殽之後素服郊次深自怨艾作悔過之誓聖人序書特列於百篇之末日月之更殆難以一眚掩矣至其報恨王官封尸殽坻成濟河焚舟之功焉其舉人之周與人之一天下稱之孟明之始敗也曰孤實貪以禍夫子夫子何罪及再敗彭衙三敗取汪猶不替孟明因而增修國政使趙成子聞聲而知懼子桑知人而終信以視楚殺得臣晉人竊喜魯用曹沫齊桓反地其得失不深切著明哉百里奚虞之俘囚也舉之牛口之下蹇叔賢而世莫知五羖大夫薦達之迎以為上大夫由余戎之賢臣也及其來歸以客禮之爰是益國十二開地千里遂霸西戎天子使召公賀以金鼓當是時秦國之強儕於齊晉荆楚則亦改過不吝用人惟已之所致矣獨其僻在西陲禮未同於中國而用子車氏之三子以殉黃鳥之詩作焉秦自此不復能東征矣君子是以惜其盛德之纍也左傳紀事本末卷五十二
