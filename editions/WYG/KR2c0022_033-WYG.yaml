body:
  text: 左傳紀事本末卷三十三詹事府詹事髙士竒撰晉失諸侯襄公二十九年晉平公杞出也故治杞六月知悼子合諸侯之大夫以城杞孟孝伯會之鄭子大叔與伯石往子大叔見大叔文子與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離徳詩曰協比其鄰昏姻孔云晉不鄰矣其誰云之范獻子來聘拜城杞也晉侯使司馬女叔侯來治杞田弗盡歸也晉悼夫人愠曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書府無虚月如是可矣何必瘠魯以肥杞且先君而有知也母寧夫人而焉用老臣杞文公來盟書曰子賤之也冬孟孝伯如晉報范叔也三十年二月癸未晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹卻成子於承匡之歳也是歳也狄伐魯叔孫莊叔於是乎敗狄於鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才遂仕之使助為政辭以老與之田使為君復陶以為綘縣師而廢其輿尉於是魯使者在晉歸以語諸大夫季武子曰晉未可媮也有趙孟以為大夫有伯瑕以為佐有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可媮乎勉事之而後可昭公元年晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居於曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商丘主辰商人是因故辰為商星遷實沈於大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂己余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝用嘉之封諸汾川沈姒蓐黄實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聴政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃壹之則生疾矣僑又聞之内官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君内實有四姬焉其無乃是也乎若由是二者弗可為也已四姬有省猶可無則必生疾矣叔向曰善哉肸未之聞也此皆然矣叔向出行人揮送之叔向問鄭故焉且問子晳對曰其與㡬何無禮而好陵人怙富而卑其上弗能久矣晉侯聞子産之言曰博物君子也重賄之晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聴也物亦如之至於煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天有六氣降生五味發為五色徴為五聲淫生六疾六氣曰隂陽風雨晦明也分為四時序為五節過則為菑隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生内熱惑蠱之疾今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉必受其咎今君至於淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云也趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也趙孟曰良醫也厚其禮而歸之二年晉侯使韓宣子來聘遂如齊納幣夏四月韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊謂陳無宇非卿執諸中都少姜為之請曰送従逆班畏大國也猶有所易是以亂作叔弓聘於晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賓徹命於執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之禄也敢辱大館叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後己卑讓也詩曰敬慎威儀以近有徳夫子近德矣晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉叔向言陳無宇於晉侯曰彼何罪君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共而執其使君刑已頗何以為盟主且少姜有辭冬十月陳無宇歸十一月鄭印段如晉弔三年春王正月鄭游吉如晉送少姜之𦵏梁丙與張趯見之梁丙曰甚矣哉子之為此來也子大叔曰將得已乎昔文襄之霸也其務不煩諸侯令諸侯三歳而聘五歳而朝有事而會不協而盟君薨大夫弔卿共𦵏事夫人士弔大夫送𦵏足以昭禮命事謀闕而已無加命矣今嬖寵之喪不敢擇位而數於守適唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室今兹吾又將來賀不唯此行也張趯曰善哉吾得聞此數也然自今子其無事矣譬如火焉火中寒暑乃退此其極也能無退乎晉將失諸侯諸侯求煩不獲二大夫退子大叔告人曰張趯有知其猶在君子之後乎齊侯使晏嬰請繼室於晉曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲不腆先君之適以備内官焜燿寡人之望則又無禄早世隕命寡人失望君若不忘先君之好恵顧齊國辱收寡人徼福於太公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妺若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命恵莫大焉若恵顧敝邑撫有晉國賜之内主豈唯寡君舉羣臣實受其貺其自唐叔以下實寵嘉之晉韓起如齊逆女公孫蠆為少姜之有寵也以其子更公女而嫁公子人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而逺其寵寵將來乎秋七月鄭罕虎如晉賀夫人張趯使謂大叔曰自子之歸也小人糞除先人之敝廬曰子其將來今子皮實來小人失望大叔曰吉賤不獲來畏大國尊夫人也且孟曰而將無事吉庻幾焉四年春王正月許男如楚楚子止之遂止鄭伯使椒舉如晉求諸侯晉侯欲弗許司馬侯曰不可乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉詳見楚靈王之亂發明按此時晉國君臣相安於媮惰故司馬侯以為不可與楚争亦茍且之計也六年春王正月杞文公卒弔如同盟禮也七年三月公如楚晉人來治杞田季孫將以成與之謝息為孟孫守不可曰人有言曰雖有挈缾之知守不假器禮也夫子從君而守臣喪邑雖吾子亦有猜焉季孫曰君之在楚於晉罪也又不聴晉魯罪重矣晉師必至我無以待之不如與之間晉而取諸杞吾與子桃成反誰敢有之是得二成也魯無憂而孟孫益邑子何病焉辭以無山與之萊柞乃遷於桃晉人為杞取成八年石言於晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聴濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦宜乎於是晉侯方築虒祁之宫叔向曰子野之言君子哉君子之言信而有徴故怨逺於其身小人之言僣而無徴故怨咎及之詩曰哀哉不能言匪舌是出唯躬是瘁哿矣能言巧言如流俾躬處休其是之謂乎是宫也成諸侯必叛君必有咎夫子知之矣叔弓如晉賀虒祁也游吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相䝉也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀補逸説苑晉平公使叔向聘於吳吳人拭舟以逆之左五百人右五百人有繡衣而豹裘者有錦衣而狐裘者叔向歸以告平公平公曰吳其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鐘鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬各異也於是平公乃罷臺晉平公春築臺叔向曰不可古者聖王貴徳而務施緩刑辟而趨民時今春築臺是奪民時也夫徳不施則民不歸刑不緩則百姓愁使不歸之民役愁怨之百姓而又奪其時是重竭也夫牧百姓養育之而重竭之豈所以定命安存而稱為人君於後世哉平公曰善乃罷臺役韓非子叔向御坐平公請事公腓痛足痺轉筋而不敢壊坐晉國聞之皆曰叔向賢者平公禮之轉筋而不敢壊坐晉國之辭仕託慕叔向者國之錘也髙士傳亥唐晉人也髙恪寡素晉人憚之雖疏食菜羮平公每為之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向勃然作色不説公曰子欲貴乎吾爵子欲富乎吾禄子夫亥先生乃無欲也吾非正坐無以養之子何不説乎韓非子晉平公問叔向曰昔者齊桓公九合諸侯一匡天下不識君之力也臣之力也叔向對曰管仲善制割賓胥無善削縫隰朋善純縁衣成君舉而服之亦臣之力也君何力之有師曠伏琴而笑之公曰太師奚笑也師曠對曰臣笑叔向之對君也凡為人臣者猶炰宰和五味而進之君君弗食孰敢強之也臣請譬之君者壤地也臣者草木也必壤地美然後草木碩大亦君之力臣何力之有國語叔向見司馬侯之子撫而泣之曰自此其父之死吾蔑與比而事君矣昔者此其父始之我終之我始之夫子終之無不可籍偃在側曰君子有比乎叔向曰君子比而不别比徳以贊事比也引黨以封己利己而忘君别也説苑平公射鴳不死使豎襄搏之失公怒拘將殺之叔向聞之夕君告之叔向曰君必殺之昔者吾先君唐叔射兕於徒林殪以為大甲以封於晉今君嗣吾先君唐叔射鴳不死摶之不得是揚吾君之恥者也君其必速殺之勿令逺聞君忸怩顔乃趣赦之韓非子昔者衛靈公將之晉至濮水之上税車而放馬設舍以宿夜分而聞鼓新聲者而説之使人問左右盡報弗聞乃召師涓而告之曰有鼓新聲者使人問左右盡弗聞其狀似鬼神子為聴而冩之師涓曰諾因静坐撫琴而冩之師涓明日報曰臣得之矣而未習也請復一宿習之靈公曰諾因復留宿明日而習之遂去之晉晉平公觴之於施夷之臺酒酣靈公起公曰有新聲願請以示平公曰善乃召師涓令坐師曠之旁援琴撫之未終師曠撫止之曰此亡國之聲不可遂也平公曰此道奚出師曠曰此師延之所作與紂為靡靡之樂也及武王伐紂師延東走至於濮水而自投故聞此聲者必於濮水之上先聞此聲者其國必削不可遂平公曰寡人所好者音也子其使遂之師涓鼓究之平公問師曠曰此所謂何聲也師曠曰此所謂清商也公曰清商固最悲乎師曠曰不如清徴公曰清徴可得而聞乎師曠曰不可古之聴清徴者皆有徳義之君也今吾君徳薄不足以聴平公曰寡人之所好者音也願試聴之師曠不得已援琴而鼓一奏之有𤣥鶴二八道南方來集於郎門之垝再奏之而列三奏之延頸而鳴舒翼而舞音中宮商之聲聲聞於天平公大説坐者皆喜平公提觴而起為師曠夀反坐而問曰音莫悲於清徴乎師曠曰不如清角平公曰清角可得而聞乎師曠曰不可昔者黄帝合鬼神於泰山之上駕象車而六蛟龍畢方並鎋蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後騰蛇伏地鳯凰覆上大合鬼神作為清角今主公徳薄不足聴之聴之將恐有敗平公曰寡人老矣所好者音也願遂聴之師曠不得已而鼓之一奏之有𤣥雲従西北方起再奏之大風至大雨随之裂帷幕破俎豆墮廊瓦坐者散走平公恐懼伏於廊室之間晉國大旱赤地三年平公之身遂瘙病故曰不務聴治而好五音不已則窮身之事也國語平公説新聲師曠曰公室其將卑乎君之明兆於衰矣夫樂以開山川之風以耀徳於廣逺也風徳以廣之風山川以逺之風物以聴之修詩以詠之修禮以節之夫徳廣逺而有時節是以逺服而邇不遷説苑平公問於師曠曰人君之道何如對曰人君之道清淨無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右廓然逺見踔然獨立屢省考績以臨臣下此人君之操也平公曰善平公問於師曠曰吾年七十欲學恐已暮矣師曠曰何不炳燭乎平公曰安有為人臣而戲其君乎師曠曰盲臣安敢戲其君乎臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎平公曰善哉平公問於師曠曰咎犯與趙衰孰賢對曰陽處父欲臣文公因咎犯三年不達因趙衰三日而達智不知其士衆不智也知而不言不忠也欲言之而不敢無勇也言之而不聴不賢也晉平公好樂多其賦歛下治城郭曰敢有諫者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言曰晉人咎犯也欲以樂見平公曰内之止坐殿上則出鐘磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隠平公召隠士十二人咎犯曰隠臣竊顧昧死御平公曰諾咎犯申其左臂而詘五指平公問於隠官曰占之為何隠官皆曰不知平公曰歸之咎犯則申其一指曰是一也便㳺赭盡而峻城闕二也柱梁衣繡士民無褐三也侏儒有餘酒而死士渴四也民有饑色而馬有粟秩五也近臣不敢諫逺臣不敢達平公曰善乃屏鐘鼓除竽瑟遂與咎犯參治國咎犯在文公時又見於此故楊周修云有兩咎犯但劉中壘復稱介子推相荆欒盈事韓武子此類非一未有確據晉平公出畋見乳虎伏而不動顧謂師曠曰吾聞之也伯王之主出則猛獸伏不敢起今者寡人出見乳虎伏而不動此其猛獸乎師曠曰鵲食猬猬食􅀈鸃􅀈鸃食豹豹食駮駮食虎夫駮之狀有似駮馬今者君之出必驂駮馬而出畋乎公曰然師曠曰臣聞之一自誣者窮再自誣者辱三自誣者死今夫虎所以不動者為駮馬也固非主君之徳義也君奈何一自誣乎平公異日出朝有鳥環平公不去平公顧謂師曠曰吾聞之也伯王之主鳯下之今者出朝有鳥環寡人終朝不去是其鳯鳥乎師曠曰東方有鳥名諫珂其為鳥也文身而朱足憎烏而愛狐今者吾君必衣狐裘以出朝乎平公曰然師曠曰臣已嘗言之矣一自誣者窮再自誣者辱三自誣者死今鳥為狐裘之故非吾君之徳義也君奈何而再自誣乎平公不説異日置酒虒祁之臺使郎中馬章布蒺藜於階上令人召師曠師曠至履而上堂平公曰安有人臣履而上人主堂者乎師曠解履刺足伏刺膝仰天而歎公起引之曰今者與叟戲叟遽憂乎對曰憂夫肉自生蟲而還自失也木自生蠧而還自刻也人自興妖而還自賊也五鼎之具不當生藜藿人主堂廟不當生蒺藜平公曰今為之奈何師曠曰妖已在前無可奈何入來月八日修百官立太子君將死矣至來月八日平旦謂師曠曰叟以今日為期寡人如何師曠不樂謁歸歸未幾而平公死乃知師曠神明矣十年春王正月有星出於婺女鄭裨竈言於子産曰七月戊子晉君將死今兹歳在顓頊之虚姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯於是乎出吾是以譏之秋七月平子伐莒取郠戊子晉平公卒鄭伯如晉及河晉人辭之㳺吉遂如晉九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉𦵏平公也鄭子皮將以幣行子産曰喪焉用幣子皮固請以行既𦵏諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聴叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣十二年齊侯衛侯鄭伯如晉朝嗣君也公如晉至河乃復取郠之役莒人愬於晉晉有平公之喪未之治也故辭公公子憖遂如晉晉侯享諸侯子産相鄭伯辭於享請免喪而後聴命晉人許之禮也晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矣曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂穆子曰子失辭吾固師諸侯矣壺何為焉其以中儁也齊君弱吾君歸弗來矣穆子曰吾軍帥彊禦卒乗競勸今猶古也齊將何事公孫傁趨進曰日旰君勤可以出矣以齊侯出十三年晉成虒祁諸侯朝而歸者皆有貳心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徴㑹告於吴秋晉侯㑹吴子于良水道不可吳子辭乃遷七月丙寅治兵於邾南甲車四千乗羊舌鮒攝司馬遂合諸侯于平丘子産子大叔相鄭伯以㑹子産以幄幕九張行子大叔以四十既而悔之每舍損焉及㑹亦如之次於衛地叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦曰諸侯事晉未敢攜貳况衛在君之宇下而敢有異志芻蕘者異於他日敢請之叔向受羮反錦曰晉有羊舌鮒者瀆貨無厭亦將及矣為此役也子若以君命賜之其已客従之未退而禁之晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速唯君叔向告於齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明棄共百事不終所由傾覆也是故明王之制使諸侯歳聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也存亡之道恒由是興晉禮主盟懼有不治奉承齊犠而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聴従既聞命矣敬共以往遲速唯君叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人愬於晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服恵伯對曰君信蠻夷之愬以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聴命甲戌同盟于平丘齊服也令諸侯日中造於除癸酉退朝子産命外僕速張於除子大叔止之使待明日及夕子産聞其未張也使速往乃無所張矣及盟子産爭承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使従公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以争至於昏晉人許之既盟子大叔咎之曰諸侯若討其可凟乎子産曰晉政多門貳偷之不暇何暇討國不競亦陵何國之為公不與盟晉人執季孫意如以歸十有四年春意如至自晉補逸國語平丘之㑹晉昭公使叔嚮辭昭公弗與盟子服恵伯曰晉信蠻夷而棄兄弟其執政貳也貳必失諸侯豈惟魯然夫失其政者必毒於人魯懼及焉不可以不恭必使上卿従之季平子曰然則意如乎若我往晉必患我誰為之貳子服恵伯曰椒既言之矣敢逃難乎椒請従晉人執平子子服恵伯見韓宣子曰夫盟信之要也晉為盟主是主信也若盟而棄魯侯信抑闕矣昔欒氏之亂齊人間晉之禍伐取朝歌我先君襄公不敢寜處使叔孫豹悉帥敝賦踦跂畢行無有處人以従軍吏次於雝俞與邯鄲勝擊齊之左掎止晏萊焉齊師退而後敢還非以求逺也以魯之密邇於齊而又小國也齊朝駕則夕極於魯國不敢憚其患而與晉共其憂亦曰庻幾有益於魯國乎今信蠻夷而棄之夫諸侯之勉於君者將安勸矣若棄魯而茍固諸侯羣臣敢憚戮乎諸侯之事晉者魯為勉矣若以蠻夷之故棄之其無乃得蠻夷而失諸侯之信乎子計其利者小國共命宣子説乃歸平子十五年公如晉平丘之㑹故也十六年春王正月公在晉晉人止公不書諱之也齊侯伐徐二月丙申齊師至於蒲隧徐人行成徐子及郯人莒人㑹齊侯盟於蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎三十年夏六月晉頃公卒秋八月𦵏鄭㳺吉弔且送𦵏魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送𦵏今吾子無貳何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命先王之制諸侯之喪士弔大夫送𦵏唯嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之閒先君有所助執紼矣若其不閒士大夫有所不獲數矣大國之恵亦慶其加而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍従舊舊有豐有省不知所從從其豐則寡君幼弱是以不共従其省則吉在此矣唯大夫圖之晉人不能詰定公三年蔡昭侯如楚三年止之蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚四年春三月劉文公合諸侯於召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之明日或斾以㑹晉於是乎失諸侯將㑹衛子行敬子言於靈公曰㑹同難嘖有煩言莫之治也其使祝佗従公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行祓社釁鼓祝奉以従於是乎出竟若嘉好之事君行師従卿行旅従臣無事焉公曰行也及皋鼬將長蔡於衛衛侯使祝佗私於萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚徳也昔武王克商成王定之選建明徳以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旂夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命於周是使之職事於魯以昭周公之明徳分之土田陪敦祝宗卜史備物典䇿官司彞器因商奄之民命以伯禽而封於少皥之虚分康叔以大路少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以㑹王之東蒐聃季授土陶叔授民命以康誥而封於殷虚皆啓以商政疆以周索分唐叔以大路密須之鼓闕鞏沽洗懐姓九宗職官五正命以唐誥而封於夏虚啓以夏正疆以戎索三者皆叔也而有令徳故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而蔡蔡叔以車七乗徒七十人其子蔡仲改行帥徳周公舉之以為已卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為大宰康叔為司冦聃季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其徳將如之何萇𢎞説告劉子與范獻子謀之乃長衛侯於盟沈人不㑹於召陵晉人使蔡伐之夏蔡滅沈五年夏歸粟於蔡以周亟矜無資六年二月公侵鄭取匡為晉討鄭之伐胥靡也夏季桓子如晉獻鄭俘也秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立後而行吾室亦不亡唯君亦以吾為知難而行也見溷而行趙簡子逆而飲之酒於綿上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志於宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁七年秋齊侯鄭伯盟於鹹徵㑹於衛衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟於瑣八年春王正月公侵齊門於陽州二月公侵齊攻廪丘之郛詳見陪臣交叛趙鞅言於晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁士鞅曰三年止之無故而歸之宋必叛晉獻子私謂子梁曰寡君懼不得事宋君是以止子子姑使溷代子子梁以告陳寅陳寅曰宋將叛晉是棄溷也不如待之樂祁歸卒於大行士鞅曰宋必叛不如止其尸以求成焉乃止諸州夏齊國夏髙張伐我西鄙晉士鞅趙鞅荀寅救我公㑹晉師於瓦范獻子執羔趙簡子中行文子皆執雁魯於是始尚羔晉師將盟衛侯於鄟澤趙簡子曰羣臣誰敢盟衛君者涉佗成何曰我能盟之衛人請執牛耳成何曰衛吾温原也焉得視諸侯將歃涉佗捘衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次於郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人従焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子厚與大夫之子為質大夫曰茍有益也公子則往羣臣之子敢不皆負羇絏以従將行王孫賈曰茍衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅㑹成桓公侵鄭圍蟲牢報伊闕也遂侵衛九月師侵衛晉故也九年秋齊侯伐晉夷儀敝無存之父將室之辭以與其弟曰此役也不死反必娶於髙國先登求自門出死於霤下東郭書讓登犂彌従之曰子讓而左我讓而右使登者絶而後下書左彌先下書與王猛息猛曰我先登書斂甲曰曩者之難今又難焉猛笑曰吾從子如驂之靳晉車千乗在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛褚師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如従齊乃伐齊師敗之齊侯致禚媚杏於衛齊侯賞犂彌犂彌辭曰有先登者臣従之晳幘而衣貍製公使視東郭書曰乃夫子也吾貺子公賞東郭書辭曰彼賓旅也乃賞犂彌齊師之在夷儀也齊侯謂夷儀人曰得敝無存者以五家免乃得其尸公三襚之與之犀軒與直葢而先歸之坐引者以師哭之親推之三十年春及齊平夏公㑹齊侯於祝其實夾谷晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午於寒氏城其西北而守之宵熸及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役涉佗曰夫子則勇矣然我往必不敢啓門亦以徒七十人旦門焉步左右皆至而立如植日中不啓門乃退反役晉人討衛之叛故曰由涉佗成何於是執涉佗以求成於衛衛人不許晉人遂殺涉佗成何奔燕君子曰此之謂棄禮必不鈞詩曰人而無禮胡不遄死涉佗亦遄矣哉十一年冬及鄭平始叛晉也十二年夏衛公孟彄伐曹克郊還滑羅殿未出不退於列其御曰殿而在列其為無勇乎羅曰與其素厲寜為無勇十三年春齊侯衛侯次於垂葭實郹氏使師伐晉將濟河諸大夫皆曰不可邴意兹曰可鋭師伐河内傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内齊侯皆斂諸大夫之軒唯邴意兹乗軒齊侯欲與衛侯乗與之宴而駕乗廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝乃介而與之乗驅之或告曰無晉師乃止哀公七年春宋師侵鄭鄭叛晉故也晉師侵衛衛不服也九年鄭武子賸之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚救之大敗二月甲戌宋取鄭師於雍丘使有能者無死以郟張與鄭羅歸宋公伐鄭晉趙鞅卜救鄭遇水適火占諸史趙史墨史龜史龜曰是謂沈陽可以興兵利以伐姜不利子商伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可㳺也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妺而有吉禄我安得吉焉乃止十年夏趙鞅帥師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉行也於是乎取犂及轅毁髙唐之郭侵及賴而還十七年公㑹齊侯盟於蒙孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首武伯問於髙柴曰諸侯盟誰執牛耳季羔曰鄫衍之役吳公子姑曹發陽之役衛石魋武伯曰然則彘也二十年春齊人來徴㑹夏㑹於廩丘為鄭故謀伐晉鄭人辭諸侯秋師還臣士竒曰晉自悼公既沒伯業復微諸侯攜貳其故有數端焉平公杞出也推恩母家興諸侯以城杞而不恤宗周之闕其失一也少姜嬖寵奔走一時之公卿而非以大義勤諸侯怒無宇而執之止魯公而不納溺帷房之私昧親親之道其失二也築虒祁之宫下可以陳鐘鼓上可以發千兵怨讟並興石妖間作而内則四姬在御族姓莫分淫溺惑亂實生蠱疾其失三也信邾莒之訴絶兄弟之歡羽毛骨肉毋乃不倫乎况郠鄆之故又非昭公意也其失四也衛侯吾之同姓而天子守藩之國也晉雖強安得以無禮施之涉佗何人而敢捘其手且曰衛吾温原也焉得視諸侯侮慢不已甚乎其失五也凡此五不韙者有一於此皆足以失諸侯而况政出多門狥於貨賄芻蕘淫而羊舌鮒取錦於衛矣子産争承而小國之誅求困矣羽旄假而谿壑之欲肆矣楊楯不至而使臣纍於客館矣意如執舍喜怒皆以利行而伯威頓矣尤可異者蔡侯以一裘一佩見止於囊瓦者三年濟漢而誓頓首伯庭愛子出質意晉之能撻彼荆楚而抒其憤懣也乃召陵之役合十有八國之師其勢可以滅此朝食而竟以一敗類之荀寅阻之伯政之壊至此欲天下之不舍舊而圖新豈可得哉所以投壺者有代興之思效鼎者従蒲隧之歃晉之號令不出於故絳而中原伯叔人自為政矣晉猶不悟恃兵甲之威逞恫疑之術欲以力征經營不已過乎吁以叔向之賢而見不及此可惜也左傳紀事本末卷三十三
