  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0022_WYG_001-1a, image: WYG0369/WYG0369-0007c.png}
body:
  text: 左傳紀事本末卷一詹事府詹事髙士竒撰王朝交魯隱公元年秋七月天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至贈死不及尸弔生不及哀豫凶事非禮也十二月祭伯來非王命也三年春王三月壬戌平王崩赴以庚戌故書之秋武氏子來求賻王未葬也六年冬京師來告飢公為之請糴於宋衛齊鄭禮也七年初戎朝於周發幣於公卿凡伯弗賔冬王使凡伯來聘還戎伐之於楚丘以歸補逸九年天王使南季來聘有經無傳榖梁傳曰聘諸侯非正也桓公四年夏周宰渠伯糾來聘父在故名五年天王使仍叔之子來聘仍叔之子弱也考異榖梁傳曰任叔之子者録父以使子也八年冬祭公來遂逆王后於紀禮也九年春紀季薑歸於京師凡諸侯之女行唯王后書十五年春天王使家父來求車非禮也諸侯不貢車服天子不私求財莊公元年秋築王姬之館于外為外禮也補逸莊公元年王使榮叔來錫桓公命有經無傳榖梁傳曰錫命非正也生不服死追錫之不正甚矣三年夏五月葬桓王緩也考異榖梁傳曰改葬也十一年冬齊侯來逆共姬發明按魯主王姬之嫁舊矣故桓公之娶王姬亦逆于魯蓋魯為王室懿親也補逸二十三年祭叔來聘有經無傳榖梁傳曰天子之內臣也不正其外交故不與使也僖公三十年冬王使周公閲來聘饗有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉榖鹽虎形以獻其功吾何以堪之東門襄仲將聘于周遂初聘于晉文公元年春王使內史叔服來會葬夏四月丁巳葬僖公王使毛伯衛來錫公命叔孫得臣如周拜五年春王使榮叔來含且賵召昭公來會葬禮也八年秋襄王崩冬穆伯如周弔喪九年春毛伯衛來求金非禮也不書王命未葬也二月莊叔如周葬襄王十年秋七月及蘇子盟于女栗頃王立故也宣公九年春王使來徴聘夏孟獻子聘于周王以為有禮厚賄之十年秋劉康公來報聘補逸國語定王八年使劉康公聘于魯發幣于大夫季文子孟獻子皆儉叔孫宣子東門子家皆侈歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎若家不亡身必不免王曰何故對曰臣聞之為臣必臣為君必君寬肅宣惠君也敬恪恭儉臣也寬所以保本也肅所以濟時也宣所以教施也惠所以和民也本有保則必固時動而濟則無敗功教施而宣則遍惠以和民則阜若本固而功成施遍而民阜乃可以長保民矣其何事不徹敬所以承命也恪所以守業也恭所以給事也儉所以足用也以敬承命則不違以恪守業則不懈以恭給事則寬于死以儉足用則逺于憂若承命不違守業不懈寬于死而逺于憂則可以上下無隙矣其何任不堪上任事而徹下能堪其任所以為令聞長世也今夫二子者儉其能足用矣用足則族可以庇二子者侈侈則不恤匱匱而不恤憂必及之若是則必廣其身且夫人臣而侈國家弗堪亡之道也王曰幾何對曰東門之位不若叔孫而泰侈焉不可以事二君叔孫之位不若季孟而亦泰侈焉不可以事三君若皆早世猶可若登年以載其毒必亡十六年魯宣公卒赴者未及東門氏來告亂子家奔齊簡王十一年魯叔孫宣伯亦奔齊成公五年十一月己酉定王崩八年秋七月召桓公來賜公命襄公二十八年冬十一月癸巳天王崩未來赴亦未書禮也十二月王人來告喪問崩日以甲寅告故書之以徴過也補逸定公十四年天王使石尚來歸脤有經無傳榖梁傳脤者何也俎實也祭肉也生曰脤熟曰膰其辭石尚士也何以知其士也天子之大夫不名石尚欲書春秋諫曰久矣周之不行禮于魯也請行脤貴復正也哀公十九年冬叔青如京師敬王崩故也臣士竒曰昔周公夾輔兩朝有大勳勞于王室伯禽封魯土田附庸倍敦諸姬號稱望國王后王女之歸皆得主之是周之最親莫如魯而魯所宜翼戴者莫如周也十二公歷年二百四十而王朝交魯書來聘者七錫命者三歸脤者一賵喪者四金車赴告之役不與焉亦綦勤矣乃述職之紀終春秋世僅僖再朝王所成一如京師又因伐秦而往非真有就日之誠者其執禮殷勤曽不及事齊晉之萬一何其慢也夫時至戰國權詐相髙君臣名分之際等辨髦矣乃齊威一朝周而天下翕然賢之幾于復伯况春秋時共主悉臣之義猶在人心也使魯能總帥諸姬勤修聘覲之禮天下其孰敢不謹臣節而王室不重于九鼎哉春秋紀王禮之隆所以深著魯侯之慢也雖然魯固有罪而王亦未為得也夫刑賞者王者馭天下之大柄賞僭而人不服猶刑濫而人不懼也周自平王之東豫奪廢置天下所共聽覩而所首加恩者乃一文手之仲子與弒逆之桓公至不朝者貶爵削地之罰不加而生則崇其號沒猶顯其稱其他辱臨魯庭者非私交之朋比則取求之無厭也來而不往安知魯之不有以窺其間而愈以長驕益惰哉使當時能正仲子之名問寪氏之故則三綱九法名義昭然魯且震懼之不暇不待徴聘而春秋冠帶相望于周京矣故曰魯固有罪而周亦未為得也載考十二公自隱及僖周魯之往來猶數文宣以後乃益寥寥蓋其時三家漸強專制魯國彼不知有公安知有王修聘于王室者愈罕而王禮亦因之以倦焉上下之交于是息矣左傳紀事本末卷一
