body:
  text: 左傳紀事本末卷五十三詹事府詹事高士竒撰春秋災異凡因他事别見者不復更載隱公元年八月有蜚不為災亦不書九年春王三月癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也几雨自三日以往為霖平地尺為大雪桓公元年秋大水凡平原出水為大水十四年秋八月壬申御廩災乙亥嘗書不害也十七年冬十月朔日有食之不書日官失之也天子有日官諸侯有日御日官居卿以砥日禮也日御不失日以授百官於朝莊公七年夏恆星不見夜明也星隕如雨與雨偕也考異公羊傳如雨者非雨也非雨則曷為謂之如雨不修春秋曰雨星不及地尺而復君子修之曰霣星如雨何以書紀異也穀梁傳恆星者經星也不見者可以見也秋無麥苖不害嘉榖也十八年秋有􅈮為災也二十五年夏六月辛未朔日有食之鼓用牲于社非常也唯正月之朔慝未作日有食之於是乎用幣於社伐鼓於朝秋大水鼓用牲於社於門亦非常也凡天災有幣無牲非日月之眚不鼓補逸穀梁傳言日言朔食正朔也鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也高下有水災曰大水既成鼓而駭衆用牲可以已矣救日以鼓兵救水以鼓衆二十九年秋有蜚為災也凡物不為災不書僖公三年春不雨夏六月雨自十月不雨至於五月不曰旱不為災也十五年夏五月日有食之不書朔與日官失之也秋震夷伯之廟罪之也於是展氏有隱慝焉發明夷伯者魯大夫也大夫稱伯魯恆有之愚以為無駭疑不能明也十六年春隕石於宋五隕星也六鷁退飛過宋都風也補逸公羊傳曷為先言霣而後言石霣石記聞聞其磌然視之則石察之則五是月者何僅逮是月也何以不日晦日也晦則何以不言晦春秋不書晦也朔有事則書晦雖有事不書曷為先言六而後言鷁六鷁退飛記見也視之則六察之則鷁徐而察之則退飛穀梁傳先隕而後石何也隕而後石也於宋四竟之內曰宋後數散辭也耳治也是月者决不日而月也六鶂退飛過宋都先數聚辭也目治也二十一年夏大旱公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗也饑而不害二十九年秋大雨雹為災也文公三年秋雨螽於宋隊而死也十五年六月辛丑朔日有食之鼓用牲於社非禮也日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝以昭事神訓民事君示有等威古之道也十六年有蛇自泉宫出入於國如先君之數秋八月辛未聲姜薨毁泉臺宣公十五年冬蝝生饑幸之也襄公二十七年十一月乙亥朔日有食之辰在申司厯過也再失閏矣二十八年春無氷梓慎曰今兹宋鄭其饑乎嵗在星紀而淫於𤣥枵以有時菑隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必饑𤣥枵虗中也枵耗名也土虗而民耗不饑何為昭公四年大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賔食喪佘於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之夫氷以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霜雹癘疾不降民不夭札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為菑誰能禦之七月之卒章藏氷之道也七年夏四月甲辰朔日有食之晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災魯實受之其大咎其衛君乎魯將上卿公曰詩所謂彼日而食於何不臧者何也對曰不善政之謂也國無政不用善則自取謫於日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時八月衛襄公卒十一月季武子卒晉侯謂伯瑕曰吾所問日食從矣可常乎對曰不可六物不同民心不一事序不類官職不則同始異終胡可常也詩曰或燕燕居息或憔悴事國其異終也如是公曰何謂六物對曰嵗時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰故以配日十七年夏六月甲戍朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否大史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集於房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水於是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒二十四年夏五月乙未朔日有食之梓慎曰將水昭于曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也三十一年十二月辛亥朔日有食之是夜也趙簡子夢童子裸而轉以歌旦占諸史墨對曰六年及此月也吳其入郢乎哀公三年夏五月辛卯司鐸火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬱攸從之䝉葺公屋自太廟始外內以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立於象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是乎去表之稿道還公宫孔子在陳聞火曰其桓僖乎十二年冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也臣士竒曰春秋二百四十二年之間凡紀災異一百二十二日食三十六也星孛三也星隕隕石各一也不雨七也無氷三也大雨震電一也雨雪三也大雨雹三也地震五也山崩二也大水九也有年二也大旱二也饑三也無麥苖一也大無麥禾一也隕霜不殺草李梅實一也隕霜殺菽一也雨木氷一也多麋有􅈮有蜚蝝生各一也六鷁退飛一也螟三也螽十也牛傷四也牛死二也宫室災六也震廟一也屋壞二也齊大災一也宋陳衛鄭災一也宋陳災各一也其間非無驚世駴俗更甚於此者而聖人不書至隂陽寒暑草木蟲蠕之變凡切於人事之休咎天道之應違者不以微而不察焉以此見聖人之不語怪而念是民生日用至急也然春秋備記災祲以垂鑒戒而不言其事應誠有深意以為言之而一有不應則適以怠後世恐懼修省之心且為矯誣者口實也洪範五行傳事事而強為之說其亦未達聖人之㫖矣日食之不書朔與日者傳皆得而推之而有莘之神降泉臺之蛇數絳郊之龍見魏榆之石言彭生之豕禍伯有之厲鬼鄭南門之蛇妖宋華氏之犬禍鳥呼嘻出而亳社災歌徴鸜鵒而稠父孫絳市之諜殺七日而能蘇鄋滿之首載專車而眉見事之所有未可云理之所無特以言不雅馴聖人不道而左氏輯其遺聞附著於冊非特以侈新竒亦所以昭勸戒也然已屬後世史家之濫觴矣夫芝草醴泉甘露神雀之祥終春秋世豈無一見而經與傳舉不及焉惟西郊獲麟一繫簡末以昭制作文成之應而且以傷吾道之窮也春秋之紀祥異亦愼矣哉左傳紀事本末卷五十三
