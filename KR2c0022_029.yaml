body:
  text: 左傳紀事本末卷二十九詹事府詹事髙士竒撰晉悼公復伯成公三年夏晉人歸楚公子穀臣與連尹襄老之尸於楚以求知罃於是荀首佐中軍矣故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好二國有好臣不與及其誰敢德王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無徳不知所報王曰雖然必告不穀對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽若從君之惠而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及於事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之荀罃之在楚也鄭賈人有將寘諸褚中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊發明悼公復伯智罃為政凡駕楚服鄭皆罃之謀也楚共王於前此釋之歸晉似與秦康公釋士㑹相似亦不失為忠厚使能修德自强用人無失晉悼知罃豈為楚害哉惜其徒敝民力以爭鄭而闇於大較也十八年春王正月庚申晉欒書中行偃使程滑弑厲公使荀罃士魴逆周子於京師而立之生十四年矣大夫逆於清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽庚午盟而入館於伯子同氏辛巳朝於武宫逐不臣者七人周子有兄而無慧不能辨菽麥故不可立補逸國語晉孫談之子周適周事單襄公立無跛視無還聽無聳言無逺言敬必及天言忠必及意言信必及身言仁必及人言義必及利言知必及事言勇必及制言教必及辨言孝必及神言惠必及和言讓必及敵晉國有憂未嘗不戚有慶未嘗不怡襄公有疾召頃公而告之曰必善晉周將得晉國其行也文能文則得天地天地所胙小而後國夫敬文之恭也忠文之實也信文之孚也仁文之愛也義文之制也知文之輿也勇文之帥也教文之施也孝文之本也惠文之慈也讓文之材也象天能敬帥意能忠思身能信愛人能仁利制能義事建能知帥義能勇施辯能教昭神能孝慈和能惠推敵能讓此十一者夫子皆有焉天六地五數之常也經之以天緯之以地經緯不爽文之象也文王質文故天胙之以天下夫子被之矣其昭穆又近可以得國且夫立無跛正也視無還端也聽無聳成也言無逺慎也夫正德之道也端德之信也成徳之終也慎徳之守也守終純固道正事信明令德矣慎成端正德之相也為晉休戚不背本也被文相德非國何取成公之歸也吾聞晉之筮之也遇乾之否曰配而不終君三出焉一既往矣後之不知其次必此且吾聞之成公之生也其母夢神規其臀以墨曰使有晉國三而畀驩之孫故名之曰黑臀於今再矣襄公曰驩此其孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉吾聞之大誓故曰朕夢協於朕卜襲於休祥戎商必克以三襲也晉仍無道而鮮胄其將失之矣必蚤善晉子其當之也頃公許諾及厲公之亂召周子而立之是為悼公史記悼公者其大父捷晉襄公少子也不得立號為桓叔桓叔最愛桓叔生惠伯談談生悼公周二月乙酉朔晉悼公即位于朝始命百官施舍己責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時使魏相士魴魏頡趙武為卿荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為太傅使修范武子之法右行辛為司空使修士蒍之法弁糾御戎校正屬焉使訓諸御知義荀賔為右司士屬焉使訓勇力之士時使卿無共御立軍尉以攝之祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄鐸遏冦為上軍尉籍偃為之司馬使訓卒乘親以聽命程鄭為乘馬御六騶屬焉使訓羣騶知禮凡六官之長皆民譽也舉不失職官不易方爵不踰德師不陵正旅不偪師民無謗言所以復霸也攷異國語既殺厲公欒武子使知武子彘恭子如周迎悼公庚午大夫逆扵清原公言於諸大夫曰孤始願不及此孤之及此天也抑人之有元君將稟命焉若稟而棄之是焚榖也其稟而不材是榖不成也榖之不成孤之咎也成而焚之二三子之虐也孤欲長處其願出令將不敢不成二三子為令之不從故求元君而訪焉孤之不元廢也其誰怨元而以虐奉之二三子之制也若欲奉元以濟大義將在今日若欲暴虐以離百姓反易民常亦在今日圖之進退願由今日大夫對曰君鎮撫羣臣而大庇䕃之無乃不堪君訓而陷於大戮以煩刑史辱君之允令敢不承業乃盟而入辛巳朝於武宫定百事立百官育門子選賢良興舊族出滯賞畢故刑赦囚繫宥閒罪薦積徳逮鰥寡振廢淹養老幼恤孤疾年過七十者公親見之稱曰王父王父不敢不承二月乙酉悼公即位使吕宣子佐下軍曰邲之役吕錡佐知莊子於上軍獲楚公子穀臣與連尹襄老以免子羽鄢之役親射楚王而敗楚師以定晉國而無後其子孫不可不崇也使彘恭子將新軍曰武子之季文子之母弟也武子宣法以定晉國至於今是用文子勤身以定諸侯至於今是賴夫二子之德其可忘乎故以彘季屏其宗使令狐文子佐之曰昔克潞之役秦來圖敗晉功魏顆以其身郤退秦師於輔氏親止杜回其勲銘於景鐘至於今不育其子不可不興也君知士貞子之帥志博聞而宣惠於教也使為大傅知右行辛之能以數宣物定功也使為司空知欒糾之能御以龢於政也使為戎御知荀賔之有力而不暴也使為戎右欒伯請公族大夫公曰荀家惇惠荀襘文敏黶也果敢無忌鎮靖使兹四人者為之夫膏粱之性難正也故使敦惠者教之使文敏者道之使果敢者諗之使鎮靖者修之惇惠者教之則徧而不倦文敏者道之則婉而入果敢者諗之則過不隱鎮靖者修之則壹使兹四人者為公族大夫公知祁奚之果而不淫也使為元尉知羊舌職之聰敏肅給也使佐之知魏絳之勇而不亂也使為元司馬知張老之知而不詐也使為元候知鐸遏㓂之恭敬而信彊也使為輿尉知籍偃之惇率舊職而共給也使為輿司馬知程鄭之端而不淫且好諫而不隱也使為贊僕始合諸侯於虛朾以救宋使張老延君譽於四方且觀道逆者吕宣子卒公以趙文子為文也而能恤大事使佐新軍三年公始合諸侯四年諸侯㑹於雞丘於是乎布令結援修好申盟而還令狐文子卒公乃以魏絳為不犯使佐新軍使張老為司馬使范獻子為候奄公譽達於戎五年諸侯來請服使魏莊子盟之於是乎始復伯公如晉朝嗣君也夏六月鄭伯侵宋及曹門外遂㑹楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入宋人患之西鉏吾曰何也若楚人與吾同惡以德於我吾固事之也不敢貳矣大國無厭鄙我猶憾不然而收吾憎使贊其政以閒吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼呉晉吾庸多矣非吾憂也且事晉何為晉必恤之公至自晉晉范宣子來聘且拜朝也君子謂晉於是乎有禮秋杞桓公來朝勞公且問晉故公以晉君語之杞伯於是驟朝於晉而請為昏七月宋老佐華喜圍彭城老佐卒焉冬十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師於台谷以救宋遇楚師於靡角之谷楚師還晉士魴來乞師季文子問師數於臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之襄公元年春己亥圍宋彭城非宋地追書也於是為宋討魚石故稱宋且不登叛人也謂之宋志彭城降晉晉人以宋五大夫在彭城者歸寘諸瓠丘齊人不㑹彭城晉人以為討二月齊太子光為質於晉夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次於鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次於戚以為之援秋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘冬衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也二年春鄭師侵宋楚令也鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰暱我免寡人唯二三子秋七月庚辰鄭伯睔卒於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改㑹於戚謀鄭故也孟獻子曰請城虎牢以偪鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君賴之冬復㑹於戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成楚公子申為右司馬多受小國之賂以偪子重子辛楚人殺之故書曰楚殺其大夫公子申三年春公如晉始朝也夏盟於長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讐寡君將君是望敢不稽首晉為鄭服故且欲修吳好將合諸侯使士匄告於齊曰寡君使匄以歲之不易不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使匄乞盟齊侯欲勿許而難為不協乃盟於耏外祁奚請老晉侯問嗣焉稱解狐其讐也將立之而卒又問焉對曰午也可於是羊舌職死矣晉侯曰孰可以代之對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂祁奚於是能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類詩云惟其有之是以似之祁奚有焉補逸國語祁奚辭於軍尉公問焉曰孰可對曰臣之子午可人有言曰擇臣莫若君擇子莫若父午之少也婉以從令㳺有鄉處有所好學而不戲其壯也彊志而用命守業而不淫其冠也和安而好敬柔惠小物而鎮定大事有直質而無流心非義不變非上不舉若臨大事其可以賢於臣也臣請薦所能擇而君比義焉公使祁午為軍尉没平公軍無秕政六月公㑹單頃公及諸侯己未同盟於雞澤晉侯使荀㑹逆吳子於淮上吳子不至楚子辛為令尹侵欲於小國陳成公使袁僑如㑹求成晉侯使和組父告於諸侯秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無貳志事君不辟難有罪不逃刑其將來辭何辱命焉言終魏絳至授僕人書將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司冦公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍張老為中軍司馬士富為候奄補逸國語悼公使張老為卿辭曰臣不如魏絳夫絳之知能治大官其仁可以利公室不忘其勇不疚於刑其學不廢其先人之職若在卿位外内必平且雞丘之㑹其官不犯而辭順不可不賞也公五命之固辭乃使為司馬使魏絳佐新軍楚司馬公子何忌侵陳陳叛故也許靈公事楚不㑹於雞澤冬晉知武子帥師伐許四年春楚師為陳叛故猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉三月陳成公卒楚人將伐陳聞䘮乃止陳人不聽命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳陳無禮故也穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮于周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜楚人使頓間陳而侵伐之故陳人圍頓無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜貳勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷於窮石因夏民以代夏政恃其射也不修民事而淫於原獸棄武羅伯因熊髠尨圉而用寒浞寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚於内而施賂於外愚弄其民而虞羿於田樹之詐慝以取其國家外内咸服羿猶不悛將歸自田家衆殺而亨之以食其子其子不忍食諸死於窮門靡奔有鬲氏浞因羿室生澆及豷恃其讒慝詐偽而不德於民使澆用師滅斟灌及斟尋氏處澆於過處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆於過后杼滅豷於戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官箴王闕於虞人之箴曰芒芒禹跡畫為九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冒於原獸忘其國恤而思其麀牡武不可重用不恢於夏家獸臣司原敢告僕夫虞箴如是可不懲乎於是晉侯好田故魏絳及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒於后羿而用德度逺至邇安五也君其圖之公說使魏絳盟諸戎修民事田以時五年秋楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子為楚共王於是不刑詩曰周道挺挺我心扃扃講事不令集人來定已則無信而殺人以逞不亦難乎夏書曰成允成功九月丙午盟於戚㑹吳且命戍陳也楚子囊為令尹范宣子曰我喪陳矣楚人討貳而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊伐陳十一月甲午㑹於城棣以救之七年冬楚子囊圍陳㑹於鄬以救之陳人患楚慶虎慶寅謂楚人曰吾使公子黄往而執之楚人從之二慶使告陳侯於㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸八年春公如晉朝且聽朝聘之數庚寅鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣五月甲辰㑹於邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戌衛甯殖邾大夫㑹之鄭伯獻捷於㑹故親聽命大夫不書尊晉侯也冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人壽幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟以待彊者而庇民焉冦不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼遠糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得於道請從楚騑也受其咎乃及楚平使王子伯駢告於晉曰君命敝邑修而車賦儆而師徒以討亂畧蔡人不從敝邑之人不敢寧處悉索敝賦以討於蔡獲司馬燮獻於邢丘今楚來討曰女何故稱兵於蔡焚我郊保馮陵我城郭敝邑之衆夫婦男女不皇啓處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟於楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告於寡君而即安於楚君之所欲也誰敢違君寡君將帥諸侯以見於城下唯君圖之晉范宣子來聘且拜公之辱告將用師於鄭公享之宣子賦摽有梅季武子曰誰敢哉今譬於草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賔將出武子賦彤弓宣子曰城濮之役我先君文公獻功於衡雍受彤弓於襄王以為子孫藏匄也先君守官之嗣也敢不承命君子以為知禮九年夏季武子如晉報宣子之聘也秦景公使士雃乞師於楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓於善其大夫不失守其士競於教其庶人力於農穡商工皂𨽻不知遷業韓厥老矣知罃禀焉以為政范匄少於中行偃而上之使佐中軍韓起少於欒黶而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋楚子師於武城以為秦援秦人侵晉晉饑弗能報也冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士匄門於鄟門衛北宫括曹人邾人從荀偃韓起門於師之梁滕人薛人從欒黶士魴門於北門杞人郳人從趙武魏絳斬行栗甲戌師於氾令於諸侯曰修器備盛餱糧歸老幼居疾於虎牢肆𤯝圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟於戲鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不徳而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門閏月戊寅濟於隂阪侵鄭次於隂口而還子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晉不我救則楚强矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平公子罷戎入盟同盟於中分楚莊夫人卒王未能定鄭而歸晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭十年夏四月戊午㑹于柤晉荀偃士匄請伐偪陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克孟氏之臣秦堇父輦重如役偪陽人啓門諸侯之士門焉縣門發郰人紇抉之以出門者狄虒彌建大車之輪而䝉之以甲以為櫓左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之隊則又縣之蘇而復上者三主人辭焉乃退帶其斷以徇於軍三日諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以机出於其閒曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至於此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親受矢石甲午滅之書曰遂滅偪陽言自㑹也以與向戍向戍辭曰君若猶辱鎮撫宋國而以偪陽光啓寡君羣臣安矣其何貺如之若專賜臣是臣興諸侯以自封也其何罪大焉敢以死歸乃子宋公宋公享晉侯於楚丘請以桑林荀罃辭荀偃士匄曰諸侯宋魯於是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎舞師題以旌夏晉侯懼而退入於房去旌卒享而還及著雍疾卜桑林見荀偃士匄欲奔請禱焉荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之晉侯有間以偪陽子歸獻於武宫謂之夷俘偪陽妘姓也使周内史選其族嗣納諸霍人禮也師歸孟獻子以秦堇父為右生秦丕兹事仲尼六月楚子囊鄭子耳伐宋師於訾母庚午圍宋門於桐門衛侯救宋師於襄牛鄭子展曰必伐衛不然是不與楚也得罪於晉又得罪於楚國將若之何子駟曰國病矣子展曰得罪於二大國必亡病不猶愈於亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦㓂之利也大夫圖之衛人追之孫蒯獲鄭皇耳於犬丘秋七月楚子囊鄭子耳侵我西鄙還圍蕭八月丙寅克之九月子耳侵宋北鄙諸侯伐鄭齊崔杼使太子光先至於師故長於滕己酉師於牛首諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰我今逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師還侵鄭北鄙而歸楚人亦還十一年春鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之使疆埸之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋四月諸侯伐鄭己亥齊太子光宋向戌先至於鄭門於東門其莫晉荀罃至於西郊東侵舊許衛孫林父侵其北鄙六月諸侯㑹於北林師於向右還次於瑣圍鄭觀兵於南門西濟於濟隧鄭人懼乃行成秋七月同盟於亳范宣子曰不慎必失諸侯諸侯道敝而無成能無貳乎乃盟載書曰凡我同盟毋藴年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家楚子囊乞旅於秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋九月諸侯悉師以復伐鄭鄭人使良霄大宰石㚟如楚告將服於晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也諸侯之師觀兵於鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯十二月戊寅㑹於蕭魚庚辰赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告於諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鍾二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸侯八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂㫖君子殿天子之邦樂㫖君子福祿攸同便蕃左右亦是帥從夫樂以安德義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來逺人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑微子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳於是乎始有金石之樂禮也十二年夏晉士魴來聘且拜師公如晉朝且拜士魴之辱禮也冬楚子囊秦庶長無地伐宋師於楊梁以報晉之取鄭也十三年春公至自晉孟獻子書勞於廟禮也夏荀罃士魴卒晉侯蒐於緜上以治兵使士匄將中軍辭曰伯游長昔臣習於知伯是以佐之非能賢也請從伯游荀偃將中軍士匄佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫一人刑善百姓休和可不務乎書曰一人有慶兆民賴之其寧惟永其是之謂乎周之興也其詩曰儀刑文王萬邦作孚言刑善也及其衰也其詩曰大夫不均我從事獨賢言不讓也世之治也君子尚能而讓其下小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿德及其亂也君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐並生由爭善也謂之昏德國家之敝恒必由之鄭良霄大宰石㚟猶在楚石㚟言於子囊曰先王卜征五年而歲習其祥祥習則行不習則増修德而改卜今楚實不競行人何罪止鄭一卿以除其偪使睦而疾楚以固於晉焉用之使歸而廢其使怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之十四年春㑹於向執莒公子務婁以其通楚使也將執戎子駒支范宣子親數諸朝曰來姜戎氏昔秦人廹逐乃祖吾離於瓜州乃祖吾離被苫葢䝉荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者葢言語漏泄則職女之由詰朝之事爾無與焉與將執女對曰昔秦負恃其衆貪於土地逐我諸戎惠公蠲其大德謂我諸戎是四嶽之裔胄也毋是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至於今不貳昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼於時以從執政猶殽志也豈敢離逷今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之能為不與於㑹亦無瞢焉賦青蠅而退宣子辭焉使即事於㑹成愷悌也於是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使師歸自伐秦晉侯舍新軍禮也成國不過半天子之軍周為六軍諸侯之大者三軍可也於是知朔生盈而死盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舍之補逸國語悼公與司馬侯升臺而望曰樂夫對曰臨下之樂則樂矣徳義之樂則未也公曰何謂徳義對曰諸侯之為日在君側以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌肸習於春秋乃召叔向使傅太子彪發明按此則當時諸侯之史皆可謂之春秋不獨魯史也冬㑹於戚范宣子假羽毛於齊而弗歸齊人始貳十五年夏齊侯圍成貳於晉故也於是乎城成郛冬晉悼公卒鄭公孫夏如晉奔喪子蟜送葬十六年春葬晉悼公平公即位羊舌肸為傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修官烝於曲沃警守而下㑹於湨梁命歸侵田晉侯與諸侯宴於温使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戌衛甯殖鄭公孫蠆小邾之大夫盟曰同討不庭許男請遷於晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師㑹晉荀偃書曰㑹鄭伯為夷故也夏六月次於棫林庚寅伐許次於函氏晉荀偃欒黶帥師伐楚以報宋楊梁之役楚公子格帥師及晉師戰於湛阪楚師敗績晉師遂侵方城之外復伐許而還秋齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庻幾乎比執事之閒恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻雁之卒章宣子曰匄在此敢使魯無鳩乎十七年春宋莊朝伐陳獲司徒卬卑宋也衛孫蒯田於曹隧飲馬於重丘毁其瓶重丘人閉門而訽之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹取重丘曹人愬於晉齊人以其未得志於我故秋齊侯伐我北鄙圍桃髙厚圍臧紇於防師自陽闗逆臧孫至於旅松郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死十八年夏晉人執衛行人石買於長子執孫蒯於純留為曹故也秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首隊於前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東方則可以逞獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二㲄而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曾臣彪將率諸侯以討焉其官臣偃實先後之茍捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月㑹於魯濟尋湨梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右偽以斾先輿曳柴而從之齊侯見之畏其衆也乃脱歸丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁十一月丁夘朔入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夾脰曰止將為三軍獲不止將取其衷顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆衿甲面縛坐於中軍之鼓下晉人欲逐歸者魯衛請攻險己夘荀偃士匄以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩范鞅門於雍門其御追喜以戈殺犬於門中孟莊子斬其橁以為公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門於揚門州綽門於東閭左驂廹還於門中以枚數闔齊侯駕將走郵棠太子與郭榮扣馬曰師速而疾畧也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劍斷鞅乃止甲辰東侵及濰南及沂楚使子庚門於純門晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之德也十九年春諸侯還自沂上盟於督揚曰大母侵小晉侯先歸公享晉六卿於蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服賄荀偃束錦加璧乘馬先吳夀夢之鼎晉欒魴帥師從衛孫文子伐齊季武子如晉拜師晉侯享之范宣子為政賦黍苗季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月季武子以所得於齊之兵作林鍾而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彛器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也齊靈公卒晉士匄侵齊及穀聞喪而還禮也冬十一月城西郛懼齊也齊及晉平盟於大隧故穆叔㑹范宣子於柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城二十年夏盟於澶淵齊成故也蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚陳慶虎慶寅畏公子黄之偪愬諸楚曰與蔡司馬同謀楚人以為討公子黄出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死書曰蔡殺其大夫公子燮言不與民同欲也陳侯之弟黄出奔楚言非其罪也公子黄將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也齊子初聘於齊禮也二十一年春公如晉拜師二十三年春杞孝公卒晉悼夫人喪之平公不徹樂非禮也禮為鄰國闕陳侯如楚公子黄愬二慶於楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黄君子謂慶氏不義不可肆也故書曰惟命不于常秋齊侯伐衛自衛將遂伐晉取朝歌以報平隂之役八月叔孫豹帥師救晉次於雍榆禮也二十四年孟孝伯侵齊晉故也齊侯既伐晉而懼將欲見楚子楚子使薳啟彊如齊聘且請期齊社蒐軍實使客觀之陳文子曰齊將有冦吾聞之兵不戢必取其族秋齊侯聞將有晉師使陳無宇從薳啟彊如楚辭且乞師崔杼帥師送之遂伐莒侵介根㑹於夷儀將以伐齊水不克冬楚子伐鄭以救齊門於東門次於棘澤諸侯還救鄭晉侯使張骼輔躒致楚師求御於鄭鄭人卜宛射犬吉子大叔戒之曰大國之人不可與也對曰無有衆寡其上一也大叔曰不然部婁無松栢二子在幄坐射犬於外既食而後食之使御廣車而行已皆乘乘車將及楚師而後從之乘皆踞轉而鼓琴近不告而馳之皆取胄於櫜而胄入壘皆下搏人以投收禽挾囚弗待而出皆超乘抽弓而射既免復踞轉而鼓琴曰公孫同乘兄弟也胡再不謀對曰曩者志入而已今則怯也皆笑曰公孫之亟也楚子自棘澤還使薳啟彊帥師送陳無宇陳人復討慶氏之黨鍼宜咎出奔楚二十五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光晉侯濟自泮㑹於夷儀伐齊以報朝歌之役齊人以莊公説使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告於諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣秋七月己巳同盟於重丘齊成故也臣士竒曰晉悼公惠伯談之子桓叔捷之孫而襄公之曽孫也出居於周蚤有英譽厲公弑諸大夫迎而立之其在周也單襄公稱其十一美行而屬其子頃善視之迨反晉國年甫十四諸大夫逆於清原悼公曰人之有君使出命也立而不從將焉用君二三子用我今日否亦今日侃侃數言足以懾強臣悍將之氣固已竒矣及觀其初政逐不臣者七人選六官於民譽施舍己責宥罪薄賦以次舉行取靈成景厲隳壞之紀綱而振刷之英風偉畧震焯一時是以魯侯見而心折杞伯聞而驟朝其能招來宇下光復伯業有以也至其經畧中原首在誅宋之叛臣又能庸魏絳之策内和戎狄使邊鄙不擾民事以修故得一意南向與楚爭衡而為諸侯倚庇其制楚也則不在虎牢梧制之城據鄭腹心而在知大夫分鋭逆來還師以敝楚之計葢楚鋒剽悍未可力爭晉即悉下河山之甲與决一戰幸而勝楚不能必其不謀再舉一往一來其勢兩敝惟以少制多使楚疲於奔命久將衰止而乃可為鄭息數十年之肩矣自此計行楚果坐屈三駕功成如操左契甚矣晉伯之成絳始之罃終之而金石之賜獨及絳而不及罃何也至鄭之所以傾心惟在悼公推至誠以待之禮囚禁掠鄭人即吾人自非木石未有誠感之而不動者蕭魚以後三經楚師而鄭不叛雖曰南風不競天道多在西北要非鄭之一心於晉其與楚為㑹安能遲至二十四年之後乎獨恨以晉悼之賢東門納欵不能力卻鄭賂以示義於天下而溺其歌鐘鎛磬女樂二八春秋之世貪冒成風賢者不免而晉國尤甚可慨也又有異者文襄之伯皆以王室為先文公出定襄王襄公朝王於温皆晉己事也况悼嘗託周單氏善之逆知其必反晉國而為之禮乃悼五合六聚未聞一事有闗王室惟雞丘之歃王臣與焉又為凟分而不可訓悼豈明於資而暗於學者耶至其工於取鄭而撫陳則拙巧於柔楚而服齊則疎英毅之氣鋭始而怠終致有宣子假羽毛之事竟以失齊而悼且没矣邢丘委政而湨梁之㑹大夫遂主之姑息貽患亦悼盛德之累也迨夫子黄納而楚横朝歌取而齊大夷儀之役又以利隳為天下笑平公而下晉伯無足觀矣如悼公不誠賢君哉左傳紀事本末卷二十九
