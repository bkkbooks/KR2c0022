body:
  text: 左傳紀事本末卷二十詹事府詹事高士竒撰靈景經略小國晏子相齊附襄公二年春齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還君子是以知齊靈公之為靈也夏齊姜薨齊侯使諸姜宗婦來送葬召萊子萊子不㑹故晏弱城東陽以偪之六年十一月齊侯滅萊萊恃謀也於鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅於堞及杞桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器于襄宮晏弱圍棠十一月丙辰而滅之遷萊于郳高厚崔杼定其田十七年齊晏桓子卒晏嬰麤縗斬苴絰帶杖菅屨食鬻居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫昭公三年燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯欵出奔齊罪之也六年十一月齊侯如晉請伐北燕也士匄相士鞅逆諸河禮也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不貳吾君賄左右諂諛作大事不以信未甞可也七年春王正月暨齊平齊求之也癸巳齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晳曰受服而退俟釁而動可也二月戊午盟于濡上燕人歸燕姬賂以瑶罋玉櫝斚耳不克而還十二年春齊高偃納北燕伯欵于唐因其衆也攷異公羊傳伯于陽者何公子陽生也子曰吾乃知之矣在側者曰子茍知之何以不革曰如爾所不知何春秋之信史也其序則齊桓晉文其㑹則主㑹者為之也其詞則丘有罪焉爾發明按此傳聞師說之誤歐陽公所以致疑于三傳也十四年秋八月莒著丘公卒郊公不慼國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善於庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田十九年秋齊高發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀二十年齊侯疥遂痁期而不瘳諸侯之賓問疾者多在梁丘據與裔款言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賓公說告晏子晏子曰日宋之盟屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外内不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信於鬼䄂其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私高臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫從肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其葢失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政偪介之關暴征其私承嗣大夫强易其賄布常無藝徵歛無度宮室日更淫樂不違内寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史修德而後可公說使有司寛政毁關去禁薄斂已責十二月齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之齊侯至自田晏子侍于遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁大小短長疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後大公因之古若無死爽鳩氏之樂非君所願也補逸晏子春秋公孫接田開疆古冶子事景公以勇力搏虎聞晏子過而趨三子者不起晏子入見公曰臣聞明君之蓄勇力之士也上有君臣之義下有長率之倫内可以禁暴外可以威敵上利其功下服其勇故尊其位重其禄今君之蓄勇力之士也上無君臣之義下無長率之倫内不以禁暴外不以威敵此危國之器也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力攻勍敵之人也無長㓜之禮因請公使人少餽之二桃曰三子何不計功而食桃公孫接仰天而嘆曰晏子智人也夫使公之計吾功者不受桃是無勇也士衆而桃寡何不計功而食桃矣接一搏􅢢而再搏乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾伏兵而卻三軍者再若開疆之功亦可以食桃而無與人同矣援桃而起古冶子曰吾甞從君濟于河黿銜左驂以入砥柱之流當是時也冶少不能游潛行逆流百步順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出津人皆曰河伯也若冶視之則大黿之首若冶之功可以食桃而無與人同矣二子何不反桃抽劍而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃􅀢領而死古冶子曰二子死之冶獨生之不仁耻人以言而夸其聲不義恨乎所行不死無勇雖然二子同桃而節冶專其桃而宜亦反其桃􅀢領而死使者復曰已死矣公殮之以服葬之以士禮焉說苑景公正晝被髪乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而不朝晏子睹裔敖而問曰君何故不朝對曰昔者君正晝被髪乘六馬御婦人出正閨刖跪擊其馬而反之曰爾非吾君也公慚而反不果出是以不朝晏子入見公曰昔者寡人有罪被髪乘六馬以出正閨刖跪擊其馬而反之曰爾非吾君也寡人以天子大夫之賜得率百姓以守宗廟今見戮于刖跪以辱社稷吾猶可以齊于諸侯乎晏子對曰君無惡焉臣聞之下無直辭上無隱君民多諱言君有驕行古者明君在上下有直辭君上好善民無諱言今君有失行而刖跪有直辭是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諌公笑曰可乎晏子曰可于是令刖跪倍資無正時朝無事二十二年春王二月甲子齊北郭啓帥師伐莒莒子將戰苑羊牧之諌曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師于壽餘齊侯伐莒莒子行成司馬竈如莒涖盟莒子如齊涖盟盟于稷門之外莒於是乎大惡其君二十三年莒子庚輿虐而好劍苟鑄劍必試諸人國人患之又將叛齊烏存帥國人以逐之庚輿將出聞烏存執殳而立於道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弑君成名遂來奔齊人納郊公二十六年齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不諂不貳其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懐多福厥德不囘以受方國君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德回亂民將流亡祝史之為無能補也公說乃止臣士竒曰齊靈肆其暴横數伐隣國圍齊之役身幾不免事在魯襄之十有八年伐滅萊裔其一端也萊恃夙沙之賂而不虞齊人之復至自取滅亡為齊役屬夾谷之㑹將以萊兵刼魯侯可見矣晏子顯君與管仲後先輝映而傳所載數事無足深取齊莊無道陵犯伯國熒庭郫卲之兵淫逞已甚不戢自焚旋以拊楹隊命晏子雖甞憂之不聞能强諫也及莊公被弑不過以枕股三踊同衆人之報其謂民望何景公嗣世疊經崔慶欒高之亂皆不能有所匡正而燕款之納僅至唐邑未能即其國都與仲父之城三亡國者殆霄壤矣郊公之奔始焉歸庚輿而溺其賂其後不終賦旄丘之葛僅能補過也當時晉政多門諸侯解體齊景陰有小伯之志是以假置君為市義之術伐徐盟莒鹹沙安甫之間左提右挈伯國莫敢致詰焉世之所謂以其君顯者此也竊謂不然方萊裔之譟齊君負大不義于天下及孔子以禮責齊景公愧悔無地晏子能以一言感悟齊侯三田來歸書之簡策魯有餘榮而齊君轉圜之美亦聲施不朽乃其顯君之最大者管晏並稱意當以此豈在覇業哉甞讀晏子春秋其言論多可采先儒謂其本墨氏夫墨氏原于老子者也晏子于患難之際大抵以退避為長策如云人有君而人弑之吾焉得死之而焉得亡之正老氏教也二桃而殺三勇士清淨流為名法不其然哉左傳紀事本末卷二十
